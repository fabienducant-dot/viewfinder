      card.appendChild(el("div",{style:"margin-bottom:8px;"}, baseInput));
    }
    const priceRow = el("div",{style:"display:flex;gap:8px;margin-bottom:8px;"});
    const priceIn = el("input",{type:"text", value:String(p.priceIn||""), placeholder:"$/1K tokens entrée"});
    priceIn.addEventListener("input", e=>{ p.priceIn = parseFloat(e.target.value)||0; LS.set("vf-api-providers", state.apiProviders); });
    const priceOut = el("input",{type:"text", value:String(p.priceOut||""), placeholder:"$/1K tokens sortie"});
    priceOut.addEventListener("input", e=>{ p.priceOut = parseFloat(e.target.value)||0; LS.set("vf-api-providers", state.apiProviders); });
    priceRow.appendChild(priceIn); priceRow.appendChild(priceOut);
    card.appendChild(priceRow);
    card.appendChild(el("p",{style:"font-size:11px;color:var(--muted2);"},"Tarifs approximatifs saisis manuellement — aucune API de pricing en temps réel. Laisse à 0 si tu ne connais pas le tarif exact."));
    frag.appendChild(card);
  });

  frag.appendChild(el("p",{class:"label", style:"margin-top:18px;"},"Génération d'image"));
  frag.appendChild(el("p",{class:"sublabel"},"OpenAI (gpt-image-1) est câblé en appel direct via la fonction serveur, si OPENAI_API_KEY est configurée. Les autres générateurs d'images (Stability, Ideogram, Flux/Fal) restent en mode manuel pour l'instant — chacun a un format d'API différent et mérite d'être fait proprement plutôt que rapidement."));

  return frag;
}

/* ============================================================
   ONGLET LABORATOIRE IA
============================================================ */
function buildLabTab(){
  const frag = el("div",{});
  frag.appendChild(el("p",{class:"sublabel"},"Historique de toutes les générations via API directe : modèle, coût, temps, résultat accepté ou refusé. Alimente l'apprentissage au fil du temps."));

  if(!state.lab.length){
    frag.appendChild(el("p",{class:"hint"},"Aucune génération via API pour l'instant. Configure un fournisseur dans \"Paramètres API\" puis génère un post en Mode Expert ou Production."));
    return frag;
  }

  // Bibliothèque de compatibilité : agrège les taux d'acceptation par fournisseur pour repérer les tendances.
  const byProvider = {};
  state.lab.forEach(l=>{
    if(!byProvider[l.provider]) byProvider[l.provider] = { accepted:0, refused:0, reasons:{} };
    if(l.status==="accepted") byProvider[l.provider].accepted++;
    if(l.status==="refused"){
      byProvider[l.provider].refused++;
      const r = l.reason || "raison inconnue";
      byProvider[l.provider].reasons[r] = (byProvider[l.provider].reasons[r]||0)+1;
    }
  });
  frag.appendChild(el("p",{class:"label"},"Bibliothèque de compatibilité"));
  Object.entries(byProvider).forEach(([provName, stats])=>{
    const total = stats.accepted+stats.refused;
    const rate = total ? Math.round((stats.accepted/total)*100) : 0;
    const topReason = Object.entries(stats.reasons).sort((a,b)=>b[1]-a[1])[0];
    frag.appendChild(el("div",{class:"module-card"},[
      el("div",{class:"module-head"},[el("div",{class:"module-title"}, provName), el("span",{style:`font-size:13px;color:${rate>=80?"var(--green)":rate>=50?"var(--amber)":"var(--coral)"};font-weight:600;`}, `${rate}% accepté`)]),
      el("div",{class:"module-content"}, `${stats.accepted} accepté(s), ${stats.refused} refusé(s)${topReason? ` — motif de refus le plus fréquent : "${topReason[0]}"` : ""}`),
    ]));
  });

  frag.appendChild(el("p",{class:"label", style:"margin-top:18px;"},"Historique détaillé"));
  const filterRow = el("div",{class:"pillrow", style:"margin-bottom:14px;"});
  const providers = ["Toutes", ...new Set(state.lab.map(l=>l.provider))];
  providers.forEach(p=>{
    filterRow.appendChild(el("button",{class:"pill"+(state.labFilter===p?" active":""), onclick:()=>{ state.labFilter=p; renderMain(); }}, p));
  });
  frag.appendChild(filterRow);

  const list = state.lab.filter(l=> state.labFilter==="Toutes" || l.provider===state.labFilter).slice().reverse();
  list.forEach(l=>{
    frag.appendChild(el("div",{class:"history-card"},[
      el("div",{class:"history-top"},[
        el("span",{}, `${l.provider} · ${l.model} · ${l.date}`),
        el("span",{style:`color:${l.status==="accepted"?"var(--green)":l.status==="refused"?"var(--coral)":"var(--muted2)"};`}, l.status==="accepted"?"✓ accepté":l.status==="refused"?"✗ refusé":"—"),
      ]),
      el("div",{style:"font-size:13px;color:var(--muted);margin-bottom:4px;"}, `Type : ${l.type} · Coût estimé : ${l.cost!=null ? "$"+l.cost.toFixed(4) : "non estimé"} · Temps : ${l.durationMs!=null ? (l.durationMs/1000).toFixed(1)+"s" : "—"}`),
      l.reason ? el("div",{style:"font-size:12px;color:var(--coral);"}, `Raison : ${l.reason}`) : null,
      el("details",{style:"margin-top:6px;"},[
        el("summary",{style:"font-size:12px;color:var(--muted2);cursor:pointer;"},"Voir le prompt envoyé"),
        el("pre",{style:"margin-top:6px;"}, l.prompt||""),
      ]),
    ]));
  });
  return frag;
}

function buildSettingsTab(){
  const frag = el("div",{});

  frag.appendChild(el("p",{class:"label"},"Synchronisation serveur (Netlify Blobs)"));
  frag.appendChild(el("p",{class:"sublabel"},"Le localStorage de ce téléphone reste toujours la copie principale et continue de fonctionner hors-ligne. Le serveur est une sauvegarde supplémentaire qui permet de retrouver tes données sur un autre appareil ou navigateur."));

  const lastServerSync = localStorage.getItem("vf-last-server-sync");
  const syncStatus = el("p",{style:"font-size:12px;color:var(--muted2);min-height:16px;margin:6px 0 10px;"},
    lastServerSync ? `Dernière sauvegarde serveur : ${new Date(Number(lastServerSync)).toLocaleString("fr-FR")}` : "Aucune synchronisation effectuée pour l'instant sur cet appareil.");
  frag.appendChild(syncStatus);

  const secretInput = el("input",{type:"text", value: localStorage.getItem("vf-sync-secret")||"", placeholder:"Secret de synchronisation (optionnel, seulement si configuré côté Netlify)"});
  secretInput.addEventListener("input", e=>{
    if(e.target.value) localStorage.setItem("vf-sync-secret", e.target.value);
    else localStorage.removeItem("vf-sync-secret");
  });
  frag.appendChild(el("div",{style:"margin-bottom:10px;"}, secretInput));

  const syncMsg = el("p",{style:"font-size:12px;color:var(--green);min-height:16px;margin:0 0 12px;"},"");

  frag.appendChild(el("button",{class:"btn-primary", style:"margin-bottom:8px;", onclick: async ()=>{
    syncMsg.style.color = "var(--muted2)"; syncMsg.textContent = "Synchronisation en cours...";
    try{
      const res = await fetch("/.netlify/functions/sync-data", {
        method:"POST", headers: syncHeaders(),
        body: JSON.stringify({ data: gatherSyncData(), updatedAt: getLocalUpdatedAt() || Date.now() }),
      });
      const result = await res.json();
      if(!res.ok || result.error) throw new Error(result.error || `Erreur ${res.status}`);
      if(result.action==="pull"){
        if(confirm("Le serveur contient une version plus récente. Remplacer les données de cet appareil par celles du serveur ?")){
          applySyncData(result.data);
          bumpLocalUpdatedAt();
          localStorage.setItem("vf-last-server-sync", String(Date.now()));
          syncMsg.style.color = "var(--green)"; syncMsg.textContent = "Données du serveur chargées, rechargement...";
          setTimeout(()=>location.reload(), 800);
        } else {
          syncMsg.style.color = "var(--muted2)"; syncMsg.textContent = "Synchronisation annulée.";
        }
      } else {
        localStorage.setItem("vf-last-server-sync", String(Date.now()));
        syncMsg.style.color = "var(--green)"; syncMsg.textContent = "Cet appareil est à jour avec le serveur ✓";
        renderMain();
      }
    }catch(err){
      syncMsg.style.color = "var(--coral)"; syncMsg.textContent = `Échec de la synchronisation (${err.message||err}).`;
    }
  }}, [svgIcon(ICONS.sparkles,16), el("span",{},"Synchroniser maintenant")]));

  frag.appendChild(el("button",{class:"btn-secondary", style:"margin-bottom:8px;", onclick: async ()=>{
    syncMsg.style.color = "var(--muted2)"; syncMsg.textContent = "Sauvegarde en cours...";
    try{
      const res = await fetch("/.netlify/functions/save-data", {
        method:"POST", headers: syncHeaders(),
        body: JSON.stringify({ data: gatherSyncData(), updatedAt: getLocalUpdatedAt() || Date.now() }),
      });
      const result = await res.json();
      if(!res.ok || result.error) throw new Error(result.error || `Erreur ${res.status}`);
      localStorage.setItem("vf-last-server-sync", String(Date.now()));
      syncMsg.style.color = "var(--green)"; syncMsg.textContent = "Sauvegardé sur le serveur ✓";
      renderMain();
    }catch(err){
      syncMsg.style.color = "var(--coral)"; syncMsg.textContent = `Échec de la sauvegarde (${err.message||err}).`;
    }
  }}, [svgIcon(ICONS.upload,14), el("span",{},"Sauvegarder sur serveur")]));

  frag.appendChild(el("button",{class:"btn-secondary", style:"margin-bottom:8px;", onclick: async ()=>{
    if(!confirm("Ça va remplacer les données de cet appareil par celles du serveur. Continuer ?")) return;
    syncMsg.style.color = "var(--muted2)"; syncMsg.textContent = "Récupération en cours...";
    try{
      const res = await fetch("/.netlify/functions/load-data", { method:"GET", headers: syncHeaders() });
      const result = await res.json();
      if(!res.ok || result.error) throw new Error(result.error || `Erreur ${res.status}`);
      if(!result.data || !Object.keys(result.data).length){
        syncMsg.style.color = "var(--amber)"; syncMsg.textContent = "Aucune donnée trouvée sur le serveur pour l'instant.";
        return;
      }
      applySyncData(result.data);
      if(result.updatedAt) localStorage.setItem("vf-updated-at", String(result.updatedAt));
      localStorage.setItem("vf-last-server-sync", String(Date.now()));
      syncMsg.style.color = "var(--green)"; syncMsg.textContent = "Données restaurées, rechargement...";
      setTimeout(()=>location.reload(), 800);
    }catch(err){
      syncMsg.style.color = "var(--coral)"; syncMsg.textContent = `Échec de la restauration (${err.message||err}).`;
    }
  }}, [svgIcon(ICONS.download,14), el("span",{},"Restaurer depuis serveur")]));

  frag.appendChild(syncMsg);
  frag.appendChild(el("p",{style:"font-size:11px;color:var(--muted2);margin:0 0 20px;border-top:1px solid var(--border);padding-top:12px;"},
    "Export/import JSON ci-dessous : ta sécurité de secours, indépendante du serveur — toujours disponible même sans connexion."));

  frag.appendChild(el("p",{class:"sublabel"},"Sauvegarde complète en un clic : bibliothèque, connaissances, direction artistique, styles, historique, audits et campagnes en cours — tout ce que contient Viewfinder, dans un seul fichier JSON. Utile pour ne jamais perdre ton travail ou pour le transférer sur un autre appareil."));

  function getAllVfKeys(){
    const keys = [];
    const EXCLUDE = ["vf-updated-at","vf-last-server-sync","vf-sync-secret"];
    for(let i=0;i<localStorage.length;i++){
      const k = localStorage.key(i);
      if(k && k.startsWith("vf-") && !EXCLUDE.includes(k)) keys.push(k);
    }
    return keys;
  }
  const LABELS = {
    "vf-images":"Bibliothèque", "vf-modules":"Connaissances", "vf-da":"Direction artistique",
    "vf-styles":"Styles", "vf-history":"Base de prompts (historique)", "vf-audit":"Audits IA",
    "vf-campaign":"Campagne en cours", "vf-lab":"Laboratoire IA", "vf-api-providers":"Paramètres API (clés incluses)", "vf-modes":"Modes de production",
    "vf-scheduled":"Calendrier de programmation", "vf-make-webhook":"Webhook Make",
  };
  const keys = getAllVfKeys();
  frag.appendChild(el("p",{class:"label"},"Contenu de la sauvegarde"));
  const list = el("div",{style:"margin-bottom:10px;"});
  keys.forEach(k=>{
    let count = "";
    try{ const v = LS.get(k, null); if(Array.isArray(v)) count = ` (${v.length})`; }catch(e){}
    list.appendChild(el("div",{style:"font-size:13px;color:var(--muted);padding:4px 0;border-bottom:1px solid var(--border);"}, `${LABELS[k]||k}${count}`));
  });
  frag.appendChild(list);

  const apiKeyToggle = el("input",{type:"checkbox", checked: state.includeApiKeysInExport});
  apiKeyToggle.addEventListener("change", e=>{ state.includeApiKeysInExport = e.target.checked; });
  frag.appendChild(el("label",{style:"display:flex;align-items:center;gap:8px;margin-bottom:18px;font-size:13px;color:var(--muted);"},
    [apiKeyToggle, "Inclure mes clés API dans l'export (déconseillé si tu comptes partager ce fichier — exclu par défaut)"]));

  frag.appendChild(el("button",{class:"btn-primary", style:"margin-bottom:12px;", onclick: ()=>{
    const dump = { _meta: { app:"Viewfinder", exportedAt: new Date().toISOString(), version: 1 } };
    getAllVfKeys().forEach(k=>{
      if(k==="vf-api-providers" && !state.includeApiKeysInExport){
        const sanitized = (LS.get(k, [])||[]).map(p=> ({...p, apiKey:""}));
        dump[k] = sanitized;
      } else {
        dump[k] = LS.get(k, null);
      }
    });
    const blob = new Blob([JSON.stringify(dump, null, 2)], {type:"application/json"});
    const link = document.createElement("a");
    link.download = `viewfinder-sauvegarde-${nowStr().replace(/\//g,"-")}.json`;
    link.href = URL.createObjectURL(blob);
    link.click();
  }}, [svgIcon(ICONS.download,16), el("span",{},"Exporter toute la sauvegarde")]));

  const importInput = el("input",{type:"file", accept:"application/json", style:"display:none"});
  const importMsg = el("p",{style:"font-size:12px;color:var(--green);min-height:14px;"},"");
  importInput.addEventListener("change", (e)=>{
    const file = e.target.files[0]; if(!file) return;
    const reader = new FileReader();
    reader.onload = ()=>{
      try{
        const dump = JSON.parse(reader.result);
        const entries = Object.entries(dump).filter(([k])=> k.startsWith("vf-"));
        if(!entries.length){ importMsg.textContent = "Ce fichier ne contient aucune donnée Viewfinder reconnue."; return; }
        const ok = confirm(`Restaurer cette sauvegarde va REMPLACER toutes les données actuelles de Viewfinder sur cet appareil (${entries.length} élément(s)). Continuer ?`);
        if(!ok) return;
        entries.forEach(([k,v])=>{ if(v!==null) LS.set(k, v); });
        importMsg.textContent = "Restauration réussie, rechargement...";
        setTimeout(()=>location.reload(), 800);
      }catch(err){ importMsg.textContent = "Fichier invalide ou corrompu."; }
    };
    reader.readAsText(file);
    importInput.value = "";
  });
  frag.appendChild(importInput);
  frag.appendChild(el("button",{class:"btn-secondary"}, [svgIcon(ICONS.upload,14), el("span",{},"Restaurer une sauvegarde")]))
    .addEventListener("click", ()=>importInput.click());
  frag.appendChild(importMsg);

  return frag;
}

/* ============================================================
   ROUTEUR
============================================================ */
function renderMain(){
  const main = document.getElementById("main");
  main.innerHTML = "";
  const builders = {
    accueil: buildAccueilTab, library: buildLibraryTab, editor: buildEditorTab, knowledge: buildKnowledgeTab,
    da: buildDaTab, styles: buildStylesTab, post: buildPostTab, calendar: buildCalendarTab, audit: buildAuditTab, lab: buildLabTab, api: buildApiTab,
    history: buildHistoryTab, settings: buildSettingsTab,
  };
  try{
    const builder = builders[state.tab] || buildAccueilTab;
    main.appendChild(builder());
  }catch(err){
    console.error("Erreur de rendu :", err);
    main.appendChild(el("div",{class:"card"},[
      el("p",{style:"color:var(--coral);font-weight:600;margin-bottom:6px;"},"Cet onglet a rencontré un problème."),
      el("p",{style:"font-size:12px;color:var(--muted2);margin-bottom:10px;"}, String(err && err.message || err)),
      el("button",{class:"btn-secondary", onclick:()=>{ state.tab="accueil"; renderNav(); renderMain(); }}, "Retour à l'accueil"),
    ]));
  }
}
renderNav();
renderMain();
updateCount();
checkServerOnLoad();

if ("serviceWorker" in navigator) {
  window.addEventListener("load", () => {
    navigator.serviceWorker.register("./sw.js").catch((err) => console.error("SW non enregistré :", err));
  });
}
</script>
