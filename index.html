<style>
  :root{
    --bg:#1B1230; --card:rgba(255,255,255,0.05); --card2:rgba(255,255,255,0.08); --border:rgba(255,255,255,0.13);
    --text:#F4F1EA; --muted:#B8B4C9; --muted2:#8B899C;
    --coral:#FF5D73; --lime:#D4F14C; --amber:#FFB020; --blue:#4C6EF5; --green:#3ECF8E;
  }
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;background:var(--bg);color:var(--text);font-family:-apple-system,Segoe UI,Roboto,Helvetica,Arial,sans-serif;}
  button{font-family:inherit;cursor:pointer;border:none;background:none;color:inherit;}
  input,textarea,select{font-family:inherit;color:inherit;background:transparent;}
  ::-webkit-scrollbar{width:6px;height:6px}
  ::-webkit-scrollbar-thumb{background:#4C3D66;border-radius:3px}

  header{position:sticky;top:0;z-index:10;background:rgba(27,18,48,0.97);border-bottom:1px solid var(--border);
    padding:14px 18px;display:flex;align-items:center;justify-content:space-between;}
  .brand{display:flex;align-items:center;gap:8px;font-weight:700;font-size:18px;letter-spacing:-0.02em;}
  .dot-ring{width:26px;height:26px;border-radius:50%;border:2px solid var(--coral);display:flex;align-items:center;justify-content:center;}
  .dot-ring i{width:8px;height:8px;border-radius:50%;background:var(--lime);}
  .count{font-size:12px;color:var(--muted);}

  nav{display:flex;gap:6px;padding:12px 16px 0;overflow-x:auto;}
  nav button{padding:8px 14px;border-radius:999px;font-size:13px;white-space:nowrap;color:var(--muted);transition:background .15s;}
  nav button.active{background:var(--coral);color:var(--bg);font-weight:600;}
  nav button:not(.active):hover{background:rgba(255,255,255,0.06);}

  main{padding:16px;padding-bottom:80px;max-width:560px;margin:0 auto;}
  .hint{text-align:center;color:var(--muted2);font-size:14px;margin-top:32px;}
  .label{font-size:11px;text-transform:uppercase;letter-spacing:.06em;color:var(--muted2);margin-bottom:8px;}
  .sublabel{font-size:12px;color:var(--muted2);margin:-6px 0 14px;line-height:1.5;}
  h2.section{font-size:16px;font-weight:700;margin:26px 0 4px;padding-top:14px;border-top:1px solid var(--border);}
  h2.section:first-child{margin-top:0;padding-top:0;border-top:none;}

  .upload-zone{width:100%;border:2px dashed rgba(255,255,255,0.2);border-radius:18px;padding:28px 10px;
    display:flex;flex-direction:column;align-items:center;gap:8px;color:var(--muted);margin-bottom:16px;transition:.15s;}
  .upload-zone:hover{border-color:rgba(255,93,115,0.6);color:var(--coral);}

  .grid2{display:grid;grid-template-columns:1fr 1fr;gap:12px;}
  .thumb{position:relative;aspect-ratio:1/1;border-radius:12px;overflow:hidden;cursor:pointer;}
  .thumb img{width:100%;height:100%;object-fit:cover;display:block;}
  .thumb .del,.thumb .fav{position:absolute;top:6px;background:rgba(0,0,0,0.6);border-radius:999px;padding:6px;opacity:0;transition:.15s;}
  .thumb .del{right:6px;} .thumb .fav{left:6px;}
  .thumb:hover .del,.thumb:hover .fav{opacity:1;}
  .thumb .fav.active{opacity:1;color:var(--amber);}
  .thumb .tags{position:absolute;bottom:0;left:0;right:0;background:linear-gradient(transparent,rgba(0,0,0,0.75));
    padding:14px 6px 5px;font-size:10px;color:var(--muted);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}

  .vf{position:relative;}
  .vf .corner{position:absolute;width:20px;height:20px;border-color:var(--amber);}
  .vf .tl{top:0;left:0;border-top:2px solid;border-left:2px solid;border-top-left-radius:4px;}
  .vf .tr{top:0;right:0;border-top:2px solid;border-right:2px solid;border-top-right-radius:4px;}
  .vf .bl{bottom:0;left:0;border-bottom:2px solid;border-left:2px solid;border-bottom-left-radius:4px;}
  .vf .br{bottom:0;right:0;border-bottom:2px solid;border-right:2px solid;border-bottom-right-radius:4px;}

  .pillrow{display:flex;gap:8px;flex-wrap:wrap;}
  .pill{padding:7px 14px;border-radius:999px;font-size:13px;border:1px solid rgba(255,255,255,0.15);color:var(--muted);}
  .pill.active{background:var(--lime);color:var(--bg);border-color:var(--lime);font-weight:600;}
  .badge{display:inline-block;font-size:10px;padding:2px 8px;border-radius:999px;background:rgba(76,110,245,0.2);color:#8FA6FF;}

  textarea,input[type=text],select{width:100%;background:var(--card);border:1px solid var(--border);border-radius:10px;
    padding:9px 12px;font-size:14px;outline:none;resize:none;}
  textarea:focus,input[type=text]:focus,select:focus{border-color:var(--coral);}
  input[type=range]{width:100%;accent-color:var(--coral);}
  input[type=checkbox]{width:16px;height:16px;accent-color:var(--coral);}

  .btn-primary{width:100%;background:var(--coral);color:var(--bg);font-weight:600;border-radius:999px;padding:13px;
    display:flex;align-items:center;justify-content:center;gap:8px;font-size:15px;}
  .btn-primary:hover{filter:brightness(1.08);}
  .btn-secondary{width:100%;background:rgba(76,110,245,0.18);color:#8FA6FF;font-weight:600;border-radius:999px;padding:10px;
    display:flex;align-items:center;justify-content:center;gap:8px;font-size:14px;}
  .btn-small{background:var(--card);border-radius:8px;padding:6px 10px;font-size:12px;display:inline-flex;align-items:center;gap:5px;}
  .btn-ghost{flex:1;background:var(--card);border-radius:999px;padding:9px;font-size:13px;
    display:flex;align-items:center;justify-content:center;gap:6px;}
  .btn-ghost.active{background:var(--lime);color:var(--bg);font-weight:600;}

  .card{background:var(--card);border:1px solid var(--border);border-radius:14px;padding:14px;}
  .module-card{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:12px;margin-bottom:8px;}
  .module-head{display:flex;align-items:center;justify-content:space-between;gap:8px;margin-bottom:6px;}
  .module-title{font-weight:600;font-size:14px;}
  .module-cat{font-size:10px;color:var(--muted2);}
  .module-content{font-size:13px;color:var(--muted);white-space:pre-wrap;line-height:1.5;}

  .history-card{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:12px;margin-bottom:10px;}
  .history-top{display:flex;justify-content:space-between;align-items:center;font-size:12px;color:var(--muted2);margin-bottom:6px;}

  .slider-block{margin-bottom:14px;}
  .slider-block .row{display:flex;justify-content:space-between;font-size:12px;color:var(--muted);margin-bottom:4px;}
  .field{margin-bottom:12px;}
  .field label{display:block;font-size:12px;color:var(--muted);margin-bottom:5px;}

  canvas{width:100%;height:auto;display:block;background:#000;border-radius:12px;touch-action:none;cursor:crosshair;}
  pre{white-space:pre-wrap;font-size:12px;color:var(--muted);max-height:240px;overflow-y:auto;margin:0;font-family:ui-monospace,monospace;}
  svg{display:inline-block;vertical-align:middle;flex-shrink:0;}
</style>
</head>

function scheduleAutoSync(){
  if(autoSyncTimer) clearTimeout(autoSyncTimer);
  autoSyncTimer = setTimeout(()=>{ pushToServerSilent(); }, 4000);

function getLocalUpdatedAt(){ return Number(localStorage.getItem("vf-updated-at")||0); }
function bumpLocalUpdatedAt(){ localStorage.setItem("vf-updated-at", String(Date.now())); }

const LS = {
  get(key, fallback){ try{ const v = localStorage.getItem(key); return v===null? fallback : JSON.parse(v);}catch(e){return fallback;} },

    try{
      localStorage.setItem(key, JSON.stringify(val));
      if(SYNC_KEYS.includes(key)){ bumpLocalUpdatedAt(); scheduleAutoSync(); }
      return true;
    }catch(e){
      console.error(e);
      if(typeof state!=="undefined") state.storageError = { key, message: String(e && e.message || e), at: Date.now() };
      return false;
    }
  }
};

/* ============================================================
   NETTOYAGE UNIQUE — purge ciblée par nom exact, jamais un reset global.
   S'exécute une seule fois (verrou vf-cleanup-2026-07) puis ne touche plus rien.
   Ne supprime QUE les entrées explicitement listées ci-dessous ; tout le reste
   (styles SDZ, modules importés, historique, audits, réglages) reste intact.
============================================================ */
(function runOneTimeCleanup(){
  const FLAG = "vf-cleanup-2026-07";
  if(LS.get(FLAG, false)) return;

  const DELETE_STYLE_NAMES = ["noir & or","editorial","éditorial","cinématique","refuge",
    "énergétique","energetique","nature","montagne","été","ete","mystique premium"];
  try{
    const styles = LS.get("vf-styles", null);
    if(Array.isArray(styles)){
      const seen = new Set();
      const cleaned = [];
      styles.forEach(s=>{
        const norm = (s.name||"").trim().toLowerCase();
        if(DELETE_STYLE_NAMES.includes(norm)) return;      // style à supprimer explicitement

      );
      if(cleaned.length !== modules.length) LS.set("vf-modules", cleaned);
    }
  }catch(e){ console.error("Nettoyage modules échoué :", e); }

})();

function el(tag, attrs={}, children=[]){
  const e = document.createElement(tag);
  for(const [k,v] of Object.entries(attrs)){
    if(k==="class") e.className = v;
    else if(k==="html") e.innerHTML = v;
    else if(k.startsWith("on")) e.addEventListener(k.slice(2), v);
    else if(k==="checked"){ e.checked = v; }
    else e.setAttribute(k, v);
  }
  (Array.isArray(children)?children:[children]).forEach(c=>{
    if(c==null) return;
    e.appendChild(typeof c === "string" ? document.createTextNode(c) : c);
  });
  return e;
}

function resizeImageFile(file, maxDim=1600, quality=0.85){
  return new Promise((resolve, reject)=>{
    const reader = new FileReader();
    reader.onload = () => {
      const img = new Image();
      img.onload = () => {
        let {width,height} = img;
        if(width>maxDim || height>maxDim){
          if(width>height){ height = Math.round(height*maxDim/width); width = maxDim; }
          else { width = Math.round(width*maxDim/height); height = maxDim; }
        }
        const c = document.createElement("canvas"); c.width=width; c.height=height;
        c.getContext("2d").drawImage(img,0,0,width,height);
        resolve(c.toDataURL("image/jpeg", quality));
      };
      img.onerror = reject;
      img.src = reader.result;
    };
    reader.onerror = reject;
    reader.readAsDataURL(file);
  });
}
function loadImage(src){
  return new Promise((resolve,reject)=>{
    const img = new Image();
    img.onload = ()=>resolve(img);
    img.onerror = reject;
    img.src = src;
  });
}

/* L'IA ne doit jamais être chargée de dessiner le logo (elle ne peut que l'approximer, jamais le reproduire
   fidèlement) : on lui demande de laisser une zone dégagée, puis on incruste ici le vrai fichier logo
   marqué comme actif de marque dans la Bibliothèque, exactement à la position réglée dans state.logoOverlay. */
async function compositeRealLogo(baseDataUrl){
  const logoAsset = state.images.find(i=>i.assetType==="logo");
  if(!logoAsset) return { dataUrl: baseDataUrl, applied:false };
  try{
    const baseImg = await loadImage(baseDataUrl);
    const logoImg = await loadImage(logoAsset.dataUrl);
    const canvas = document.createElement("canvas");
    canvas.width = baseImg.width; canvas.height = baseImg.height;
    const ctx = canvas.getContext("2d");
    ctx.drawImage(baseImg, 0, 0);
    const logoW = canvas.width * (state.logoOverlay.size/100);
    const logoH = logoW * (logoImg.height/logoImg.width);
    const lx = (state.logoOverlay.x/100)*canvas.width - logoW/2;
    const ly = (state.logoOverlay.y/100)*canvas.height - logoH/2;
    ctx.drawImage(logoImg, lx, ly, logoW, logoH);
    return { dataUrl: canvas.toDataURL("image/png"), applied:true };
  }catch(e){
    return { dataUrl: baseDataUrl, applied:false };
  }
}

/* Fusionne le contenu de tous les modules "Prestations" activés, en éliminant les doublons exacts
   (si le même texte a été collé dans plusieurs modules). Ne modifie jamais les modules eux-mêmes. */
function getMergedPrestationsText(){
  const mods = state.modules.filter(m=>m.enabled && m.category==="Prestations");
  const seen = new Set();
  const parts = [];
  mods.forEach(m=>{
    const c = (m.content||"").trim();
    if(c && !seen.has(c)){ seen.add(c); parts.push(c); }
  });
  return parts.join("\n\n");
}
/* Repère, dans le texte fusionné, où commence chaque prestation connue et découpe le texte
   entre deux noms de prestations consécutifs pour isoler le bloc de détails de chacune. */
function extractPrestationBlocks(text){
  const found = [];
  KNOWN_PRESTATIONS.forEach(name=>{
    const idx = text.indexOf(name);
    if(idx !== -1) found.push({name, idx});
  });
  found.sort((a,b)=>a.idx-b.idx);
  const blocks = {};
  found.forEach((f,i)=>{
    const end = i+1<found.length ? found[i+1].idx : text.length;
    blocks[f.name] = text.slice(f.idx, end).trim();
  });
  return blocks;
}
function extractField(block, patterns){
  for(const re of patterns){ const m = block.match(re); if(m) return m[1].trim(); }
  return null;
}
const DURATION_PATTERNS = [/dur[ée]e\s*[:\-]\s*([^\n]+)/i, /(\d+\s*(?:min|minutes|h|heures)\b[^\n]*)/i];
const PRICE_PATTERNS = [/tarifs?\s*[:\-]\s*([^\n]+)/i, /prix\s*[:\-]\s*([^\n]+)/i, /(\d+[\.,]?\d*\s*€[^\n]*)/];
/* Champs de la "fiche prestation" enrichie : reconnus automatiquement s'ils sont écrits
   sous la forme "Label : contenu" dans le bloc de la prestation. Ceux non trouvés sont
   simplement omis — le bloc brut complet est de toute façon toujours transmis en renfort. */
const PRESTATION_FICHE_LABELS = ["histoire","émotion","psychologie","codes visuels","matières",
  "textures","lumière","composition","vocabulaire","cta","interdits","scène visuelle"];
function extractFicheFields(block){
  const found = {};
  PRESTATION_FICHE_LABELS.forEach(label=>{
    const re = new RegExp(label.replace(/[.*+?^${}()|[\]\\]/g,"\\$&")+"\\s*[:\\-]\\s*([^\\n]+)","i");
    const m = block.match(re);
    if(m) found[label] = m[1].trim();
  });
  return found;
}

/* Retourne les infos de la prestation actuellement sélectionnée, ou null si aucune. */
function getSelectedPrestationInfo(){

}

/* ---------- MOTEUR DE CONTEXTE ----------
   Sélectionne les modules pertinents pour les catégories demandées, fusionne les doublons stricts
   (même titre + même contenu dans deux modules), trie selon la hiérarchie SDZ, puis applique un
   budget de caractères pour ne garder que ce qui a un réel impact — qualité plutôt que quantité. */
/* ---------- Paliers de priorité par catégorie ----------
   "always" : ADN de marque, ton, direction artistique, règles dures, CTA, mission, et catégories déjà
              spécifiques à la plateforme (via TEXT_MODULE_MAP) — jamais sacrifiées en premier.
   "rare"   : contenus de fond (glossaire, historique de décisions, exemples, leçons) — utiles mais
              plafonnés en nombre pour éviter le remplissage systématique.
   "context": tout le reste — inclus seulement s'il est réellement pertinent maintenant (voir plus bas). */
function moduleTier(category){
  const ALWAYS = ["MASTER SDZ","CODEX SDZ","Univers de marque","Charte graphique","Direction artistique",
    "Règles rédactionnelles","CTA","Missions","Interdits","À ne jamais faire","À faire",
    "Vocabulaire autorisé","Vocabulaire interdit","Logo","Palette","Typographies",
    "Instagram","Facebook","Google Business","Stories","Blog Wix","SEO"];
  const RARE = ["Décisions importantes","Glossaire","Erreurs fréquentes","Exemples excellents",
    "Exemples validés","Exemples refusés","Leçons apprises","Bibliothèque d'idées"];
  if(ALWAYS.includes(category)) return "always";
  if(RARE.includes(category)) return "rare";
  return "context";
}
/* Pertinence contextuelle réelle, calculée automatiquement (aucun réglage manuel ajouté à l'interface) :
   une connaissance "context" n'est injectée que si elle correspond à la situation actuelle. */
function isContextRelevantNow(m){
  if(m.category==="Saisonnalité"){
    const season = getCurrentSeasonFR().toLowerCase();
    return m.content.toLowerCase().includes(season);
  }
  if(m.category==="Offres"){
    const t = `${state.topic||""} ${state.prestationName||""} ${state.mission||""}`.toLowerCase();
    return t.includes("cadeau") || t.includes("offre") || state.mission==="Vendre des bons cadeaux";
  }
  return true; // Prestations, Psychologie client, Personae, Objections clients : pertinents dès qu'ils existent
}
/* Quasi-déduplication : au sein d'une même catégorie, deux connaissances au contenu très proche
   (ex : "Univers SDZ" et "Fondation SDZ" qui disent la même chose) ne sont injectées qu'une fois —
   on garde la plus complète des deux. Basé sur une similarité de mots, pas seulement un texte identique. */
function quasiDedup(mods){
  const kept = [];
  let removed = 0;
  mods.forEach(m=>{
    const dupIdx = kept.findIndex(k=> k.category===m.category && textSimilarity(k.content, m.content) > 0.6);
    if(dupIdx===-1){ kept.push(m); return; }
    removed++;
    if(m.content.length > kept[dupIdx].content.length) kept[dupIdx] = m;
  });
  return { kept, removed };
}

function selectModulesOrdered(categories, budgetChars){
  const allCats = [...new Set([...ALWAYS_ON_CATEGORIES, ...categories])];
  let mods = selectModules(allCats);
  const totalAvailable = mods.length;
  const lengthBefore = mods.reduce((s,m)=>s+m.content.length, 0);

  // 1. doublons stricts (contenu identique)
  const seen = new Set();
  let strictDuplicates = 0;
  mods = mods.filter(m=>{
    const key = m.category+"|"+m.title+"|"+m.content.trim();
    if(seen.has(key)){ strictDuplicates++; return false; }
    seen.add(key);
    return true;
  });
  // 2. quasi-doublons (idée très proche exprimée deux fois)
  const dedupResult = quasiDedup(mods);
  mods = dedupResult.kept;
  const duplicatesRemoved = strictDuplicates + dedupResult.removed;

  // 3. tri selon la hiérarchie SDZ
  const rank = c => { const i = HIERARCHY_ORDER.indexOf(c); return i===-1 ? HIERARCHY_ORDER.length : i; };
  mods = mods.map((m,i)=>({m,i})).sort((a,b)=> rank(a.m.category)-rank(b.m.category) || a.i-b.i).map(x=>x.m);

  // 4. paliers de priorité + pertinence contextuelle
  const always = mods.filter(m=> moduleTier(m.category)==="always");
  const contextAll = mods.filter(m=> moduleTier(m.category)==="context");
  const rareAll = mods.filter(m=> moduleTier(m.category)==="rare");
  const contextRelevant = contextAll.filter(isContextRelevantNow);
  const contextSkipped = contextAll.filter(m=>!isContextRelevantNow(m));

  // 5. construction budgétée : toujours en premier, puis contexte pertinent, puis rare (plafonné à 2)
  const kept = []; const ignored = [];
  let total = 0;
  const tryAdd = (m)=>{
    const len = m.content.length;
    if(kept.length===0 || total+len<=budgetChars){ kept.push(m); total+=len; return true; }
    ignored.push(m); return false;
  };
  always.forEach(tryAdd);
  contextRelevant.forEach(tryAdd);
  let rareAdded = 0;
  rareAll.forEach(m=>{
    if(rareAdded>=2){ ignored.push(m); return; }
    if(tryAdd(m)) rareAdded++;
  });
  ignored.push(...contextSkipped);

  const lengthAfter = kept.reduce((s,m)=>s+m.content.length, 0);
  const gainPercent = lengthBefore>0 ? Math.round((1 - lengthAfter/lengthBefore)*100) : 0;
  const tokensSaved = Math.max(0, Math.round((lengthBefore-lengthAfter)/4));
  // Indice de pertinence : part du contenu injecté qui est "toujours" ou "contexte pertinent" (par opposition au "rare")
  const highValueCount = always.filter(m=>kept.includes(m)).length + contextRelevant.filter(m=>kept.includes(m)).length;
  const relevanceIndex = kept.length>0 ? Math.round((highValueCount/kept.length)*100) : 100;

  return { kept, ignored, totalAvailable, totalKept: kept.length, duplicatesRemoved,
    lengthBefore, lengthAfter, gainPercent, tokensSaved, relevanceIndex };
}

/* Garde-fou permanent, toujours inclus dans tout prompt image, quel que soit le sujet.
   Politique générale de sécurité — jamais de description visuelle détaillée générée automatiquement

/* ---------- score qualité : mesure automatique + auto-évaluation guidée ---------- */
function textSimilarity(a, b){
  const words = s => new Set(s.toLowerCase().split(/\W+/).filter(w=>w.length>3));
  const wa = words(a), wb = words(b);
  if(!wa.size || !wb.size) return 0;
  let inter = 0; wa.forEach(w=>{ if(wb.has(w)) inter++; });
  return inter / Math.min(wa.size, wb.size);
}
function computeRepetitionRisk(platform, text){
  if(!text || !text.trim()) return 0;
  const recents = state.history.filter(h=>h.platform===platform && h.textResult).slice(-6);
  if(!recents.length) return 0;
  let max = 0;
  recents.forEach(h=>{ const sim = textSimilarity(text, h.textResult); if(sim>max) max=sim; });
  return Math.round(max*100);
}

/* Empreinte simple (djb2) pour détecter un prompt identique déjà généré — évite un appel API inutile. */
function hashPrompt(text){
  let h = 5381;
  for(let i=0;i<text.length;i++){ h = ((h*33) ^ text.charCodeAt(i)) >>> 0; }
  return h.toString(36);
}
function findCachedResult(providerLabel, promptText){
  const hash = hashPrompt(promptText);
  return state.lab.find(l=> l.provider===providerLabel && l.promptHash===hash && l.status==="accepted") || null;
}

/* Tous les appels passent désormais par les fonctions serveur du même site Netlify
   (/.netlify/functions/generate-text et /.netlify/functions/generate-image), qui contactent

   Netlify). Le navigateur ne détient plus aucune clé et ne contacte jamais le fournisseur
   directement — ça évite le blocage CORS et sécurise les clés. */
async function callProviderText(provider, systemPrompt, userPrompt){
  const res = await fetch("/.netlify/functions/generate-text", {
    method:"POST",
    headers: { "Content-Type":"application/json" },
    body: JSON.stringify({ kind: provider.kind, model: provider.model, baseUrl: provider.baseUrl, systemPrompt, userPrompt }),
  });
  const data = await res.json();
  if(!res.ok || data.error) throw new Error(data.error || `Erreur ${res.status}`);
  return data.text || "";
}
async function callProviderImage(prompt, size){
  const res = await fetch("/.netlify/functions/generate-image", {
    method:"POST",
    headers: { "Content-Type":"application/json" },
    body: JSON.stringify({ prompt, size }),
  });
  const data = await res.json();
  if(!res.ok || data.error) throw new Error(data.error || `Erreur ${res.status}`);
  if(data.b64) return `data:image/png;base64,${data.b64}`;
  if(data.url) return data.url;
  throw new Error("Aucune image reçue du fournisseur.");
}

/* Estimation grossière (≈4 caractères/token) — précision dépendante des tarifs que l'utilisateur renseigne. */
function estimateCost(provider, promptText){
  if(!provider || (!provider.priceIn && !provider.priceOut)) return null;
  const inTokens = Math.ceil(promptText.length / 4);
  const outTokens = 400; // estimation forfaitaire de la réponse
  const cost = (inTokens/1000)*(provider.priceIn||0) + (outTokens/1000)*(provider.priceOut||0);
  return cost;
}

/* ============================================================
   SYNCHRONISATION SERVEUR (Netlify Blobs) — le localStorage reste la source
   de vérité locale et le cache principal ; le serveur n'est qu'une sauvegarde
   accessible depuis un autre appareil. Aucune fonctionnalité existante n'est
   modifiée : ce module lit/écrit les mêmes clés, il ne fait qu'ajouter un aller-retour réseau.
============================================================ */
function syncHeaders(){
  const headers = { "Content-Type":"application/json" };
  const secret = localStorage.getItem("vf-sync-secret");
  if(secret) headers["x-sync-secret"] = secret;
  return headers;
}
function gatherSyncData(){
  const data = {};
  SYNC_KEYS.forEach(k=>{ const v = LS.get(k, null); if(v!==null) data[k] = v; });
  return data;
}
function applySyncData(data){
  if(!data || typeof data!=="object") return;
  Object.entries(data).forEach(([k,v])=>{
    if(SYNC_KEYS.includes(k) && v!==undefined){
      // écriture directe dans localStorage : on ne veut pas redéclencher une synchro auto ici
      try{ localStorage.setItem(k, JSON.stringify(v)); }catch(e){}
    }
  });
}
async function pushToServerSilent(){
  try{
    const controller = new AbortController();
    const timeoutId = setTimeout(()=>controller.abort(), 12000);
    const res = await fetch("/.netlify/functions/save-data", {
      method:"POST", headers: syncHeaders(), signal: controller.signal,
      body: JSON.stringify({ data: gatherSyncData(), updatedAt: getLocalUpdatedAt() || Date.now() }),
    });
    clearTimeout(timeoutId);
    if(res.ok){ localStorage.setItem("vf-last-server-sync", String(Date.now())); return true; }
    return false;
  }catch(e){ return false; /* pas de connexion, timeout, ou serveur indisponible : le local reste intact */ }
}
async function checkServerOnLoad(){
  try{
    const res = await fetch("/.netlify/functions/load-data", { method:"GET", headers: syncHeaders() });
    if(!res.ok) return;
    const remote = await res.json();
    if(remote && remote.updatedAt && remote.updatedAt > getLocalUpdatedAt()){
      state.serverHasNewerData = remote;
      renderMain();
    }
  }catch(e){ /* pas de réseau au démarrage : on continue avec le localStorage, comme avant */ }
}

/* ---------- SCORE QUALITÉ (avant génération) ----------
   Heuristique locale basée sur des signaux structurels disponibles (présence de modules,
   longueur, budget de contexte, risques détectés, historique récent). Ce n'est PAS un jugement
   sémantique — pour une vraie évaluation qualitative, utiliser l'onglet Audit IA (ChatGPT). */
function computeQualityScore({ platform, textPrompt, textMods, imageMods, totalTextAvailable, missionKey }){
  const dims = {};
  const hasMasterCodex = state.modules.some(m=>m.enabled && (m.category==="MASTER SDZ"||m.category==="CODEX SDZ"));
  dims["Respect SDZ"] = hasMasterCodex ? 100 : 60;
  dims["Respect plateforme"] = textMods.some(m=>[platform,"Instagram","Facebook","Google Business","Blog Wix"].includes(m.category)) ? 100 : 75;
  const needsSEO = platform==="Google Business" || platform==="Article Blog Wix";
  dims["Respect SEO"] = !needsSEO ? 100 : (textMods.some(m=>m.category==="SEO") ? 100 : 45);
  dims["Respect conversion"] = (missionKey && MISSIONS[missionKey]) || textMods.some(m=>m.category==="CTA") ? 100 : 65;
  dims["Respect DA"] = daLinesText().length > 40 ? 100 : 55;
  const len = textPrompt.length;
  dims["Longueur"] = len<300 ? 50 : len>7000 ? 55 : 100;
  dims["Doublons"] = 100; // la fusion sans doublons est déjà appliquée en amont
  const risks = currentRiskFlags();
  dims["Risque API"] = Math.max(30, 100 - risks.length*20);
  dims["Lisibilité"] = len>0 && len<6000 ? 90 : 65;
  dims["Clarté"] = (missionKey ? 15 : 0) + (state.prestationName ? 15 : 0) + 70;
  const recentSame = state.history.filter(h=>h.platform===platform).slice(-5);
  dims["Originalité"] = recentSame.length>3 ? 70 : 95;

  const values = Object.values(dims).map(v=>Math.min(100,v));
  const global = Math.round(values.reduce((a,b)=>a+b,0) / values.length);
  const weakPoints = Object.entries(dims).filter(([,v])=>v<75).map(([k])=>k);
  return { global, dims, weakPoints };
}

function parseAuditReport(text){
  const num = (key)=>{ const m = text.match(new RegExp(key+"\\s*:\\s*([0-9.]+)")); return m ? parseFloat(m[1]) : null; };
  const section = (label, stops)=>{
    const re = new RegExp(label+"\\s*:\\s*([\\s\\S]*?)(?="+stops.join("|")+"|$)", "i");
    const m = text.match(re);
    if(!m) return [];
    return m[1].split("\n").map(l=>l.trim()).filter(l=>l.startsWith("-")).map(l=>l.replace(/^-+\s*/,"").trim()).filter(Boolean);
  };
  return {
    charte:num("RESPECT_CHARTE"), coherence:num("COHERENCE_MARQUE"), plateforme:num("RESPECT_PLATEFORME"),
    seo:num("SEO"), conversion:num("CONVERSION"), clarte:num("CLARTE"), redaction:num("QUALITE_REDACTIONNELLE"),
    da:num("QUALITE_DA"), originalite:num("ORIGINALITE"), repetition:num("RISQUE_REPETITION"), global:num("SCORE_GLOBAL"),
    pointsForts: section("POINTS_FORTS", ["POINTS_FAIBLES","RECOMMANDATIONS"]),
    pointsFaibles: section("POINTS_FAIBLES", ["RECOMMANDATIONS","POINTS_FORTS"]),
    recommandations: section("RECOMMANDATIONS", ["POINTS_FORTS","POINTS_FAIBLES"]),
    raw: text,
  };
}

let canvasEl = null;
function drawCanvas(){
  if(!canvasEl) return;
  const img = state.images.find(i=>i.id===state.selectedId);
  if(!img) return;
  const {w,h} = ASPECTS[state.aspect];
  canvasEl.width = w; canvasEl.height = h;
  const ctx = canvasEl.getContext("2d");
  ctx.clearRect(0,0,w,h);
  loadImage(img.dataUrl).then(async image=>{
    const srcRatio = image.width/image.height, dstRatio = w/h;
    let sx,sy,sw,sh;
    if(srcRatio>dstRatio){ sh=image.height; sw=sh*dstRatio; sx=(image.width-sw)/2; sy=0; }
    else { sw=image.width; sh=sw/dstRatio; sx=0; sy=(image.height-sh)/2; }
    ctx.filter = `brightness(${state.filters.brightness}%) contrast(${state.filters.contrast}%) saturate(${state.filters.saturate}%) grayscale(${state.filters.grayscale}%)`;
    ctx.drawImage(image, sx,sy,sw,sh, 0,0,w,h);
    ctx.filter = "none";
    if(state.overlay.text.trim()){
      const fontSize = (state.overlay.size/100)*(w/10);
      ctx.font = `700 ${fontSize}px Georgia, serif`;
      ctx.fillStyle = state.overlay.color;
      ctx.textAlign = "center"; ctx.textBaseline = "middle";
      ctx.shadowColor = "rgba(0,0,0,0.55)"; ctx.shadowBlur = fontSize*0.15;
      ctx.fillText(state.overlay.text, (state.overlay.x/100)*w, (state.overlay.y/100)*h);
      ctx.shadowBlur = 0;
    }
    if(state.logoOverlay.assetId){
      const asset = state.images.find(i=>i.id===state.logoOverlay.assetId);
      if(asset){
        try{
          const logoImg = await loadImage(asset.dataUrl);
          const logoW = w * (state.logoOverlay.size/100);
          const logoH = logoW * (logoImg.height/logoImg.width);
          const lx = (state.logoOverlay.x/100)*w - logoW/2;
          const ly = (state.logoOverlay.y/100)*h - logoH/2;
          ctx.drawImage(logoImg, lx, ly, logoW, logoH);
        }catch(e){}
      }
    }
  });
}

    drawCanvas();

  canvasEl.addEventListener("mousemove", e=>{ if(dragging) posFromEvent(e); });
  window.addEventListener("mouseup", ()=>dragging=false);
  canvasEl.addEventListener("touchstart", e=>{dragging=true; posFromEvent(e);});

function importModulesFromText(text){
  const lines = text.split("\n").map(l=>l.trim()).filter(Boolean);

  lines.forEach(line=>{

    if(parts.length>=3 && CATEGORIES.includes(parts[0])){
      state.modules.push({ id: uid(), category:parts[0], title:parts[1], content:parts.slice(2).join(" | "), enabled:true });
      count++;

  });
  LS.set("vf-modules", state.modules);
  return count;

/* ---------- bloc de retour + score qualité, réutilisé pour post simple et campagne ---------- */
function buildValidationChecklist(ctx){
  const platform = ctx.platform;
  const text = (ctx.getTextResult ? ctx.getTextResult() : "") || "";
  const requiresText = !!ctx.textPrompt;
  const checks = [];

  if(requiresText){
    checks.push({ label:"Texte rédigé (généré ou collé)", ok: text.trim().length>0 });
  }
  checks.push({ label:"Image sélectionnée pour ce post", ok: !!ctx.hasImage });

  if(logoRequiredFor(platform)){
    checks.push({ label:"Logo réel de la marque appliqué (pas dessiné par l'IA)", ok: !!ctx.logoApplied });
  }
  if(requiresText && ctx.prestationName){
    checks.push({ label:`Nom de la prestation repris exactement ("${ctx.prestationName}")`, ok: text.includes(ctx.prestationName) });
  }
  if(requiresText && platform==="Google Business"){
    checks.push({ label:"Pas de hashtags (non recommandé pour Google Business)", ok: !text.includes("#") });
  }
  if(requiresText && (platform==="Instagram" || platform==="Facebook")){
    checks.push({ label:"Longueur raisonnable pour un réseau social (moins de 2200 caractères)", ok: text.length>0 && text.length<2200 });
  }
  if(requiresText && platform==="Article Blog Wix"){
    checks.push({ label:"Article suffisamment développé pour le SEO (plus de 500 caractères)", ok: text.length>500 });
  }

  const passed = checks.filter(c=>c.ok).length;
  return { checks, passed, total: checks.length, allOk: checks.length>0 && checks.every(c=>c.ok) };
}

      })(),
      risks.length
        ? el("div",{class:"learning-row", style:"color:var(--amber);"}, `⚠ Sujets à traiter avec prudence : ${risks.join(", ")}. Un garde-fou générique est déjà inclus dans le prompt image ; pour un résultat plus précis, renseigne un champ "Scène visuelle" dans la fiche de cette prestation (onglet Connaissances).`)
        : el("div",{class:"learning-row"}, "Aucun sujet sensible détecté."),
      el("div",{class:"learning-row"}, provider
        ? `Coût estimé (${provider.label}) : ${estCost!=null ? "$"+estCost.toFixed(4) : "non estimé — renseigne les tarifs dans Paramètres API"} · Temps estimé : ${estTime}`
        : "Aucun fournisseur API configuré — mode manuel (copier/coller)."),
      routerSuggestion ? el("div",{class:"learning-row", style:"color:#8FA6FF;"}, `Moteur recommandé pour ce type de contenu : ${routerSuggestion.suggestion} — ${routerSuggestion.reason} (suggestion libre, tu choisis toujours toi-même dans le sélecteur ci-dessous).`) : null,
      el("p",{style:"font-size:11px;color:var(--muted2);margin-top:6px;"},"La vraie validation (texte, image, logo, nom de prestation) se fait via la checklist plus bas, une fois le contenu prêt."),
    ]));

    if(state.textPrompt && qScore.global < 70){
      frag.appendChild(el("button",{class:"btn-secondary", style:"margin-bottom:16px;", onclick: ()=>{
        const optimizedText = buildTextPromptFull(platform, state.topic, state.mission);
        const optimizedImage = buildImagePromptFull(platform, state.topic, PLATFORM_ASPECT[platform], state.mission);
        state.textPromptOptimized = optimizedText;
        state.imagePromptOptimized = optimizedImage;
        renderMain();
      }}, "🛠 Optimiser le prompt (contexte perfectible)"));
    }
    if(state.textPromptOptimized){
      frag.appendChild(el("div",{class:"card", style:"margin-bottom:16px;"},[
        el("p",{class:"label"},"Comparaison — version actuelle vs optimisée"),
        el("p",{style:"font-size:12px;color:var(--muted2);margin-bottom:8px;"},"La reconstruction applique la même logique de sélection avec le contexte le plus à jour (modules activés, historique récent). Choisis la version à utiliser."),
        el("div",{style:"display:flex;gap:8px;"},[
          el("button",{class:"btn-ghost", onclick:()=>{ state.textPromptOptimized=null; state.imagePromptOptimized=null; renderMain(); }}, "Garder l'actuelle"),
          el("button",{class:"btn-ghost active", onclick:()=>{ state.textPrompt=state.textPromptOptimized; state.imagePrompt=state.imagePromptOptimized; state.textPromptOptimized=null; state.imagePromptOptimized=null; renderMain(); }}, "Utiliser l'optimisée"),
        ]),
      ]));
    }

    if(provider){
      const cached = findCachedResult(provider.label, state.textPrompt);
      if(cached){
        frag.appendChild(el("div",{class:"card", style:"margin-bottom:16px;border-color:#8FA6FF;"},[
          el("p",{style:"font-size:13px;margin-bottom:8px;"}, `Un résultat identique existe déjà (généré le ${cached.date} via ${cached.provider}) — évite un appel payant inutile.`),
          el("div",{style:"display:flex;gap:8px;"},[
            el("button",{class:"btn-ghost", onclick:()=>{ state.textPasted = cached.result||""; renderMain(); }}, "Réutiliser"),
            el("button",{class:"btn-ghost", onclick:()=>{ /* laisse générer via le bouton API plus bas */ }}, "Régénérer quand même"),
          ]),
        ]));
      }
    }

    frag.appendChild(el("h2",{class:"section"}, state.viewMode==="production" ? "Image à copier dans ChatGPT" : "Prompt image"));
    frag.appendChild(vfWrap(el("div",{class:"card", style:"margin-bottom:6px;"},[el("pre",{}, state.imagePrompt)])));
    frag.appendChild(copyBtnFor(()=>state.imagePrompt));
    frag.appendChild(el("p",{class:"sublabel"},"Colle ce prompt dans ChatGPT Plus (génération d'image), puis importe le résultat dans ta bibliothèque — ou génère-la directement ci-dessous si OpenAI est configuré."));

    const openaiProvider = state.apiProviders.find(p=>p.kind==="openai-compatible" && (p.baseUrl||"").includes("api.openai.com")) || DEFAULT_OPENAI_PROVIDER;
    if(openaiProvider){
      const imgApiStatus = el("p",{style:"font-size:12px;color:var(--muted2);min-height:16px;margin:4px 0 8px;"},"");
      const imgApiBtn = el("button",{class:"btn-secondary", style:"margin-bottom:10px;"}, [svgIcon(ICONS.wand,14), el("span",{},"Générer l'image via l'API (OpenAI)")]);
      imgApiBtn.addEventListener("click", async ()=>{
        if(!confirm("Lancer la génération d'image via OpenAI ? Ceci consomme du crédit API.")) return;
        imgApiStatus.textContent = "Génération en cours (peut prendre 10-20 s)...";
        const t0 = Date.now();
        const ratio = ASPECTS[PLATFORM_ASPECT[platform]].w / ASPECTS[PLATFORM_ASPECT[platform]].h;
        const size = ratio > 1.15 ? "1792x1024" : ratio < 0.85 ? "1024x1792" : "1024x1024";
        try{
          let dataUrl = await callProviderImage(state.imagePrompt, size);
          let logoApplied = false;
          if(logoRequiredFor(platform)){
            const composited = await compositeRealLogo(dataUrl);
            dataUrl = composited.dataUrl; logoApplied = composited.applied;
          }
          const id = uid();
          state.images.push({ id, name:`${platform}-${nowStr()}.png`, dataUrl, tags:[platform], favorite:false, logoApplied });
          LS.set("vf-images", state.images);
          updateCount();
          state.selectedId = id;
          state.postImageId = id;
          logToLab({ provider:"OpenAI", model:"gpt-image-1-mini", type:"image", prompt: state.imagePrompt, promptHash: hashPrompt(state.imagePrompt), cost:null, durationMs: Date.now()-t0, status:"accepted" });
          imgApiStatus.textContent = logoRequiredFor(platform)
            ? (logoApplied ? "Image générée, logo réel appliqué ✓" : "Image générée — aucun logo marqué comme actif de marque dans la Bibliothèque, rien n'a été ajouté.")
            : "Image générée et ajoutée à ta bibliothèque ✓";
          renderMain();
        }catch(err){
          logToLab({ provider:"OpenAI", model:"gpt-image-1-mini", type:"image", prompt: state.imagePrompt, promptHash: hashPrompt(state.imagePrompt), cost:null, durationMs: Date.now()-t0, status:"refused", reason:String(err.message||err) });
          imgApiStatus.textContent = `Échec (${err.message||err}) — utilise l'import manuel ci-dessous à la place.`;
        }
      });
      frag.appendChild(imgApiBtn);
      frag.appendChild(imgApiStatus);
    }

    const imgFileInput = el("input",{type:"file", accept:"image/*", style:"display:none"});
    const confirmMsg = el("p",{style:"font-size:12px;color:var(--green);margin-top:8px;min-height:14px;"},"");
    imgFileInput.addEventListener("change", async (e)=>{
      const file = e.target.files[0]; if(!file) return;
      let dataUrl = await resizeImageFile(file);
      let logoApplied = false;
      if(logoRequiredFor(platform)){
        const composited = await compositeRealLogo(dataUrl);
        dataUrl = composited.dataUrl; logoApplied = composited.applied;
      }
      const id = uid();
      state.images.push({id, name:file.name, dataUrl, tags:[platform], favorite:false, logoApplied});
      LS.set("vf-images", state.images);
      updateCount();
      state.selectedId = id;
      state.postImageId = id;
      confirmMsg.textContent = logoRequiredFor(platform)
        ? (logoApplied ? "Image importée, logo réel appliqué ✓" : "Image importée — aucun logo marqué comme actif de marque dans la Bibliothèque, rien n'a été ajouté.")
        : "Image ajoutée à ta bibliothèque ✓";
      imgFileInput.value = "";
      renderMain();
    });
    frag.appendChild(imgFileInput);
    frag.appendChild(el("button",{class:"btn-secondary", onclick:()=>imgFileInput.click()}, [svgIcon(ICONS.upload,14), el("span",{},"Importer l'image générée")]));
    frag.appendChild(confirmMsg);

    const previewImg = state.images.find(i=>i.id===state.postImageId);
    if(previewImg){
      frag.appendChild(el("p",{class:"label", style:"margin-top:14px;"},"Aperçu de l'image retenue pour ce post"));
      frag.appendChild(vfWrap(el("div",{style:"max-width:280px;margin:0 auto 10px;border-radius:12px;overflow:hidden;"},[
        el("img",{src:previewImg.dataUrl, style:"width:100%;display:block;"}),
      ])));

      const logoAsset = state.images.find(i=>i.assetType==="logo");
      if(logoAsset){
        const logoMsg = el("p",{style:"font-size:12px;color:var(--green);min-height:16px;margin:0 0 10px;text-align:center;"},"");
        frag.appendChild(el("button",{class:"btn-secondary", style:"margin-bottom:10px;", onclick: async ()=>{
          logoMsg.style.color = "var(--muted2)"; logoMsg.textContent = "Ajout du logo en cours...";
          try{
            const baseImg = await loadImage(previewImg.dataUrl);
            const logoImg = await loadImage(logoAsset.dataUrl);
            const canvas = document.createElement("canvas");
            canvas.width = baseImg.width; canvas.height = baseImg.height;
            const ctx = canvas.getContext("2d");
            ctx.drawImage(baseImg, 0, 0);
            const logoW = canvas.width * (state.logoOverlay.size/100);
            const logoH = logoW * (logoImg.height/logoImg.width);
            const lx = (state.logoOverlay.x/100)*canvas.width - logoW/2;
            const ly = (state.logoOverlay.y/100)*canvas.height - logoH/2;
            ctx.drawImage(logoImg, lx, ly, logoW, logoH);
            const newDataUrl = canvas.toDataURL("image/png");
            const id = uid();
            state.images.push({ id, name:`${previewImg.name.replace(/\.png$/,"")}-logo.png`, dataUrl:newDataUrl, tags:[platform,"logo-ajouté"], favorite:false });
            LS.set("vf-images", state.images);
            updateCount();
            state.postImageId = id;
            logoMsg.style.color = "var(--green)"; logoMsg.textContent = "Logo ajouté ✓ — nouvelle image créée dans la bibliothèque.";
            renderMain();
          }catch(err){
            logoMsg.style.color = "var(--coral)"; logoMsg.textContent = `Échec (${err.message||err}).`;
          }
        }}, [svgIcon(ICONS.sparkles,14), el("span",{},"Ajouter mon logo sur cette image")]));
        frag.appendChild(logoMsg);
        frag.appendChild(el("p",{style:"font-size:11px;color:var(--muted2);margin:-4px 0 10px;text-align:center;"},
          "Utilise la position/taille réglées dans l'onglet Éditeur. Crée une nouvelle image, l'originale reste intacte."));
      } else {
        frag.appendChild(el("p",{style:"font-size:12px;color:var(--muted2);margin:0 0 10px;"},
          "Aucun logo enregistré comme actif de marque — marque une image \"Logo\" dans l'onglet Bibliothèque pour pouvoir l'ajouter automatiquement ici."));
      }
    }

    if(state.textPrompt){
      frag.appendChild(el("h2",{class:"section"}, state.viewMode==="production" ? "Texte à copier dans ChatGPT" : "Prompt texte"));
      frag.appendChild(vfWrap(el("div",{class:"card", style:"margin-bottom:6px;"},[el("pre",{}, state.textPrompt)])));
      frag.appendChild(copyBtnFor(()=>state.textPrompt));

      {
        const availableProviders = state.apiProviders.length ? state.apiProviders : [DEFAULT_OPENAI_PROVIDER];
        const providerSelect = el("select",{style:"margin:8px 0;"}, availableProviders.map(p=> el("option",{value:p.id}, p.label)));
        providerSelect.value = state.selectedProviderId || availableProviders[0].id;
        providerSelect.addEventListener("change", e=>{ state.selectedProviderId = e.target.value; renderMain(); });
        frag.appendChild(providerSelect);

        const apiStatus = el("p",{style:"font-size:12px;color:var(--muted2);min-height:16px;margin:4px 0 8px;"},"");
        const apiBtn = el("button",{class:"btn-secondary", style:"margin-bottom:10px;"}, [svgIcon(ICONS.sparkles,14), el("span",{},"Générer via l'API (remplace le copier/coller)")]);
        apiBtn.addEventListener("click", async ()=>{
          const provider = availableProviders.find(p=>p.id===(state.selectedProviderId||availableProviders[0].id)) || availableProviders[0];
          const cached = findCachedResult(provider.label, state.textPrompt);
          if(cached && !confirm(`Un résultat identique existe déjà (${cached.date}). Régénérer quand même et consommer du budget ?`)) {
            state.textPasted = cached.result || "";
            renderMain();
            return;
          }
          const cost = estimateCost(provider, state.textPrompt);
          const costLabel = cost!=null ? `~$${cost.toFixed(4)}` : "coût non estimé (tarifs non renseignés)";
          if(!confirm(`Lancer la génération via ${provider.label} ? Coût estimé : ${costLabel}.`)) return;
          apiStatus.textContent = "Génération en cours...";
          const t0 = Date.now();
          try{
            const result = await callProviderText(provider, "Tu es le rédacteur officiel de cette marque, respecte strictement les informations et contraintes fournies.", state.textPrompt);
            state.textPasted = result;
            logToLab({ provider: provider.label, model: provider.model, type:"texte", prompt: state.textPrompt, promptHash: hashPrompt(state.textPrompt), result, cost, durationMs: Date.now()-t0, status:"accepted" });
            apiStatus.textContent = "Résultat reçu et inséré ci-dessous ✓";
            renderMain();
          }catch(err){
            logToLab({ provider: provider.label, model: provider.model, type:"texte", prompt: state.textPrompt, promptHash: hashPrompt(state.textPrompt), cost, durationMs: Date.now()-t0, status:"refused", reason: String(err.message||err) });
            apiStatus.textContent = `Échec de l'appel (${err.message||err}) — utilise le mode manuel ci-dessous à la place.`;
          }
        });
        frag.appendChild(apiBtn);
        frag.appendChild(apiStatus);
      }

      const pastedArea = el("textarea",{rows:"5", placeholder:"Colle ici la réponse texte de ChatGPT (ou récupère-la automatiquement via l'API ci-dessus)..."}, state.textPasted);
      pastedArea.addEventListener("input", e=>{ state.textPasted = e.target.value; });
      frag.appendChild(el("div",{style:"margin:10px 0;"}, pastedArea));

      frag.appendChild(el("button",{class:"btn-secondary", style:"margin-bottom:10px;", onclick: ()=>{
        sendToAudit({
          platform, missionKey: state.mission, topic: state.topic,
          imagePrompt: state.imagePrompt, textPrompt: state.textPrompt,
          textMods: textModulesFor(platform), imageMods: imageModulesFor(),
          prestation: getSelectedPrestationInfo(), style: getSelectedStyle(),
          antiRepeatTextNote: buildAntiRepeatNote(platform,"texte"), antiRepeatImageNote: buildAntiRepeatNote(platform,"image"),
          textPasted: state.textPasted,
        });
      }}, [svgIcon(ICONS.sparkles,14), el("span",{},"Analyser avec ChatGPT")]));
    } else {
      frag.appendChild(el("p",{class:"sublabel", style:"margin-top:10px;"}, "Aucun texte séparé pour ce format : l'accroche fait partie intégrante de l'image générée ci-dessus."));
    }

    frag.appendChild(buildFeedbackBlock({
      platform, topic: state.topic, imagePrompt: state.imagePrompt, textPrompt: state.textPrompt,
      getTextResult: ()=>state.textPasted,
      hasImage: !!previewImg, logoApplied: !!(previewImg && previewImg.logoApplied),
      prestationName: state.prestationName || null,
    }));

    const isSchedulable = platform !== "Article Blog Wix" && platform !== "Story";
    const requiresTextForSchedule = !!state.textPrompt;
    const contentReady = previewImg && (!requiresTextForSchedule || state.textPasted.trim());
    if(contentReady){
      if(isSchedulable){
        frag.appendChild(el("h2",{class:"section"},"Programmer la publication"));
        frag.appendChild(el("p",{class:"sublabel"},"Texte et image validés ? Choisis une date et une heure — Make ne sera déclenché qu'à ce moment précis, jamais avant."));
        const dateInput = el("input",{type:"datetime-local", value: state.scheduleDate || "", style:"width:100%;background:var(--card);border:1px solid var(--border);border-radius:10px;padding:9px 12px;font-size:14px;margin-bottom:10px;"});
        dateInput.addEventListener("input", e=>{ state.scheduleDate = e.target.value; });
        frag.appendChild(dateInput);
        const schedMsg = el("p",{style:"font-size:12px;color:var(--green);min-height:16px;"},"");
        frag.appendChild(el("button",{class:"btn-primary", style:"margin-bottom:10px;", onclick: async ()=>{
         try{
          if(!state.scheduleDate){ schedMsg.style.color="var(--coral)"; schedMsg.textContent="Choisis une date et une heure d'abord."; return; }
          if(!previewImg || !previewImg.dataUrl){ schedMsg.style.color="var(--coral)"; schedMsg.textContent="Erreur : aucune image valide sélectionnée pour ce post."; return; }
          const scheduledAt = new Date(state.scheduleDate).getTime();
          if(isNaN(scheduledAt)){ schedMsg.style.color="var(--coral)"; schedMsg.textContent="Date invalide, réessaie."; return; }
          const newPost = {
            id: uid(), platform, mission: state.mission, topic: state.topic,
            textFinal: state.textPasted, imageDataUrl: previewImg.dataUrl, schedulable: true,
            scheduledAt, status: "programmé", createdAt: Date.now(), sentAt: null, error: null,
          };
          state.scheduled.push(newPost);
          const savedLocally = LS.set("vf-scheduled", state.scheduled);
          if(!savedLocally){
            state.scheduled.pop(); // annule l'ajout en mémoire : rien n'a réellement été enregistré
            schedMsg.style.color = "var(--coral)";
            schedMsg.textContent = "Échec : stockage du téléphone plein (trop de photos enregistrées). Supprime d'anciens posts envoyés ou des images de la bibliothèque, puis réessaie.";
            renderMain();
            return;
          }
          state.scheduleDate = "";
          schedMsg.style.color = "var(--muted2)";
          schedMsg.textContent = "Post programmé — synchronisation avec le serveur...";
          const ok = await pushToServerSilent();
          if(ok){
            schedMsg.style.color = "var(--green)";
            schedMsg.textContent = "Post programmé ✓ — envoyé au serveur, visible dans l'onglet Calendrier.";
          } else {
            schedMsg.style.color = "var(--coral)";
            schedMsg.textContent = "Post programmé localement, mais la synchro serveur a échoué — va dans Réglages → \"Sauvegarder sur serveur\" avant de fermer l'appli.";
          }
         }catch(e){
            schedMsg.style.color = "var(--coral)";
            schedMsg.textContent = "Erreur inattendue : " + String(e && e.message || e);
         }
        }}, [svgIcon(ICONS.sparkles,16), el("span",{},"Programmer ce post")]));
        frag.appendChild(el("button",{class:"btn-ghost", style:"margin-bottom:10px;", onclick:()=>{
          state.scheduled.push({
            id: uid(), platform, mission: state.mission, topic: state.topic,
            textFinal: state.textPasted, imageDataUrl: previewImg.dataUrl, schedulable: true,
            scheduledAt: null, status: "brouillon", createdAt: Date.now(), sentAt: null, error: null,
          });
          LS.set("vf-scheduled", state.scheduled);
          schedMsg.style.color = "var(--green)";
          schedMsg.textContent = "Enregistré comme brouillon ✓ — tu pourras lui donner une date plus tard.";
        }}, "Enregistrer comme brouillon (sans date pour l'instant)"));
        frag.appendChild(schedMsg);
      } else {
        frag.appendChild(el("h2",{class:"section"},"Publication manuelle"));
        frag.appendChild(el("p",{class:"sublabel"}, `${platform} n'est pas automatisable via Make — copie le texte (s'il y en a) et télécharge l'image, puis publie-les toi-même.`));
        const manualMsg = el("p",{style:"font-size:12px;color:var(--green);min-height:16px;"},"");
        if(requiresTextForSchedule) frag.appendChild(copyBtnFor(()=>state.textPasted));
        frag.appendChild(el("button",{class:"btn-secondary", style:"margin:6px 0;", onclick:()=>{
          const link = document.createElement("a");
          link.download = `${platform.toLowerCase().replace(/\s+/g,"-")}-${uid()}.jpg`;
          link.href = previewImg.dataUrl;
          link.click();
        }}, [svgIcon(ICONS.download,14), el("span",{},"Télécharger l'image")]));
        frag.appendChild(el("button",{class:"btn-ghost", style:"margin:6px 0;display:block;", onclick:()=>{
          state.scheduled.push({
            id: uid(), platform, mission: state.mission, topic: state.topic,
            textFinal: state.textPasted, imageDataUrl: previewImg.dataUrl, schedulable: false,
            scheduledAt: null, status: "validé", createdAt: Date.now(), sentAt: null, error: null,
          });
          LS.set("vf-scheduled", state.scheduled);
          manualMsg.textContent = "Archivé dans le Calendrier ✓ (statut Validé, pour garder une trace).";
          renderMain();
        }}, "Garder une trace dans le Calendrier"));
        frag.appendChild(manualMsg);
      }
    }
  }

  return frag;
}

/* ============================================================
   ONGLET CALENDRIER — programmation et archive des publications
============================================================ */
const SCHEDULE_STATUS_LABEL = { "brouillon":"📝 Brouillon", "validé":"☑️ Validé", "programmé":"⏳ Programmé", "envoyé":"✅ Envoyé", "erreur":"⚠️ Erreur" };
function buildCalendarCard(item, inCampaign){
  const card = el("div",{class:"history-card"});
  card.appendChild(el("div",{class:"history-top"},[
    el("span",{}, `${item.platform} · ${item.mission||"—"}`),
    el("span",{}, SCHEDULE_STATUS_LABEL[item.status]||item.status),
  ]));
  card.appendChild(el("div",{style:"font-size:13px;color:var(--muted);margin-bottom:6px;"}, item.topic));
  if(item.scheduledAt) card.appendChild(el("div",{style:"font-size:12px;color:var(--muted2);"}, `Programmé pour : ${new Date(item.scheduledAt).toLocaleString("fr-FR")}`));
  if(item.sentAt) card.appendChild(el("div",{style:"font-size:12px;color:var(--green);"}, `Envoyé le : ${new Date(item.sentAt).toLocaleString("fr-FR")}`));
  if(item.error) card.appendChild(el("div",{style:"font-size:12px;color:var(--coral);"}, `Erreur : ${item.error}`));

  const requiresText = !!item.textPrompt;
  const needsContent = inCampaign && ((requiresText && (!item.textFinal || !item.textFinal.trim())) || !item.imageDataUrl);
  if(needsContent){
    card.appendChild(el("p",{class:"label", style:"margin-top:10px;"}, "Prompt image"));
    card.appendChild(vfWrap(el("div",{class:"card", style:"margin-bottom:6px;"},[el("pre",{}, item.imagePrompt)])));
    card.appendChild(copyBtnFor(()=>item.imagePrompt));

    const imgApiStatus = el("p",{style:"font-size:12px;color:var(--muted2);min-height:16px;margin:4px 0;"},"");
    const openaiProvider = state.apiProviders.find(p=>p.kind==="openai-compatible" && (p.baseUrl||"").includes("api.openai.com")) || DEFAULT_OPENAI_PROVIDER;
    if(openaiProvider){
      const imgApiBtn = el("button",{class:"btn-secondary", style:"margin:6px 0;"}, [svgIcon(ICONS.wand,14), el("span",{},"Générer l'image via l'API")]);
      imgApiBtn.addEventListener("click", async ()=>{
        if(!confirm("Lancer la génération d'image via OpenAI ? Ceci consomme du crédit API.")) return;
        imgApiStatus.textContent = "Génération en cours (peut prendre 10-20 s)...";
        const t0 = Date.now();
        const aspectKey = PLATFORM_ASPECT[item.platform];
        const ratio = ASPECTS[aspectKey].w / ASPECTS[aspectKey].h;
        const size = ratio > 1.15 ? "1792x1024" : ratio < 0.85 ? "1024x1792" : "1024x1024";
        try{
          let dataUrl = await callProviderImage(item.imagePrompt, size);
          let logoApplied = false;
          if(logoRequiredFor(item.platform)){
            const composited = await compositeRealLogo(dataUrl);
            dataUrl = composited.dataUrl; logoApplied = composited.applied;
          }
          item.imageDataUrl = dataUrl; item.logoApplied = logoApplied;
          const saved = LS.set("vf-scheduled", state.scheduled);
          logToLab({ provider:"OpenAI", model:"gpt-image-1-mini", type:"image", prompt:item.imagePrompt, promptHash:hashPrompt(item.imagePrompt), cost:null, durationMs:Date.now()-t0, status:"accepted" });
          imgApiStatus.textContent = !saved ? "Générée, mais échec d'enregistrement (stockage plein ?)."
            : logoRequiredFor(item.platform) ? (logoApplied ? "Image générée, logo réel appliqué ✓" : "Image générée — aucun logo marqué comme actif de marque, rien n'a été ajouté.")
            : "Image générée ✓";
          renderMain();
        }catch(err){
          imgApiStatus.textContent = `Échec (${err.message||err}) — utilise l'import manuel ci-dessous.`;
        }
      });
      card.appendChild(imgApiBtn);
    }
    const imgFileInput = el("input",{type:"file", accept:"image/*", style:"display:none"});
    imgFileInput.addEventListener("change", async (e)=>{
      const file = e.target.files[0]; if(!file) return;
      let dataUrl = await resizeImageFile(file);
      let logoApplied = false;
      if(logoRequiredFor(item.platform)){
        const composited = await compositeRealLogo(dataUrl);
        dataUrl = composited.dataUrl; logoApplied = composited.applied;
      }
      item.imageDataUrl = dataUrl; item.logoApplied = logoApplied;
      const saved = LS.set("vf-scheduled", state.scheduled);
      imgApiStatus.textContent = !saved ? "Importée, mais échec d'enregistrement (stockage plein ?)."
        : logoRequiredFor(item.platform) ? (logoApplied ? "Image importée, logo réel appliqué ✓" : "Image importée — aucun logo marqué comme actif de marque, rien n'a été ajouté.")
        : "Image importée ✓";
      renderMain();
    });
    card.appendChild(imgFileInput);
    card.appendChild(el("button",{class:"btn-secondary", style:"margin:6px 0;", onclick:()=>imgFileInput.click()}, [svgIcon(ICONS.upload,14), el("span",{},"Importer une image")]));
    card.appendChild(imgApiStatus);

    if(item.textPrompt){
      card.appendChild(el("p",{class:"label", style:"margin-top:10px;"}, "Prompt texte"));
      card.appendChild(vfWrap(el("div",{class:"card", style:"margin-bottom:6px;"},[el("pre",{}, item.textPrompt)])));
      card.appendChild(copyBtnFor(()=>item.textPrompt));
      const pastedArea = el("textarea",{rows:"4", placeholder:"Colle ici la réponse texte de ChatGPT...", style:"margin:6px 0;"}, item.textFinal);
      pastedArea.addEventListener("input", e=>{ item.textFinal = e.target.value; LS.set("vf-scheduled", state.scheduled); });
      card.appendChild(pastedArea);
    }

    const checklist = buildValidationChecklist({
      platform: item.platform, textPrompt: item.textPrompt, getTextResult: ()=>item.textFinal,
      hasImage: !!item.imageDataUrl, logoApplied: !!item.logoApplied, prestationName: null,
    });
    if(checklist.total>0){
      card.appendChild(el("p",{class:"label", style:"margin-top:10px;"}, "Checklist"));
      checklist.checks.forEach(c=>{
        card.appendChild(el("div",{class:"learning-row", style:`color:${c.ok?"var(--green)":"var(--coral)"};font-size:12px;`}, `${c.ok?"✅":"⚠️"} ${c.label}`));
      });
    }

    const validateMsg = el("p",{style:"font-size:12px;color:var(--coral);min-height:14px;margin:4px 0;"},"");
    card.appendChild(el("button",{class:"btn-secondary", style:"margin-bottom:6px;", onclick: async ()=>{
      if((requiresText && (!item.textFinal || !item.textFinal.trim())) || !item.imageDataUrl){
        validateMsg.textContent = requiresText ? "Texte et image requis avant de valider." : "Image requise avant de valider.";
        return;
      }
      item.status = "validé";
      const ok = pushToServerSilentSafe();
      LS.set("vf-scheduled", state.scheduled);
      validateMsg.style.color = "var(--green)";
      validateMsg.textContent = "Validé ✓";
      renderMain();
    }}, "☑️ Valider ce contenu"));
    card.appendChild(validateMsg);
  }

  const row = el("div",{style:"display:flex;gap:10px;align-items:flex-start;margin-top:8px;"});
  if(item.imageDataUrl) row.appendChild(el("img",{src:item.imageDataUrl, style:"width:70px;height:70px;object-fit:cover;border-radius:8px;flex-shrink:0;"}));
  row.appendChild(el("div",{style:"font-size:12px;color:var(--muted);flex:1;white-space:pre-wrap;"}, (item.textFinal||"").slice(0,180)+((item.textFinal||"").length>180?"...":"")));
  card.appendChild(row);

  const actionsRow = el("div",{style:"display:flex;gap:8px;margin-top:10px;flex-wrap:wrap;"});
  const isSchedulable = item.schedulable !== false;
  if(isSchedulable){
    if(item.status==="brouillon" || item.status==="validé" || item.status==="erreur"){
      const dt = el("input",{type:"datetime-local", style:"flex:1;background:var(--card);border:1px solid var(--border);border-radius:8px;padding:6px 8px;font-size:12px;"});
      dt.addEventListener("change", e=>{
        item.scheduledAt = new Date(e.target.value).getTime();
        item.status = "programmé"; item.error = null;
        LS.set("vf-scheduled", state.scheduled);
        pushToServerSilentSafe();
        renderMain();
      });
      actionsRow.appendChild(dt);
    }
    if(item.status==="programmé"){
      actionsRow.appendChild(el("button",{class:"btn-small", onclick:()=>{
        item.status="brouillon"; item.scheduledAt=null;
        LS.set("vf-scheduled", state.scheduled); renderMain();
      }}, "Retirer la date"));
    }
  } else {
    card.appendChild(el("p",{class:"sublabel", style:"margin:6px 0;"}, "Article non programmable — copie le texte et télécharge l'image, puis publie-les toi-même dans Wix."));
    actionsRow.appendChild(copyBtnFor(()=>item.textFinal||""));
    if(item.imageDataUrl){
      actionsRow.appendChild(el("button",{class:"btn-small", onclick:()=>{
        const link = document.createElement("a");
        link.download = `${(item.platform||"blog").toLowerCase().replace(/\s+/g,"-")}-${item.id}.jpg`;
        link.href = item.imageDataUrl;
        link.click();
      }}, "Télécharger l'image"));
    }
  }
  actionsRow.appendChild(el("button",{class:"btn-small", onclick:()=>{
    if(!confirm("Supprimer définitivement ce post de l'archive ?")) return;
    state.scheduled = state.scheduled.filter(s=>s.id!==item.id);
    LS.set("vf-scheduled", state.scheduled); renderMain();
  }}, svgIcon(ICONS.trash,12)));
  card.appendChild(actionsRow);

  return card;
}

/* Pousse en arrière-plan sans bloquer l'UI ni exiger un await partout ; ignore silencieusement l'échec
   (l'auto-sync debouncée prendra quand même le relais dans la foulée). */
function pushToServerSilentSafe(){
  pushToServerSilent().catch(()=>{});
  return true;
}

function buildCalendarTab(){
  const frag = el("div",{});

  frag.appendChild(el("p",{class:"label"},"Webhook Make"));
  frag.appendChild(el("p",{class:"sublabel"},"L'URL de ton scénario Make (déclenchement webhook). À la date programmée, Viewfinder l'appelle automatiquement — une seule fois par post, comme ton run manuel actuel."));
  const webhookInput = el("input",{type:"text", value: state.makeWebhook, placeholder:"https://hook.eu2.make.com/..."});
  webhookInput.addEventListener("input", e=>{ state.makeWebhook = e.target.value; LS.set("vf-make-webhook", e.target.value); });
  frag.appendChild(el("div",{style:"margin-bottom:12px;"}, webhookInput));

  const actionMsg = el("p",{style:"font-size:12px;color:var(--muted2);min-height:16px;margin:0 0 10px;"},"");
  const actionsRow = el("div",{class:"pillrow", style:"margin-bottom:16px;"});

  actionsRow.appendChild(el("button",{class:"btn-small", onclick: async ()=>{
    actionMsg.style.color="var(--muted2)"; actionMsg.textContent="Actualisation depuis le serveur...";
    try{
      const res = await fetch("/.netlify/functions/load-data", { method:"GET", headers: syncHeaders() });
      const result = await res.json();
      if(result && result.data && result.data["vf-scheduled"]){
        state.scheduled = result.data["vf-scheduled"];
        localStorage.setItem("vf-scheduled", JSON.stringify(state.scheduled));
        actionMsg.style.color="var(--green)"; actionMsg.textContent="Statuts actualisés depuis le serveur ✓";
      } else {
        actionMsg.style.color="var(--amber)"; actionMsg.textContent="Aucune donnée de calendrier trouvée côté serveur.";
      }
    }catch(e){ actionMsg.style.color="var(--coral)"; actionMsg.textContent="Échec de l'actualisation : "+String(e.message||e); }
    renderMain();
  }}, "🔄 Actualiser les statuts"));

  actionsRow.appendChild(el("button",{class:"btn-small", onclick: async ()=>{
    if(!state.makeWebhook){ actionMsg.style.color="var(--coral)"; actionMsg.textContent="Renseigne d'abord l'URL du webhook Make ci-dessus."; return; }
    actionMsg.style.color="var(--muted2)"; actionMsg.textContent="Test du webhook en cours...";
    try{
      const res = await fetch(state.makeWebhook, { method:"POST", headers:{"Content-Type":"application/json"}, body: JSON.stringify({ test:true, source:"Viewfinder - test manuel" }) });
      actionMsg.style.color = res.ok ? "var(--green)" : "var(--coral)";
      actionMsg.textContent = `Make a répondu HTTP ${res.status}${res.ok ? " ✓" : " — vérifie que le scénario est actif"}.`;
    }catch(e){ actionMsg.style.color="var(--coral)"; actionMsg.textContent="Échec de connexion au webhook : "+String(e.message||e); }
  }}, "🧪 Tester le webhook"));

  actionsRow.appendChild(el("button",{class:"btn-small", onclick: async ()=>{
    actionMsg.style.color="var(--muted2)"; actionMsg.textContent="Déclenchement de l'envoi en cours...";
    try{
      const res = await fetch("/.netlify/functions/check-scheduled-posts");
      const result = await res.json();
      actionMsg.style.color="var(--green)";
      actionMsg.textContent = `Vérifié : ${result.checked||0} post(s) au total, ${result.due||0} éligible(s), ${result.sent||0} envoyé(s), ${result.errors||0} erreur(s).`;
    }catch(e){ actionMsg.style.color="var(--coral)"; actionMsg.textContent="Échec : "+String(e.message||e); }
    renderMain();
  }}, "🚀 Envoyer maintenant"));

  actionsRow.appendChild(el("button",{class:"btn-small", onclick:()=>{
    let count = 0;
    state.scheduled.forEach(p=>{
      if(p.status!=="brouillon") return;
      const requiresText = !!p.textPrompt;
      const ready = (!requiresText || (p.textFinal && p.textFinal.trim())) && p.imageDataUrl;
      if(ready){ p.status="validé"; count++; }
    });
    LS.set("vf-scheduled", state.scheduled);
    pushToServerSilentSafe();
    actionMsg.style.color = count ? "var(--green)" : "var(--amber)";
    actionMsg.textContent = count ? `${count} contenu(s) validé(s) ✓` : "Aucun contenu prêt à valider (image requise partout, texte requis sauf pour les Stories).";
    renderMain();
  }}, "☑️ Valider la campagne"));

  frag.appendChild(actionsRow);
  frag.appendChild(actionMsg);

  if(!state.scheduled.length){
    frag.appendChild(el("p",{class:"hint"},"Aucun post programmé ou en brouillon pour l'instant. Génère un post dans \"Créer un post\" (seul ou en campagne complète), valide le texte et l'image, puis programme-le."));
    return frag;
  }

  const campaignIds = [...new Set(state.scheduled.filter(p=>p.campaignId).map(p=>p.campaignId))]
    .sort((a,b)=>{
      const ca = state.scheduled.find(p=>p.campaignId===a) || {};
      const cb = state.scheduled.find(p=>p.campaignId===b) || {};
      return (cb.createdAt||0)-(ca.createdAt||0);
    });

  campaignIds.forEach(cid=>{
    const items = state.scheduled.filter(p=>p.campaignId===cid);
    const topic = items[0].campaignTopic || items[0].topic || "(sans thème)";
    frag.appendChild(el("h2",{class:"section"}, `📦 Campagne — ${topic.length>60 ? topic.slice(0,60)+"..." : topic}`));
    items.forEach(item=> frag.appendChild(buildCalendarCard(item, true)));
  });

  const standalone = state.scheduled.filter(p=>!p.campaignId);
  if(standalone.length){
    if(campaignIds.length) frag.appendChild(el("h2",{class:"section"},"Posts individuels"));
    const sorted = standalone.slice().sort((a,b)=>{
      const order = {"programmé":0, "validé":1, "brouillon":2, "erreur":3, "envoyé":4};
      if(order[a.status]!==order[b.status]) return order[a.status]-order[b.status];
      return (a.scheduledAt||Infinity) - (b.scheduledAt||Infinity);
    });
    sorted.forEach(item=> frag.appendChild(buildCalendarCard(item, false)));
  }

  return frag;
}

function scoreRow(label, val){
  const pct = val==null ? 0 : val*10;
  const color = val==null ? "var(--muted2)" : pct>=70 ? "var(--green)" : pct>=45 ? "var(--amber)" : "var(--coral)";
  return el("div",{style:"margin-bottom:8px;"},[
    el("div",{style:"display:flex;justify-content:space-between;font-size:12px;color:var(--muted);margin-bottom:3px;"},
      [el("span",{},label), el("span",{style:`color:${color};font-weight:600;`}, val!=null? `${val}/10` : "—")]),
    el("div",{style:"height:5px;background:rgba(255,255,255,0.08);border-radius:3px;overflow:hidden;"},[
      el("div",{style:`height:100%;width:${pct}%;background:${color};`}),
    ]),
  ]);
}
function renderAuditReport(report){
  const frag = el("div",{class:"card", style:"margin-bottom:16px;"});
  frag.appendChild(el("div",{style:"text-align:center;margin-bottom:14px;"},[
    el("div",{style:"font-size:11px;color:var(--muted2);text-transform:uppercase;letter-spacing:.06em;"},"Score global"),
    el("div",{style:"font-size:32px;font-weight:700;color:var(--lime);"}, report.global!=null?`${report.global}/10`:"—"),
  ]));
  [["Respect de la charte",report.charte],["Cohérence marque",report.coherence],["Respect plateforme",report.plateforme],
   ["SEO",report.seo],["Conversion",report.conversion],["Clarté",report.clarte],
   ["Qualité rédactionnelle",report.redaction],["Qualité direction artistique",report.da],
   ["Originalité",report.originalite],["Risque de répétition",report.repetition]]
   .forEach(([label,val])=> frag.appendChild(scoreRow(label,val)));

  if(report.pointsForts.length){
    frag.appendChild(el("p",{class:"label", style:"margin-top:14px;"},"Points forts"));
    report.pointsForts.forEach(p=> frag.appendChild(el("div",{class:"learning-row", style:"color:var(--green);"}, `+ ${p}`)));
  }
  if(report.pointsFaibles.length){
    frag.appendChild(el("p",{class:"label", style:"margin-top:10px;"},"Points faibles"));
    report.pointsFaibles.forEach(p=> frag.appendChild(el("div",{class:"learning-row", style:"color:var(--coral);"}, `− ${p}`)));
  }
  if(report.recommandations.length){
    frag.appendChild(el("p",{class:"label", style:"margin-top:10px;"},"Recommandations"));
    report.recommandations.forEach(p=> frag.appendChild(el("div",{class:"learning-row"}, `→ ${p}`)));
  }
  return frag;
}
function buildAuditTab(){
  const frag = el("div",{});
  const ctx = state.lastGenerated;

  if(!ctx){
    frag.appendChild(el("p",{class:"hint"},"Génère d'abord un contenu depuis l'onglet \"Créer un post\", puis clique sur \"Analyser avec ChatGPT\"."));
  } else {
    frag.appendChild(el("h2",{class:"section"},"Contenu à analyser"));
    frag.appendChild(el("p",{class:"sublabel"}, `${ctx.campaignLabel || ctx.platform} · Mission : ${ctx.missionKey || "non spécifiée"} · Sujet : ${ctx.topic}`));

    frag.appendChild(el("button",{class:"btn-primary", style:"margin-bottom:14px;", onclick: ()=>{
      state.auditPrompt = buildAuditPromptText(ctx);
      renderMain();
    }}, [svgIcon(ICONS.sparkles,16), el("span",{},"Générer le prompt d'audit")]));

    if(state.auditPrompt){
      frag.appendChild(vfWrap(el("div",{class:"card", style:"margin-bottom:6px;"},[el("pre",{}, state.auditPrompt)])));
      frag.appendChild(copyBtnFor(()=>state.auditPrompt));
      frag.appendChild(el("p",{class:"sublabel"},"Colle ce prompt dans ChatGPT (dans la conversation où l'image a été générée si possible), puis colle sa réponse ci-dessous."));

      const pastedArea = el("textarea",{rows:"6", placeholder:"Colle ici le rapport structuré de ChatGPT..."}, state.auditPasted);
      pastedArea.addEventListener("input", e=>{ state.auditPasted = e.target.value; });
      frag.appendChild(el("div",{style:"margin:10px 0;"}, pastedArea));

      frag.appendChild(el("button",{class:"btn-primary", style:"margin-bottom:20px;", onclick: ()=>{
        if(!state.auditPasted.trim()) return;
        const report = parseAuditReport(state.auditPasted);
        const entry = { id: uid(), date: nowStr(), platform: ctx.platform, missionKey: ctx.missionKey, topic: ctx.topic, ...report };
        state.auditHistory.push(entry);
        LS.set("vf-audit", state.auditHistory);
        state.auditPasted = ""; state.auditPrompt = "";
        renderMain();
      }}, "Importer le rapport dans l'historique d'audit"));
    }

    const last = state.auditHistory[state.auditHistory.length-1];
    if(last){
      frag.appendChild(el("h2",{class:"section"},"Dernier audit importé"));
      frag.appendChild(renderAuditReport(last));
      if(last.recommandations && last.recommandations.length){
        frag.appendChild(el("button",{class:"btn-secondary", style:"margin-bottom:24px;", onclick: ()=>{
          last.recommandations.forEach(r=>{
            state.modules.push({ id: uid(), category:"Leçons apprises",
              title: `Recommandation audit ${last.platform} — ${last.date}`, content:r, enabled:true });
          });
          LS.set("vf-modules", state.modules);
          alert("Recommandations ajoutées à la base de connaissances (catégorie Leçons apprises).");
        }}, "Ajouter ces recommandations à la base de connaissances"));
      }
    }
  }

  frag.appendChild(el("h2",{class:"section"},"Historique des audits"));
  const filterRow = el("div",{class:"pillrow", style:"margin-bottom:14px;"});
  ["Toutes",...PLATFORMS].forEach(p=>{
    filterRow.appendChild(el("button",{class:"pill"+(state.auditFilter===p?" active":""), onclick:()=>{ state.auditFilter=p; renderMain(); }}, p));
  });
  frag.appendChild(filterRow);

  const list = state.auditHistory.filter(a=> state.auditFilter==="Toutes" || a.platform===state.auditFilter).slice().reverse();
  if(list.length===0){
    frag.appendChild(el("p",{class:"hint"},"Aucun audit enregistré pour l'instant."));
  } else {
    list.forEach(a=>{
      const details = el("details",{class:"history-card"});
      details.appendChild(el("summary",{style:"cursor:pointer;display:flex;justify-content:space-between;font-size:13px;"},[
        el("span",{}, `${a.platform} · ${a.date}`),
        el("span",{style:"color:var(--lime);font-weight:600;"}, a.global!=null?`${a.global}/10`:"—"),
      ]));
      details.appendChild(renderAuditReport(a));
      frag.appendChild(details);
    });
  }

  return frag;
}
