/* ---------- score qualité : mesure automatique + auto-évaluation guidée ---------- */
function textSimilarity(a, b){
  const words = s => new Set(s.toLowerCase().split(/\W+/).filter(w=>w.length>3));
  const wa = words(a), wb = words(b);
  if(!wa.size || !wb.size) return 0;
  let inter = 0; wa.forEach(w=>{ if(wb.has(w)) inter++; });
  return inter / Math.min(wa.size, wb.size);
}
function computeRepetitionRisk(platform, text){
  if(!text || !text.trim()) return 0;
  const recents = state.history.filter(h=>h.platform===platform && h.textResult).slice(-6);
  if(!recents.length) return 0;
  let max = 0;
  recents.forEach(h=>{ const sim = textSimilarity(text, h.textResult); if(sim>max) max=sim; });
  return Math.round(max*100);
}

/* Empreinte simple (djb2) pour détecter un prompt identique déjà généré — évite un appel API inutile. */
function hashPrompt(text){
  const t = text || "";
  let h = 5381;
  for(let i=0;i<t.length;i++){ h = ((h*33) ^ t.charCodeAt(i)) >>> 0; }
  return h.toString(36);
}
function findCachedResult(providerLabel, promptText){
  if(!promptText) return null;
  const hash = hashPrompt(promptText);
  return state.lab.find(l=> l.provider===providerLabel && l.promptHash===hash && l.status==="accepted") || null;
}

/* Tous les appels passent désormais par les fonctions serveur du même site Netlify
   (/.netlify/functions/generate-text pour le texte ; /.netlify/functions/create-image-job +
   process-image-job-background + get-image-job pour l'image, en flux asynchrone — voir plus bas),
   qui contactent elles-mêmes le fournisseur avec la clé API stockée côté serveur (variables
   d'environnement Netlify). Le navigateur ne détient plus aucune clé et ne contacte jamais le
   fournisseur directement — ça évite le blocage CORS et sécurise les clés. */
async function callProviderText(provider, systemPrompt, userPrompt){
  const res = await fetch("/.netlify/functions/generate-text", {
    method:"POST",
    headers: { "Content-Type":"application/json" },
    body: JSON.stringify({ kind: provider.kind, model: provider.model, baseUrl: provider.baseUrl, systemPrompt, userPrompt }),
  });
  const data = await res.json();
  if(!res.ok || data.error) throw new Error(data.error || `Erreur ${res.status}`);
  return data.text || "";
}
async function fetchJsonOrThrowRaw(res, contextLabel){
  // Contrôle du content-type avant de parser : une réponse HTML (ex: page d'erreur passerelle Netlify)
  // ferait échouer res.json() avec un message cryptique ("Unexpected token '<'") qui masque la vraie
  // cause. On affiche ici le statut et le corps brut à la place.
  const contentType = res.headers.get("content-type") || "";
  if(!contentType.includes("application/json")){
    const rawBody = await res.text();
    throw new Error(`Réponse non-JSON du serveur (${contextLabel}, statut ${res.status}). Corps brut : ${rawBody.slice(0, 300)}`);
  }
  return res.json();
}

const IMAGE_JOB_POLL_INTERVAL_MS = 2500;
const IMAGE_JOB_MAX_WAIT_MS = 17 * 60 * 1000; // 17 minutes — au-delà des 15 min max d'une Background
                                                // Function et des 16 min de seuil de get-image-job.js,
                                                // pour laisser le temps au statut "failed" calculé
                                                // côté serveur d'être lu avant que le client n'abandonne
const IMAGE_JOB_SESSION_KEY = "vf-active-image-job";

/* Génération d'image en flux asynchrone (job + polling) — la connexion HTTP synchrone d'origine
   pouvait dépasser la limite d'exécution Netlify (10-26s) pour gpt-image-1, en particulier avec
   une image de référence (/v1/images/edits, plus lente). Ici : create-image-job répond en quelques
   centaines de ms, puis on interroge get-image-job toutes les 2,5s jusqu'à completed/failed.
   `onStatus(label)` est optionnel (mise à jour de l'UI) ; `cancelToken` est un objet { cancelled }
   optionnel que l'appelant peut faire passer à true pour arrêter le suivi (le job continue côté
   serveur, seul le suivi côté client s'arrête — cf. cahier des charges, l'annulation réelle du job
   n'est pas requise en V1). */
async function callProviderImage(prompt, size, extraReferenceDataUrls, onStatus, cancelToken, options){
  options = options || {};
  const referenceImageUrls = getBrandReferenceImages();
  // Références visuelles validées en premier (assetType "reference"), puis l'éventuelle image de
  // cohérence de campagne déjà existante (siblingImage) — combinées, plafonnées à 3 (repris côté
  // serveur). SAUF si options.smartReferenceDataUrls est explicitement fourni (Creative Planner) :
  // dans ce cas elle est utilisée telle quelle, MÊME VIDE — un tableau vide signifie "zéro référence
  // choisie", jamais un signal pour retomber sur les 3 premières références génériques de la
  // Bibliothèque. On teste donc la présence du tableau (Array.isArray), pas sa longueur.
  const referenceImageData = Array.isArray(options.smartReferenceDataUrls)
    ? [...options.smartReferenceDataUrls, ...(extraReferenceDataUrls||[])].filter(Boolean).slice(0,3)
    : [...getValidatedReferenceImageData(), ...(extraReferenceDataUrls||[])].filter(Boolean).slice(0,3);

  if(onStatus) onStatus("Génération lancée…");
  const createRes = await fetch("/.netlify/functions/create-image-job", {
    method:"POST",
    headers: { "Content-Type":"application/json" },
    body: JSON.stringify({
      prompt, size,
      referenceImageUrls: referenceImageUrls.length ? referenceImageUrls : undefined,
      referenceImageData: referenceImageData.length ? referenceImageData : undefined,
    }),
  });
  const createData = await fetchJsonOrThrowRaw(createRes, "création du travail");
  if(!createRes.ok || createData.error) throw new Error(createData.error || `Erreur ${createRes.status}`);
  const jobId = createData.jobId;
  try{ sessionStorage.setItem(IMAGE_JOB_SESSION_KEY, jobId); }catch(e){ /* stockage indisponible : tant pis, pas bloquant */ }

  try{
    return await pollImageJob(jobId, onStatus, cancelToken);
  } finally {
    try{
      if(sessionStorage.getItem(IMAGE_JOB_SESSION_KEY) === jobId) sessionStorage.removeItem(IMAGE_JOB_SESSION_KEY);
    }catch(e){}
  }
}

/* Interroge get-image-job jusqu'à completed/failed/annulation/délai dépassé. Séparée de
   callProviderImage pour pouvoir reprendre le suivi d'un job existant après un rechargement
   de page (cf. IMAGE_JOB_SESSION_KEY), sans en recréer un nouveau. */
async function pollImageJob(jobId, onStatus, cancelToken){
  const startTime = Date.now();
  if(onStatus) onStatus("Préparation de l'image…");
  while(true){
    if(cancelToken && cancelToken.cancelled) throw new Error("__CANCELLED__");
    if(Date.now() - startTime > IMAGE_JOB_MAX_WAIT_MS) throw new Error("Délai d'attente dépassé (17 minutes) — le travail continue peut-être côté serveur, mais le suivi s'arrête ici.");
    await new Promise(r=> setTimeout(r, IMAGE_JOB_POLL_INTERVAL_MS));
    if(cancelToken && cancelToken.cancelled) throw new Error("__CANCELLED__");

    const statusRes = await fetch(`/.netlify/functions/get-image-job?jobId=${encodeURIComponent(jobId)}`);
    if(statusRes.status===404){
      const body = await fetchJsonOrThrowRaw(statusRes, "suivi du travail");
      throw new Error(body.error || "Travail introuvable ou expiré.");
    }
    const statusData = await fetchJsonOrThrowRaw(statusRes, "suivi du travail");

    if(statusData.status==="failed") throw new Error((statusData.error && statusData.error.message) || "Échec de la génération.");
    if(statusData.status==="completed"){
      if(onStatus) onStatus("Finalisation…");
      if(!statusData.result || !statusData.result.resultUrl) throw new Error("Aucune image reçue du fournisseur.");
      const dataUrl = await fetchImageAsDataUrl(statusData.result.resultUrl);
      return { dataUrl, usedReference: !!statusData.result.usedReference, referenceFallbackReason: statusData.result.referenceFallbackReason || null };
    }
    if(onStatus) onStatus(statusData.status==="processing" ? "Génération OpenAI en cours…" : "Préparation de l'image…");
  }
}

/* Récupère l'image finale depuis get-image-result (renvoyée en binaire, pas en JSON) et la convertit
   en data URL exploitable par le reste du flux (compositeBrandSignature, Bibliothèque, campagne). */
async function fetchImageAsDataUrl(url){
  const res = await fetch(url);
  if(!res.ok){
    let rawBody = "";
    try{ rawBody = await res.text(); }catch(e){}
    throw new Error(`Impossible de récupérer l'image générée (statut ${res.status}). ${rawBody.slice(0, 200)}`);
  }
  const blob = await res.blob();
  return new Promise((resolve, reject)=>{
    const reader = new FileReader();
    reader.onload = ()=> resolve(reader.result);
    reader.onerror = ()=> reject(new Error("Échec de lecture de l'image générée."));
    reader.readAsDataURL(blob);
  });
}

function estimateCost(provider, promptText){

/* ============================================================
   SYNCHRONISATION SERVEUR (Netlify Blobs) — le localStorage reste la source
   de vérité locale et le cache principal ; le serveur n'est qu'une sauvegarde
   accessible depuis un autre appareil. Aucune fonctionnalité existante n'est
   modifiée : ce module lit/écrit les mêmes clés, il ne fait qu'ajouter un aller-retour réseau.
============================================================ */
function syncHeaders(){
  const headers = { "Content-Type":"application/json" };
  const secret = localStorage.getItem("vf-sync-secret");
  if(secret) headers["x-sync-secret"] = secret;
  return headers;
}
function gatherSyncData(){
  const data = {};
  SYNC_KEYS.forEach(k=>{ const v = LS.get(k, null); if(v!==null) data[k] = v; });
  return data;
}
function applySyncData(data){
  if(!data || typeof data!=="object") return;
  Object.entries(data).forEach(([k,v])=>{
    if(SYNC_KEYS.includes(k) && v!==undefined && v!==null){
      // écriture directe dans localStorage : on ne veut pas redéclencher une synchro auto ici
      try{ localStorage.setItem(k, JSON.stringify(v)); }catch(e){}
    }
  });
}
async function pushToServerSilent(){
  try{
    const controller = new AbortController();
    const timeoutId = setTimeout(()=>controller.abort(), 12000);
    const res = await fetch("/.netlify/functions/save-data", {
      method:"POST", headers: syncHeaders(), signal: controller.signal,
      body: JSON.stringify({ data: gatherSyncData(), updatedAt: getLocalUpdatedAt() || Date.now() }),
    });
    clearTimeout(timeoutId);
    if(res.ok){ localStorage.setItem("vf-last-server-sync", String(Date.now())); localStorage.setItem("vf-last-sync-failed","0"); return true; }
    localStorage.setItem("vf-last-sync-failed","1");
    return false;
  }catch(e){
    // pas de connexion, timeout, ou serveur indisponible : le local reste intact (rien n'est perdu),
    // mais l'échec doit rester visible plutôt qu'avalé silencieusement — voir getSyncStatusLabel().
    localStorage.setItem("vf-last-sync-failed","1");
    return false;
  }
}
/* Statut de synchronisation affichable dans Réglages — dérivé de signaux déjà existants
   (horodatage de dernière modification locale, horodatage de dernière synchro réussie, indicateur
   d'échec explicite ci-dessus) sans nouvelle structure de données lourde. */
function getSyncStatusLabel(){
  const failed = localStorage.getItem("vf-last-sync-failed")==="1";
  if(failed) return "Échec de synchronisation";
  const lastUpdate = getLocalUpdatedAt();
  const lastSync = Number(localStorage.getItem("vf-last-server-sync")||0);
  if(lastUpdate && lastSync < lastUpdate) return "Synchronisation en attente";
  return "Synchronisé";
}
async function checkServerOnLoad(){
  try{
    const res = await fetch("/.netlify/functions/load-data", { method:"GET", headers: syncHeaders() });
    if(!res.ok) return;
    const remote = await res.json();
    if(remote && remote.updatedAt && remote.updatedAt > getLocalUpdatedAt()){
      state.serverHasNewerData = remote;
      renderMain();
    }
  }catch(e){ /* pas de réseau au démarrage : on continue avec le localStorage, comme avant */ }
}

/* ---------- SCORE QUALITÉ (avant génération) ----------
   Heuristique locale basée sur des signaux structurels disponibles (présence de modules,
   longueur, budget de contexte, risques détectés, historique récent). Ce n'est PAS un jugement
   sémantique — pour une vraie évaluation qualitative, utiliser l'onglet Audit IA (ChatGPT). */
function computeQualityScore({ platform, textPrompt, textMods, imageMods, totalTextAvailable, missionKey }){
  const dims = {};
  const hasMasterCodex = state.modules.some(m=>m.enabled && (m.category==="MASTER SDZ"||m.category==="CODEX SDZ"));
  dims["Respect SDZ"] = hasMasterCodex ? 100 : 60;
  dims["Respect plateforme"] = textMods.some(m=>[platform,"Instagram","Facebook","Google Business","Blog Wix"].includes(m.category)) ? 100 : 75;
  const needsSEO = platform==="Google Business" || platform==="Article Blog Wix";
  dims["Respect SEO"] = !needsSEO ? 100 : (textMods.some(m=>m.category==="SEO") ? 100 : 45);
  dims["Respect conversion"] = (missionKey && MISSIONS[missionKey]) || textMods.some(m=>m.category==="CTA") ? 100 : 65;
  dims["Respect DA"] = daLinesText().length > 40 ? 100 : 55;
  const len = textPrompt.length;
  dims["Longueur"] = len<300 ? 50 : len>7000 ? 55 : 100;
  dims["Doublons"] = 100; // la fusion sans doublons est déjà appliquée en amont
  const risks = currentRiskFlags();
  dims["Risque API"] = Math.max(30, 100 - risks.length*20);
  dims["Lisibilité"] = len>0 && len<6000 ? 90 : 65;
  dims["Clarté"] = (missionKey ? 15 : 0) + (state.prestationName ? 15 : 0) + 70;
  const recentSame = state.history.filter(h=>h.platform===platform).slice(-5);
  dims["Originalité"] = recentSame.length>3 ? 70 : 95;

  const values = Object.values(dims).map(v=>Math.min(100,v));
  const global = Math.round(values.reduce((a,b)=>a+b,0) / values.length);
  const weakPoints = Object.entries(dims).filter(([,v])=>v<75).map(([k])=>k);
  return { global, dims, weakPoints };
}

function parseAuditReport(text){
  const num = (key)=>{ const m = text.match(new RegExp(key+"\\s*:\\s*([0-9.]+)")); return m ? parseFloat(m[1]) : null; };
  const section = (label, stops)=>{
    const re = new RegExp(label+"\\s*:\\s*([\\s\\S]*?)(?="+stops.join("|")+"|$)", "i");
    const m = text.match(re);
    if(!m) return [];
    return m[1].split("\n").map(l=>l.trim()).filter(l=>l.startsWith("-")).map(l=>l.replace(/^-+\s*/,"").trim()).filter(Boolean);
  };
  return {
    charte:num("RESPECT_CHARTE"), coherence:num("COHERENCE_MARQUE"), plateforme:num("RESPECT_PLATEFORME"),
    seo:num("SEO"), conversion:num("CONVERSION"), clarte:num("CLARTE"), redaction:num("QUALITE_REDACTIONNELLE"),
    da:num("QUALITE_DA"), originalite:num("ORIGINALITE"), repetition:num("RISQUE_REPETITION"), global:num("SCORE_GLOBAL"),
    pointsForts: section("POINTS_FORTS", ["POINTS_FAIBLES","RECOMMANDATIONS"]),
    pointsFaibles: section("POINTS_FAIBLES", ["RECOMMANDATIONS","POINTS_FORTS"]),
    recommandations: section("RECOMMANDATIONS", ["POINTS_FORTS","POINTS_FAIBLES"]),
    raw: text,
  };
}

        refBox.appendChild(familySelect);

        wrap.appendChild(refBox);
      }

      grid.appendChild(wrap);

  return frag;
}

/* Vérification légère (coins de l'image) pour avertir si un logo semble ne pas avoir de fond
   transparent — un PNG transparent est recommandé pour un rendu propre en surimpression. */
async function checkImageHasTransparency(dataUrl){
  try{
    const img = await loadImage(dataUrl);
    const canvas = document.createElement("canvas");
    canvas.width = img.width; canvas.height = img.height;
    const ctx = canvas.getContext("2d");
    ctx.drawImage(img, 0, 0);
    const corners = [[0,0],[canvas.width-1,0],[0,canvas.height-1],[canvas.width-1,canvas.height-1]];
    for(const [x,y] of corners){
      const [,,,a] = ctx.getImageData(x, y, 1, 1).data;
      if(a < 250) return true; // au moins un coin transparent ou semi-transparent détecté
    }
    return false;
  }catch(e){
    return true; // en cas de doute (erreur de lecture), ne pas afficher un faux avertissement
  }
}

let canvasEl = null;
function drawCanvas(){
  if(!canvasEl) return;
  const img = state.images.find(i=>i.id===state.selectedId);
  if(!img) return;
  const {w,h} = ASPECTS[state.aspect];
  canvasEl.width = w; canvasEl.height = h;
  const ctx = canvasEl.getContext("2d");
  ctx.clearRect(0,0,w,h);
  loadImage(img.dataUrl).then(async image=>{
    const srcRatio = image.width/image.height, dstRatio = w/h;
    let sx,sy,sw,sh;
    if(srcRatio>dstRatio){ sh=image.height; sw=sh*dstRatio; sx=(image.width-sw)/2; sy=0; }
    else { sw=image.width; sh=sw/dstRatio; sx=0; sy=(image.height-sh)/2; }
    ctx.filter = `brightness(${state.filters.brightness}%) contrast(${state.filters.contrast}%) saturate(${state.filters.saturate}%) grayscale(${state.filters.grayscale}%)`;
    ctx.drawImage(image, sx,sy,sw,sh, 0,0,w,h);
    ctx.filter = "none";
    if(state.overlay.text.trim()){
      const fontSize = (state.overlay.size/100)*(w/10);
      ctx.font = `700 ${fontSize}px Georgia, serif`;
      ctx.fillStyle = state.overlay.color;
      ctx.textAlign = "center"; ctx.textBaseline = "middle";
      ctx.shadowColor = "rgba(0,0,0,0.55)"; ctx.shadowBlur = fontSize*0.15;
      ctx.fillText(state.overlay.text, (state.overlay.x/100)*w, (state.overlay.y/100)*h);
      ctx.shadowBlur = 0;
    }
    if(state.logoOverlay.assetId){
      const asset = state.images.find(i=>i.id===state.logoOverlay.assetId);
      if(asset){
        try{
          const logoImg = await loadImage(asset.dataUrl);
          const logoW = w * (state.logoOverlay.size/100);
          const logoH = logoW * (logoImg.height/logoImg.width);
          const lx = (state.logoOverlay.x/100)*w - logoW/2;
          const ly = (state.logoOverlay.y/100)*h - logoH/2;
          ctx.drawImage(logoImg, lx, ly, logoW, logoH);
        }catch(e){}
      }
    }
  });
}

  function posFromEvent(e){
    const rect = canvasEl.getBoundingClientRect();
    const cx = e.touches ? e.touches[0].clientX : e.clientX;
    const cy = e.touches ? e.touches[0].clientY : e.clientY;
    state.overlay.x = Math.max(0,Math.min(100, ((cx-rect.left)/rect.width)*100));
    state.overlay.y = Math.max(0,Math.min(100, ((cy-rect.top)/rect.height)*100));
    drawCanvas();
  }
  canvasEl.addEventListener("mousedown", e=>{dragging=true; posFromEvent(e);});
  canvasEl.addEventListener("mousemove", e=>{ if(dragging) posFromEvent(e); });
  window.addEventListener("mouseup", ()=>dragging=false);
  canvasEl.addEventListener("touchstart", e=>{dragging=true; posFromEvent(e);});
  canvasEl.addEventListener("touchmove", e=>{ if(dragging) posFromEvent(e); });
  canvasEl.addEventListener("touchend", ()=>dragging=false);

function buildConfigPromptText(){
  return cleanPrompt(`Tu me connais déjà à travers nos échanges précédents. En te basant sur tout ce que tu sais de mon activité, propose des modules de connaissance pour structurer ma base de marque.

Réponds STRICTEMENT avec une ligne par module, dans ce format exact (rien d'autre) :
CATEGORIE | TITRE | CONTENU

Les catégories possibles sont : ${CATEGORIES.join(", ")}.
Propose au moins un module pour "Univers de marque", "Charte graphique", "Prestations" et "Direction artistique".`);
}
function importModulesFromText(text){
  const lines = text.split("\n").map(l=>l.trim()).filter(Boolean);
  let count = 0;
  lines.forEach(line=>{
    const parts = line.split("|").map(p=>p.trim());
    if(parts.length>=3 && CATEGORIES.includes(parts[0])){
      state.modules.push({ id: uid(), category:parts[0], title:parts[1], content:parts.slice(2).join(" | "), enabled:true });
      count++;
    }
  });
  LS.set("vf-modules", state.modules);
  return count;
}

/* ---------- bloc de retour + score qualité, réutilisé pour post simple et campagne ---------- */
function hasLikelyCTA(text, missionKey){
  const t = (text||"").toLowerCase();
  const genericCtas = ["réserve","réservez","contacte","contactez","découvre","découvrez","profite","profitez",
    "appelle","appelez","offre","offrez","réservation","rendez-vous","inscri","clique","cliquez","visite","visitez"];
  if(genericCtas.some(w=>t.includes(w))) return true;
  const missionCta = missionKey && MISSIONS[missionKey] && MISSIONS[missionKey].cta;
  if(missionCta){
    const ctaWords = missionCta.toLowerCase().split(/\W+/).filter(w=>w.length>3);
    if(ctaWords.some(w=>t.includes(w))) return true;
  }
  return false;
}

function buildValidationChecklist(ctx){
  const platform = ctx.platform;
  const text = (ctx.getTextResult ? ctx.getTextResult() : "") || "";
  const requiresText = !!ctx.textPrompt;
  const checks = [];

  checks.push({ label:`Format plateforme correct (${PLATFORM_ASPECT[platform]})`, ok: true });
  checks.push({ label: requiresText ? "Texte requis pour cette plateforme : rédigé" : "Texte non requis pour cette plateforme (normal, rien à faire)",
    ok: requiresText ? text.trim().length>0 : true });
  checks.push({ label:"Image sélectionnée pour ce post", ok: !!ctx.hasImage });
  checks.push({ label:"Logo IA interdit dans le prompt (consigne appliquée automatiquement)", ok: true });
  checks.push({ label: wantsRealLogoLabel(platform), ok: !logoRequiredFor(platform) || !!ctx.logoApplied });

  if(requiresText && ctx.prestationName){
    checks.push({ label:`Nom de la prestation repris exactement ("${ctx.prestationName}")`, ok: text.includes(ctx.prestationName) });
  }
  if(requiresText){
    checks.push({ label:"CTA (appel à l'action) présent dans le texte", ok: hasLikelyCTA(text, ctx.missionKey) });
  }
  if(requiresText && platform==="Google Business"){
    checks.push({ label:"Pas de hashtags (non recommandé pour Google Business)", ok: !text.includes("#") });
    checks.push({ label:"Longueur adaptée à un résumé Google Business (150 à 300 mots environ)", ok: text.split(/\s+/).filter(Boolean).length>=80 });
  }
  if(requiresText && (platform==="Instagram" || platform==="Facebook")){
    checks.push({ label:"Longueur raisonnable pour un réseau social (moins de 2200 caractères)", ok: text.length>0 && text.length<2200 });
  }
  if(requiresText && platform==="Article Blog Wix"){
    checks.push({ label:"Article suffisamment développé pour le SEO (plus de 500 caractères)", ok: text.length>500 });
  }
  if(ctx.schedulable !== false && platform!=="Article Blog Wix" && platform!=="Story"){
    checks.push({ label:"Image compatible avec l'envoi automatique à Make (servie via image_url)", ok: !!ctx.hasImage });
  }

  const passed = checks.filter(c=>c.ok).length;
  return { checks, passed, total: checks.length, allOk: checks.length>0 && checks.every(c=>c.ok) };
}
function wantsRealLogoLabel(platform){
  return logoRequiredFor(platform) ? "Vrai logo prévu en surimpression (pas un logo dessiné par l'IA)" : "Logo non requis pour ce format (normal)";
}

function buildFeedbackBlock(ctx){
  const frag = el("div",{});
  const risk = computeRepetitionRisk(ctx.platform, ctx.getTextResult());
  const checklist = buildValidationChecklist(ctx);
  frag.appendChild(el("h2",{class:"section"},"Checklist de validation"));
  const riskColor = risk>50 ? "var(--coral)" : risk>25 ? "var(--amber)" : "var(--green)";
  frag.appendChild(el("p",{style:`font-size:13px;margin-bottom:10px;`},[
    "Risque de répétition détecté (calcul automatique vs historique) : ",
    el("strong",{style:`color:${riskColor};`}, `${risk}%`),
  ]));
  checklist.checks.forEach(c=>{
    frag.appendChild(el("div",{class:"learning-row", style:`color:${c.ok?"var(--green)":"var(--coral)"};`}, `${c.ok?"✅":"⚠️"} ${c.label}`));
  });
  if(checklist.total>0){
    frag.appendChild(el("p",{style:`font-size:13px;font-weight:600;margin:10px 0;color:${checklist.allOk?"var(--green)":"var(--amber)"};`},
      checklist.allOk ? "Tout est en ordre, prêt à valider." : `${checklist.passed}/${checklist.total} points validés — vérifie les points signalés ci-dessus avant de publier.`));
  }

  frag.appendChild(el("h2",{class:"section"},"Retour sur ce contenu"));
  frag.appendChild(el("p",{class:"sublabel"},"Ton retour devient une nouvelle règle réinjectée dans les prochaines générations."));

      id: uid(), date: nowStr(), platform: ctx.platform, topic: ctx.topic,

      textResult: ctx.getTextResult(), rating, comment: state.feedbackComment, favorite:false,

      campaignLabel: ctx.campaignLabel || null,

    state.history.push(entry);
    LS.set("vf-history", state.history);
    if(rating==="down" || state.feedbackComment.trim()){
      state.modules.push({ id: uid(), category:"Erreurs fréquentes",
        title: `Retour ${ctx.platform} — ${nowStr()}`,
        content: state.feedbackComment.trim() || `Contenu jugé à revoir pour ${ctx.platform} : "${(ctx.getTextResult()||"").slice(0,120)}"`,
        enabled:true, platform: ctx.platform, createdAt: Date.now() });

    if(rating==="up" && ctx.getTextResult().trim()){
      state.modules.push({ id: uid(), category:"Exemples excellents",
        title: `Exemple validé ${ctx.platform} — ${nowStr()}`,
        content: ctx.getTextResult().trim(), enabled:true, platform: ctx.platform, createdAt: Date.now() });

    state.feedbackComment = "";
    ctx.onSaved && ctx.onSaved();
    renderMain();

  rateRow.appendChild(el("button",{class:"btn-ghost", onclick:()=>doRate("up")}, "👍 Excellent"));
  rateRow.appendChild(el("button",{class:"btn-ghost", onclick:()=>doRate("mid")}, "👌 Moyen"));
  rateRow.appendChild(el("button",{class:"btn-ghost", onclick:()=>doRate("down")}, "👎 À revoir"));
  frag.appendChild(rateRow);
  return frag;
