<style>

    --bg:#0B0B0B; --card:rgba(255,255,255,0.05); --card2:rgba(255,255,255,0.08); --border:rgba(255,255,255,0.14);

  html,body{margin:0;padding:0;background:var(--bg);color:var(--text);font-family:-apple-system,Segoe UI,Roboto,Helvetica,Arial,sans-serif;}
  button{font-family:inherit;cursor:pointer;border:none;background:none;color:inherit;}
  input,textarea,select{font-family:inherit;color:inherit;background:transparent;}

  .brand{display:flex;align-items:center;gap:8px;font-weight:700;font-size:18px;letter-spacing:-0.02em;}
  .dot-ring{width:26px;height:26px;border-radius:50%;border:2px solid var(--gold);display:flex;align-items:center;justify-content:center;}

  .count{font-size:12px;color:var(--muted);}

  nav button.active{background:var(--gold);color:var(--bg);font-weight:600;}

  main{padding:16px;padding-bottom:80px;max-width:560px;margin:0 auto;}
  .hint{text-align:center;color:var(--muted2);font-size:14px;margin-top:32px;}

  .grid2{display:grid;grid-template-columns:1fr 1fr;gap:12px;}
  .thumb{position:relative;aspect-ratio:1/1;border-radius:12px;overflow:hidden;cursor:pointer;}
  .thumb img{width:100%;height:100%;object-fit:cover;display:block;}
  .thumb .del,.thumb .fav{position:absolute;top:6px;background:rgba(0,0,0,0.6);border-radius:999px;padding:6px;opacity:0;transition:.15s;}
  .thumb .del{right:6px;} .thumb .fav{left:6px;}
  .thumb:hover .del,.thumb:hover .fav{opacity:1;}
  .thumb .fav.active{opacity:1;color:var(--amber);}
  .thumb .tags{position:absolute;bottom:0;left:0;right:0;background:linear-gradient(transparent,rgba(0,0,0,0.75));
    padding:14px 6px 5px;font-size:10px;color:var(--muted);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}

  .vf{position:relative;}
  .vf .corner{position:absolute;width:20px;height:20px;border-color:var(--amber);}
  .vf .tl{top:0;left:0;border-top:2px solid;border-left:2px solid;border-top-left-radius:4px;}
  .vf .tr{top:0;right:0;border-top:2px solid;border-right:2px solid;border-top-right-radius:4px;}
  .vf .bl{bottom:0;left:0;border-bottom:2px solid;border-left:2px solid;border-bottom-left-radius:4px;}
  .vf .br{bottom:0;right:0;border-bottom:2px solid;border-right:2px solid;border-bottom-right-radius:4px;}

  .pillrow{display:flex;gap:8px;flex-wrap:wrap;}
  .pill{padding:7px 14px;border-radius:999px;font-size:13px;border:1px solid rgba(255,255,255,0.15);color:var(--muted);}
  .pill.active{background:var(--lime);color:var(--bg);border-color:var(--lime);font-weight:600;}
  .badge{display:inline-block;font-size:10px;padding:2px 8px;border-radius:999px;background:rgba(201,162,39,0.2);color:var(--gold-soft);}

  textarea,input[type=text],select{width:100%;background:var(--card);border:1px solid var(--border);border-radius:10px;

  textarea:focus,input[type=text]:focus,select:focus{border-color:var(--gold);}
  input[type=range]{width:100%;accent-color:var(--gold);}
  input[type=checkbox]{width:16px;height:16px;accent-color:var(--gold);}

  .btn-primary{width:100%;background:var(--gold);color:var(--bg);font-weight:600;border-radius:999px;padding:13px;

  .btn-secondary{width:100%;background:rgba(201,162,39,0.18);color:var(--gold-soft);font-weight:600;border-radius:999px;padding:10px;

  .btn-small{background:var(--card);border-radius:8px;padding:6px 10px;font-size:12px;display:inline-flex;align-items:center;gap:5px;}
  .btn-ghost{flex:1;background:var(--card);border-radius:999px;padding:9px;font-size:13px;

  .btn-ghost.active{background:var(--lime);color:var(--bg);font-weight:600;}

  .module-card{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:12px;margin-bottom:8px;}

  .module-cat{font-size:10px;color:var(--muted2);}
  .module-content{font-size:13px;color:var(--muted);white-space:pre-wrap;line-height:1.5;}

  .history-card{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:12px;margin-bottom:10px;}
  .history-top{display:flex;justify-content:space-between;align-items:center;font-size:12px;color:var(--muted2);margin-bottom:6px;}

  .field{margin-bottom:12px;}
  .field label{display:block;font-size:12px;color:var(--muted);margin-bottom:5px;}

  canvas{width:100%;height:auto;display:block;background:#000;border-radius:12px;touch-action:none;cursor:crosshair;}
  pre{white-space:pre-wrap;font-size:12px;color:var(--muted);max-height:240px;overflow-y:auto;margin:0;font-family:ui-monospace,monospace;}
  svg{display:inline-block;vertical-align:middle;flex-shrink:0;}

<script>
/* ============================================================
   STOCKAGE LOCAL
============================================================ */
/* Clés synchronisées avec le serveur (Netlify Blobs) — doit rester identique à la
   liste ALLOWED_KEYS des fonctions serveur save-data / load-data / sync-data.
   Volontairement exclues : vf-images (trop lourd), toute clé API. */
const SYNC_KEYS = ["vf-modules","vf-styles","vf-da","vf-history","vf-image-history","vf-audit","vf-lab","vf-api-providers","vf-modes","vf-campaign","vf-scheduled","vf-make-webhook","vf-pack-imports","vf-pack-versions"];

let autoSyncTimer = null;
function scheduleAutoSync(){
  if(autoSyncTimer) clearTimeout(autoSyncTimer);
  autoSyncTimer = setTimeout(()=>{ pushToServerSilent(); }, 4000);
}
function getLocalUpdatedAt(){ return Number(localStorage.getItem("vf-updated-at")||0); }
function bumpLocalUpdatedAt(){ localStorage.setItem("vf-updated-at", String(Date.now())); }

const LS = {
  get(key, fallback){
    try{
      const v = localStorage.getItem(key);
      if(v===null) return fallback;
      const parsed = JSON.parse(v);
      // guérison rétroactive : une valeur stockée "null" ou de mauvais type ne doit jamais remplacer un tableau/objet attendu
      if(parsed===null || parsed===undefined) return fallback;
      if(Array.isArray(fallback) && !Array.isArray(parsed)) return fallback;
      if(fallback && typeof fallback==="object" && !Array.isArray(fallback) && (typeof parsed!=="object" || Array.isArray(parsed))) return fallback;
      return parsed;
    }catch(e){ return fallback; }
  },
  set(key, val){
    try{
      localStorage.setItem(key, JSON.stringify(val));
      if(SYNC_KEYS.includes(key)){ bumpLocalUpdatedAt(); scheduleAutoSync(); }
      return true;
    }catch(e){
      console.error(e);
      if(typeof state!=="undefined") state.storageError = { key, message: String(e && e.message || e), at: Date.now() };
      return false;
    }
  }
};
const uid = () => `${Date.now()}-${Math.random().toString(36).slice(2,8)}`;
const nowStr = () => new Date().toLocaleDateString("fr-FR",{day:"2-digit",month:"2-digit",year:"numeric"});

/* ============================================================
   CONFIGURATION — plateformes, formats, catégories de connaissance
============================================================ */
const ASPECTS = {
  "1:1": { w: 1080, h: 1080 },
  "4:5": { w: 1080, h: 1350 },
  "4:3": { w: 1200, h: 900 },
  "9:16": { w: 1080, h: 1920 },

const PLATFORMS = ["Instagram","Facebook","Google Business","Article Blog Wix","Story"];

const PLATFORM_ASPECT = { "Instagram":"1:1", "Facebook":"4:5", "Google Business":"4:3", "Article Blog Wix":"16:9", "Story":"9:16" };
// Tailles réellement acceptées par gpt-image-1 (1024x1024, 1024x1536, 1536x1024 — pas les tailles
// DALL·E 3 comme 1792x1024). Mapping direct par plateforme, pas par ratio calculé.
const API_IMAGE_SIZE_BY_PLATFORM = {
  "Story": "1024x1536",
  "Instagram": "1024x1536",
  "Facebook": "1024x1536",
  "Google Business": "1024x1024",
  "Article Blog Wix": "1536x1024",
};
const PLATFORM_OVERLAY = { "Instagram":"léger", "Facebook":"léger", "Google Business":"aucun", "Article Blog Wix":"fiche", "Story":"fort" };
const PLATFORM_MAXCHARS = { "Instagram":110, "Facebook":120, "Google Business":0, "Article Blog Wix":220, "Story":220 };
const PLATFORM_NOTE = {
  "Instagram": "Format carré, 1 à 2 phrases courtes incrustées sur l'image (pas un simple mot-clé, une vraie accroche).",
  "Facebook": "Format portrait, 1 à 2 phrases courtes incrustées sur l'image (pas un simple mot-clé, une vraie accroche).",

  "Story": "Format vertical plein écran, 4 à 5 phrases fortes disposées avec des tailles de police variées (hiérarchie visuelle, jamais uniforme) et le logo en bas, centré — publiée simultanément sur Instagram et Facebook.",

};
/* MASTER SDZ et CODEX SDZ sont les documents de plus haute autorité : toujours injectés,
   quelle que soit la plateforme ou la mission — c'est le socle non négociable de la marque. */
const ALWAYS_ON_CATEGORIES = ["MASTER SDZ","CODEX SDZ"];

const TEXT_MODULE_MAP = {
  "Instagram": ["Univers de marque","Règles rédactionnelles","Instagram","Interdits","À ne jamais faire","À faire",
    "Vocabulaire autorisé","Vocabulaire interdit","Exemples excellents","Exemples validés","Exemples refusés",
    "Leçons apprises","Prestations","Offres","CTA","Psychologie client","Personae",
    "Objections clients","Saisonnalité","Missions"],
  "Facebook": ["Univers de marque","Règles rédactionnelles","Facebook","Interdits","À ne jamais faire","À faire",
    "Vocabulaire autorisé","Vocabulaire interdit","Exemples excellents","Exemples validés","Exemples refusés",
    "Leçons apprises","Prestations","Offres","CTA","Psychologie client","Personae",
    "Objections clients","Saisonnalité","Missions"],
  "Google Business": ["SEO","Google Business","Prestations","Offres","Règles rédactionnelles","Interdits",
    "À ne jamais faire","À faire","Vocabulaire autorisé","Vocabulaire interdit","Leçons apprises",
    "CTA","Psychologie client","Objections clients","Saisonnalité","Missions"],
  "Article Blog Wix": ["SEO","Blog Wix","Prestations","Offres","Règles rédactionnelles","Glossaire","Interdits",
    "À ne jamais faire","À faire","Vocabulaire autorisé","Vocabulaire interdit","Leçons apprises",
    "CTA","Psychologie client","Personae","Objections clients","Saisonnalité","Missions"],
  "Story": ["Univers de marque","Règles rédactionnelles","Stories","Interdits","À ne jamais faire","À faire",
    "Vocabulaire autorisé","Vocabulaire interdit","Prestations","Offres","CTA","Saisonnalité","Missions"],
};
/* Story : image uniquement dans le mode campagne, donc pas de map texte — elle ne charge jamais SEO. */
const IMAGE_MODULE_CATS = ["Charte graphique","Direction artistique","Logo","Palette","Typographies",
  "Exemples validés","Exemples refusés","Bibliothèque d'idées"];
/* "Interdits" / "À ne jamais faire" / "À faire" sont volontairement exclus du prompt image : ce sont des
   règles rédactionnelles déjà couvertes par le prompt texte, et l'image dispose de son propre garde-fou
   permanent (SAFETY_GUARDRAIL). Les injecter aussi ici ne ferait que dupliquer le même contenu dans les
   deux prompts sans rien apporter — exactement ce que le moteur doit désormais éviter. */
const CATEGORIES = ["MASTER SDZ","CODEX SDZ","Univers de marque","Direction artistique","Charte graphique","Logo","Palette","Typographies",
  "Prestations","Offres","SEO","Google Business","Instagram","Facebook","Stories","Blog Wix",
  "Psychologie client","Personae","Missions","CTA","Objections clients","Saisonnalité",
  "Vocabulaire autorisé","Vocabulaire interdit","À faire","À ne jamais faire","Interdits","Règles rédactionnelles",
  "Glossaire","Erreurs fréquentes","Décisions importantes","Exemples excellents","Exemples validés","Exemples refusés",
  "Leçons apprises","Bibliothèque d'idées"];
/* Bibliothèque de styles et Base de prompts restent des systèmes dédiés (onglets Styles / Base de prompts)
   plutôt que des catégories de modules texte, pour éviter de dupliquer une structure qui existe déjà. */

/* Ordre de priorité du moteur de contexte : en cas de budget limité, les catégories en tête
   sont toujours conservées en premier, les catégories en fin de liste sont les premières sacrifiées. */
const HIERARCHY_ORDER = ["MASTER SDZ","CODEX SDZ","Direction artistique","Charte graphique","Logo","Palette","Typographies",
  "Univers de marque","Prestations","Offres","Missions",
  "Instagram","Facebook","Google Business","Stories","Blog Wix","SEO","CTA",
  "Psychologie client","Personae","Objections clients","Saisonnalité",
  "Vocabulaire autorisé","Vocabulaire interdit","À faire","À ne jamais faire","Interdits",
  "Règles rédactionnelles","Glossaire","Erreurs fréquentes","Décisions importantes",
  "Exemples excellents","Exemples validés","Exemples refusés","Leçons apprises","Bibliothèque d'idées"];

/* Budget de contexte : au-delà de ce volume de caractères, le moteur arrête d'ajouter des modules
   (en respectant la hiérarchie ci-dessus) plutôt que de tout concaténer. Qualité > quantité. */
/* Niveau de détail adaptatif (étape 7) : Instagram reste court et percutant, un article de blog
   a droit à beaucoup plus d'espace pour un vrai développement SEO. */
const PLATFORM_TEXT_BUDGET = {
  "Instagram": 2600,
  "Facebook": 3000,
  "Google Business": 3200,
  "Article Blog Wix": 6000,
  "Story": 800,
};
const TEXT_CONTEXT_BUDGET = 4500; // valeur de repli si la plateforme n'a pas de budget dédié
const IMAGE_CONTEXT_BUDGET = 2600;

/* ============================================================
   MASTER_IMAGE V2 — CONTRAT D'ORCHESTRATION (cf. CONTRAT_ORCHESTRATION_V1.md)
   Ne concerne que les modules category==="MASTER_IMAGE" (Constitution générale,
   Noir & Or, et les registres ci-dessous). Les anciennes catégories (IMAGE_MODULE_CATS)
   et leur moteur (selectModulesOrdered) restent inchangés et continuent de fonctionner
   à l'identique — rétrocompatibilité totale.
============================================================ */
const KNOWN_REGISTRES = ["cinematographie","architecture","fantastique"];
const REGISTRE_LABELS = {
  cinematographie: "Cinématographie",
  architecture: "Architecture",
  fantastique: "Fantastique",
};
/* state.network (libellés d'affichage) → identifiants techniques utilisés dans criteres.plateforme
   des modules MASTER_IMAGE V2 (ex : "story", "google_business"). Garde-fou : une plateforme non
   mappée ne fait pas échouer la sélection, elle est simplement ignorée comme filtre (voir matchesPlatform). */
const CRITERES_PLATEFORME_MAP = {
  "Instagram": "instagram",
  "Facebook": "facebook",
  "Google Business": "google_business",
  "Article Blog Wix": "blog_wix",
  "Story": "story",
};
function platformCriteresId(platform){ return CRITERES_PLATEFORME_MAP[platform] || null; }

const PRIORITE_RANK = { haute:0, normale:1, basse:2 };

const IMAGE_FOUNDATION_BUDGET = 5000;       // Noir & Or
const IMAGE_REGISTRIES_TOTAL_BUDGET = 7000; // enveloppe commune, partagée dynamiquement entre registres actifs
const IMAGE_REGISTRY_MIN_BUDGET = 2000;
const IMAGE_REGISTRY_MAX_BUDGET = 4000;
const IMAGE_ADAPTATION_BUDGET = 2500;       // réservé pour une future couche adaptation/contexte (non exploité ici)
const IMAGE_TOTAL_HARD_LIMIT = 18000;       // filet de sécurité final, jamais le mécanisme principal

/* Complète les critères manquants ou partiels avec les valeurs par défaut du contrat :
   un module MASTER_IMAGE V2 sans `criteres`, ou avec des critères incomplets, reste valide
   et se comporte comme un module permanent/toutes plateformes/tous objectifs/priorité haute. */
function normalizeCriteres(m){
  const c = m.criteres || {};
  const portee = (c.portee==="permanent" || c.portee==="contextuel") ? c.portee : "permanent";
  const priorite = ["haute","normale","basse"].includes(c.priorite) ? c.priorite : "haute";
  const plateforme = (Array.isArray(c.plateforme) && c.plateforme.length) ? c.plateforme : ["toutes"];
  const objectif = (Array.isArray(c.objectif) && c.objectif.length) ? c.objectif : ["tous"];
  return { portee, priorite, plateforme, objectif };
}

/* Détermine à quel registre appartient un module. Utilise en priorité un champ explicite
   `m.registre` (à stamper lors d'un futur import enrichi des packs), et à défaut un préfixe
   d'id — c'est la seule information de rattachement disponible dans les 5 fichiers actuels
   tant que l'import n'a pas été étendu pour porter cette donnée. Fragile si les ids changent :
   à remplacer par un champ explicite dès que possible. */
const ID_PREFIX_TO_REGISTRE = {
  "constitution_": "constitution_generale",
  "noir_or_": "noir_or",
  "cinema_": "cinematographie",
  "architecture_": "architecture",
  "fantastique_": "fantastique",
};
function moduleRegistre(m){
  if(m.registre) return m.registre;
  const prefix = Object.keys(ID_PREFIX_TO_REGISTRE).find(p=> String(m.id||"").startsWith(p));
  return prefix ? ID_PREFIX_TO_REGISTRE[prefix] : null;
}
/* Numéro de bloc (1 à 4) déduit de l'id (ex : "noir_or_c3_..." → 3). Les modules de la
   Constitution générale n'ont pas de notion de bloc : ils comptent comme bloc 1. */
function moduleBloc(m){
  const match = String(m.id||"").match(/_c([1-4])_/);
  return match ? Number(match[1]) : 1;
}

/* Sélectionne, trie et budgète les modules d'une couche (fondation ou un registre donné)
   selon le contrat : priorité d'abord (haute > normale > basse), puis bloc (1→2→3→4),
   puis ordre d'origine. Garantit qu'au moins un module de chaque bloc présent survit
   si le budget le permet, pour éviter d'injecter une Constitution sans mise en œuvre. */
function pickForLayer(entries, budget){
  const sorted = entries.map((x,i)=>({...x, i})).sort((a,b)=>
    (PRIORITE_RANK[a.criteres.priorite]-PRIORITE_RANK[b.criteres.priorite]) || (a.bloc-b.bloc) || (a.i-b.i));
  const kept = []; const keptByBloc = {}; let total = 0;
  sorted.forEach(x=>{
    const len = x.m.content.length;
    if(kept.length===0 || total+len<=budget){ kept.push(x); total+=len; keptByBloc[x.bloc]=(keptByBloc[x.bloc]||0)+1; }
  });
  const blocsPresents = [...new Set(entries.map(x=>x.bloc))];
  blocsPresents.forEach(b=>{
    if(!keptByBloc[b]){
      const candidat = sorted.find(x=>x.bloc===b && !kept.includes(x));
      if(candidat && total+candidat.m.content.length <= budget*1.15){ kept.push(candidat); total+=candidat.m.content.length; }
    }
  });
  return kept.map(x=>x.m);
}

/* Point d'entrée du contrat d'orchestration MASTER_IMAGE V2. Ne touche à rien de l'ancien
   moteur ; renvoie la liste des modules MASTER_IMAGE à ajouter au prompt image. */
function selectMasterImageModules(platform){
  const all = state.modules.filter(m=> m.enabled && m.category==="MASTER_IMAGE");
  const entries = all.map(m=>({ m, criteres: normalizeCriteres(m), registre: moduleRegistre(m), bloc: moduleBloc(m) }));

  const platformId = platformCriteresId(platform || state.network);
  const matchesPlatform = c => c.plateforme.includes("toutes") || !platformId || c.plateforme.includes(platformId);

  // 1. Permanents (Constitution générale + invariants Noir & Or) : hors budget, toujours entiers
  const permanentEntries = entries.filter(x=> x.criteres.portee==="permanent" && matchesPlatform(x.criteres));

  // 2. Fondation Noir & Or (contextuel) : budget dédié
  const foundationEntries = entries.filter(x=> x.criteres.portee==="contextuel" && x.registre==="noir_or" && matchesPlatform(x.criteres));
  const foundationKept = pickForLayer(foundationEntries, IMAGE_FOUNDATION_BUDGET);

  // 3. Registres contextuels actifs (state.registres) : enveloppe commune dynamique.
  //    Toute valeur inconnue dans state.registres est ignorée silencieusement (garde-fou migration).
  const activeRegistres = (state.registres||[]).filter(r=> KNOWN_REGISTRES.includes(r));
  const registryBudget = activeRegistres.length>0
    ? Math.min(IMAGE_REGISTRY_MAX_BUDGET, Math.max(IMAGE_REGISTRY_MIN_BUDGET, Math.floor(IMAGE_REGISTRIES_TOTAL_BUDGET/activeRegistres.length)))
    : 0;
  const registryKept = [];
  activeRegistres.forEach(r=>{
    const regEntries = entries.filter(x=> x.criteres.portee==="contextuel" && x.registre===r && matchesPlatform(x.criteres));
    registryKept.push(...pickForLayer(regEntries, registryBudget));
  });

  let kept = [...permanentEntries.map(x=>x.m), ...foundationKept, ...registryKept];

  // 4. Plafond global de sécurité : dernier recours, retire d'abord les blocs les plus hauts (4→1)
  //    des couches contextuelles, jamais les modules permanents.
  let total = kept.reduce((s,m)=>s+m.content.length, 0);
  if(total > IMAGE_TOTAL_HARD_LIMIT){
    const reducible = [...registryKept, ...foundationKept]
      .map(m=>({ m, bloc: moduleBloc(m) }))
      .sort((a,b)=> b.bloc - a.bloc);
    for(const x of reducible){
      if(total<=IMAGE_TOTAL_HARD_LIMIT) break;
      const idx = kept.indexOf(x.m);
      if(idx!==-1){ total-=x.m.content.length; kept.splice(idx,1); }
    }
  }
  return kept;
}

/* ============================================================
   NETTOYAGE UNIQUE — purge ciblée par nom exact, jamais un reset global.
   S'exécute une seule fois (verrou vf-cleanup-2026-07) puis ne touche plus rien.
   Ne supprime QUE les entrées explicitement listées ci-dessous ; tout le reste
   (styles SDZ, modules importés, historique, audits, réglages) reste intact.
============================================================ */
(function runOneTimeCleanup(){
  const FLAG = "vf-cleanup-2026-07";
  if(LS.get(FLAG, false)) return;

  const DELETE_STYLE_NAMES = ["noir & or","editorial","éditorial","cinématique","refuge",
    "énergétique","energetique","nature","montagne","été","ete","mystique premium"];
  try{
    const styles = LS.get("vf-styles", null);
    if(Array.isArray(styles)){
      const seen = new Set();
      const cleaned = [];
      styles.forEach(s=>{
        const norm = (s.name||"").trim().toLowerCase();
        if(DELETE_STYLE_NAMES.includes(norm)) return;      // style à supprimer explicitement
        if(seen.has(norm)) return;                          // doublon (ex: "Luxe silencieux" en double)
        seen.add(norm);
        cleaned.push(s);
      });
      if(cleaned.length !== styles.length) LS.set("vf-styles", cleaned);
    }
  }catch(e){ console.error("Nettoyage styles échoué :", e); }

  const DELETE_MODULES = [
    { category:"Charte graphique", title:"Ton & identité visuelle" },
    { category:"Interdits", title:"Interdits généraux" },
    { category:"Règles rédactionnelles", title:"Structure générale" },
    { category:"Direction artistique", title:"Style par défaut" },
    { category:"Univers de marque", title:"Présentation de la marque" },
  ];
  try{
    const modules = LS.get("vf-modules", null);
    if(Array.isArray(modules)){
      const cleaned = modules.filter(m =>
        !DELETE_MODULES.some(d => d.category===m.category && d.title===m.title)
      );
      if(cleaned.length !== modules.length) LS.set("vf-modules", cleaned);
    }
  }catch(e){ console.error("Nettoyage modules échoué :", e); }

  LS.set(FLAG, true);
})();

function el(tag, attrs={}, children=[]){
  const e = document.createElement(tag);
  for(const [k,v] of Object.entries(attrs)){
    if(k==="class") e.className = v;
    else if(k==="html") e.innerHTML = v;
    else if(k.startsWith("on")) e.addEventListener(k.slice(2), v);
    else if(k==="checked"){ e.checked = v; }
    else e.setAttribute(k, v);
  }
  (Array.isArray(children)?children:[children]).forEach(c=>{
    if(c==null) return;
    e.appendChild(typeof c === "string" ? document.createTextNode(c) : c);
  });
  return e;
}

  s.setAttribute("stroke-linecap","round"); s.setAttribute("stroke-linejoin","round");
  s.innerHTML = pathHtml;

}

function resizeImageFile(file, maxDim=1600, quality=0.85){
  return new Promise((resolve, reject)=>{
    const reader = new FileReader();
    reader.onload = () => {
      const img = new Image();
      img.onload = () => {
        let {width,height} = img;
        if(width>maxDim || height>maxDim){
          if(width>height){ height = Math.round(height*maxDim/width); width = maxDim; }
          else { width = Math.round(width*maxDim/height); height = maxDim; }
        }
        const c = document.createElement("canvas"); c.width=width; c.height=height;
        c.getContext("2d").drawImage(img,0,0,width,height);
        resolve(c.toDataURL("image/jpeg", quality));
      };
      img.onerror = reject;
      img.src = reader.result;
    };
    reader.onerror = reject;
    reader.readAsDataURL(file);
  });
}
function loadImage(src){
  return new Promise((resolve,reject)=>{
    const img = new Image();
    img.onload = ()=>resolve(img);
    img.onerror = reject;
    img.src = src;
  });
}

/* L'IA ne doit jamais être chargée de dessiner le logo (elle ne peut que l'approximer, jamais le reproduire
   fidèlement) : on lui demande de laisser une zone dégagée, puis on incruste ici le vrai fichier logo
   marqué comme actif de marque dans la Bibliothèque, exactement à la position réglée dans state.logoOverlay. */
/* Certains logos fournis ont un vrai fond blanc plein (pas transparent) plutôt qu'un PNG
   transparent — plutôt que d'imposer à Fabien de refaire le fichier, on détecte ce cas et on
   retire automatiquement le fond blanc avant d'incruster le logo, avec un léger adoucissement
   des bords pour éviter un contour crénelé. Mis en cache par image pour ne le calculer qu'une
   fois par session. */
let _autoTransparentLogoCache = null; // { key, canvas }
async function getAutoTransparentLogo(logoAsset){
  const cacheKey = logoAsset.id + ":" + logoAsset.dataUrl.length;
  if(_autoTransparentLogoCache && _autoTransparentLogoCache.key===cacheKey) return _autoTransparentLogoCache.canvas;

  const img = await loadImage(logoAsset.dataUrl);
  const canvas = document.createElement("canvas");
  canvas.width = img.width; canvas.height = img.height;
  const ctx = canvas.getContext("2d");
  ctx.drawImage(img, 0, 0);

  // Le fond est-il réellement opaque ? (coins non transparents) — sinon on ne touche à rien.
  const corners = [[0,0],[canvas.width-1,0],[0,canvas.height-1],[canvas.width-1,canvas.height-1]];
  const looksOpaque = corners.every(([x,y])=> ctx.getImageData(x,y,1,1).data[3] >= 250);
  if(!looksOpaque){
    _autoTransparentLogoCache = { key: cacheKey, canvas };
    return canvas;
  }

  const imageData = ctx.getImageData(0, 0, canvas.width, canvas.height);
  const d = imageData.data;

  // La couleur de fond réelle est déduite des coins (peu importe qu'elle soit blanche, noire, ou autre),
  // plutôt que de supposer un fond blanc — sinon un fond noir plein (comme ici) n'était jamais détecté.
  const cornerSamples = corners.map(([x,y])=>{
    const p = ctx.getImageData(x,y,1,1).data;
    return [p[0], p[1], p[2]];
  });
  const bg = [0,1,2].map(ch => Math.round(cornerSamples.reduce((s,c)=>s+c[ch],0) / cornerSamples.length));

  const DIST_THRESHOLD = 40;   // en dessous, considéré comme faisant partie du fond à retirer
  const FEATHER_RANGE = 35;    // adoucissement du contour pour éviter un bord crénelé
  for(let i=0; i<d.length; i+=4){
    const r=d[i], g=d[i+1], b=d[i+2];
    const dist = Math.sqrt((r-bg[0])**2 + (g-bg[1])**2 + (b-bg[2])**2);
    if(dist <= DIST_THRESHOLD){
      d[i+3] = 0;
    } else if(dist <= DIST_THRESHOLD + FEATHER_RANGE){
      const t = 1 - (dist - DIST_THRESHOLD) / FEATHER_RANGE;
      d[i+3] = Math.round(d[i+3] * (1 - t));
    }
  }
  ctx.putImageData(imageData, 0, 0);
  _autoTransparentLogoCache = { key: cacheKey, canvas };
  return canvas;
}

async function compositeRealLogo(baseDataUrl){
  const logoAsset = state.images.find(i=>i.assetType==="logo");
  if(!logoAsset) return { dataUrl: baseDataUrl, applied:false };
  try{
    const baseImg = await loadImage(baseDataUrl);
    const logoImg = await getAutoTransparentLogo(logoAsset); // canvas prêt à dessiner, fond blanc déjà retiré si besoin
    const canvas = document.createElement("canvas");
    canvas.width = baseImg.width; canvas.height = baseImg.height;
    const ctx = canvas.getContext("2d");
    ctx.drawImage(baseImg, 0, 0);
    const logoW = canvas.width * (state.logoOverlay.size/100);
    const logoH = logoW * (logoImg.height/logoImg.width);
    const lx = (state.logoOverlay.x/100)*canvas.width - logoW/2;
    const ly = (state.logoOverlay.y/100)*canvas.height - logoH/2;
    ctx.drawImage(logoImg, lx, ly, logoW, logoH);
    return { dataUrl: canvas.toDataURL("image/png"), applied:true };
  }catch(e){
    return { dataUrl: baseDataUrl, applied:false };
  }
}

/* Signature de marque complète et obligatoire après toute génération : vrai logo + nom de la
   marque + ville, toujours au même endroit, avec le même rendu — jamais une signature "imaginée"
   par l'IA. C'est la seule signature considérée comme valide. */
/* Découpe un texte en plusieurs lignes centrées qui tiennent dans une largeur maximale donnée. */
function wrapText(ctx, text, maxWidth){
  const words = text.split(/\s+/).filter(Boolean);
  const lines = [];
  let current = "";
  words.forEach(word=>{
    const test = current ? current + " " + word : word;
    if(ctx.measureText(test).width > maxWidth && current){
      lines.push(current);
      current = word;
    } else {
      current = test;
    }
  });
  if(current) lines.push(current);
  return lines;
}

async function compositeBrandSignature(baseDataUrl, platform){
  const logoResult = await compositeRealLogo(baseDataUrl);
  if(!logoResult.applied) return logoResult; // sans logo réel disponible, rien de fiable à ancrer le texte dessus
  try{
    const img = await loadImage(logoResult.dataUrl);
    const canvas = document.createElement("canvas");
    canvas.width = img.width; canvas.height = img.height;
    const ctx = canvas.getContext("2d");
    ctx.drawImage(img, 0, 0);

    // --- Accroche / titre visuel : texte saisi par Fabien, jamais généré par l'IA (fiabilité à 100%) ---
    if(state.visualAccroche && state.visualAccroche.trim()){
      const zone = state.textOverlayZone || { y: 60, maxWidthPct: 82 };
      const maxWidth = canvas.width * (zone.maxWidthPct/100);
      const titleFontSize = Math.max(20, Math.round(canvas.width * 0.052));
      ctx.textAlign = "center";
      ctx.textBaseline = "middle";
      ctx.shadowColor = "rgba(0,0,0,0.7)";
      ctx.shadowBlur = 8;
      ctx.fillStyle = "#F5F4EF"; // blanc cassé de la charte SDZ
      ctx.font = `700 ${titleFontSize}px Georgia, 'Times New Roman', serif`;
      const lines = wrapText(ctx, state.visualAccroche.trim().toUpperCase(), maxWidth);
      const lineHeight = titleFontSize * 1.25;
      const totalHeight = lines.length * lineHeight;
      const startY = (canvas.height * (zone.y/100)) - totalHeight/2 + lineHeight/2;
      lines.forEach((line,i)=>{ ctx.fillText(line, canvas.width/2, startY + i*lineHeight); });
      ctx.shadowBlur = 0;
    }

    const logoW = canvas.width * (state.logoOverlay.size/100);
    const cx = (state.logoOverlay.x/100) * canvas.width;
    const logoBottomY = (state.logoOverlay.y/100) * canvas.height + logoW/2;

    const brandFontSize = Math.max(14, Math.round(canvas.width * 0.026));
    const cityFontSize = Math.max(10, Math.round(canvas.width * 0.016));

    ctx.textAlign = "center";
    ctx.textBaseline = "top";
    ctx.shadowColor = "rgba(0,0,0,0.65)";
    ctx.shadowBlur = 5;

    ctx.fillStyle = "#F5F4EF"; // blanc cassé de la charte SDZ
    ctx.font = `600 ${brandFontSize}px Georgia, 'Times New Roman', serif`;
    ctx.fillText("LA SANTÉ DES ZÈBRES", cx, logoBottomY + 8);

    ctx.fillStyle = "#C9A227"; // or officiel SDZ
    ctx.font = `${cityFontSize}px Georgia, 'Times New Roman', serif`;
    ctx.fillText("RAISMES", cx, logoBottomY + 8 + brandFontSize + 6);

    ctx.shadowBlur = 0;
    return { dataUrl: canvas.toDataURL("image/png"), applied:true };
  }catch(e){
    return logoResult; // dégradation propre : au pire, le logo reste appliqué sans le texte
  }
}

/* Pousse le logo actuellement marqué comme "logo" au serveur (une seule fois par changement réel),
   et déduit l'URL publique stable. Ne re-télécharge/reconvertit jamais inutilement. */
async function syncOfficialLogoToServer(){
  const logoAsset = state.images.find(i=>i.assetType==="logo");
  if(!logoAsset) return { ok:false, reason:"Aucune image marquée comme logo dans la Bibliothèque." };
  const already = LS.get("vf-logo-sync", null);
  if(already && already.assetId===logoAsset.id && already.dataUrlHash===hashPrompt(logoAsset.dataUrl)){
    state.logoPublicUrl = already.publicUrl;
    resetBrandReferenceCache();
    return { ok:true, alreadySynced:true, publicUrl: already.publicUrl };
  }
  try{
    const res = await fetch("/.netlify/functions/save-logo", {
      method:"POST", headers: syncHeaders(),
      body: JSON.stringify({ dataUrl: logoAsset.dataUrl }),
    });
    if(!res.ok) return { ok:false, reason:`Échec de l'envoi au serveur (HTTP ${res.status}).` };
    const publicUrl = `${location.origin}/logo.png`;
    LS.set("vf-logo-sync", { assetId: logoAsset.id, dataUrlHash: hashPrompt(logoAsset.dataUrl), publicUrl, syncedAt: Date.now() });
    state.logoPublicUrl = publicUrl;
    resetBrandReferenceCache();
    return { ok:true, alreadySynced:false, publicUrl };
  }catch(e){
    return { ok:false, reason: String(e.message||e) };
  }
}

/* Liste fixe des prestations reconnues individuellement par le sélecteur.
   Modifiable ici sans toucher au reste du moteur si de nouvelles prestations apparaissent. */
const KNOWN_PRESTATIONS = [

/* Table d'alias : chaque nom canonique (celui déjà stocké dans les sélections, historiques,
   campagnes et modes existants — JAMAIS modifié) peut être reconnu sous plusieurs formulations
   réelles trouvées sur le site officiel. Alias triés du plus long au plus court par nom : le plus
   spécifique est toujours testé en premier. */
const PRESTATION_ALIASES = {
  "Massage Zébré": ["Massage Zébré — Exclusivité SDZ", "Massage Zébré - Exclusivité SDZ", "Massage Zébré"],
  "Massage Ayurvédique Abhyanga": ["Massage Ayurvédique Abhyanga"],
  "Massage Balinais": ["Massage Balinais"],
  "Massage Thaï traditionnel": ["Massage Thaï Traditionnel", "Massage Thaï traditionnel"],
  "Massage Femme enceinte": ["Massage Femme Enceinte", "Massage Femme enceinte"],
  "Massage Enfant": ["Massage Enfant"],
  "Réflexologie plantaire thaïlandaise": ["Réflexologie Plantaire Thaïlandaise", "Réflexologie plantaire thaïlandaise"],
  "Massage japonais du visage": ["Massage Japonais du Visage", "Massage japonais du visage"],
  "Massage lymphatique expert": ["Massage Lymphatique Expert", "Massage lymphatique expert"],
  "Soin énergétique": ["Soin Énergétique", "Soin énergétique"],
  "Reiki": ["Reiki"],
  "Luminothérapie PSIO®": ["Luminothérapie PSiO®", "Luminothérapie PSIO®", "Luminothérapie PSiO", "Luminothérapie PSIO"],
  "Biorésonance quantique": ["Biorésonance quantique", "Biorésonance"],
  "Soin minceur": ["Massage Minceur Raffermissant", "Soin minceur"],
  "Offre Sylver": ["Offre Sylver"],

  "Massage dos/zone": ["Massage dos/zone"],
  "Prestations en entreprise": ["Prestations en entreprise", "PRESTATIONS EN ENTREPRISE"],
};
function escapeRegExpChar(s){ return s.replace(/[.*+?^${}()|[\]\\]/g, "\\$&"); }
/* Repliement caractère par caractère : chaque lettre de base couvre ses variantes accentuées via
   une classe de caractères — jamais de décomposition Unicode qui changerait la longueur du texte. */
const ACCENT_FOLD_CLASSES = { a:"[aàâä]", e:"[eéèêë]", i:"[iîï]", o:"[oôö]", u:"[uùûü]", c:"[cç]", n:"[nñ]", y:"[yÿ]" };
/* Construit un motif insensible à la casse (flag i) et aux accents (classes ci-dessus), avec des
   espaces tolérants (\s+) et le symbole ® rendu optionnel/ignoré — appliqué directement au texte
   ORIGINAL, jamais à une copie modifiée : aucun risque de décalage d'index. */
function buildAliasPattern(alias){
  let pattern = "";
  for(const ch of alias){
    if(ch === " "){ pattern += "\\s+"; continue; }
    if(ch === "®"){ pattern += "®?"; continue; }
    const lower = ch.toLowerCase();
    pattern += ACCENT_FOLD_CLASSES[lower] || escapeRegExpChar(ch);
  }
  return pattern;
}
/* Recherche ANCRÉE : l'alias ne compte que s'il occupe (espaces de début tolérés) toute une ligne,
   éventuellement suivi d'un séparateur de titre (: - – —) — jamais une occurrence au milieu d'une
   phrase (ex : "Reiki" cité en passant dans le texte de l'Offre Gold). */
function findAnchoredAliasIndex(text, alias){
  const pattern = buildAliasPattern(alias);
  const re = new RegExp(`^[ \\t]*${pattern}[ \\t]*(?:[:\\-–—][ \\t]*)?$`, "im");
  const m = re.exec(text);
  return m ? m.index : -1;
}
/* Fusionne le contenu de tous les modules "Prestations" activés, en éliminant les doublons exacts
   (si le même texte a été collé dans plusieurs modules). Ne modifie jamais les modules eux-mêmes. */
function getMergedPrestationsText(){
  const mods = state.modules.filter(m=>m.enabled && m.category==="Prestations");
  const seen = new Set();
  const parts = [];
  mods.forEach(m=>{
    const c = (m.content||"").trim();
    if(c && !seen.has(c)){ seen.add(c); parts.push(c); }
  });
  return parts.join("\n\n");
}
/* Repère, dans le texte fusionné, où commence chaque prestation connue (via ses alias, recherche
   ancrée en début de ligne) et découpe le texte entre deux noms de prestations consécutifs pour
   isoler le bloc de détails de chacune. Un nom canonique sans entrée dans PRESTATION_ALIASES
   retombe sur lui-même (compatibilité totale avec l'existant). */
function extractPrestationBlocks(text){
  const found = [];
  KNOWN_PRESTATIONS.forEach(name=>{
    const aliases = (PRESTATION_ALIASES[name] || [name]).slice().sort((a,b)=> b.length - a.length);
    let bestIdx = -1;
    for(const alias of aliases){
      const idx = findAnchoredAliasIndex(text, alias);
      if(idx !== -1){ bestIdx = idx; break; } // déjà trié du plus long au plus court : premier trouvé = le bon
    }
    if(bestIdx !== -1) found.push({name, idx: bestIdx});
  });
  found.sort((a,b)=>a.idx-b.idx);
  const blocks = {};
  found.forEach((f,i)=>{
    const end = i+1<found.length ? found[i+1].idx : text.length;
    blocks[f.name] = text.slice(f.idx, end).trim();
  });
  return blocks;
}
function extractField(block, patterns){
  for(const re of patterns){ const m = block.match(re); if(m) return m[1].trim(); }
  return null;
}
const DURATION_PATTERNS = [/dur[ée]e\s*[:\-]\s*([^\n]+)/i, /(\d+\s*(?:min|minutes|h|heures)\b[^\n]*)/i];
const PRICE_PATTERNS = [/tarifs?\s*[:\-]\s*([^\n]+)/i, /prix\s*[:\-]\s*([^\n]+)/i, /(\d+[\.,]?\d*\s*€[^\n]*)/];
/* Champs de la "fiche prestation" enrichie : reconnus automatiquement s'ils sont écrits
   sous la forme "Label : contenu" dans le bloc de la prestation. Ceux non trouvés sont
   simplement omis — le bloc brut complet est de toute façon toujours transmis en renfort. */
const PRESTATION_FICHE_LABELS = ["histoire","émotion","psychologie","codes visuels","matières",
  "textures","lumière","composition","vocabulaire","cta","interdits","scène visuelle",
  "description","déroulé de la séance","bienfaits","public concerné","précautions"];
function extractFicheFields(block){
  const found = {};
  PRESTATION_FICHE_LABELS.forEach(label=>{
    const re = new RegExp(label.replace(/[.*+?^${}()|[\]\\]/g,"\\$&")+"\\s*[:\\-]\\s*([^\\n]+)","i");
    const m = block.match(re);
    if(m) found[label] = m[1].trim();
  });
  return found;
}

/* Retourne les infos de la prestation demandée, ou de la prestation actuellement sélectionnée si
   aucun nom n'est fourni (repli rétrocompatible — tout appel existant sans argument garde
   exactement son comportement actuel). Accepter un nom explicite permet à un flux préparé (Creative
   Planner, campagne, future déclinaison) de rester indépendant de l'état global de l'interface. */
function getSelectedPrestationInfo(prestationName = state.prestationName){
  if(!prestationName) return null;
  if(prestationName === "Tous sujets") return { name:"Tous sujets", generic:true, block:"", duree:null, tarif:null, fiche:{} };
  const blocks = extractPrestationBlocks(getMergedPrestationsText());
  const block = blocks[prestationName] || "";
  return {
    name: prestationName,
    block,
    duree: block ? extractField(block, DURATION_PATTERNS) : null,
    tarif: block ? extractField(block, PRICE_PATTERNS) : null,
    fiche: block ? extractFicheFields(block) : {},
  };
}

/* ---------- MOTEUR DE CONTEXTE ----------
   Sélectionne les modules pertinents pour les catégories demandées, fusionne les doublons stricts
   (même titre + même contenu dans deux modules), trie selon la hiérarchie SDZ, puis applique un
   budget de caractères pour ne garder que ce qui a un réel impact — qualité plutôt que quantité. */
/* ---------- Paliers de priorité par catégorie ----------
   "always" : ADN de marque, ton, direction artistique, règles dures, CTA, mission, et catégories déjà
              spécifiques à la plateforme (via TEXT_MODULE_MAP) — jamais sacrifiées en premier.
   "rare"   : contenus de fond (glossaire, historique de décisions, exemples, leçons) — utiles mais
              plafonnés en nombre pour éviter le remplissage systématique.
   "context": tout le reste — inclus seulement s'il est réellement pertinent maintenant (voir plus bas). */
function moduleTier(category){
  const ALWAYS = ["MASTER SDZ","CODEX SDZ","Univers de marque","Charte graphique","Direction artistique",
    "Règles rédactionnelles","CTA","Missions","Interdits","À ne jamais faire","À faire",
    "Vocabulaire autorisé","Vocabulaire interdit","Logo","Palette","Typographies",
    "Instagram","Facebook","Google Business","Stories","Blog Wix","SEO"];
  const RARE = ["Décisions importantes","Glossaire","Erreurs fréquentes","Exemples excellents",
    "Exemples validés","Exemples refusés","Leçons apprises","Bibliothèque d'idées"];
  if(ALWAYS.includes(category)) return "always";
  if(RARE.includes(category)) return "rare";
  return "context";
}
/* Pertinence contextuelle réelle, calculée automatiquement (aucun réglage manuel ajouté à l'interface) :
   une connaissance "context" n'est injectée que si elle correspond à la situation actuelle. */
function isContextRelevantNow(m){
  if(m.category==="Saisonnalité"){
    const season = getCurrentSeasonFR().toLowerCase();
    return m.content.toLowerCase().includes(season);
  }
  if(m.category==="Offres"){
    const t = `${state.topic||""} ${state.prestationName||""} ${state.mission||""}`.toLowerCase();
    return t.includes("cadeau") || t.includes("offre") || state.mission==="Vendre des bons cadeaux";
  }
  return true; // Prestations, Psychologie client, Personae, Objections clients : pertinents dès qu'ils existent
}
/* Quasi-déduplication : au sein d'une même catégorie, deux connaissances au contenu très proche
   (ex : "Univers SDZ" et "Fondation SDZ" qui disent la même chose) ne sont injectées qu'une fois —
   on garde la plus complète des deux. Basé sur une similarité de mots, pas seulement un texte identique. */
function quasiDedup(mods){
  const kept = [];
  let removed = 0;
  mods.forEach(m=>{
    const dupIdx = kept.findIndex(k=> k.category===m.category && textSimilarity(k.content, m.content) > 0.6);
    if(dupIdx===-1){ kept.push(m); return; }
    removed++;
    if(m.content.length > kept[dupIdx].content.length) kept[dupIdx] = m;
  });
  return { kept, removed };
}

function selectModulesOrdered(categories, budgetChars){
  const allCats = [...new Set([...ALWAYS_ON_CATEGORIES, ...categories])];
  let mods = selectModules(allCats);
  const totalAvailable = mods.length;
  const lengthBefore = mods.reduce((s,m)=>s+m.content.length, 0);

  // 1. doublons stricts (contenu identique)
  const seen = new Set();
  let strictDuplicates = 0;
  mods = mods.filter(m=>{
    const key = m.category+"|"+m.title+"|"+m.content.trim();
    if(seen.has(key)){ strictDuplicates++; return false; }
    seen.add(key);
    return true;
  });
  // 2. quasi-doublons (idée très proche exprimée deux fois)
  const dedupResult = quasiDedup(mods);
  mods = dedupResult.kept;
  const duplicatesRemoved = strictDuplicates + dedupResult.removed;

  // 3. tri selon la hiérarchie SDZ
  const rank = c => { const i = HIERARCHY_ORDER.indexOf(c); return i===-1 ? HIERARCHY_ORDER.length : i; };
  mods = mods.map((m,i)=>({m,i})).sort((a,b)=> rank(a.m.category)-rank(b.m.category) || a.i-b.i).map(x=>x.m);

  // 4. paliers de priorité + pertinence contextuelle
  const always = mods.filter(m=> moduleTier(m.category)==="always");
  const contextAll = mods.filter(m=> moduleTier(m.category)==="context");
  const rareAll = mods.filter(m=> moduleTier(m.category)==="rare");
  const contextRelevant = contextAll.filter(isContextRelevantNow);
  const contextSkipped = contextAll.filter(m=>!isContextRelevantNow(m));

  // 5. construction budgétée : toujours en premier, puis contexte pertinent, puis rare (plafonné à 2)
  const kept = []; const ignored = [];
  let total = 0;
  const tryAdd = (m)=>{
    const len = m.content.length;
    if(kept.length===0 || total+len<=budgetChars){ kept.push(m); total+=len; return true; }
    ignored.push(m); return false;
  };
  always.forEach(tryAdd);
  contextRelevant.forEach(tryAdd);
  let rareAdded = 0;
  rareAll.forEach(m=>{
    if(rareAdded>=2){ ignored.push(m); return; }
    if(tryAdd(m)) rareAdded++;
  });
  ignored.push(...contextSkipped);

  const lengthAfter = kept.reduce((s,m)=>s+m.content.length, 0);
  const gainPercent = lengthBefore>0 ? Math.round((1 - lengthAfter/lengthBefore)*100) : 0;
  const tokensSaved = Math.max(0, Math.round((lengthBefore-lengthAfter)/4));
  // Indice de pertinence : part du contenu injecté qui est "toujours" ou "contexte pertinent" (par opposition au "rare")
  const highValueCount = always.filter(m=>kept.includes(m)).length + contextRelevant.filter(m=>kept.includes(m)).length;
  const relevanceIndex = kept.length>0 ? Math.round((highValueCount/kept.length)*100) : 100;

  return { kept, ignored, totalAvailable, totalKept: kept.length, duplicatesRemoved,
    lengthBefore, lengthAfter, gainPercent, tokensSaved, relevanceIndex };
}
/* Déduit la plateforme d'un module "Erreurs fréquentes" : champ explicite si présent (retours créés
   après cette correction), sinon extrait du titre "Retour <plateforme> — ..." pour les anciens
   modules déjà existants — aucune migration nécessaire, aucune compatibilité cassée. */
function feedbackPlatform(m){
  if(m.platform) return m.platform;
  const match = (m.title||"").match(/^Retour (.+?) —/);
  return match ? match[1] : null;
}
/* Déduit la date de création : champ explicite si présent, sinon extrait de l'id (uid() commence
   toujours par Date.now()) — fonctionne aussi sur tous les anciens modules sans champ dédié. */
function feedbackRecency(m){
  if(m.createdAt) return m.createdAt;
  const match = String(m.id||"").match(/^(\d+)-/);
  return match ? Number(match[1]) : 0;
}
/* Sélection dédiée des retours ("Erreurs fréquentes") — remplace leur ancien traitement générique
   plafonné à 2 emplacements partagés avec 7 autres catégories (voir diagnostic précédent). Priorité
   à la plateforme active, puis aux retours les plus récents ; jusqu'à 5 retours, jamais bloqués
   indéfiniment par d'anciens retours. Ne supprime rien du stockage : filtre uniquement à l'affichage. */
function selectRecentFeedback(platform, maxCount){
  maxCount = maxCount || 5;
  const all = state.modules.filter(m=> m.enabled && m.category==="Erreurs fréquentes");
  const withMeta = all.map(m=>({ m, platform: feedbackPlatform(m), recency: feedbackRecency(m) }));
  const matching = withMeta.filter(x=> x.platform===platform).sort((a,b)=> b.recency-a.recency);
  const nonMatching = withMeta.filter(x=> x.platform!==platform).sort((a,b)=> b.recency-a.recency);
  return [...matching, ...nonMatching].slice(0, maxCount).map(x=>x.m);
}

function textModulesFor(platform){
  const cats = TEXT_MODULE_MAP[platform] || [];
  const budget = PLATFORM_TEXT_BUDGET[platform] || TEXT_CONTEXT_BUDGET;
  const { kept } = selectModulesOrdered(cats, budget);
  /* Si une prestation précise est choisie, son détail est injecté séparément (voir prestationPromptBlock) :
     on retire donc les modules "Prestations" génériques pour éviter la redondance. */
  return state.prestationName ? kept.filter(m=> m.category!=="Prestations") : kept;
}
function imageModulesFor(platform){
  const { kept } = selectModulesOrdered(IMAGE_MODULE_CATS, IMAGE_CONTEXT_BUDGET);
  // Ajout du contrat d'orchestration MASTER_IMAGE V2 (Constitution générale + Noir & Or + registres
  // actifs dans state.registres) en plus de l'ancien moteur par catégories, sans rien lui retirer.
  // `platform` reçu explicitement (ex : item.platform dans une campagne) prime sur state.network,
  // pour que chaque déclinaison d'une campagne applique sa propre adaptation plateforme — l'univers
  // (registres, concept, émotion) reste lui identique, seule l'adaptation doit varier.
  return [...kept, ...selectMasterImageModules(platform || state.network)];
}

/* Injecte automatiquement nom, durée, tarif, fiche et détails de la prestation choisie, quand disponibles. */
function prestationPromptBlock(){
  const info = getSelectedPrestationInfo();
  if(!info) return "";
  if(info.generic){
    return `SUJET GÉNÉRAL : ce contenu ne met volontairement en avant aucune prestation précise (annonce, information, actualité, contenu institutionnel...). Reste généraliste, ne force pas la mention d'un soin en particulier, et ne cite aucun nom de prestation de la base de connaissances sauf si le sujet décrit ci-dessous l'exige naturellement.\n`;
  }
  let out = `PRESTATION CONCERNÉE : ${info.name}\nIMPORTANT : reprends ce nom de prestation EXACTEMENT tel qu'écrit ci-dessus (mêmes majuscules, même orthographe) partout où tu le mentionnes — ne le reformule pas, ne le traduis pas, ne change pas sa casse.\n`;
  if(info.duree) out += `Durée : ${info.duree}\n`;
  if(info.tarif) out += `Tarif : ${info.tarif}\n`;
  const ficheKeys = Object.keys(info.fiche);
  if(ficheKeys.length){
    out += `Fiche prestation :\n`;
    ficheKeys.forEach(k=>{ out += `- ${k.charAt(0).toUpperCase()+k.slice(1)} : ${info.fiche[k]}\n`; });
  }
  out += `Détails / spécificités complètes :\n${info.block || "(non documentée dans la base de connaissances — utilise uniquement le nom)"}\n`;
  return out;
}

/* Catégories de sujets à traiter avec prudence (pas de description détaillée ici — juste une alerte

const RISK_KEYWORDS = {
  "mineur / enfant": ["enfant","mineur","bébé","bebe"],
  "grossesse": ["grossesse","enceinte","femme enceinte"],
  "corps / nudité": ["nudité","nudite","nu ","poitrine","seins","ventre nu"],
  "minceur / poids": ["minceur","perte de poids","amincissant","amaigrissement"],

  "sexualisation": ["sexy","sexuel","érotique","erotique","suggestif"],
  "violence": ["violence","violent","agression","coup","douleur intense"],
};
function detectRisks(text){
  const t = (text||"").toLowerCase();
  const found = [];
  Object.entries(RISK_KEYWORDS).forEach(([label, kws])=>{
    if(kws.some(kw=> t.includes(kw))) found.push(label);
  });
  return found;
}

  const info = getSelectedPrestationInfo();
  const text = [state.topic, state.prestationName, info?.block||""].join(" ");

}

/* ---------- anti-répétition : s'appuie sur l'historique + leçons apprises ---------- */
const ANTI_REPEAT_EXCLUDE_KEYWORDS = ["test", "post test", "en test", "🚧"];
/* Exclut : contenu explicitement rejeté (rating "down"), contenu marqué manuellement à exclure,
   et tout contenu dont le sujet ou le texte contient un marqueur de test — sans jamais supprimer
   l'entrée elle-même du stockage (state.history reste intact, seul l'usage dans ce bloc est filtré). */
function isExcludedFromAntiRepeat(h){
  if(h.excludedFromAntiRepeat) return true;
  if(h.rating === "down") return true; // contenu rejeté : ne sert pas de référence "à ne pas reproduire"
  const haystack = `${h.topic||""} ${h.textResult||""}`.toLowerCase();
  return ANTI_REPEAT_EXCLUDE_KEYWORDS.some(kw => haystack.includes(kw.toLowerCase()));
}
function buildAntiRepeatNote(platform, kind){
  const pool = state.history.filter(h=>h.platform===platform && (kind==="texte" ? h.textResult : true) && !isExcludedFromAntiRepeat(h));
  // Fenêtre élargie à 10 (certains seront filtrés), puis priorité aux contenus les mieux notés —
  // meilleur proxy disponible pour "validé" en l'absence d'un statut publié/programmé unifié entre
  // state.history et state.scheduled (deux structures distinctes aujourd'hui, non reliées par id).
  const recentPool = pool.slice(-10);
  const prioritized = recentPool.slice().sort((a,b)=>{
    const rank = r => r==="up" ? 0 : r==="mid" ? 1 : 2;
    return rank(a.rating) - rank(b.rating);
  });
  const recent = prioritized.slice(0, 6);
  if(!recent.length) return "";
  if(kind==="texte"){
    return `\nÉVITE ABSOLUMENT de reproduire, sur ce contenu :\n- les mêmes accroches / premières phrases\n- les mêmes CTA\n- les mêmes structures de texte\n- les mêmes émotions mises en avant\n- les mêmes formulations\nVoici des extraits déjà utilisés récemment pour cette plateforme, à ne pas reproduire :\n${recent.filter(h=>h.textResult).map(h=>`- "${h.textResult.slice(0,70).replace(/\n/g," ")}..."`).join("\n")}\n`;
  }
  return `\nÉVITE ABSOLUMENT de reproduire une composition, une idée visuelle ou un sujet déjà traité récemment sur cette plateforme :\n${recent.map(h=>`- ${h.topic}`).join("\n")}\nPropose un angle visuel différent tout en restant fidèle à la charte.\nVARIÉTÉ OBLIGATOIRE DU DÉCOR : ne reviens pas systématiquement au même motif monumental (le portail, par exemple, ne doit pas devenir un réflexe par défaut). L'univers SDZ dispose de bien d'autres éléments possibles — mets-en un différent en avant à chaque génération plutôt que de répéter toujours le même symbole.\n`;
}

function buildRecentFeedbackBlock(platform){

/* Sélectionne, parmi MASTER_UNIVERS_SDZ_V0, uniquement les modules compatibles avec les archétypes
   effectivement autorisés pour cette génération (paramètre `allowed`, jamais lu depuis state — même
   principe que buildCompactMasterImageSocle(registres)). Tri par prioriteArtistique croissante
   (1 = pilier) pour que les symboles les plus importants arrivent en tête du bloc.
   Ne s'applique par construction qu'en affiche_fantastique : aucun id de ARCHETYPE_CATALOG (luxe
   silencieux) ne correspond à un archetypeIds ci-dessus, donc `modules` reste vide dans ce cas. */
function buildUniversSDZBlock(allowed){
  const allowedIds = (allowed||[]).map(a=>a.id);
  const modules = MASTER_UNIVERS_SDZ_V0
    .filter(m => m.archetypeIds.some(id => allowedIds.includes(id)))
    .sort((x,y)=> x.prioriteArtistique - y.prioriteArtistique);
  if(!modules.length) return "";
  return modules.map(m=>`- [${m.categorie}/${m.roleNarratif}] ${m.label} : ${m.content} Interdit : ${m.interdits.join(", ")}.`).join("\n");
}

/* ---------- 2. CALCUL DÉTERMINISTE DES OPTIONS AUTORISÉES (avant tout appel au Planner) ---------- */
/* state.imageHistory : historique structuré dédié à l'image (distinct de state.history, qui reste
   celui du texte). Un tableau d'entrées { platform, archetypeId, decor, cadrage, action, presenceSoin,
   createdAt }, alimenté par recordStructuredImageEntry() après chaque génération acceptée. */
function getRecentImageEntries(platform, limit){
  limit = limit || 5;
  return (state.imageHistory||[]).filter(e=>e.platform===platform).slice(-limit);
}
/* typeCreationImpose sélectionne le catalogue de départ : jamais mélangé entre les deux registres. */
function computeAllowedArchetypes(mission, prestation, platform, typeCreationImpose){
  const sourceCatalog = typeCreationImpose === "affiche_fantastique" ? ARCHETYPE_CATALOG_FANTASTIQUE : ARCHETYPE_CATALOG;
  const compatible = sourceCatalog.filter(a=>
    (a.missionsCompatibles.includes("toutes") || !mission || a.missionsCompatibles.includes(mission)) &&
    (a.prestationsCompatibles.includes("toutes") || !prestation || a.prestationsCompatibles.includes(prestation))
  );
  const base = compatible.length ? compatible : sourceCatalog; // repli : aucune contrainte ne doit jamais vider le catalogue
  const recentIds = getRecentImageEntries(platform, 5).map(e=>e.archetype);
  const allowed = base.filter(a=> !recentIds.includes(a.id));
  if(allowed.length) return allowed;
  // Repli local déterministe (jamais de boucle d'appels) : l'archétype compatible le moins récemment
  // utilisé pour cette plateforme, même s'il apparaît dans les 5 derniers.
  const withRecency = base.map(a=>{
    const idx = recentIds.lastIndexOf(a.id);
    return { a, lastUsedRank: idx===-1 ? -1 : idx };
  }).sort((x,y)=> x.lastUsedRank - y.lastUsedRank);
  return [withRecency[0].a];
}
/* Compare aux 3 dernières générations de cette plateforme : décor/cadrage/action à éviter
   explicitement — c'est ce qui empêche concrètement "personne allongée + mains sur le dos"
   de revenir alors qu'aucun champ ne le nommait jusqu'ici. */
function computeRecentCompositionExclusions(platform){
  const recent = getRecentImageEntries(platform, 3);
  const exclusions = [];
  recent.forEach(e=>{
    if(e.decor) exclusions.push(e.decor);
    if(e.framing) exclusions.push(e.framing);
    if(e.action) exclusions.push(e.action);
  });
  return [...new Set(exclusions)];
}

      "cadrage","pointDeVue","lumiere","niveauLuminosite","elementOr","symboleSDZ","presenceSoin",
      "caracteristiquePrestationVisible","texteImage","compositionInterdite","raisonDifferenceAvecHistorique",
      "referenceFamily","negativePrompt",
      "typeCreation","caracteristiqueSourcePrestation","structureNarrative","plansVisuels",
      "symbolePrincipal","oppositionVisuelle","pointDeTransformation","zoneTexte","zoneLogo"],
  },
};
function buildCreativePlannerSystemPrompt(){
  return "Tu es le directeur artistique interne de La Santé des Zèbres (SDZ). Tu ne rédiges jamais de texte final : tu conçois UNE scène concrète, précise et jouable par un modèle de génération d'image, à partir des options qui te sont données. Tu choisis toujours ton archétype et ta scène PARMI les options fournies, jamais en dehors. Réponds uniquement selon le schéma structuré demandé.";
}
/* Socle compact extrait des packs MASTER_IMAGE (Constitution générale + Noir & Or + registre actif)
   — jamais les 83 modules complets. Ne prend que : les modules permanents (Constitution + Noir & Or
   Bloc 1), les modules "haute priorité" de Noir & Or (Bloc 2), et jusqu'à 2 modules "haute priorité"
   par registre actif. Budget cible : ~2500 caractères max. `registres` doit être une copie figée
   transmise explicitement par l'appelant — jamais lu directement depuis state.registres ici, pour
   que le flux préparé reste indépendant de l'état courant de l'interface. */
function buildCompactMasterImageSocle(registres){
  const BUDGET = 2500;
  const all = state.modules.filter(m=> m.enabled && m.category==="MASTER_IMAGE");
  const permanents = all.filter(m=> m.criteres && m.criteres.portee==="permanent");
  const noirOrHaute = all.filter(m=> m.criteres && m.criteres.portee==="contextuel" && m.criteres.priorite==="haute" && moduleRegistre(m)==="noir_or");
  const registresActifs = Array.isArray(registres) ? registres : [];
  const registreHaute = registresActifs.flatMap(r=>
    all.filter(m=> m.criteres && m.criteres.priorite==="haute" && moduleRegistre(m)===r).slice(0,2)
  );
  const picked = [...permanents, ...noirOrHaute.slice(0,3), ...registreHaute];
  let text = picked.map(m=>m.content).join(" ");
  if(text.length > BUDGET) text = text.slice(0, BUDGET) + "…";
  return text;
}

/* Plafond global du bloc fiche prestation dans le prompt du Creative Planner — entre 1400 et 1600
   caractères demandés, 1500 retenu. En cas de dépassement, dégradation dans l'ordre exact demandé :
   Tarif -> Durée -> Public concerné -> raccourcissement de Précautions -> jamais Description ni
   Déroulé de la séance, prioritaires. Utilise l'argument `prestation` explicitement transmis au
   flux (jamais state.prestationName directement) — indépendant de l'état global de l'interface. */
const PRESTATION_FICHE_PROMPT_BUDGET = 1500;
function buildPrestationFicheBlock(prestation){
  const info = getSelectedPrestationInfo(prestation);
  if(!info) return `Prestation : ${prestation||"non précisée"}`;
  if(info.generic) return `Prestation : sujet général — ne force pas la mention d'une prestation précise, ne cite aucun nom de prestation sauf si le sujet l'exige naturellement.`;
  if(!info.block) return `Prestation : ${info.name} (non documentée dans la base de connaissances — utilise uniquement ce nom, n'invente aucun détail).`;

  const f = info.fiche || {};
  const fields = {
    description: f["description"] || "",
    deroule: f["déroulé de la séance"] || "",
    bienfaits: f["bienfaits"] || "",
    publicConcerne: f["public concerné"] || "",
    precautions: f["précautions"] || "",
    duree: info.duree || "",
    tarif: info.tarif || "",
  };
  function assemble(includeTarif, includeDuree, includePublic, precautionsMaxLen){
    let out = `FICHE DE LA PRESTATION :\nNom : ${info.name}\n`;
    if(fields.description) out += `Description : ${fields.description}\n`;
    if(fields.deroule) out += `Déroulé de la séance : ${fields.deroule}\n`;
    if(fields.bienfaits) out += `Bienfaits : ${fields.bienfaits}\n`;
    if(includePublic && fields.publicConcerne) out += `Public concerné : ${fields.publicConcerne}\n`;
    if(fields.precautions){
      const p = precautionsMaxLen && fields.precautions.length > precautionsMaxLen
        ? fields.precautions.slice(0, precautionsMaxLen) + "…"
        : fields.precautions;
      out += `Précautions : ${p}\n`;
    }
    if(includeDuree && fields.duree) out += `Durée : ${fields.duree}\n`;
    if(includeTarif && fields.tarif) out += `Tarif : ${fields.tarif}\n`;
    return out;
  }
  // Dégradation progressive, dans l'ordre exact demandé — Description et Déroulé jamais retirés.
  let out = assemble(true, true, true, null);
  if(out.length > PRESTATION_FICHE_PROMPT_BUDGET) out = assemble(false, true, true, null);       // retire Tarif
  if(out.length > PRESTATION_FICHE_PROMPT_BUDGET) out = assemble(false, false, true, null);      // puis Durée
  if(out.length > PRESTATION_FICHE_PROMPT_BUDGET) out = assemble(false, false, false, null);     // puis Public concerné
  if(out.length > PRESTATION_FICHE_PROMPT_BUDGET) out = assemble(false, false, false, 150);      // puis raccourcit Précautions
  if(out.length > PRESTATION_FICHE_PROMPT_BUDGET) out = out.slice(0, PRESTATION_FICHE_PROMPT_BUDGET) + "…"; // filet de sécurité ultime
  return out;
}

    : `- Aucune prestation précise et documentée n'est sélectionnée : "caracteristiqueSourcePrestation" doit rester une valeur sobre comme "aucune prestation précise" — n'invente aucun détail technique de soin, aucun geste, aucun matériel qui ne provient pas d'une fiche réelle.`;

/* Normalisation utilisée uniquement pour vérifier qu'une formulation est réellement contenue dans
   la fiche — minuscules, accents neutralisés, ponctuation neutralisée, espaces normalisés. Sert
   uniquement à une comparaison de contenu (pas de recherche positionnelle), la décomposition
   Unicode est donc sans risque ici. */
function normalizeForContainmentCheck(str){
  return String(str||"")
    .normalize("NFD").replace(/[\u0300-\u036f]/g, "")
    .toLowerCase()
    .replace(/[.,;:!?«»""''()\-–—…]/g, " ")
    .replace(/\s+/g, " ")
    .trim();
}
const GENERIC_CARACTERISTIQUE_FORBIDDEN = ["detente","serenite","lacher prise","lacher-prise","posture ouverte","bien-etre","bien etre","approche holistique"];
/* Validation déterministe + UN SEUL repli local si collision — jamais un second appel au Planner.
   typeCreationImpose et prestation sont transmis explicitement (jamais lus depuis state) pour que
   le flux préparé reste indépendant de l'état courant de l'interface.
   La vérification stricte de caracteristiqueSourcePrestation ne s'applique QUE si la prestation
   sélectionnée est précise ET documentée (point 1) — sinon aucun blocage métier n'est produit. */
function validateAndFixBrief(brief, allowed, exclusions, typeCreationImpose, prestation){
  const allowedIds = allowed.map(a=>a.id);
  const fixed = { ...brief };
  let corrected = false;
  if(!allowedIds.includes(fixed.archetypeNarratif)){
    fixed.archetypeNarratif = allowedIds[0];
    corrected = true;
  }
  const collides = exclusions.some(ex => ex && fixed.decor && fixed.decor.toLowerCase().includes(String(ex).toLowerCase().slice(0,20)));
  if(collides){
    fixed.decor = `${fixed.decor} — variante imposée localement : un décor concrètement différent des générations récentes est requis, sans nouvel appel au concepteur.`;
    corrected = true;
  }
  if(!Array.isArray(fixed.compositionInterdite)) fixed.compositionInterdite = [];
  fixed.compositionInterdite = [...new Set([...fixed.compositionInterdite, ...exclusions])];

  // Type de création : correction locale silencieuse (comme pour l'archétype), jamais un choix du modèle.
  if(fixed.typeCreation !== typeCreationImpose){
    fixed.typeCreation = typeCreationImpose;
    corrected = true;
  }

  const info = getSelectedPrestationInfo(prestation);
  const prestationDocumentee = !!(info && !info.generic && info.block);

  let blockingError = null;
  if(!prestationDocumentee){
    // Pas de prestation précise/documentée : aucun contrôle métier, une chaîne vide est acceptée.
    if(!fixed.caracteristiqueSourcePrestation) fixed.caracteristiqueSourcePrestation = "aucune prestation précise";
  } else {
    // Provenance réelle vérifiée contre la fiche, jamais réparée en inventant une phrase — un échec
    // ici bloque l'image (voir prepareCreativeBrief).
    const carac = (fixed.caracteristiqueSourcePrestation || "").trim();
    const caracNorm = normalizeForContainmentCheck(carac);
    if(!carac){
      blockingError = `Caractéristique de prestation manquante — le Planner n'a fourni aucune valeur pour "caracteristiqueSourcePrestation".`;
    } else if(GENERIC_CARACTERISTIQUE_FORBIDDEN.some(mot => caracNorm.includes(mot))){
      blockingError = `Caractéristique de prestation trop générique : "${carac}" — reformulation attendue à partir de la fiche réelle (Description ou Déroulé de la séance), pas une formule générique de bien-être.`;
    } else {
      const ficheSource = `${(info.fiche && info.fiche["description"]) || ""} ${(info.fiche && info.fiche["déroulé de la séance"]) || ""}`;
      const ficheSourceNorm = normalizeForContainmentCheck(ficheSource);
      if(!ficheSourceNorm || !ficheSourceNorm.includes(caracNorm)){
        blockingError = `Caractéristique de prestation non vérifiable dans la fiche : "${carac}" n'a pas été retrouvée dans Description ou Déroulé de la séance de "${prestation}". Aucune correction automatique n'est tentée.`;
      }
    }
  }
  return { brief: fixed, corrected, blockingError };
}
async function generateCreativeBrief(mission, prestation, platform, topic, typeCreationImpose, registres){
  const allowed = computeAllowedArchetypes(mission, prestation, platform, typeCreationImpose);
  const exclusions = computeRecentCompositionExclusions(platform);
  const systemPrompt = buildCreativePlannerSystemPrompt();
  const userPrompt = buildCreativePlannerUserPrompt(allowed, exclusions, mission, prestation, platform, topic, typeCreationImpose, registres);
  const provider = state.apiProviders.find(p=>p.id===state.selectedProviderId) || DEFAULT_OPENAI_PROVIDER;
  const res = await fetch("/.netlify/functions/generate-text", {
    method:"POST", headers:{ "Content-Type":"application/json" },
    body: JSON.stringify({ kind: provider.kind, model: provider.model, baseUrl: provider.baseUrl, systemPrompt, userPrompt, responseSchema: CREATIVE_BRIEF_SCHEMA }),
  });
  const contentType = res.headers.get("content-type")||"";
  if(!contentType.includes("application/json")){
    throw new Error(`Réponse non-JSON du Creative Planner (statut ${res.status}).`);
  }
  const data = await res.json();
  if(!res.ok || data.error) throw new Error(data.error || `Erreur ${res.status}`);
  let rawBrief;
  try{ rawBrief = JSON.parse(data.text); }
  catch(e){
    console.error("[Creative Planner] JSON.parse a échoué — contenu brut reçu :", data.text);
    console.error("[Creative Planner] Erreur JSON.parse réelle :", e.message);
    throw new Error(`Creative Planner — erreur JSON.parse :\n${e.message}\n\nRéponse brute :\n${String(data.text||"").slice(0,1500)}`);
  }
  const { brief, corrected, blockingError } = validateAndFixBrief(rawBrief, allowed, exclusions, typeCreationImpose, prestation);
  return { brief, corrected, blockingError, allowed, exclusions };
}

/* ---------- 5. MÉTADONNÉES ET SÉLECTION DES RÉFÉRENCES ---------- */
/* Une image de référence porte désormais des métadonnées optionnelles (referenceFamily, luminosite,
   narration, presenceHumaine, sceneSoin, echelle, plateformesCompatibles) — rétrocompatible : une
   image "reference" sans metadata reste sélectionnable (comportement par défaut : compatible avec tout). */
function selectReferencesForBrief(brief, platform, maxCount){
  maxCount = maxCount || 2;
  const candidates = state.images.filter(i=> i.assetType==="reference" && typeof i.dataUrl==="string" && i.dataUrl);
  const scored = candidates.map(img=>{
    const meta = img.referenceMeta || {};
    let score = 0;
    if(meta.referenceFamily && brief.referenceFamily && meta.referenceFamily===brief.referenceFamily) score += 3;
    if(!meta.referenceFamily) score += 1; // pas de metadata : neutre plutôt que pénalisé (retrocompatibilité)
    if(meta.plateformesCompatibles && meta.plateformesCompatibles.length && meta.plateformesCompatibles.includes(platform)) score += 2;
    if(!meta.plateformesCompatibles) score += 1;
    if(meta.sceneSoin === (brief.presenceSoin!=="aucune")) score += 1;
    return { img, score };
  });
  scored.sort((a,b)=> b.score - a.score);
  // Forme riche demandée : {id, dataUrl, metadata} — l'id est indispensable pour l'historique
  // (point 5), jamais le dataUrl complet qui y était stocké par erreur auparavant.
  return scored.slice(0, maxCount).map(x=>({ id: x.img.id, dataUrl: x.img.dataUrl, metadata: x.img.referenceMeta || null }));
}

/* ---------- 6. HISTORIQUE VISUEL STRUCTURÉ ---------- */
/* N'est appelée qu'après obtention RÉELLE d'une image (voir l'orchestrateur plus bas) — une
   génération échouée avant ce point ne produit jamais d'entrée dans state.imageHistory. */
function recordStructuredImageEntry(inputs, brief, referenceIds, imagePrompt, imageId){
  state.imageHistory = Array.isArray(state.imageHistory) ? state.imageHistory : [];
  const entry = {
    id: uid(), createdAt: Date.now(), platform: inputs.platform, mission: inputs.mission || null,
    prestation: inputs.prestation || null, topic: inputs.topic, archetype: brief.archetypeNarratif,
    subject: brief.sujetPrincipal, action: brief.action, decor: brief.decor, framing: brief.cadrage,
    pointOfView: brief.pointDeVue, lighting: brief.lumiere, careScene: brief.presenceSoin,
    referenceIds: referenceIds || [], promptImage: imagePrompt, imageId,
  };
  state.imageHistory.push(entry);
  LS.set("vf-image-history", state.imageHistory);
  return entry;
}

const IMAGE_ANALYSIS_SCHEMA = {
  name: "image_result_analysis",
  strict: true,
  schema: {
    type:"object", additionalProperties:false,
    properties: {
      visibleSubjects: { type:"array", items:{type:"string"} },
      visibleAction: { type:"string" }, visibleSetting: { type:"string" },
      visibleObjects: { type:"array", items:{type:"string"} },
      lighting: { type:"string" }, altText: { type:"string" },
      briefMismatch: { type:"array", items:{type:"string"} },
    },
    required: ["visibleSubjects","visibleAction","visibleSetting","visibleObjects","lighting","altText","briefMismatch"],
  },
};
/* Analyse l'image RÉELLEMENT obtenue (pas le brief) — c'est cette sortie, pas le brief, qui doit
   fonder l'alt text final : le brief décrit une intention, l'image peut en différer. */
/* Copie réduite (JPEG, 1024px max) utilisée UNIQUEMENT pour l'analyse visuelle — l'image d'origine
   (PNG complet en base64) n'est jamais envoyée telle quelle à ce endpoint texte, et reste intacte
   pour la publication réelle. Repli sur l'original si le redimensionnement échoue pour une raison
   quelconque, plutôt que de bloquer l'analyse. */
function resizeDataUrlForAnalysis(dataUrl, maxDim, quality){
  maxDim = maxDim || 1024; quality = quality || 0.7;
  return new Promise((resolve)=>{
    try{
      const img = new Image();
      img.onload = ()=>{
        let { width, height } = img;
        if(width > maxDim || height > maxDim){
          if(width > height){ height = Math.round(height*maxDim/width); width = maxDim; }
          else { width = Math.round(width*maxDim/height); height = maxDim; }
        }
        const c = document.createElement("canvas"); c.width = width; c.height = height;
        c.getContext("2d").drawImage(img, 0, 0, width, height);
        resolve(c.toDataURL("image/jpeg", quality));
      };
      img.onerror = ()=> resolve(dataUrl); // repli : image d'origine si le décodage échoue
      img.src = dataUrl;
    }catch(e){ resolve(dataUrl); }
  });
}

  const provider = state.apiProviders.find(p=>p.id===state.selectedProviderId) || DEFAULT_OPENAI_PROVIDER;
  const analysisImage = await resizeDataUrlForAnalysis(dataUrl, 1024, 0.7);
  const systemPrompt = "Tu décris uniquement ce qui est visuellement présent dans l'image fournie, jamais ce qui était prévu ou souhaité. Ne complète jamais par supposition (pas de bon cadeau, huile ou accessoire non visible). Si un élément du brief n'apparaît pas dans l'image, note-le dans briefMismatch.";
  const userPrompt = `Décris précisément ce qui est visible dans cette image, en la comparant à ce qui était prévu (sans jamais inventer ce qui manque) :\nScène prévue : ${brief.ideeVisuelle}\nSujet prévu : ${brief.sujetPrincipal}\nAction prévue : ${brief.action}`;
  const res = await fetch("/.netlify/functions/generate-text", {
    method:"POST", headers:{ "Content-Type":"application/json" },
    body: JSON.stringify({ kind: provider.kind, model: provider.model, baseUrl: provider.baseUrl, systemPrompt, userPrompt, responseSchema: IMAGE_ANALYSIS_SCHEMA, imageDataUrl: analysisImage }),
  });
  const contentType = res.headers.get("content-type")||"";
  if(!contentType.includes("application/json")) throw new Error(`Réponse non-JSON de l'analyseur d'image (statut ${res.status}).`);
  const data = await res.json();
  if(!res.ok || data.error) throw new Error(data.error || `Erreur ${res.status}`);

  catch(e){ throw new Error("L'analyseur d'image n'a pas renvoyé un JSON exploitable."); }
}

/* ---------- PHASE A — PRÉPARATION (GRATUITE, aucun appel image) ----------
   Diversité déterministe -> Creative Planner -> validation locale -> sélection des références ->
   prompt image compact. Rien ici ne consomme de crédit image. Le résultat est ce qui doit être
   affiché dans le Prompt Inspector AVANT toute confirmation. */
async function prepareCreativeBrief(inputs){
  const { mission, platform, prestation, topic, aspectKey, isCampaign, registres } = inputs;
  const steps = {};

  // typeCreation figé ICI, depuis la copie des registres transmise dans inputs (jamais depuis
  // state.registres directement) : le flux préparé reste indépendant de l'état courant de l'interface.
  // Calculé AVANT computeAllowedArchetypes, qui a besoin de cette valeur pour choisir le bon catalogue.
  const typeCreationImpose = (Array.isArray(registres) && registres.includes("fantastique"))
    ? "affiche_fantastique" : "luxe_silencieux";

  const allowed = computeAllowedArchetypes(mission, prestation, platform, typeCreationImpose);
  const exclusions = computeRecentCompositionExclusions(platform);
  steps.allowed = allowed.map(a=>a.id); steps.exclusions = exclusions;

  let brief, briefCorrected = false, plannerError = null, usedLocalBriefFallback = false, blockingError = null;
  try{
    const plannerResult = await generateCreativeBrief(mission, prestation, platform, topic, typeCreationImpose, registres);
    brief = plannerResult.brief; briefCorrected = plannerResult.corrected; blockingError = plannerResult.blockingError;
  }catch(err){
    plannerError = `Échec du Creative Planner : ${String(err.message||err)}`;
    brief = localFallbackBrief(mission, prestation, platform, topic, allowed, typeCreationImpose);
    usedLocalBriefFallback = true;
  }
  if(!brief || !brief.archetypeNarratif){
    plannerError = plannerError || "Brief invalide : archétype manquant.";
    brief = localFallbackBrief(mission, prestation, platform, topic, allowed, typeCreationImpose);
    usedLocalBriefFallback = true;
  }
  if(usedLocalBriefFallback){
    // Le repli local n'a pas de caractéristique fidèle déductible sans invention — la validation
    // tourne quand même, pour produire un blockingError cohérent plutôt qu'une erreur JavaScript
    // ou une caractéristique inventée. Le Prompt Inspector reste exploitable dans tous les cas.
    const fallbackValidation = validateAndFixBrief(brief, allowed, exclusions, typeCreationImpose, prestation);
    brief = fallbackValidation.brief;
    blockingError = fallbackValidation.blockingError;
  }

  let referenceSelections = [], referenceError = null;
  try{ referenceSelections = selectReferencesForBrief(brief, platform, 2) || []; }
  catch(err){ referenceError = `Sélection de référence impossible, génération sans référence : ${String(err.message||err)}`; referenceSelections = []; }

  const imagePrompt = buildCompactImagePromptFromBrief(brief, platform, aspectKey, !!isCampaign, registres);

  return {
    phase: "prepared", inputs, allowed, exclusions, brief, briefCorrected, plannerError,
    usedLocalBriefFallback, referenceSelections, referenceError, imagePrompt, steps, blockingError,
  };
}

/* ---------- PHASE B — GÉNÉRATION (PAYANTE, uniquement après confirmation explicite) ----------
   Prend le résultat EXACT de prepareCreativeBrief (rien n'est recalculé) : image -> analyse ->
   texte. Chaque étape a son propre repli, jamais de relance automatique d'un appel image payant. */
async function confirmAndGenerateImage(prepared, onStatus, cancelToken){
  const { inputs, brief, referenceSelections } = prepared;
  const { platform, mission, size } = inputs;

  onStatus && onStatus("Génération de l'image...");
  const smartReferenceDataUrls = (referenceSelections||[]).map(r=>r.dataUrl).filter(Boolean);
  let dataUrl, usedReference = false, referenceFallbackReason = null;
  try{
    const genResult = await callProviderImage(prepared.imagePrompt, size, undefined, onStatus, cancelToken, { smartReferenceDataUrls });
    dataUrl = genResult.dataUrl; usedReference = genResult.usedReference; referenceFallbackReason = genResult.referenceFallbackReason;
  }catch(err){
    // Échec image : aucun historique visuel créé, aucune analyse ni texte lancés (jamais de relance
    // automatique d'un appel image payant).
    return { ...prepared, phase:"image_failed", ok:false, stage:"image", error:`Échec de la génération d'image : ${String(err.message||err)}` };
  }

  onStatus && onStatus("Analyse de l'image obtenue...");
  let analysis, analysisError = null;
  try{
    analysis = await analyzeGeneratedImage(dataUrl, brief);
  }catch(err){
    analysisError = `Échec de l'analyse d'image : ${String(err.message||err)} — image conservée, alt text prudent utilisé.`;
    analysis = { visibleSubjects:[], visibleAction:"", visibleSetting:"", visibleObjects:[], lighting:"",
      altText: "Image générée pour La Santé des Zèbres.", briefMismatch:[] };
  }

  onStatus && onStatus("Rédaction du texte...");
  let content = null, textError = null;
  try{
    content = await generateContentFromBrief(brief, analysis, platform, mission);
  }catch(err){
    textError = `Échec de la génération de texte : ${String(err.message||err)} — image conservée, relance du texte seul possible.`;
  }

  return { ...prepared, phase:"completed", ok:true, dataUrl, usedReference, referenceFallbackReason,
    analysis, analysisError, content, textError };
}
