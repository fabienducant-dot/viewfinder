/* ============================================================
   PACK PRODUCTION SDZ — import définitif, transactionnel, versionné
============================================================ */
const KNOWN_PACK_TYPES = ["MASTER_PRODUCTION_SDZ","MASTER_IMAGE_SDZ","MASTER_CAMPAIGN_SDZ","MASTER_DIRECTION_ARTISTIQUE","STYLES"];
const MODULE_PACK_TYPES = ["MASTER_PRODUCTION_SDZ","MASTER_IMAGE_SDZ","MASTER_CAMPAIGN_SDZ"]; // les 3 packs "164 modules", figés
const PACK_TARGETS = { "MASTER_PRODUCTION_SDZ":48, "MASTER_IMAGE_SDZ":62, "MASTER_CAMPAIGN_SDZ":54 };
const PACK_LABELS = { "MASTER_PRODUCTION_SDZ":"MASTER PRODUCTION", "MASTER_IMAGE_SDZ":"MASTER IMAGE", "MASTER_CAMPAIGN_SDZ":"MASTER CAMPAIGN",
  "MASTER_DIRECTION_ARTISTIQUE":"DIRECTION ARTISTIQUE", "STYLES":"STYLES" };

function compareVersions(a,b){
  const pa = parseFloat(a), pb = parseFloat(b);
  if(isNaN(pa) || isNaN(pb)) return 0;
  if(pa===pb) return 0;
  return pa<pb ? -1 : 1;
}

/* Validation stricte AVANT toute écriture : un fichier structurellement invalide, ou contenant
   ne serait-ce qu'un seul module incomplet, est intégralement rejeté (tout ou rien). */
function validatePackFile(raw){
  const structuralErrors = [];
  if(!raw || typeof raw!=="object") return { valid:false, structuralErrors:["Le fichier ne contient pas un objet JSON valide."], moduleErrors:[] };
  if(!raw.packType) structuralErrors.push('Champ "packType" manquant.');
  else if(!KNOWN_PACK_TYPES.includes(raw.packType)) structuralErrors.push(`packType "${raw.packType}" non reconnu (attendu : ${KNOWN_PACK_TYPES.join(", ")}).`);

  const moduleErrors = [];
  const packType = raw.packType;

  if(packType==="MASTER_DIRECTION_ARTISTIQUE"){
    if(!raw.direction_artistique || typeof raw.direction_artistique!=="object" || Array.isArray(raw.direction_artistique)){
      structuralErrors.push('Champ "direction_artistique" manquant ou n\'est pas un objet.');
    }
  } else if(packType==="STYLES"){
    if(!Array.isArray(raw.styles)) structuralErrors.push('Champ "styles" manquant ou n\'est pas une liste.');
    else raw.styles.forEach((s,i)=>{
      const label = (s && s.name && String(s.name).trim()) || `style #${i+1}`;
      if(!s || typeof s!=="object"){ moduleErrors.push({title:label, reason:"n'est pas un objet valide"}); return; }
      if(!s.name || !String(s.name).trim()) moduleErrors.push({title:label, reason:"nom manquant"});
    });
  } else {
    // MASTER_PRODUCTION_SDZ / MASTER_IMAGE_SDZ / MASTER_CAMPAIGN_SDZ : liste de modules
    if(!Array.isArray(raw.modules)) structuralErrors.push('Champ "modules" manquant ou n\'est pas une liste.');
    else raw.modules.forEach((m,i)=>{
      const label = (m && m.title && String(m.title).trim()) || `module #${i+1}`;
      if(!m || typeof m!=="object"){ moduleErrors.push({title:label, reason:"n'est pas un objet valide"}); return; }
      if(!m.category || !String(m.category).trim()) moduleErrors.push({title:label, reason:"catégorie manquante"});
      if(!m.title || !String(m.title).trim()) moduleErrors.push({title:label, reason:"titre manquant"});
      if(!m.content || !String(m.content).trim()) moduleErrors.push({title:label, reason:"contenu manquant"});
    });
  }
  return { valid: structuralErrors.length===0 && moduleErrors.length===0, structuralErrors, moduleErrors };
}

/* Analyse un fichier déjà validé. dryRun=true (Mode Test) ne touche jamais à state.modules/state.da/state.styles. */
function analyzePackFile(raw, dryRun){
  const packType = raw.packType;
  const incomingVersion = String(raw.version || "1.0");
  const installedVersionBefore = state.packVersions[packType] || null;
  const versionComparison = installedVersionBefore ? compareVersions(installedVersionBefore, incomingVersion) : null;

  if(packType==="MASTER_DIRECTION_ARTISTIQUE"){
    let added=0, updated=0, identical=0;
    const moduleResults = [];
    Object.keys(raw.direction_artistique).forEach(k=>{
      const incomingVal = raw.direction_artistique[k];
      if(incomingVal==null || incomingVal==="") return;
      const currentVal = state.da[k];
      const wasEmpty = currentVal===undefined || currentVal===null || currentVal==="";
      const changed = JSON.stringify(currentVal) !== JSON.stringify(incomingVal);
      if(!changed){ identical++; moduleResults.push({title:k, status:"identical"}); return; }
      if(!dryRun) state.da[k] = incomingVal;
      if(wasEmpty){ added++; moduleResults.push({title:k, status:"added"}); }
      else { updated++; moduleResults.push({title:k, status:"updated"}); }
    });
    if(!dryRun) state.packVersions[packType] = incomingVersion;
    return {
      packType, version:incomingVersion, installedVersionBefore, versionComparison,
      modulesRead: Object.keys(raw.direction_artistique).length, added, updated, identical, ignored:0,
      moduleResults, unknownCategories:[], daUpdated: added+updated,
    };
  }

  if(packType==="STYLES"){
    let added=0, updated=0, identical=0;
    const moduleResults = [];
    const META_FIELDS = ["id","createdAt","updatedAt","sourcePack","packVersion"];
    const stripMeta = (obj)=>{ const c={...obj}; META_FIELDS.forEach(f=>delete c[f]); return c; };
    raw.styles.forEach(s=>{
      const name = String(s.name).trim();
      const incoming = stripMeta({ ...s, name });
      const existing = state.styles.find(x=>(x.name||"").trim().toLowerCase()===name.toLowerCase());
      if(existing){
        const existingComparable = stripMeta(existing);
        if(JSON.stringify(existingComparable) !== JSON.stringify(incoming)){
          if(!dryRun){ Object.assign(existing, incoming); existing.updatedAt = Date.now(); existing.sourcePack = packType; existing.packVersion = incomingVersion; }
          updated++; moduleResults.push({title:name, status:"updated"});
        } else {
          identical++; moduleResults.push({title:name, status:"identical"});
        }
      } else {
        if(!dryRun) state.styles.push({ id: uid(), ...incoming, createdAt:Date.now(), sourcePack:packType, packVersion:incomingVersion });
        added++; moduleResults.push({title:name, status:"added"});
      }
    });
    if(!dryRun) state.packVersions[packType] = incomingVersion;
    return {
      packType, version:incomingVersion, installedVersionBefore, versionComparison,
      modulesRead: raw.styles.length, added, updated, identical, ignored:0,
      moduleResults, unknownCategories:[], daUpdated:0,
    };
  }

  // MASTER_PRODUCTION_SDZ / MASTER_IMAGE_SDZ / MASTER_CAMPAIGN_SDZ : liste de modules (comportement historique,
  // conservé à l'identique pour title/content/category/dédoublonnage — seul ajout : préservation des métadonnées
  // MASTER_IMAGE V2 (criteres/tags/status/updatedAt/id) quand le module entrant les porte, et dérivation d'un
  // registre explicite depuis le packId du fichier importé (ex: "noir_or_v2_04" → "noir_or").
  let added=0, updated=0, identical=0;
  const moduleResults = [];
  const unknownCategories = new Set();
  const packIdMatch = String(raw.packId||"").match(/^(.*)_v2_\d+$/);
  const packRegistre = packIdMatch ? packIdMatch[1] : null;

  raw.modules.forEach(m=>{
    const title = String(m.title).trim(), content = String(m.content).trim(), category = String(m.category).trim();
    if(!CATEGORIES.includes(category)) unknownCategories.add(category);
    // Un module V2 porte un id stable et propre : deux modules de registres différents peuvent légitimement
    // partager un même titre (ex: "Adaptation Portrait" en Cinématographie et en Fantastique) sans être le
    // même module. On les identifie donc par id quand il existe, et on ne retombe sur title+category — le
    // mécanisme historique — que pour les modules qui n'en fournissent aucun (anciens packs, inchangé).
    const incomingId = (typeof m.id==="string" && m.id.trim()) ? m.id.trim() : null;
    const existing = incomingId
      ? state.modules.find(x=> x.id===incomingId)
      : state.modules.find(x=>x.title.trim().toLowerCase()===title.toLowerCase() && x.category===category);
    const incomingCriteres = (m.criteres && typeof m.criteres==="object" && !Array.isArray(m.criteres)) ? m.criteres : undefined;
    const incomingTags = Array.isArray(m.tags) ? m.tags : undefined;
    const incomingStatus = (typeof m.status==="string" && m.status.trim()) ? m.status.trim() : undefined;
    const incomingRegistre = (typeof m.registre==="string" && m.registre.trim()) ? m.registre.trim() : (packRegistre || undefined);
    if(existing){
      const contentChanged = existing.content.trim() !== content;
      const metaChanged = JSON.stringify(existing.criteres||null)!==JSON.stringify(incomingCriteres||null)
        || JSON.stringify(existing.tags||null)!==JSON.stringify(incomingTags||null)
        || (existing.status||undefined)!==incomingStatus
        || (existing.registre||undefined)!==incomingRegistre;
      if(contentChanged || metaChanged){
        if(!dryRun){
          existing.content = content; existing.updatedAt = Date.now();
          existing.sourcePack = packType; existing.packVersion = incomingVersion;
          if(incomingCriteres!==undefined) existing.criteres = incomingCriteres;
          if(incomingTags!==undefined) existing.tags = incomingTags;
          if(incomingStatus!==undefined) existing.status = incomingStatus;
          if(incomingRegistre!==undefined) existing.registre = incomingRegistre;
        }
        updated++; moduleResults.push({title, status:"updated"});
      } else {
        identical++; moduleResults.push({title, status:"identical"});
      }
    } else {
      if(!dryRun){
        const newModule = {
          id: (typeof m.id==="string" && m.id.trim()) ? m.id.trim() : uid(),
          category, title, content, enabled:true,
          createdAt: Date.now(),
          updatedAt: m.updatedAt || Date.now(),
          sourcePack: packType, packVersion: incomingVersion,
        };
        if(incomingCriteres!==undefined) newModule.criteres = incomingCriteres;
        if(incomingTags!==undefined) newModule.tags = incomingTags;
        if(incomingStatus!==undefined) newModule.status = incomingStatus;
        if(incomingRegistre!==undefined) newModule.registre = incomingRegistre;
        state.modules.push(newModule);
      }
      added++; moduleResults.push({title, status:"added"});
    }
  });

  let daUpdated = 0;
  if(!dryRun && raw.direction_artistique && typeof raw.direction_artistique==="object"){
    Object.keys(raw.direction_artistique).forEach(k=>{
      if(raw.direction_artistique[k]!=null && raw.direction_artistique[k]!==""){ state.da[k]=raw.direction_artistique[k]; daUpdated++; }
    });
  }
  if(!dryRun) state.packVersions[packType] = incomingVersion;

  return {
    packType, version:incomingVersion, installedVersionBefore, versionComparison,
    modulesRead: raw.modules.length, added, updated, identical, ignored:0,
    moduleResults, unknownCategories:[...unknownCategories], daUpdated,
  };
}

/* Traite un fichier de bout en bout : parsing → validation stricte (tout ou rien) → analyse. */
async function processPackFile(file, dryRun){
  let raw;
  try{ raw = JSON.parse(await file.text()); }
  catch(err){ return { fileName:file.name, ok:false, packType:null, structuralErrors:[`JSON invalide : ${err.message}`], moduleErrors:[] }; }

  const validation = validatePackFile(raw);
  if(!validation.valid){
    return { fileName:file.name, ok:false, packType:raw.packType||null, structuralErrors:validation.structuralErrors, moduleErrors:validation.moduleErrors };
  }
  const result = analyzePackFile(raw, dryRun);
  return { fileName:file.name, ok:true, ...result };
}

function formatPackReportText(r){
  const lines = [];
  lines.push("==================================================");
  lines.push(dryRun_marker(r));
  lines.push("");
  lines.push(`Fichier : ${r.fileName}`);
  if(!r.ok){
    lines.push(`Statut : ✖ REJETÉ (aucune modification appliquée)`);
    if(r.structuralErrors && r.structuralErrors.length){
      lines.push("");
      lines.push("Erreurs de structure :");
      r.structuralErrors.forEach(e=> lines.push(`✖ ${e}`));
    }
    if(r.moduleErrors && r.moduleErrors.length){
      lines.push("");
      lines.push("Modules invalides :");
      r.moduleErrors.forEach(e=> lines.push(`✖ ${e.title} — ${e.reason}`));
    }
    lines.push("==================================================");
    return lines.join("\n");
  }
  lines.push(`Pack : ${r.packType}  (v${r.version})`);
  if(r.installedVersionBefore){
    if(r.versionComparison===0) lines.push(`Version : identique à celle déjà installée (v${r.installedVersionBefore}) — déjà à jour.`);
    else if(r.versionComparison<0) lines.push(`Version : mise à jour v${r.installedVersionBefore} → v${r.version}.`);
    else lines.push(`⚠ Version : le pack importé (v${r.version}) est PLUS ANCIEN que celui déjà installé (v${r.installedVersionBefore}).`);
  } else {
    lines.push(`Version : première installation de ce pack (v${r.version}).`);
  }
  lines.push(`Date : ${new Date().toLocaleString("fr-FR")}`);
  lines.push("");
  lines.push(`Modules lus : ${r.modulesRead}`);
  lines.push(`Ajoutés : ${r.added}`);
  lines.push(`Mis à jour : ${r.updated}`);
  lines.push(`Déjà identiques : ${r.identical}`);
  lines.push(`Ignorés : ${r.ignored}`);
  lines.push(`Erreurs : 0`);
  if(r.unknownCategories && r.unknownCategories.length) lines.push(`⚠ Catégories non reconnues : ${r.unknownCategories.join(", ")}`);
  if(!dryRunFlagFromReport(r)) lines.push(`Synchronisation serveur : ${r.blobsStatus==="ok"?"✔ OK":r.blobsStatus==="failed"?"⚠ échec (local conservé)":"—"}`);
  lines.push("==================================================");
  lines.push("");
  r.moduleResults.forEach(mr=>{
    const mark = mr.status==="added" ? "✔ (ajouté)" : mr.status==="updated" ? "✔ (mis à jour)" : "✔ (déjà identique)";
    lines.push(`${mark} ${mr.title}`);
  });
  return lines.join("\n");
}
function dryRun_marker(r){ return r.isDryRun ? `TEST PACK SDZ (aucune donnée modifiée)` : `IMPORT PACK SDZ`; }
function dryRunFlagFromReport(r){ return !!r.isDryRun; }

function buildModulesReportText(){
  const lines = [];
  lines.push("RAPPORT DES MODULES SDZ APP");
  lines.push(`Généré le ${new Date().toLocaleString("fr-FR")}`);
  lines.push("");
  lines.push("=== PROGRESSION ===");
  let totalOfficial = 0, totalTarget = 0;
  MODULE_PACK_TYPES.forEach(pt=>{
    const count = state.modules.filter(m=>m.sourcePack===pt).length;
    const target = PACK_TARGETS[pt];
    totalOfficial += count; totalTarget += target;
    lines.push(`${PACK_LABELS[pt]} : ${count} / ${target}${state.packVersions[pt] ? ` (v${state.packVersions[pt]})` : ""}`);
  });
  lines.push(`TOTAL OFFICIEL : ${totalOfficial} / ${totalTarget}`);
  const autresCount = state.modules.length - totalOfficial;
  if(autresCount>0) lines.push(`Autres modules (hors des 3 packs officiels) : ${autresCount}`);
  lines.push("");

  lines.push("=== RÉPARTITION PAR CATÉGORIE (tous modules confondus) ===");
  const byCategory = {};
  state.modules.forEach(m=>{ const c=m.category||"(sans catégorie)"; byCategory[c]=(byCategory[c]||0)+1; });
  CATEGORIES.forEach(cat=>{ lines.push(`${cat} : ${byCategory[cat]||0} module(s)`); });
  const unknownCats = Object.keys(byCategory).filter(c=>!CATEGORIES.includes(c));
  unknownCats.forEach(cat=> lines.push(`${cat} (catégorie non standard) : ${byCategory[cat]} module(s)`));
  lines.push("");

  const groups = {};
  state.modules.forEach(m=>{
    const pack = (m.sourcePack && MODULE_PACK_TYPES.includes(m.sourcePack)) ? m.sourcePack : "AUTRES";
    groups[pack] = groups[pack] || {};
    const cat = m.category || "(sans catégorie)";
    groups[pack][cat] = groups[pack][cat] || [];
    groups[pack][cat].push(m);
  });

  [...MODULE_PACK_TYPES, "AUTRES"].forEach(pack=>{
    if(!groups[pack]) return;
    lines.push(`\n========================================`);
    lines.push(pack==="AUTRES" ? "AUTRES MODULES (hors pack officiel)" : `${PACK_LABELS[pack]} (${pack})`);
    lines.push(`========================================`);
    Object.keys(groups[pack]).sort().forEach(cat=>{
      lines.push(`\n--- ${cat} ---`);
      groups[pack][cat].forEach(m=>{
        lines.push(`\n[${m.title}]`);
        lines.push(m.content);
      });
    });
  });

  lines.push("\n========================================");
  lines.push("FIN DU RAPPORT");
  lines.push("========================================");
  return lines.join("\n");
}

  /* ============================================================

  const RESET_OPTIONS = [

    selected.forEach(opt=>{
      opt.storageKeys.forEach(k=>{
        if(Object.prototype.hasOwnProperty.call(opt,"resetValue")) LS.set(k, opt.resetValue);

  // --- Compteurs de modules (48/62/54, progression globale 164) ---

    counterRow.appendChild(el("div",{class:"card", style:"text-align:center;padding:10px 6px;"},[

      el("div",{style:"font-size:10px;color:var(--muted2);"}, PACK_LABELS[pt]),

  });
  counterRow.appendChild(el("div",{class:"card", style:"text-align:center;padding:10px 6px;grid-column:span 2;"},[
    el("div",{style:`font-size:18px;font-weight:700;color:${globalCount>=globalTarget?"var(--green)":"var(--amber)"};`}, `${globalCount} / ${globalTarget}`),

  const daTextFields = Object.keys(DEFAULT_DA).filter(k=>typeof DEFAULT_DA[k]==="string");

  const daRow = el("div",{style:"display:grid;grid-template-columns:repeat(2,1fr);gap:8px;margin-bottom:16px;"},[
    el("div",{class:"card", style:"text-align:center;padding:10px 6px;"},[
      el("div",{style:"font-size:16px;font-weight:700;"}, `${daFieldsFilled} / ${daTextFields.length}`),
      el("div",{style:"font-size:10px;color:var(--muted2);"}, "Direction artistique (champs renseignés)"),
      state.packVersions["MASTER_DIRECTION_ARTISTIQUE"] ? el("div",{style:"font-size:9px;color:var(--muted2);"}, `v${state.packVersions["MASTER_DIRECTION_ARTISTIQUE"]}`) : null,
    ]),
    el("div",{class:"card", style:"text-align:center;padding:10px 6px;"},[
      el("div",{style:"font-size:16px;font-weight:700;"}, String(state.styles.length)),
      el("div",{style:"font-size:10px;color:var(--muted2);"}, "Styles enregistrés"),
      state.packVersions["STYLES"] ? el("div",{style:"font-size:9px;color:var(--muted2);"}, `v${state.packVersions["STYLES"]}`) : null,
    ]),

  frag.appendChild(daRow);

  {
    const total = state.modules.length;
    const byPack = {};
    MODULE_PACK_TYPES.forEach(pt=> byPack[pt]=0);
    let autres = 0;
    state.modules.forEach(m=>{
      if(m.sourcePack && MODULE_PACK_TYPES.includes(m.sourcePack)) byPack[m.sourcePack]++;
      else autres++;
    });
    const byCategory = {};
    state.modules.forEach(m=>{
      const cat = m.category || "(sans catégorie)";
      byCategory[cat] = (byCategory[cat]||0)+1;
    });
    const idCounts = {};
    state.modules.forEach(m=> idCounts[m.id] = (idCounts[m.id]||0)+1);
    const duplicateIds = Object.keys(idCounts).filter(id=>idCounts[id]>1);

    frag.appendChild(el("p",{style:"font-size:11px;color:var(--muted2);margin:-12px 0 16px;"},

  }

  const packReportBox = el("div",{class:"card", style:"font-family:monospace;font-size:11px;white-space:pre-wrap;margin:8px 0 12px;display:none;max-height:420px;overflow:auto;"});
  const packMsg = el("p",{style:"font-size:12px;min-height:16px;margin:4px 0 12px;"},"");

  function showPackReports(reports){
    packReportBox.style.display = "block";
    packReportBox.textContent = reports.map(formatPackReportText).join("\n\n");
  }

  async function runPackImport(files, isDryRun){
    const reports = [];
    let touchedModules = false, touchedDa = false, touchedStyles = false;

    for(const file of files){
      const preview = await processPackFile(file, true); // toujours un essai à blanc d'abord, pour connaître la version avant d'écrire quoi que ce soit
      if(!preview.ok){ reports.push({...preview, isDryRun}); continue; }

      if(!isDryRun && preview.versionComparison>0){
        const proceed = confirm(`${PACK_LABELS[preview.packType]||preview.packType} : le pack importé (v${preview.version}) est PLUS ANCIEN que celui déjà installé (v${preview.installedVersionBefore}). Importer quand même et écraser avec cette version plus ancienne ?`);
        if(!proceed){
          reports.push({ fileName:file.name, ok:false, packType:preview.packType, isDryRun, structuralErrors:["Import annulé : version plus ancienne que l'installée, refusé par l'utilisateur."], moduleErrors:[] });
          continue;
        }
      }

      if(isDryRun){
        reports.push({...preview, isDryRun:true});
        continue;
      }

      const real = await processPackFile(file, false); // deuxième lecture : commit réel cette fois
      real.isDryRun = false;
      const hasChange = real.added || real.updated;
      if(hasChange){
        if(MODULE_PACK_TYPES.includes(real.packType)) touchedModules = true;
        else if(real.packType==="MASTER_DIRECTION_ARTISTIQUE") touchedDa = true;
        else if(real.packType==="STYLES") touchedStyles = true;
      }
      if(real.daUpdated && MODULE_PACK_TYPES.includes(real.packType)) touchedDa = true; // bonus direction_artistique glissé dans un pack de modules
      reports.push(real);
    }

    if(isDryRun){
      showPackReports(reports);
      packMsg.style.color = "var(--muted2)";
      packMsg.textContent = "Mode test : aucune donnée n'a été modifiée.";
      renderMain();
      return;
    }

    normalizeState();
    if(touchedModules) LS.set("vf-modules", state.modules);
    if(touchedDa) LS.set("vf-da", state.da);
    if(touchedStyles) LS.set("vf-styles", state.styles);
    LS.set("vf-pack-versions", state.packVersions);

    packMsg.style.color = "var(--muted2)";
    packMsg.textContent = "Sauvegarde vers le serveur...";
    renderMain();
    const anyRealChange = touchedModules || touchedDa || touchedStyles;
    const synced = anyRealChange ? await pushToServerSilent() : true;
    const blobsStatus = !anyRealChange ? "skipped" : synced ? "ok" : "failed";
    reports.forEach(r=>{ if(r.ok) r.blobsStatus = blobsStatus; });

    reports.filter(r=>r.ok).forEach(r=>{
      state.packHistory.unshift({
        id: uid(), packType:r.packType, version:r.version, fileName:r.fileName, importedAt: Date.now(),
        modulesRead:r.modulesRead, added:r.added, updated:r.updated, identical:r.identical,
        errors: 0, blobsStatus,
      });
    });
    reports.filter(r=>!r.ok).forEach(r=>{
      state.packHistory.unshift({
        id: uid(), packType:r.packType||"(inconnu)", version:null, fileName:r.fileName, importedAt: Date.now(),
        modulesRead:0, added:0, updated:0, identical:0,
        errors: (r.structuralErrors||[]).length + (r.moduleErrors||[]).length, blobsStatus:"skipped",
      });
    });
    state.packHistory = state.packHistory.slice(0,50);
    LS.set("vf-pack-imports", state.packHistory);

    showPackReports(reports);
    packMsg.style.color = synced ? "var(--green)" : "var(--coral)";
    packMsg.textContent = blobsStatus==="ok" ? "✔ Sauvegarde serveur réussie."
      : blobsStatus==="failed" ? "⚠ Sauvegarde serveur impossible — les données restent enregistrées en local, réessaie depuis \"Sauvegarder sur serveur\" plus haut."
      : "Aucune modification à sauvegarder (fichiers déjà à jour ou rejetés).";
    renderMain();
  }

  const packFileInput = el("input",{type:"file", accept:".json,application/json", multiple:true, style:"display:none"});

    await runPackImport(files, false);
    packFileInput.value = "";

  frag.appendChild(packFileInput);
  frag.appendChild(el("button",{class:"btn-primary", style:"margin-bottom:8px;", onclick:()=>packFileInput.click()}, [svgIcon(ICONS.upload,16), el("span",{},"Importer Pack SDZ")]));

  const testFileInput = el("input",{type:"file", accept:".json,application/json", multiple:true, style:"display:none"});
  testFileInput.addEventListener("change", async (e)=>{
    const files = Array.from(e.target.files||[]);
    if(!files.length) return;
    await runPackImport(files, true);
    testFileInput.value = "";
  });
  frag.appendChild(testFileInput);
  frag.appendChild(el("button",{class:"btn-secondary", style:"margin-bottom:12px;", onclick:()=>testFileInput.click()}, [svgIcon(ICONS.sparkles,14), el("span",{},"Tester un Pack (sans importer)")]));

  frag.appendChild(packMsg);
  frag.appendChild(packReportBox);

  if(state.packHistory.length){
    frag.appendChild(el("p",{class:"label", style:"margin-top:6px;"}, "Historique des imports"));
    state.packHistory.slice(0,15).forEach(h=>{
      const ok = h.errors===0 && h.blobsStatus!=="skipped-error";
      frag.appendChild(el("div",{class:"history-card", style:"padding:8px 10px;margin-bottom:6px;"},[
        el("div",{class:"history-top", style:"font-size:12px;"},[
          el("span",{}, `${new Date(h.importedAt).toLocaleString("fr-FR")} · ${PACK_LABELS[h.packType]||h.packType}${h.version?` v${h.version}`:""}`),
          el("span",{style:`color:${h.errors>0?"var(--coral)":"var(--green)"};`}, h.errors>0 ? `⚠ ${h.errors} erreur(s)` : "✔ Succès"),
        ]),
        el("div",{style:"font-size:11px;color:var(--muted2);"}, h.errors>0
          ? `Fichier rejeté (${h.fileName})`
          : `${h.modulesRead} module(s) lus · ${h.added} ajouté(s) · ${h.updated} mis à jour · sauvegarde serveur : ${h.blobsStatus==="ok"?"✔":h.blobsStatus==="failed"?"⚠":"—"}`),
      ]));
    });
  }

  frag.appendChild(el("p",{class:"label", style:"margin-top:10px;"}, "Exporter la Direction artistique / les Styles"));
  frag.appendChild(el("p",{class:"sublabel"}, "Génère un fichier au même format que celui attendu à l'import — pratique pour sauvegarder l'état actuel, le transférer, ou repartir d'une base pour la faire évoluer avec ChatGPT."));
  const exportRow = el("div",{style:"display:flex;gap:8px;flex-wrap:wrap;margin-bottom:16px;"});
  exportRow.appendChild(el("button",{class:"btn-secondary", style:"flex:1;", onclick:()=>{
    const payload = { packType:"MASTER_DIRECTION_ARTISTIQUE", version: state.packVersions["MASTER_DIRECTION_ARTISTIQUE"]||"1.0", direction_artistique: state.da };
    const blob = new Blob([JSON.stringify(payload,null,2)], {type:"application/json"});
    const link = document.createElement("a");
    link.download = "MASTER_DIRECTION_ARTISTIQUE.json";
    link.href = URL.createObjectURL(blob);
    link.click();
  }}, [svgIcon(ICONS.download,14), el("span",{},"Exporter la DA")]));
  exportRow.appendChild(el("button",{class:"btn-secondary", style:"flex:1;", onclick:()=>{
    const payload = { packType:"STYLES", version: state.packVersions["STYLES"]||"1.0", styles: state.styles };
    const blob = new Blob([JSON.stringify(payload,null,2)], {type:"application/json"});
    const link = document.createElement("a");
    link.download = "STYLES.json";
    link.href = URL.createObjectURL(blob);
    link.click();
  }}, [svgIcon(ICONS.download,14), el("span",{},"Exporter les Styles")]));
  frag.appendChild(exportRow);

  frag.appendChild(el("p",{style:"font-size:11px;color:var(--muted2);margin:20px 0 4px;border-top:1px solid var(--border);padding-top:12px;"},
    "Export/import JSON ci-dessous : ta sécurité de secours, indépendante du serveur — toujours disponible même sans connexion."));

  frag.appendChild(el("p",{class:"sublabel"},"Sauvegarde complète en un clic : bibliothèque, connaissances, direction artistique, styles, historique, audits et campagnes en cours — tout ce que contient SDZ App, dans un seul fichier JSON. Utile pour ne jamais perdre ton travail ou pour le transférer sur un autre appareil."));

  function getAllVfKeys(){
    const keys = [];
    const EXCLUDE = ["vf-updated-at","vf-last-server-sync","vf-sync-secret"];
    for(let i=0;i<localStorage.length;i++){
      const k = localStorage.key(i);
      if(k && k.startsWith("vf-") && !EXCLUDE.includes(k)) keys.push(k);
    }
    return keys;
  }
  const LABELS = {
    "vf-images":"Bibliothèque", "vf-modules":"Connaissances", "vf-da":"Direction artistique",
    "vf-styles":"Styles", "vf-history":"Base de prompts (historique)", "vf-audit":"Audits IA",
    "vf-campaign":"Campagne en cours", "vf-lab":"Laboratoire IA", "vf-api-providers":"Paramètres API (clés incluses)", "vf-modes":"Modes de production",
    "vf-pack-imports":"Historique des imports Pack SDZ", "vf-pack-versions":"Versions des Packs SDZ installés",
    "vf-scheduled":"Calendrier de programmation", "vf-make-webhook":"Webhook Make",
  };
  const keys = getAllVfKeys();
  frag.appendChild(el("p",{class:"label"},"Contenu de la sauvegarde"));
  const list = el("div",{style:"margin-bottom:10px;"});
  keys.forEach(k=>{
    let count = "";
    try{ const v = LS.get(k, null); if(Array.isArray(v)) count = ` (${v.length})`; }catch(e){}
    list.appendChild(el("div",{style:"font-size:13px;color:var(--muted);padding:4px 0;border-bottom:1px solid var(--border);"}, `${LABELS[k]||k}${count}`));
  });
  frag.appendChild(list);

  const apiKeyToggle = el("input",{type:"checkbox", checked: state.includeApiKeysInExport});
  apiKeyToggle.addEventListener("change", e=>{ state.includeApiKeysInExport = e.target.checked; });
  frag.appendChild(el("label",{style:"display:flex;align-items:center;gap:8px;margin-bottom:18px;font-size:13px;color:var(--muted);"},
    [apiKeyToggle, "Inclure mes clés API dans l'export (déconseillé si tu comptes partager ce fichier — exclu par défaut)"]));

  frag.appendChild(el("button",{class:"btn-primary", style:"margin-bottom:12px;", onclick: ()=>{
    const dump = { _meta: { app:"Viewfinder", exportedAt: new Date().toISOString(), version: 1 } };
    getAllVfKeys().forEach(k=>{
      if(k==="vf-api-providers" && !state.includeApiKeysInExport){
        const sanitized = (LS.get(k, [])||[]).map(p=> ({...p, apiKey:""}));
        dump[k] = sanitized;
      } else {
        dump[k] = LS.get(k, null);
      }
    });
    const blob = new Blob([JSON.stringify(dump, null, 2)], {type:"application/json"});
    const link = document.createElement("a");
    link.download = `viewfinder-sauvegarde-${nowStr().replace(/\//g,"-")}.json`;
    link.href = URL.createObjectURL(blob);
    link.click();
  }}, [svgIcon(ICONS.download,16), el("span",{},"Exporter toute la sauvegarde")]));

  const importInput = el("input",{type:"file", accept:"application/json", style:"display:none"});
  const importMsg = el("p",{style:"font-size:12px;color:var(--green);min-height:14px;"},"");
  importInput.addEventListener("change", (e)=>{
    const file = e.target.files[0]; if(!file) return;
    const reader = new FileReader();
    reader.onload = ()=>{
      try{
        const dump = JSON.parse(reader.result);
        const entries = Object.entries(dump).filter(([k])=> k.startsWith("vf-"));
        if(!entries.length){ importMsg.textContent = "Ce fichier ne contient aucune donnée Viewfinder reconnue."; return; }
        const ok = confirm(`Restaurer cette sauvegarde va REMPLACER toutes les données actuelles de Viewfinder sur cet appareil (${entries.length} élément(s)). Continuer ?`);
        if(!ok) return;
        entries.forEach(([k,v])=>{ if(v!==null) LS.set(k, v); });
        importMsg.textContent = "Restauration réussie, rechargement...";
        setTimeout(()=>location.reload(), 800);
      }catch(err){ importMsg.textContent = "Fichier invalide ou corrompu."; }
    };
    reader.readAsText(file);
    importInput.value = "";
  });
  frag.appendChild(importInput);
  frag.appendChild(el("button",{class:"btn-secondary"}, [svgIcon(ICONS.upload,14), el("span",{},"Restaurer une sauvegarde")]))
    .addEventListener("click", ()=>importInput.click());
  frag.appendChild(importMsg);

  return frag;
}

/* ============================================================
   ROUTEUR
============================================================ */
function renderMain(){
  const main = document.getElementById("main");
  main.innerHTML = "";
  const builders = {
    accueil: buildAccueilTab, library: buildLibraryTab, editor: buildEditorTab, knowledge: buildKnowledgeTab,
    da: buildDaTab, styles: buildStylesTab, post: buildPostTab, calendar: buildCalendarTab, audit: buildAuditTab, lab: buildLabTab, api: buildApiTab,
    history: buildHistoryTab, settings: buildSettingsTab,
  };
  try{
    normalizeState();
    const builder = builders[state.tab] || buildAccueilTab;
    main.appendChild(builder());
  }catch(err){
    console.error("Erreur de rendu :", err);
    main.appendChild(el("div",{class:"card"},[
      el("p",{style:"color:var(--coral);font-weight:600;margin-bottom:6px;"},"Cet onglet a rencontré un problème."),
      el("p",{style:"font-size:12px;color:var(--muted2);margin-bottom:10px;"}, String(err && err.message || err)),
      el("button",{class:"btn-secondary", onclick:()=>{ state.tab="accueil"; renderNav(); renderMain(); }}, "Retour à l'accueil"),
    ]));
  }
}
renderNav();
renderMain();
updateCount();
checkServerOnLoad();

if ("serviceWorker" in navigator) {
  window.addEventListener("load", () => {
    navigator.serviceWorker.register("./sw.js").catch((err) => console.error("SW non enregistré :", err));
  });
}
</script>
</body>
</html>
