  .thumb{position:relative;aspect-ratio:1/1;border-radius:12px;overflow:hidden;cursor:pointer;}
  .thumb img{width:100%;height:100%;object-fit:cover;display:block;}

  .vf .tr{top:0;right:0;border-top:2px solid;border-right:2px solid;border-top-right-radius:4px;}
  .vf .bl{bottom:0;left:0;border-bottom:2px solid;border-left:2px solid;border-bottom-left-radius:4px;}
  .vf .br{bottom:0;right:0;border-bottom:2px solid;border-right:2px solid;border-bottom-right-radius:4px;}

  if(autoSyncTimer) clearTimeout(autoSyncTimer);

function getLocalUpdatedAt(){ return Number(localStorage.getItem("vf-updated-at")||0); }

  get(key, fallback){
    try{
      const v = localStorage.getItem(key);
      if(v===null) return fallback;
      const parsed = JSON.parse(v);
      // gu├йrison r├йtroactive : une valeur stock├йe "null" ou de mauvais type ne doit jamais remplacer un tableau/objet attendu
      if(parsed===null || parsed===undefined) return fallback;
      if(Array.isArray(fallback) && !Array.isArray(parsed)) return fallback;
      if(fallback && typeof fallback==="object" && !Array.isArray(fallback) && (typeof parsed!=="object" || Array.isArray(parsed))) return fallback;
      return parsed;
    }catch(e){ return fallback; }
  },
  set(key, val){
    try{
      localStorage.setItem(key, JSON.stringify(val));
      if(SYNC_KEYS.includes(key)){ bumpLocalUpdatedAt(); scheduleAutoSync(); }
      return true;
    }catch(e){
      console.error(e);
      if(typeof state!=="undefined") state.storageError = { key, message: String(e && e.message || e), at: Date.now() };
      return false;
    }
  }
};

/* ============================================================
   NETTOYAGE UNIQUE тАФ purge cibl├йe par nom exact, jamais un reset global.
   S'ex├йcute une seule fois (verrou vf-cleanup-2026-07) puis ne touche plus rien.
   Ne supprime QUE les entr├йes explicitement list├йes ci-dessous ; tout le reste
   (styles SDZ, modules import├йs, historique, audits, r├йglages) reste intact.
============================================================ */
(function runOneTimeCleanup(){
  const FLAG = "vf-cleanup-2026-07";
  if(LS.get(FLAG, false)) return;

  const DELETE_STYLE_NAMES = ["noir & or","editorial","├йditorial","cin├йmatique","refuge",
    "├йnerg├йtique","energetique","nature","montagne","├йt├й","ete","mystique premium"];
  try{
    const styles = LS.get("vf-styles", null);
    if(Array.isArray(styles)){
      const seen = new Set();
      const cleaned = [];
      styles.forEach(s=>{
        const norm = (s.name||"").trim().toLowerCase();
        if(DELETE_STYLE_NAMES.includes(norm)) return;      // style ├а supprimer explicitement
        if(seen.has(norm)) return;                          // doublon (ex: "Luxe silencieux" en double)
        seen.add(norm);
        cleaned.push(s);
      });
      if(cleaned.length !== styles.length) LS.set("vf-styles", cleaned);
    }
  }catch(e){ console.error("Nettoyage styles ├йchou├й :", e); }

  const DELETE_MODULES = [
    { category:"Charte graphique", title:"Ton & identit├й visuelle" },
    { category:"Interdits", title:"Interdits g├йn├йraux" },
    { category:"R├иgles r├йdactionnelles", title:"Structure g├йn├йrale" },
    { category:"Direction artistique", title:"Style par d├йfaut" },
    { category:"Univers de marque", title:"Pr├йsentation de la marque" },
  ];
  try{
    const modules = LS.get("vf-modules", null);
    if(Array.isArray(modules)){
      const cleaned = modules.filter(m =>
        !DELETE_MODULES.some(d => d.category===m.category && d.title===m.title)
      );
      if(cleaned.length !== modules.length) LS.set("vf-modules", cleaned);
    }
  }catch(e){ console.error("Nettoyage modules ├йchou├й :", e); }

  LS.set(FLAG, true);
})();

/* ============================================================

   la provenance de la donn├йe (localStorage, Netlify Blobs, import JSON,

function normalizeModule(m){
  if(!m || typeof m!=="object") return null;
  return {
    id: m.id || uid(),
    category: (typeof m.category==="string" && m.category) ? m.category : (CATEGORIES[0]||"Univers de marque"),
    title: typeof m.title==="string" ? m.title : "",
    content: typeof m.content==="string" ? m.content : "",
    enabled: typeof m.enabled==="boolean" ? m.enabled : true,
    createdAt: m.createdAt || Date.now(),
    updatedAt: m.updatedAt || undefined,
    sourcePack: m.sourcePack || undefined,
    packVersion: m.packVersion || undefined,
  };
}
function normalizeStyle(s){
  if(!s || typeof s!=="object") return null;
  return {
    id: s.id || uid(),
    name: typeof s.name==="string" && s.name ? s.name : "(style sans nom)",
    description: typeof s.description==="string" ? s.description : "",
    objectif: typeof s.objectif==="string" ? s.objectif : "",
    ambiance: typeof s.ambiance==="string" ? s.ambiance : "",
    palette: typeof s.palette==="string" ? s.palette : "",

    sourcePack: s.sourcePack || undefined,
    packVersion: s.packVersion || undefined,

}
function normalizeImage(img){
  if(!img || typeof img!=="object") return null;

    id: img.id || uid(),
    name: typeof img.name==="string" ? img.name : "image",
    dataUrl: typeof img.dataUrl==="string" ? img.dataUrl : "",

/* Point d'entr├йe unique : ├а appeler apr├иs tout chargement externe (localStorage au d├йmarrage,
   restauration Netlify Blobs, import JSON, restauration de sauvegarde) et avant chaque rendu/g├йn├йration. */
function normalizeState(){
  state.modules = Array.isArray(state.modules) ? state.modules.map(normalizeModule).filter(Boolean) : [];
  state.styles = Array.isArray(state.styles) ? state.styles.map(normalizeStyle).filter(Boolean) : [];

  state.da = normalizeDirectionArtistique(state.da);
  state.history = Array.isArray(state.history) ? state.history : [];
  state.auditHistory = Array.isArray(state.auditHistory) ? state.auditHistory : [];
  state.lab = Array.isArray(state.lab) ? state.lab : [];

  state.productionModes = Array.isArray(state.productionModes) ? state.productionModes : [];
  state.campaign = Array.isArray(state.campaign) ? state.campaign : [];
  state.scheduled = Array.isArray(state.scheduled) ? state.scheduled.map(normalizeScheduledPost).filter(Boolean) : [];
  state.packHistory = Array.isArray(state.packHistory) ? state.packHistory.map(normalizeCampaignHistoryEntry).filter(Boolean) : [];
  state.packVersions = (state.packVersions && typeof state.packVersions==="object" && !Array.isArray(state.packVersions)) ? state.packVersions : {};
  state.qualityScores = (state.qualityScores && typeof state.qualityScores==="object" && !Array.isArray(state.qualityScores))
    ? state.qualityScores : { charte:7, coherence:7, adaptation:7, originalite:7, clarte:7, conversion:7 };
  state.makeWebhook = typeof state.makeWebhook==="string" ? state.makeWebhook : "";
  state.logoPublicUrl = typeof state.logoPublicUrl==="string" ? state.logoPublicUrl : "";
  state.mission = typeof state.mission==="string" ? state.mission : "";
  state.topic = typeof state.topic==="string" ? state.topic : "";
  state.prestationName = typeof state.prestationName==="string" ? state.prestationName : "";
  state.textPasted = typeof state.textPasted==="string" ? state.textPasted : "";
  // l'id s├йlectionn├й doit toujours pointer vers un ├йl├йment qui existe r├йellement, sinon on le r├йinitialise
  if(state.selectedId && !state.images.some(i=>i.id===state.selectedId)) state.selectedId = state.images[0] ? state.images[0].id : null;
  if(state.postImageId && !state.images.some(i=>i.id===state.postImageId)) state.postImageId = null;
  if(state.styleId && !state.styles.some(s=>s.id===state.styleId)) state.styleId = state.styles[0] ? state.styles[0].id : "";
}

function el(tag, attrs={}, children=[]){
  const e = document.createElement(tag);
  for(const [k,v] of Object.entries(attrs)){
    if(k==="class") e.className = v;
    else if(k==="html") e.innerHTML = v;
    else if(k.startsWith("on")) e.addEventListener(k.slice(2), v);
    else if(k==="checked"){ e.checked = v; }
    else e.setAttribute(k, v);
  }
  (Array.isArray(children)?children:[children]).forEach(c=>{
    if(c==null) return;
    e.appendChild(typeof c === "string" ? document.createTextNode(c) : c);
  });
  return e;
}
function svgIcon(pathHtml, size=16){
  const s = document.createElementNS("http://www.w3.org/2000/svg","svg");
  s.setAttribute("viewBox","0 0 24 24"); s.setAttribute("width",size); s.setAttribute("height",size);
  s.setAttribute("fill","none"); s.setAttribute("stroke","currentColor"); s.setAttribute("stroke-width","2");
  s.setAttribute("stroke-linecap","round"); s.setAttribute("stroke-linejoin","round");
  s.innerHTML = pathHtml;
  return s;
}

function resizeImageFile(file, maxDim=1600, quality=0.85){
  return new Promise((resolve, reject)=>{
    const reader = new FileReader();
    reader.onload = () => {
      const img = new Image();
      img.onload = () => {
        let {width,height} = img;
        if(width>maxDim || height>maxDim){
          if(width>height){ height = Math.round(height*maxDim/width); width = maxDim; }
          else { width = Math.round(width*maxDim/height); height = maxDim; }
        }
        const c = document.createElement("canvas"); c.width=width; c.height=height;
        c.getContext("2d").drawImage(img,0,0,width,height);
        resolve(c.toDataURL("image/jpeg", quality));
      };
      img.onerror = reject;
      img.src = reader.result;
    };
    reader.onerror = reject;
    reader.readAsDataURL(file);
  });
}
function loadImage(src){
  return new Promise((resolve,reject)=>{
    const img = new Image();
    img.onload = ()=>resolve(img);
    img.onerror = reject;
    img.src = src;
  });
}

/* L'IA ne doit jamais ├кtre charg├йe de dessiner le logo (elle ne peut que l'approximer, jamais le reproduire
   fid├иlement) : on lui demande de laisser une zone d├йgag├йe, puis on incruste ici le vrai fichier logo
   marqu├й comme actif de marque dans la Biblioth├иque, exactement ├а la position r├йgl├йe dans state.logoOverlay. */
async function compositeRealLogo(baseDataUrl){
  const logoAsset = state.images.find(i=>i.assetType==="logo");
  if(!logoAsset) return { dataUrl: baseDataUrl, applied:false };
  try{
    const baseImg = await loadImage(baseDataUrl);
    const logoImg = await loadImage(logoAsset.dataUrl);
    const canvas = document.createElement("canvas");
    canvas.width = baseImg.width; canvas.height = baseImg.height;
    const ctx = canvas.getContext("2d");
    ctx.drawImage(baseImg, 0, 0);
    const logoW = canvas.width * (state.logoOverlay.size/100);
    const logoH = logoW * (logoImg.height/logoImg.width);
    const lx = (state.logoOverlay.x/100)*canvas.width - logoW/2;
    const ly = (state.logoOverlay.y/100)*canvas.height - logoH/2;
    ctx.drawImage(logoImg, lx, ly, logoW, logoH);
    return { dataUrl: canvas.toDataURL("image/png"), applied:true };
  }catch(e){
    return { dataUrl: baseDataUrl, applied:false };
  }
}

/* Signature de marque compl├иte et obligatoire apr├иs toute g├йn├йration : vrai logo + nom de la
   marque + ville, toujours au m├кme endroit, avec le m├кme rendu тАФ jamais une signature "imagin├йe"
   par l'IA. C'est la seule signature consid├йr├йe comme valide. */
async function compositeBrandSignature(baseDataUrl, platform){
  const logoResult = await compositeRealLogo(baseDataUrl);
  if(!logoResult.applied) return logoResult; // sans logo r├йel disponible, rien de fiable ├а ancrer le texte dessus
  try{
    const img = await loadImage(logoResult.dataUrl);
    const canvas = document.createElement("canvas");
    canvas.width = img.width; canvas.height = img.height;
    const ctx = canvas.getContext("2d");
    ctx.drawImage(img, 0, 0);

    const logoW = canvas.width * (state.logoOverlay.size/100);
    const cx = (state.logoOverlay.x/100) * canvas.width;
    const logoBottomY = (state.logoOverlay.y/100) * canvas.height + logoW/2;

    const brandFontSize = Math.max(14, Math.round(canvas.width * 0.026));
    const cityFontSize = Math.max(10, Math.round(canvas.width * 0.016));

    ctx.textAlign = "center";
    ctx.textBaseline = "top";
    ctx.shadowColor = "rgba(0,0,0,0.65)";
    ctx.shadowBlur = 5;

    ctx.fillStyle = "#F5F4EF"; // blanc cass├й de la charte SDZ
    ctx.font = `600 ${brandFontSize}px Georgia, 'Times New Roman', serif`;
    ctx.fillText("LA SANT├Й DES Z├ИBRES", cx, logoBottomY + 8);

    ctx.fillStyle = "#C9A227"; // or officiel SDZ
    ctx.font = `${cityFontSize}px Georgia, 'Times New Roman', serif`;
    ctx.fillText("RAISMES", cx, logoBottomY + 8 + brandFontSize + 6);

    ctx.shadowBlur = 0;
    return { dataUrl: canvas.toDataURL("image/png"), applied:true };
  }catch(e){
    return logoResult; // d├йgradation propre : au pire, le logo reste appliqu├й sans le texte
  }
}

/* Pousse le logo actuellement marqu├й comme "logo" au serveur (une seule fois par changement r├йel),
   et d├йduit l'URL publique stable. Ne re-t├йl├йcharge/reconvertit jamais inutilement. */
async function syncOfficialLogoToServer(){
  const logoAsset = state.images.find(i=>i.assetType==="logo");
  if(!logoAsset) return { ok:false, reason:"Aucune image marqu├йe comme logo dans la Biblioth├иque." };

    });
    if(!res.ok) return { ok:false, reason:`├Йchec de l'envoi au serveur (HTTP ${res.status}).` };

const KNOWN_PRESTATIONS = [

  "Massage Femme enceinte","Massage Enfant","R├йflexologie plantaire tha├пlandaise",

/* Fusionne le contenu de tous les modules "Prestations" activ├йs, en ├йliminant les doublons exacts
   (si le m├кme texte a ├йt├й coll├й dans plusieurs modules). Ne modifie jamais les modules eux-m├кmes. */
function getMergedPrestationsText(){
  const mods = state.modules.filter(m=>m.enabled && m.category==="Prestations");
  const seen = new Set();
  const parts = [];
  mods.forEach(m=>{
    const c = (m.content||"").trim();
    if(c && !seen.has(c)){ seen.add(c); parts.push(c); }
  });
  return parts.join("\n\n");
}
/* Rep├иre, dans le texte fusionn├й, o├╣ commence chaque prestation connue et d├йcoupe le texte
   entre deux noms de prestations cons├йcutifs pour isoler le bloc de d├йtails de chacune. */
function extractPrestationBlocks(text){
  const found = [];
  KNOWN_PRESTATIONS.forEach(name=>{
    const idx = text.indexOf(name);
    if(idx !== -1) found.push({name, idx});
  });
  found.sort((a,b)=>a.idx-b.idx);
  const blocks = {};
  found.forEach((f,i)=>{
    const end = i+1<found.length ? found[i+1].idx : text.length;
    blocks[f.name] = text.slice(f.idx, end).trim();
  });
  return blocks;
}
function extractField(block, patterns){
  for(const re of patterns){ const m = block.match(re); if(m) return m[1].trim(); }
  return null;
}
const DURATION_PATTERNS = [/dur[├йe]e\s*[:\-]\s*([^\n]+)/i, /(\d+\s*(?:min|minutes|h|heures)\b[^\n]*)/i];
const PRICE_PATTERNS = [/tarifs?\s*[:\-]\s*([^\n]+)/i, /prix\s*[:\-]\s*([^\n]+)/i, /(\d+[\.,]?\d*\s*тВм[^\n]*)/];
/* Champs de la "fiche prestation" enrichie : reconnus automatiquement s'ils sont ├йcrits
   sous la forme "Label : contenu" dans le bloc de la prestation. Ceux non trouv├йs sont
   simplement omis тАФ le bloc brut complet est de toute fa├зon toujours transmis en renfort. */
const PRESTATION_FICHE_LABELS = ["histoire","├йmotion","psychologie","codes visuels","mati├иres",
  "textures","lumi├иre","composition","vocabulaire","cta","interdits","sc├иne visuelle"];

/* ---------- MOTEUR DE CONTEXTE ----------
   S├йlectionne les modules pertinents pour les cat├йgories demand├йes, fusionne les doublons stricts
   (m├кme titre + m├кme contenu dans deux modules), trie selon la hi├йrarchie SDZ, puis applique un
   budget de caract├иres pour ne garder que ce qui a un r├йel impact тАФ qualit├й plut├┤t que quantit├й. */
/* ---------- Paliers de priorit├й par cat├йgorie ----------
   "always" : ADN de marque, ton, direction artistique, r├иgles dures, CTA, mission, et cat├йgories d├йj├а
              sp├йcifiques ├а la plateforme (via TEXT_MODULE_MAP) тАФ jamais sacrifi├йes en premier.
   "rare"   : contenus de fond (glossaire, historique de d├йcisions, exemples, le├зons) тАФ utiles mais
              plafonn├йs en nombre pour ├йviter le remplissage syst├йmatique.
   "context": tout le reste тАФ inclus seulement s'il est r├йellement pertinent maintenant (voir plus bas). */
function moduleTier(category){
  const ALWAYS = ["MASTER SDZ","CODEX SDZ","Univers de marque","Charte graphique","Direction artistique",
    "R├иgles r├йdactionnelles","CTA","Missions","Interdits","├А ne jamais faire","├А faire",
    "Vocabulaire autoris├й","Vocabulaire interdit","Logo","Palette","Typographies",
    "Instagram","Facebook","Google Business","Stories","Blog Wix","SEO"];
  const RARE = ["D├йcisions importantes","Glossaire","Erreurs fr├йquentes","Exemples excellents",
    "Exemples valid├йs","Exemples refus├йs","Le├зons apprises","Biblioth├иque d'id├йes"];
  if(ALWAYS.includes(category)) return "always";
  if(RARE.includes(category)) return "rare";
  return "context";
}
/* Pertinence contextuelle r├йelle, calcul├йe automatiquement (aucun r├йglage manuel ajout├й ├а l'interface) :
   une connaissance "context" n'est inject├йe que si elle correspond ├а la situation actuelle. */
function isContextRelevantNow(m){
  if(m.category==="Saisonnalit├й"){
    const season = getCurrentSeasonFR().toLowerCase();
    return m.content.toLowerCase().includes(season);
  }
  if(m.category==="Offres"){
    const t = `${state.topic||""} ${state.prestationName||""} ${state.mission||""}`.toLowerCase();
    return t.includes("cadeau") || t.includes("offre") || state.mission==="Vendre des bons cadeaux";
  }
  return true; // Prestations, Psychologie client, Personae, Objections clients : pertinents d├иs qu'ils existent
}
/* Quasi-d├йduplication : au sein d'une m├кme cat├йgorie, deux connaissances au contenu tr├иs proche
   (ex : "Univers SDZ" et "Fondation SDZ" qui disent la m├кme chose) ne sont inject├йes qu'une fois тАФ
   on garde la plus compl├иte des deux. Bas├й sur une similarit├й de mots, pas seulement un texte identique. */
function quasiDedup(mods){
  const kept = [];
  let removed = 0;
  mods.forEach(m=>{
    const dupIdx = kept.findIndex(k=> k.category===m.category && textSimilarity(k.content, m.content) > 0.6);
    if(dupIdx===-1){ kept.push(m); return; }
    removed++;
    if(m.content.length > kept[dupIdx].content.length) kept[dupIdx] = m;
  });
  return { kept, removed };
}

function selectModulesOrdered(categories, budgetChars){
  const allCats = [...new Set([...ALWAYS_ON_CATEGORIES, ...categories])];
  let mods = selectModules(allCats);
  const totalAvailable = mods.length;
  const lengthBefore = mods.reduce((s,m)=>s+m.content.length, 0);

  // 1. doublons stricts (contenu identique)
  const seen = new Set();
  let strictDuplicates = 0;
  mods = mods.filter(m=>{
    const key = m.category+"|"+m.title+"|"+m.content.trim();
    if(seen.has(key)){ strictDuplicates++; return false; }
    seen.add(key);
    return true;
  });
  // 2. quasi-doublons (id├йe tr├иs proche exprim├йe deux fois)
  const dedupResult = quasiDedup(mods);
  mods = dedupResult.kept;
  const duplicatesRemoved = strictDuplicates + dedupResult.removed;

  // 3. tri selon la hi├йrarchie SDZ
  const rank = c => { const i = HIERARCHY_ORDER.indexOf(c); return i===-1 ? HIERARCHY_ORDER.length : i; };
  mods = mods.map((m,i)=>({m,i})).sort((a,b)=> rank(a.m.category)-rank(b.m.category) || a.i-b.i).map(x=>x.m);

  // 4. paliers de priorit├й + pertinence contextuelle
  const always = mods.filter(m=> moduleTier(m.category)==="always");
  const contextAll = mods.filter(m=> moduleTier(m.category)==="context");
  const rareAll = mods.filter(m=> moduleTier(m.category)==="rare");
  const contextRelevant = contextAll.filter(isContextRelevantNow);
  const contextSkipped = contextAll.filter(m=>!isContextRelevantNow(m));

  // 5. construction budg├йt├йe : toujours en premier, puis contexte pertinent, puis rare (plafonn├й ├а 2)
  const kept = []; const ignored = [];
  let total = 0;
  const tryAdd = (m)=>{
    const len = m.content.length;
    if(kept.length===0 || total+len<=budgetChars){ kept.push(m); total+=len; return true; }
    ignored.push(m); return false;
  };
  always.forEach(tryAdd);
  contextRelevant.forEach(tryAdd);
  let rareAdded = 0;
  rareAll.forEach(m=>{
    if(rareAdded>=2){ ignored.push(m); return; }
    if(tryAdd(m)) rareAdded++;
  });
  ignored.push(...contextSkipped);

  const lengthAfter = kept.reduce((s,m)=>s+m.content.length, 0);
  const gainPercent = lengthBefore>0 ? Math.round((1 - lengthAfter/lengthBefore)*100) : 0;
  const tokensSaved = Math.max(0, Math.round((lengthBefore-lengthAfter)/4));
  // Indice de pertinence : part du contenu inject├й qui est "toujours" ou "contexte pertinent" (par opposition au "rare")
  const highValueCount = always.filter(m=>kept.includes(m)).length + contextRelevant.filter(m=>kept.includes(m)).length;
  const relevanceIndex = kept.length>0 ? Math.round((highValueCount/kept.length)*100) : 100;

  return { kept, ignored, totalAvailable, totalKept: kept.length, duplicatesRemoved,
    lengthBefore, lengthAfter, gainPercent, tokensSaved, relevanceIndex };
}

/* ---------- score qualit├й : mesure automatique + auto-├йvaluation guid├йe ---------- */
function textSimilarity(a, b){
  const words = s => new Set(s.toLowerCase().split(/\W+/).filter(w=>w.length>3));
  const wa = words(a), wb = words(b);
  if(!wa.size || !wb.size) return 0;
  let inter = 0; wa.forEach(w=>{ if(wb.has(w)) inter++; });
  return inter / Math.min(wa.size, wb.size);
}
function computeRepetitionRisk(platform, text){
  if(!text || !text.trim()) return 0;
  const recents = state.history.filter(h=>h.platform===platform && h.textResult).slice(-6);
  if(!recents.length) return 0;
  let max = 0;
  recents.forEach(h=>{ const sim = textSimilarity(text, h.textResult); if(sim>max) max=sim; });
  return Math.round(max*100);
}

/* Empreinte simple (djb2) pour d├йtecter un prompt identique d├йj├а g├йn├йr├й тАФ ├йvite un appel API inutile. */
function hashPrompt(text){
  const t = text || "";
  let h = 5381;
  for(let i=0;i<t.length;i++){ h = ((h*33) ^ t.charCodeAt(i)) >>> 0; }
  return h.toString(36);
}

/* ============================================================
   SYNCHRONISATION SERVEUR (Netlify Blobs) тАФ le localStorage reste la source
   de v├йrit├й locale et le cache principal ; le serveur n'est qu'une sauvegarde
   accessible depuis un autre appareil. Aucune fonctionnalit├й existante n'est
   modifi├йe : ce module lit/├йcrit les m├кmes cl├йs, il ne fait qu'ajouter un aller-retour r├йseau.
============================================================ */
function syncHeaders(){
  const headers = { "Content-Type":"application/json" };
  const secret = localStorage.getItem("vf-sync-secret");
  if(secret) headers["x-sync-secret"] = secret;
  return headers;
}
function gatherSyncData(){
  const data = {};
  SYNC_KEYS.forEach(k=>{ const v = LS.get(k, null); if(v!==null) data[k] = v; });
  return data;
}
function applySyncData(data){
  if(!data || typeof data!=="object") return;
  Object.entries(data).forEach(([k,v])=>{
    if(SYNC_KEYS.includes(k) && v!==undefined && v!==null){
      // ├йcriture directe dans localStorage : on ne veut pas red├йclencher une synchro auto ici
      try{ localStorage.setItem(k, JSON.stringify(v)); }catch(e){}
    }
  });
}
async function pushToServerSilent(){
  try{
    const controller = new AbortController();
    const timeoutId = setTimeout(()=>controller.abort(), 12000);
    const res = await fetch("/.netlify/functions/save-data", {
      method:"POST", headers: syncHeaders(), signal: controller.signal,
      body: JSON.stringify({ data: gatherSyncData(), updatedAt: getLocalUpdatedAt() || Date.now() }),
    });
    clearTimeout(timeoutId);
    if(res.ok){ localStorage.setItem("vf-last-server-sync", String(Date.now())); return true; }
    return false;
  }catch(e){ return false; /* pas de connexion, timeout, ou serveur indisponible : le local reste intact */ }
}
async function checkServerOnLoad(){
  try{
    const res = await fetch("/.netlify/functions/load-data", { method:"GET", headers: syncHeaders() });
    if(!res.ok) return;
    const remote = await res.json();
    if(remote && remote.updatedAt && remote.updatedAt > getLocalUpdatedAt()){
      state.serverHasNewerData = remote;
      renderMain();
    }
  }catch(e){ /* pas de r├йseau au d├йmarrage : on continue avec le localStorage, comme avant */ }
}

/* ---------- SCORE QUALIT├Й (avant g├йn├йration) ----------
   Heuristique locale bas├йe sur des signaux structurels disponibles (pr├йsence de modules,
   longueur, budget de contexte, risques d├йtect├йs, historique r├йcent). Ce n'est PAS un jugement
   s├йmantique тАФ pour une vraie ├йvaluation qualitative, utiliser l'onglet Audit IA (ChatGPT). */
function computeQualityScore({ platform, textPrompt, textMods, imageMods, totalTextAvailable, missionKey }){
  const dims = {};
  const hasMasterCodex = state.modules.some(m=>m.enabled && (m.category==="MASTER SDZ"||m.category==="CODEX SDZ"));
  dims["Respect SDZ"] = hasMasterCodex ? 100 : 60;
  dims["Respect plateforme"] = textMods.some(m=>[platform,"Instagram","Facebook","Google Business","Blog Wix"].includes(m.category)) ? 100 : 75;
  const needsSEO = platform==="Google Business" || platform==="Article Blog Wix";
  dims["Respect SEO"] = !needsSEO ? 100 : (textMods.some(m=>m.category==="SEO") ? 100 : 45);
  dims["Respect conversion"] = (missionKey && MISSIONS[missionKey]) || textMods.some(m=>m.category==="CTA") ? 100 : 65;
  dims["Respect DA"] = daLinesText().length > 40 ? 100 : 55;
  const len = textPrompt.length;
  dims["Longueur"] = len<300 ? 50 : len>7000 ? 55 : 100;
  dims["Doublons"] = 100; // la fusion sans doublons est d├йj├а appliqu├йe en amont
  const risks = currentRiskFlags();
  dims["Risque API"] = Math.max(30, 100 - risks.length*20);
  dims["Lisibilit├й"] = len>0 && len<6000 ? 90 : 65;
  dims["Clart├й"] = (missionKey ? 15 : 0) + (state.prestationName ? 15 : 0) + 70;
  const recentSame = state.history.filter(h=>h.platform===platform).slice(-5);
  dims["Originalit├й"] = recentSame.length>3 ? 70 : 95;

  const values = Object.values(dims).map(v=>Math.min(100,v));
  const global = Math.round(values.reduce((a,b)=>a+b,0) / values.length);
  const weakPoints = Object.entries(dims).filter(([,v])=>v<75).map(([k])=>k);
  return { global, dims, weakPoints };
}

function parseAuditReport(text){

/* V├йrification l├йg├иre (coins de l'image) pour avertir si un logo semble ne pas avoir de fond
   transparent тАФ un PNG transparent est recommand├й pour un rendu propre en surimpression. */
async function checkImageHasTransparency(dataUrl){
  try{
    const img = await loadImage(dataUrl);
    const canvas = document.createElement("canvas");
    canvas.width = img.width; canvas.height = img.height;
    const ctx = canvas.getContext("2d");
    ctx.drawImage(img, 0, 0);
    const corners = [[0,0],[canvas.width-1,0],[0,canvas.height-1],[canvas.width-1,canvas.height-1]];
    for(const [x,y] of corners){
      const [,,,a] = ctx.getImageData(x, y, 1, 1).data;
      if(a < 250) return true; // au moins un coin transparent ou semi-transparent d├йtect├й
    }
    return false;
  }catch(e){
    return true; // en cas de doute (erreur de lecture), ne pas afficher un faux avertissement
  }
}

let canvasEl = null;
function drawCanvas(){
  if(!canvasEl) return;
  const img = state.images.find(i=>i.id===state.selectedId);
  if(!img) return;
  const {w,h} = ASPECTS[state.aspect];
  canvasEl.width = w; canvasEl.height = h;
  const ctx = canvasEl.getContext("2d");
  ctx.clearRect(0,0,w,h);
  loadImage(img.dataUrl).then(async image=>{
    const srcRatio = image.width/image.height, dstRatio = w/h;
    let sx,sy,sw,sh;
    if(srcRatio>dstRatio){ sh=image.height; sw=sh*dstRatio; sx=(image.width-sw)/2; sy=0; }
    else { sw=image.width; sh=sw/dstRatio; sx=0; sy=(image.height-sh)/2; }
    ctx.filter = `brightness(${state.filters.brightness}%) contrast(${state.filters.contrast}%) saturate(${state.filters.saturate}%) grayscale(${state.filters.grayscale}%)`;
    ctx.drawImage(image, sx,sy,sw,sh, 0,0,w,h);
    ctx.filter = "none";
    if(state.overlay.text.trim()){
      const fontSize = (state.overlay.size/100)*(w/10);
      ctx.font = `700 ${fontSize}px Georgia, serif`;
      ctx.fillStyle = state.overlay.color;
      ctx.textAlign = "center"; ctx.textBaseline = "middle";
      ctx.shadowColor = "rgba(0,0,0,0.55)"; ctx.shadowBlur = fontSize*0.15;
      ctx.fillText(state.overlay.text, (state.overlay.x/100)*w, (state.overlay.y/100)*h);
      ctx.shadowBlur = 0;
    }
    if(state.logoOverlay.assetId){
      const asset = state.images.find(i=>i.id===state.logoOverlay.assetId);
      if(asset){
        try{
          const logoImg = await loadImage(asset.dataUrl);
          const logoW = w * (state.logoOverlay.size/100);
          const logoH = logoW * (logoImg.height/logoImg.width);
          const lx = (state.logoOverlay.x/100)*w - logoW/2;
          const ly = (state.logoOverlay.y/100)*h - logoH/2;
          ctx.drawImage(logoImg, lx, ly, logoW, logoH);
        }catch(e){}
      }
    }
  });
}

/* ---------- bloc de retour + score qualit├й, r├йutilis├й pour post simple et campagne ---------- */
function hasLikelyCTA(text, missionKey){
  const t = (text||"").toLowerCase();
  const genericCtas = ["r├йserve","r├йservez","contacte","contactez","d├йcouvre","d├йcouvrez","profite","profitez",
    "appelle","appelez","offre","offrez","r├йservation","rendez-vous","inscri","clique","cliquez","visite","visitez"];
  if(genericCtas.some(w=>t.includes(w))) return true;
  const missionCta = missionKey && MISSIONS[missionKey] && MISSIONS[missionKey].cta;
  if(missionCta){
    const ctaWords = missionCta.toLowerCase().split(/\W+/).filter(w=>w.length>3);
    if(ctaWords.some(w=>t.includes(w))) return true;
  }
  return false;
}

function buildValidationChecklist(ctx){
  const platform = ctx.platform;
  const text = (ctx.getTextResult ? ctx.getTextResult() : "") || "";
  const requiresText = !!ctx.textPrompt;
  const checks = [];

  checks.push({ label:`Format plateforme correct (${PLATFORM_ASPECT[platform]})`, ok: true });
  checks.push({ label: requiresText ? "Texte requis pour cette plateforme : r├йdig├й" : "Texte non requis pour cette plateforme (normal, rien ├а faire)",
    ok: requiresText ? text.trim().length>0 : true });
  checks.push({ label:"Image s├йlectionn├йe pour ce post", ok: !!ctx.hasImage });
  checks.push({ label:"Logo IA interdit dans le prompt (consigne appliqu├йe automatiquement)", ok: true });
  checks.push({ label: wantsRealLogoLabel(platform), ok: !logoRequiredFor(platform) || !!ctx.logoApplied });

  if(requiresText && ctx.prestationName){
    checks.push({ label:`Nom de la prestation repris exactement ("${ctx.prestationName}")`, ok: text.includes(ctx.prestationName) });
  }
  if(requiresText){
    checks.push({ label:"CTA (appel ├а l'action) pr├йsent dans le texte", ok: hasLikelyCTA(text, ctx.missionKey) });
  }
  if(requiresText && platform==="Google Business"){
    checks.push({ label:"Pas de hashtags (non recommand├й pour Google Business)", ok: !text.includes("#") });
    checks.push({ label:"Longueur adapt├йe ├а un r├йsum├й Google Business (150 ├а 300 mots environ)", ok: text.split(/\s+/).filter(Boolean).length>=80 });
  }
  if(requiresText && (platform==="Instagram" || platform==="Facebook")){
    checks.push({ label:"Longueur raisonnable pour un r├йseau social (moins de 2200 caract├иres)", ok: text.length>0 && text.length<2200 });
  }
  if(requiresText && platform==="Article Blog Wix"){
    checks.push({ label:"Article suffisamment d├йvelopp├й pour le SEO (plus de 500 caract├иres)", ok: text.length>500 });
  }
  if(ctx.schedulable !== false && platform!=="Article Blog Wix" && platform!=="Story"){
    checks.push({ label:"Image compatible avec l'envoi automatique ├а Make (servie via image_url)", ok: !!ctx.hasImage });
  }

  const passed = checks.filter(c=>c.ok).length;
  return { checks, passed, total: checks.length, allOk: checks.length>0 && checks.every(c=>c.ok) };
}
function wantsRealLogoLabel(platform){
  return logoRequiredFor(platform) ? "Vrai logo pr├йvu en surimpression (pas un logo dessin├й par l'IA)" : "Logo non requis pour ce format (normal)";
}

  checklist.checks.forEach(c=>{

          const costLabel = cost!=null ? `~$${cost.toFixed(4)}` : "co├╗t non estim├й (tarifs non renseign├йs)";
          if(!confirm(`Lancer la g├йn├йration via ${provider.label} ? Co├╗t estim├й : ${costLabel}.`)) return;
          apiStatus.textContent = "G├йn├йration en cours...";
          const t0 = Date.now();
          try{

    } else {
      frag.appendChild(el("p",{class:"sublabel", style:"margin-top:10px;"}, "Aucun texte s├йpar├й pour ce format : l'accroche fait partie int├йgrante de l'image g├йn├йr├йe ci-dessus."));
    }

    frag.appendChild(buildFeedbackBlock({
      platform, topic: state.topic, imagePrompt: state.imagePrompt, textPrompt: state.textPrompt,
      getTextResult: ()=>state.textPasted,
      hasImage: !!previewImg, logoApplied: !!(previewImg && previewImg.logoApplied),
      prestationName: (state.prestationName && state.prestationName!=="Tous sujets") ? state.prestationName : null, missionKey: state.mission,
      schedulable: platform !== "Article Blog Wix" && platform !== "Story",
    }));

    const isSchedulable = platform !== "Article Blog Wix" && platform !== "Story";
    const requiresTextForSchedule = !!state.textPrompt;
    const contentReady = previewImg && (!requiresTextForSchedule || state.textPasted.trim());
    if(contentReady){
      if(isSchedulable){

        frag.appendChild(el("p",{class:"sublabel"},"Texte et image valid├йs ? Choisis une date et une heure тАФ Make ne sera d├йclench├й qu'├а ce moment pr├йcis, jamais avant."));
        const dateInput = el("input",{type:"datetime-local", value: state.scheduleDate || "", style:"width:100%;background:var(--card);border:1px solid var(--border);border-radius:10px;padding:9px 12px;font-size:14px;margin-bottom:10px;"});

         try{

          if(!previewImg || !previewImg.dataUrl){ schedMsg.style.color="var(--coral)"; schedMsg.textContent="Erreur : aucune image valide s├йlectionn├йe pour ce post."; return; }
          const scheduledAt = new Date(state.scheduleDate).getTime();
          if(isNaN(scheduledAt)){ schedMsg.style.color="var(--coral)"; schedMsg.textContent="Date invalide, r├йessaie."; return; }
          const newPost = {

            textFinal: state.textPasted, imageDataUrl: previewImg.dataUrl, schedulable: true,
            scheduledAt, status: "programm├й", createdAt: Date.now(), sentAt: null, error: null,

          const savedLocally = LS.set("vf-scheduled", state.scheduled);
          if(!savedLocally){

            schedMsg.style.color = "var(--coral)";
            schedMsg.textContent = "├Йchec : stockage du t├йl├йphone plein (trop de photos enregistr├йes). Supprime d'anciens posts envoy├йs ou des images de la biblioth├иque, puis r├йessaie.";
            renderMain();
            return;
          }
          state.scheduleDate = "";
          schedMsg.style.color = "var(--muted2)";

          const ok = await pushToServerSilent();
          if(ok){
            schedMsg.style.color = "var(--green)";
            schedMsg.textContent = "Post programm├й тЬУ тАФ envoy├й au serveur, visible dans l'onglet Calendrier.";
          } else {
            schedMsg.style.color = "var(--coral)";
            schedMsg.textContent = "Post programm├й localement, mais la synchro serveur a ├йchou├й тАФ va dans R├йglages тЖТ \"Sauvegarder sur serveur\" avant de fermer l'appli.";
          }
         }catch(e){
            schedMsg.style.color = "var(--coral)";
            schedMsg.textContent = "Erreur inattendue : " + String(e && e.message || e);
         }
        }}, [svgIcon(ICONS.sparkles,16), el("span",{},"Programmer ce post")]));
        frag.appendChild(el("button",{class:"btn-ghost", style:"margin-bottom:10px;", onclick:()=>{
          state.scheduled.push({
            id: uid(), platform, mission: state.mission, topic: state.topic,
            textFinal: state.textPasted, imageDataUrl: previewImg.dataUrl, schedulable: true,
            scheduledAt: null, status: "brouillon", createdAt: Date.now(), sentAt: null, error: null,
          });
          LS.set("vf-scheduled", state.scheduled);
          schedMsg.style.color = "var(--green)";
          schedMsg.textContent = "Enregistr├й comme brouillon тЬУ тАФ tu pourras lui donner une date plus tard.";
        }}, "Enregistrer comme brouillon (sans date pour l'instant)"));
        frag.appendChild(schedMsg);
      } else {
        frag.appendChild(el("h2",{class:"section"},"Publication manuelle"));
        const manualHint = platform==="Story"
          ? "Story non automatisable via Make тАФ t├йl├йcharge l'image et publie-la toi-m├кme en story sur Instagram et/ou Facebook."
          : `${platform} n'est pas automatisable via Make тАФ copie le texte (s'il y en a) et t├йl├йcharge l'image, puis publie-les toi-m├кme.`;
        frag.appendChild(el("p",{class:"sublabel"}, manualHint));
        const manualMsg = el("p",{style:"font-size:12px;color:var(--green);min-height:16px;"},"");
        if(requiresTextForSchedule) frag.appendChild(copyBtnFor(()=>state.textPasted));
        frag.appendChild(el("button",{class:"btn-secondary", style:"margin:6px 0;", onclick:()=>{
          const link = document.createElement("a");
          link.download = `${platform.toLowerCase().replace(/\s+/g,"-")}-${uid()}.jpg`;
          link.href = previewImg.dataUrl;
          link.click();
        }}, [svgIcon(ICONS.download,14), el("span",{},"T├йl├йcharger l'image")]));
        frag.appendChild(el("button",{class:"btn-ghost", style:"margin:6px 0;display:block;", onclick:()=>{
          state.scheduled.push({
            id: uid(), platform, mission: state.mission, topic: state.topic,

            scheduledAt: null, status: "valid├й", createdAt: Date.now(), sentAt: null, error: null,
          });
          LS.set("vf-scheduled", state.scheduled);
          manualMsg.textContent = "Archiv├й dans le Calendrier тЬУ (statut Valid├й, pour garder une trace).";
          renderMain();
        }}, "Garder une trace dans le Calendrier"));
        frag.appendChild(manualMsg);
      }
    }
  }

  return frag;
}

/* ============================================================

const SCHEDULE_STATUS_LABEL = { "brouillon":"ЁЯУЭ Brouillon", "valid├й":"тШСя╕П Valid├й", "programm├й":"тП│ Programm├й", "envoy├й":"тЬЕ Envoy├й", "erreur":"тЪая╕П Erreur" };
function buildCalendarCard(item, inCampaign){
  const card = el("div",{class:"history-card"});
  card.appendChild(el("div",{class:"history-top"},[
    el("span",{}, `${item.platform} ┬╖ ${item.mission||"тАФ"}`),
    el("span",{}, SCHEDULE_STATUS_LABEL[item.status]||item.status),
  ]));
  card.appendChild(el("div",{style:"font-size:13px;color:var(--muted);margin-bottom:6px;"}, item.topic));
  if(item.scheduledAt) card.appendChild(el("div",{style:"font-size:12px;color:var(--muted2);"}, `Programm├й pour : ${new Date(item.scheduledAt).toLocaleString("fr-FR")}`));
  if(item.sentAt) card.appendChild(el("div",{style:"font-size:12px;color:var(--green);"}, `Envoy├й le : ${new Date(item.sentAt).toLocaleString("fr-FR")}`));
  if(item.error) card.appendChild(el("div",{style:"font-size:12px;color:var(--coral);"}, `Erreur : ${item.error}`));

  const requiresText = !!item.textPrompt;
  const needsContent = inCampaign && ((requiresText && (!item.textFinal || !item.textFinal.trim())) || !item.imageDataUrl);
  if(needsContent){
    card.appendChild(el("p",{class:"label", style:"margin-top:10px;"}, "Prompt image"));
    card.appendChild(vfWrap(el("div",{class:"card", style:"margin-bottom:6px;"},[el("pre",{}, item.imagePrompt)])));
    card.appendChild(copyBtnFor(()=>item.imagePrompt));

    const imgApiStatus = el("p",{style:"font-size:12px;color:var(--muted2);min-height:16px;margin:4px 0;"},"");
    const openaiProvider = state.apiProviders.find(p=>p.kind==="openai-compatible" && (p.baseUrl||"").includes("api.openai.com")) || DEFAULT_OPENAI_PROVIDER;
    if(openaiProvider){
      const imgApiBtn = el("button",{class:"btn-secondary", style:"margin:6px 0;"}, [svgIcon(ICONS.wand,14), el("span",{},"G├йn├йrer l'image via l'API")]);
      imgApiBtn.addEventListener("click", async ()=>{
        if(!confirm("Lancer la g├йn├йration d'image via OpenAI ? Ceci consomme du cr├йdit API.")) return;
        imgApiStatus.textContent = "G├йn├йration en cours (peut prendre 10-20 s)...";
        const t0 = Date.now();
        const aspectKey = PLATFORM_ASPECT[item.platform];
        const ratio = ASPECTS[aspectKey].w / ASPECTS[aspectKey].h;
        const size = ratio > 1.15 ? "1792x1024" : ratio < 0.85 ? "1024x1792" : "1024x1024";
        try{
          let dataUrl = await callProviderImage(item.imagePrompt, size);
          let logoApplied = false;
          if(logoRequiredFor(item.platform)){
            const composited = await compositeBrandSignature(dataUrl, item.platform);
            dataUrl = composited.dataUrl; logoApplied = composited.applied;
          }
          item.imageDataUrl = dataUrl; item.logoApplied = logoApplied;
          const saved = LS.set("vf-scheduled", state.scheduled);
          logToLab({ provider:"OpenAI", model:"gpt-image-1-mini", type:"image", prompt:item.imagePrompt, promptHash:hashPrompt(item.imagePrompt), cost:null, durationMs:Date.now()-t0, status:"accepted" });
          imgApiStatus.textContent = !saved ? "G├йn├йr├йe, mais ├йchec d'enregistrement (stockage plein ?)."
            : logoRequiredFor(item.platform) ? (logoApplied ? "Image g├йn├йr├йe, logo r├йel appliqu├й тЬУ" : "Image g├йn├йr├йe тАФ aucun logo marqu├й comme actif de marque, rien n'a ├йt├й ajout├й.")
            : "Image g├йn├йr├йe тЬУ";
          renderMain();
        }catch(err){
          imgApiStatus.textContent = `├Йchec (${err.message||err}) тАФ utilise l'import manuel ci-dessous.`;
        }
      });
      card.appendChild(imgApiBtn);
    }
    const imgFileInput = el("input",{type:"file", accept:"image/*", style:"display:none"});
    imgFileInput.addEventListener("change", async (e)=>{
      const file = e.target.files[0]; if(!file) return;
      let dataUrl = await resizeImageFile(file);
      let logoApplied = false;
      if(logoRequiredFor(item.platform)){
        const composited = await compositeBrandSignature(dataUrl, item.platform);
        dataUrl = composited.dataUrl; logoApplied = composited.applied;
      }
      item.imageDataUrl = dataUrl; item.logoApplied = logoApplied;
      const saved = LS.set("vf-scheduled", state.scheduled);
      imgApiStatus.textContent = !saved ? "Import├йe, mais ├йchec d'enregistrement (stockage plein ?)."
        : logoRequiredFor(item.platform) ? (logoApplied ? "Image import├йe, logo r├йel appliqu├й тЬУ" : "Image import├йe тАФ aucun logo marqu├й comme actif de marque, rien n'a ├йt├й ajout├й.")
        : "Image import├йe тЬУ";
      renderMain();
    });
    card.appendChild(imgFileInput);
    card.appendChild(el("button",{class:"btn-secondary", style:"margin:6px 0;", onclick:()=>imgFileInput.click()}, [svgIcon(ICONS.upload,14), el("span",{},"Importer une image")]));
    card.appendChild(imgApiStatus);

    if(item.textPrompt){
      card.appendChild(el("p",{class:"label", style:"margin-top:10px;"}, "Prompt texte"));
      card.appendChild(vfWrap(el("div",{class:"card", style:"margin-bottom:6px;"},[el("pre",{}, item.textPrompt)])));
      card.appendChild(copyBtnFor(()=>item.textPrompt));
      const pastedArea = el("textarea",{rows:"4", placeholder:"Colle ici la r├йponse texte de ChatGPT...", style:"margin:6px 0;"}, item.textFinal);
      pastedArea.addEventListener("input", e=>{ item.textFinal = e.target.value; LS.set("vf-scheduled", state.scheduled); });
      card.appendChild(pastedArea);
    }

    const checklist = buildValidationChecklist({
      platform: item.platform, textPrompt: item.textPrompt, getTextResult: ()=>item.textFinal,
      hasImage: !!item.imageDataUrl, logoApplied: !!item.logoApplied, prestationName: null,
      missionKey: item.mission, schedulable: item.schedulable,
    });
    if(checklist.total>0){
      card.appendChild(el("p",{class:"label", style:"margin-top:10px;"}, "Checklist"));
      checklist.checks.forEach(c=>{
        card.appendChild(el("div",{class:"learning-row", style:`color:${c.ok?"var(--green)":"var(--coral)"};font-size:12px;`}, `${c.ok?"тЬЕ":"тЪая╕П"} ${c.label}`));
      });
    }

    const validateMsg = el("p",{style:"font-size:12px;color:var(--coral);min-height:14px;margin:4px 0;"},"");
    card.appendChild(el("button",{class:"btn-secondary", style:"margin-bottom:6px;", onclick: async ()=>{
      if((requiresText && (!item.textFinal || !item.textFinal.trim())) || !item.imageDataUrl){
        validateMsg.textContent = requiresText ? "Texte et image requis avant de valider." : "Image requise avant de valider.";
        return;
      }
      item.status = "valid├й";
      const ok = pushToServerSilentSafe();
      LS.set("vf-scheduled", state.scheduled);
      validateMsg.style.color = "var(--green)";
      validateMsg.textContent = "Valid├й тЬУ";
      renderMain();
    }}, "тШСя╕П Valider ce contenu"));
    card.appendChild(validateMsg);
  }

  const row = el("div",{style:"display:flex;gap:10px;align-items:flex-start;margin-top:8px;"});
  if(item.imageDataUrl) row.appendChild(el("img",{src:item.imageDataUrl, style:"width:70px;height:70px;object-fit:cover;border-radius:8px;flex-shrink:0;"}));
  row.appendChild(el("div",{style:"font-size:12px;color:var(--muted);flex:1;white-space:pre-wrap;"}, (item.textFinal||"").slice(0,180)+((item.textFinal||"").length>180?"...":"")));
  card.appendChild(row);

  const actionsRow = el("div",{style:"display:flex;gap:8px;margin-top:10px;flex-wrap:wrap;"});
  const isSchedulable = item.schedulable !== false;
  if(isSchedulable){
    if(item.status==="brouillon" || item.status==="valid├й" || item.status==="erreur"){
      const dt = el("input",{type:"datetime-local", style:"flex:1;background:var(--card);border:1px solid var(--border);border-radius:8px;padding:6px 8px;font-size:12px;"});
      dt.addEventListener("change", e=>{
        item.scheduledAt = new Date(e.target.value).getTime();
        item.status = "programm├й"; item.error = null;
        LS.set("vf-scheduled", state.scheduled);
        pushToServerSilentSafe();
        renderMain();
      });
      actionsRow.appendChild(dt);
    }
    if(item.status==="programm├й"){
      actionsRow.appendChild(el("button",{class:"btn-small", onclick:()=>{
        item.status="brouillon"; item.scheduledAt=null;
        LS.set("vf-scheduled", state.scheduled); renderMain();
      }}, "Retirer la date"));
    }
  } else {
    const hint = item.platform==="Story"
      ? "Story non programmable тАФ t├йl├йcharge l'image et publie-la toi-m├кme en story sur Instagram et/ou Facebook."
      : "Article non programmable тАФ copie le texte et t├йl├йcharge l'image, puis publie-les toi-m├кme dans Wix.";
    card.appendChild(el("p",{class:"sublabel", style:"margin:6px 0;"}, hint));
    if(item.textFinal) actionsRow.appendChild(copyBtnFor(()=>item.textFinal||""));
    if(item.imageDataUrl){
      actionsRow.appendChild(el("button",{class:"btn-small", onclick:()=>{
        const link = document.createElement("a");
        link.download = `${(item.platform||"blog").toLowerCase().replace(/\s+/g,"-")}-${item.id}.jpg`;
        link.href = item.imageDataUrl;
        link.click();
      }}, "T├йl├йcharger l'image"));
    }
  }
  actionsRow.appendChild(el("button",{class:"btn-small", onclick:()=>{
    if(!confirm("Supprimer d├йfinitivement ce post de l'archive ?")) return;
    state.scheduled = state.scheduled.filter(s=>s.id!==item.id);
    LS.set("vf-scheduled", state.scheduled); renderMain();
  }}, svgIcon(ICONS.trash,12)));
  card.appendChild(actionsRow);

  return card;
}

}

    }catch(e){ actionMsg.style.color="var(--coral)"; actionMsg.textContent="├Йchec de connexion au webhook : "+String(e.message||e); }
  }}, "ЁЯзк Tester le webhook"));

  actionsRow.appendChild(el("button",{class:"btn-small", onclick: async ()=>{
    actionMsg.style.color="var(--muted2)"; actionMsg.textContent="D├йclenchement de l'envoi en cours...";

      const res = await fetch("/.netlify/functions/check-scheduled-posts");
      const result = await res.json();
      actionMsg.style.color="var(--green)";
      actionMsg.textContent = `V├йrifi├й : ${result.checked||0} post(s) au total, ${result.due||0} ├йligible(s), ${result.sent||0} envoy├й(s), ${result.errors||0} erreur(s).`;
    }catch(e){ actionMsg.style.color="var(--coral)"; actionMsg.textContent="├Йchec : "+String(e.message||e); }
    renderMain();
  }}, "ЁЯЪА Envoyer maintenant"));

  actionsRow.appendChild(el("button",{class:"btn-small", onclick:()=>{
    let count = 0;
    state.scheduled.forEach(p=>{
      if(p.status!=="brouillon") return;
      const requiresText = !!p.textPrompt;
      const ready = (!requiresText || (p.textFinal && p.textFinal.trim())) && p.imageDataUrl;
      if(ready){ p.status="valid├й"; count++; }
    });
    LS.set("vf-scheduled", state.scheduled);
    pushToServerSilentSafe();
    actionMsg.style.color = count ? "var(--green)" : "var(--amber)";
    actionMsg.textContent = count ? `${count} contenu(s) valid├й(s) тЬУ` : "Aucun contenu pr├кt ├а valider (image requise partout, texte requis sauf pour les Stories).";
    renderMain();
  }}, "тШСя╕П Valider la campagne"));

  frag.appendChild(actionsRow);
  frag.appendChild(actionMsg);

  if(!state.scheduled.length){
    frag.appendChild(el("p",{class:"hint"},"Aucun post programm├й ou en brouillon pour l'instant. G├йn├иre un post dans \"Cr├йer un post\" (seul ou en campagne compl├иte), valide le texte et l'image, puis programme-le."));
    return frag;
  }

  const campaignIds = [...new Set(state.scheduled.filter(p=>p.campaignId).map(p=>p.campaignId))]
    .sort((a,b)=>{
      const ca = state.scheduled.find(p=>p.campaignId===a) || {};
      const cb = state.scheduled.find(p=>p.campaignId===b) || {};
      return (cb.createdAt||0)-(ca.createdAt||0);
    });

  campaignIds.forEach(cid=>{
    const items = state.scheduled.filter(p=>p.campaignId===cid);
    const topic = items[0].campaignTopic || items[0].topic || "(sans th├иme)";
    frag.appendChild(el("h2",{class:"section"}, `ЁЯУж Campagne тАФ ${topic.length>60 ? topic.slice(0,60)+"..." : topic}`));
    items.forEach(item=> frag.appendChild(buildCalendarCard(item, true)));
  });

  const standalone = state.scheduled.filter(p=>!p.campaignId);
  if(standalone.length){
    if(campaignIds.length) frag.appendChild(el("h2",{class:"section"},"Posts individuels"));
    const sorted = standalone.slice().sort((a,b)=>{
      const order = {"programm├й":0, "valid├й":1, "brouillon":2, "erreur":3, "envoy├й":4};
      if(order[a.status]!==order[b.status]) return order[a.status]-order[b.status];
      return (a.scheduledAt||Infinity) - (b.scheduledAt||Infinity);
    });
    sorted.forEach(item=> frag.appendChild(buildCalendarCard(item, false)));
  }

  return frag;
}

/* ============================================================
   PACK PRODUCTION SDZ тАФ import d├йfinitif, transactionnel, versionn├й
============================================================ */
const KNOWN_PACK_TYPES = ["MASTER_PRODUCTION_SDZ","MASTER_IMAGE_SDZ","MASTER_CAMPAIGN_SDZ","MASTER_DIRECTION_ARTISTIQUE","STYLES"];
const MODULE_PACK_TYPES = ["MASTER_PRODUCTION_SDZ","MASTER_IMAGE_SDZ","MASTER_CAMPAIGN_SDZ"]; // les 3 packs "164 modules", fig├йs
const PACK_TARGETS = { "MASTER_PRODUCTION_SDZ":48, "MASTER_IMAGE_SDZ":62, "MASTER_CAMPAIGN_SDZ":54 };
const PACK_LABELS = { "MASTER_PRODUCTION_SDZ":"MASTER PRODUCTION", "MASTER_IMAGE_SDZ":"MASTER IMAGE", "MASTER_CAMPAIGN_SDZ":"MASTER CAMPAIGN",
  "MASTER_DIRECTION_ARTISTIQUE":"DIRECTION ARTISTIQUE", "STYLES":"STYLES" };

function compareVersions(a,b){
  const pa = parseFloat(a), pb = parseFloat(b);
  if(isNaN(pa) || isNaN(pb)) return 0;
  if(pa===pb) return 0;
  return pa<pb ? -1 : 1;
}

/* Validation stricte AVANT toute ├йcriture : un fichier structurellement invalide, ou contenant
   ne serait-ce qu'un seul module incomplet, est int├йgralement rejet├й (tout ou rien). */
function validatePackFile(raw){
  const structuralErrors = [];
  if(!raw || typeof raw!=="object") return { valid:false, structuralErrors:["Le fichier ne contient pas un objet JSON valide."], moduleErrors:[] };
  if(!raw.packType) structuralErrors.push('Champ "packType" manquant.');
  else if(!KNOWN_PACK_TYPES.includes(raw.packType)) structuralErrors.push(`packType "${raw.packType}" non reconnu (attendu : ${KNOWN_PACK_TYPES.join(", ")}).`);

  const moduleErrors = [];
  const packType = raw.packType;

  if(packType==="MASTER_DIRECTION_ARTISTIQUE"){
    if(!raw.direction_artistique || typeof raw.direction_artistique!=="object" || Array.isArray(raw.direction_artistique)){
      structuralErrors.push('Champ "direction_artistique" manquant ou n\'est pas un objet.');
    }
  } else if(packType==="STYLES"){
    if(!Array.isArray(raw.styles)) structuralErrors.push('Champ "styles" manquant ou n\'est pas une liste.');
    else raw.styles.forEach((s,i)=>{
      const label = (s && s.name && String(s.name).trim()) || `style #${i+1}`;
      if(!s || typeof s!=="object"){ moduleErrors.push({title:label, reason:"n'est pas un objet valide"}); return; }
      if(!s.name || !String(s.name).trim()) moduleErrors.push({title:label, reason:"nom manquant"});
    });
  } else {
    // MASTER_PRODUCTION_SDZ / MASTER_IMAGE_SDZ / MASTER_CAMPAIGN_SDZ : liste de modules
    if(!Array.isArray(raw.modules)) structuralErrors.push('Champ "modules" manquant ou n\'est pas une liste.');
    else raw.modules.forEach((m,i)=>{
      const label = (m && m.title && String(m.title).trim()) || `module #${i+1}`;
      if(!m || typeof m!=="object"){ moduleErrors.push({title:label, reason:"n'est pas un objet valide"}); return; }
      if(!m.category || !String(m.category).trim()) moduleErrors.push({title:label, reason:"cat├йgorie manquante"});
      if(!m.title || !String(m.title).trim()) moduleErrors.push({title:label, reason:"titre manquant"});
      if(!m.content || !String(m.content).trim()) moduleErrors.push({title:label, reason:"contenu manquant"});
    });
  }
  return { valid: structuralErrors.length===0 && moduleErrors.length===0, structuralErrors, moduleErrors };
}

/* Analyse un fichier d├йj├а valid├й. dryRun=true (Mode Test) ne touche jamais ├а state.modules/state.da/state.styles. */
function analyzePackFile(raw, dryRun){
  const packType = raw.packType;
  const incomingVersion = String(raw.version || "1.0");
  const installedVersionBefore = state.packVersions[packType] || null;
  const versionComparison = installedVersionBefore ? compareVersions(installedVersionBefore, incomingVersion) : null;

  if(packType==="MASTER_DIRECTION_ARTISTIQUE"){
    let added=0, updated=0, identical=0;
    const moduleResults = [];
    Object.keys(raw.direction_artistique).forEach(k=>{
      const incomingVal = raw.direction_artistique[k];
      if(incomingVal==null || incomingVal==="") return;
      const currentVal = state.da[k];
      const wasEmpty = currentVal===undefined || currentVal===null || currentVal==="";
      const changed = JSON.stringify(currentVal) !== JSON.stringify(incomingVal);
      if(!changed){ identical++; moduleResults.push({title:k, status:"identical"}); return; }
      if(!dryRun) state.da[k] = incomingVal;
      if(wasEmpty){ added++; moduleResults.push({title:k, status:"added"}); }
      else { updated++; moduleResults.push({title:k, status:"updated"}); }
    });
    if(!dryRun) state.packVersions[packType] = incomingVersion;
    return {
      packType, version:incomingVersion, installedVersionBefore, versionComparison,
      modulesRead: Object.keys(raw.direction_artistique).length, added, updated, identical, ignored:0,
      moduleResults, unknownCategories:[], daUpdated: added+updated,
    };
  }

  if(packType==="STYLES"){
    let added=0, updated=0, identical=0;
    const moduleResults = [];
    const META_FIELDS = ["id","createdAt","updatedAt","sourcePack","packVersion"];
    const stripMeta = (obj)=>{ const c={...obj}; META_FIELDS.forEach(f=>delete c[f]); return c; };
    raw.styles.forEach(s=>{
      const name = String(s.name).trim();
      const incoming = stripMeta({ ...s, name });
      const existing = state.styles.find(x=>(x.name||"").trim().toLowerCase()===name.toLowerCase());
      if(existing){
        const existingComparable = stripMeta(existing);
        if(JSON.stringify(existingComparable) !== JSON.stringify(incoming)){
          if(!dryRun){ Object.assign(existing, incoming); existing.updatedAt = Date.now(); existing.sourcePack = packType; existing.packVersion = incomingVersion; }
          updated++; moduleResults.push({title:name, status:"updated"});
        } else {
          identical++; moduleResults.push({title:name, status:"identical"});
        }
      } else {
        if(!dryRun) state.styles.push({ id: uid(), ...incoming, createdAt:Date.now(), sourcePack:packType, packVersion:incomingVersion });
        added++; moduleResults.push({title:name, status:"added"});
      }
    });
    if(!dryRun) state.packVersions[packType] = incomingVersion;
    return {
      packType, version:incomingVersion, installedVersionBefore, versionComparison,
      modulesRead: raw.styles.length, added, updated, identical, ignored:0,
      moduleResults, unknownCategories:[], daUpdated:0,
    };
  }

  // MASTER_PRODUCTION_SDZ / MASTER_IMAGE_SDZ / MASTER_CAMPAIGN_SDZ : liste de modules (comportement historique, inchang├й)
  let added=0, updated=0, identical=0;
  const moduleResults = [];
  const unknownCategories = new Set();

  raw.modules.forEach(m=>{
    const title = String(m.title).trim(), content = String(m.content).trim(), category = String(m.category).trim();
    if(!CATEGORIES.includes(category)) unknownCategories.add(category);
    const existing = state.modules.find(x=>x.title.trim().toLowerCase()===title.toLowerCase() && x.category===category);
    if(existing){
      if(existing.content.trim() !== content){
        if(!dryRun){ existing.content = content; existing.updatedAt = Date.now(); existing.sourcePack = packType; existing.packVersion = incomingVersion; }
        updated++; moduleResults.push({title, status:"updated"});
      } else {
        identical++; moduleResults.push({title, status:"identical"});
      }
    } else {
      if(!dryRun) state.modules.push({ id: uid(), category, title, content, enabled:true, createdAt:Date.now(), sourcePack:packType, packVersion:incomingVersion });
      added++; moduleResults.push({title, status:"added"});
    }
  });

  let daUpdated = 0;
  if(!dryRun && raw.direction_artistique && typeof raw.direction_artistique==="object"){
    Object.keys(raw.direction_artistique).forEach(k=>{
      if(raw.direction_artistique[k]!=null && raw.direction_artistique[k]!==""){ state.da[k]=raw.direction_artistique[k]; daUpdated++; }
    });
  }
  if(!dryRun) state.packVersions[packType] = incomingVersion;

  return {
    packType, version:incomingVersion, installedVersionBefore, versionComparison,
    modulesRead: raw.modules.length, added, updated, identical, ignored:0,
    moduleResults, unknownCategories:[...unknownCategories], daUpdated,
  };
}

/* Traite un fichier de bout en bout : parsing тЖТ validation stricte (tout ou rien) тЖТ analyse. */
async function processPackFile(file, dryRun){
  let raw;
  try{ raw = JSON.parse(await file.text()); }
  catch(err){ return { fileName:file.name, ok:false, packType:null, structuralErrors:[`JSON invalide : ${err.message}`], moduleErrors:[] }; }

  const validation = validatePackFile(raw);
  if(!validation.valid){
    return { fileName:file.name, ok:false, packType:raw.packType||null, structuralErrors:validation.structuralErrors, moduleErrors:validation.moduleErrors };
  }
  const result = analyzePackFile(raw, dryRun);
  return { fileName:file.name, ok:true, ...result };
}

function formatPackReportText(r){
  const lines = [];
  lines.push("==================================================");
  lines.push(dryRun_marker(r));
  lines.push("");
  lines.push(`Fichier : ${r.fileName}`);
  if(!r.ok){
    lines.push(`Statut : тЬЦ REJET├Й (aucune modification appliqu├йe)`);
    if(r.structuralErrors && r.structuralErrors.length){
      lines.push("");
      lines.push("Erreurs de structure :");
      r.structuralErrors.forEach(e=> lines.push(`тЬЦ ${e}`));
    }
    if(r.moduleErrors && r.moduleErrors.length){
      lines.push("");
      lines.push("Modules invalides :");
      r.moduleErrors.forEach(e=> lines.push(`тЬЦ ${e.title} тАФ ${e.reason}`));
    }
    lines.push("==================================================");
    return lines.join("\n");
  }
  lines.push(`Pack : ${r.packType}  (v${r.version})`);
  if(r.installedVersionBefore){
    if(r.versionComparison===0) lines.push(`Version : identique ├а celle d├йj├а install├йe (v${r.installedVersionBefore}) тАФ d├йj├а ├а jour.`);
    else if(r.versionComparison<0) lines.push(`Version : mise ├а jour v${r.installedVersionBefore} тЖТ v${r.version}.`);
    else lines.push(`тЪа Version : le pack import├й (v${r.version}) est PLUS ANCIEN que celui d├йj├а install├й (v${r.installedVersionBefore}).`);
  } else {
    lines.push(`Version : premi├иre installation de ce pack (v${r.version}).`);
  }
  lines.push(`Date : ${new Date().toLocaleString("fr-FR")}`);
  lines.push("");
  lines.push(`Modules lus : ${r.modulesRead}`);
  lines.push(`Ajout├йs : ${r.added}`);
  lines.push(`Mis ├а jour : ${r.updated}`);
  lines.push(`D├йj├а identiques : ${r.identical}`);
  lines.push(`Ignor├йs : ${r.ignored}`);
  lines.push(`Erreurs : 0`);
  if(r.unknownCategories && r.unknownCategories.length) lines.push(`тЪа Cat├йgories non reconnues : ${r.unknownCategories.join(", ")}`);
  if(!dryRunFlagFromReport(r)) lines.push(`Synchronisation serveur : ${r.blobsStatus==="ok"?"тЬФ OK":r.blobsStatus==="failed"?"тЪа ├йchec (local conserv├й)":"тАФ"}`);
  lines.push("==================================================");
  lines.push("");
  r.moduleResults.forEach(mr=>{
    const mark = mr.status==="added" ? "тЬФ (ajout├й)" : mr.status==="updated" ? "тЬФ (mis ├а jour)" : "тЬФ (d├йj├а identique)";
    lines.push(`${mark} ${mr.title}`);
  });
  return lines.join("\n");
}
function dryRun_marker(r){ return r.isDryRun ? `TEST PACK SDZ (aucune donn├йe modifi├йe)` : `IMPORT PACK SDZ`; }
function dryRunFlagFromReport(r){ return !!r.isDryRun; }

    reports.filter(r=>r.ok).forEach(r=>{
      state.packHistory.unshift({
        id: uid(), packType:r.packType, version:r.version, fileName:r.fileName, importedAt: Date.now(),
        modulesRead:r.modulesRead, added:r.added, updated:r.updated, identical:r.identical,
        errors: 0, blobsStatus,
      });
    });
    reports.filter(r=>!r.ok).forEach(r=>{
      state.packHistory.unshift({
        id: uid(), packType:r.packType||"(inconnu)", version:null, fileName:r.fileName, importedAt: Date.now(),
        modulesRead:0, added:0, updated:0, identical:0,
        errors: (r.structuralErrors||[]).length + (r.moduleErrors||[]).length, blobsStatus:"skipped",
      });
    });
    state.packHistory = state.packHistory.slice(0,50);
    LS.set("vf-pack-imports", state.packHistory);

    showPackReports(reports);
    packMsg.style.color = synced ? "var(--green)" : "var(--coral)";
    packMsg.textContent = blobsStatus==="ok" ? "тЬФ Sauvegarde serveur r├йussie."
      : blobsStatus==="failed" ? "тЪа Sauvegarde serveur impossible тАФ les donn├йes restent enregistr├йes en local, r├йessaie depuis \"Sauvegarder sur serveur\" plus haut."
      : "Aucune modification ├а sauvegarder (fichiers d├йj├а ├а jour ou rejet├йs).";
    renderMain();
  }

  const packFileInput = el("input",{type:"file", accept:".json,application/json", multiple:true, style:"display:none"});
  packFileInput.addEventListener("change", async (e)=>{
    const files = Array.from(e.target.files||[]);
    if(!files.length) return;
    await runPackImport(files, false);
    packFileInput.value = "";
  });
  frag.appendChild(packFileInput);
  frag.appendChild(el("button",{class:"btn-primary", style:"margin-bottom:8px;", onclick:()=>packFileInput.click()}, [svgIcon(ICONS.upload,16), el("span",{},"Importer Pack SDZ")]));

  const testFileInput = el("input",{type:"file", accept:".json,application/json", multiple:true, style:"display:none"});
  testFileInput.addEventListener("change", async (e)=>{
    const files = Array.from(e.target.files||[]);
    if(!files.length) return;
    await runPackImport(files, true);
    testFileInput.value = "";
  });
  frag.appendChild(testFileInput);
  frag.appendChild(el("button",{class:"btn-secondary", style:"margin-bottom:12px;", onclick:()=>testFileInput.click()}, [svgIcon(ICONS.sparkles,14), el("span",{},"Tester un Pack (sans importer)")]));

  frag.appendChild(packMsg);
  frag.appendChild(packReportBox);

  if(state.packHistory.length){
    frag.appendChild(el("p",{class:"label", style:"margin-top:6px;"}, "Historique des imports"));
    state.packHistory.slice(0,15).forEach(h=>{
      const ok = h.errors===0 && h.blobsStatus!=="skipped-error";
      frag.appendChild(el("div",{class:"history-card", style:"padding:8px 10px;margin-bottom:6px;"},[
        el("div",{class:"history-top", style:"font-size:12px;"},[
          el("span",{}, `${new Date(h.importedAt).toLocaleString("fr-FR")} ┬╖ ${PACK_LABELS[h.packType]||h.packType}${h.version?` v${h.version}`:""}`),
          el("span",{style:`color:${h.errors>0?"var(--coral)":"var(--green)"};`}, h.errors>0 ? `тЪа ${h.errors} erreur(s)` : "тЬФ Succ├иs"),
        ]),
        el("div",{style:"font-size:11px;color:var(--muted2);"}, h.errors>0
          ? `Fichier rejet├й (${h.fileName})`
          : `${h.modulesRead} module(s) lus ┬╖ ${h.added} ajout├й(s) ┬╖ ${h.updated} mis ├а jour ┬╖ sauvegarde serveur : ${h.blobsStatus==="ok"?"тЬФ":h.blobsStatus==="failed"?"тЪа":"тАФ"}`),
      ]));
    });
  }

  frag.appendChild(el("p",{class:"label", style:"margin-top:10px;"}, "Exporter la Direction artistique / les Styles"));
  frag.appendChild(el("p",{class:"sublabel"}, "G├йn├иre un fichier au m├кme format que celui attendu ├а l'import тАФ pratique pour sauvegarder l'├йtat actuel, le transf├йrer, ou repartir d'une base pour la faire ├йvoluer avec ChatGPT."));
  const exportRow = el("div",{style:"display:flex;gap:8px;flex-wrap:wrap;margin-bottom:16px;"});
  exportRow.appendChild(el("button",{class:"btn-secondary", style:"flex:1;", onclick:()=>{
    const payload = { packType:"MASTER_DIRECTION_ARTISTIQUE", version: state.packVersions["MASTER_DIRECTION_ARTISTIQUE"]||"1.0", direction_artistique: state.da };
    const blob = new Blob([JSON.stringify(payload,null,2)], {type:"application/json"});
    const link = document.createElement("a");
    link.download = "MASTER_DIRECTION_ARTISTIQUE.json";
    link.href = URL.createObjectURL(blob);
    link.click();
  }}, [svgIcon(ICONS.download,14), el("span",{},"Exporter la DA")]));
  exportRow.appendChild(el("button",{class:"btn-secondary", style:"flex:1;", onclick:()=>{
    const payload = { packType:"STYLES", version: state.packVersions["STYLES"]||"1.0", styles: state.styles };
    const blob = new Blob([JSON.stringify(payload,null,2)], {type:"application/json"});
    const link = document.createElement("a");
    link.download = "STYLES.json";
    link.href = URL.createObjectURL(blob);
    link.click();
  }}, [svgIcon(ICONS.download,14), el("span",{},"Exporter les Styles")]));
  frag.appendChild(exportRow);

  frag.appendChild(el("p",{style:"font-size:11px;color:var(--muted2);margin:20px 0 4px;border-top:1px solid var(--border);padding-top:12px;"},
    "Export/import JSON ci-dessous : ta s├йcurit├й de secours, ind├йpendante du serveur тАФ toujours disponible m├кme sans connexion."));

  frag.appendChild(el("p",{class:"sublabel"},"Sauvegarde compl├иte en un clic : biblioth├иque, connaissances, direction artistique, styles, historique, audits et campagnes en cours тАФ tout ce que contient SDZ App, dans un seul fichier JSON. Utile pour ne jamais perdre ton travail ou pour le transf├йrer sur un autre appareil."));

  function getAllVfKeys(){
    const keys = [];
    const EXCLUDE = ["vf-updated-at","vf-last-server-sync","vf-sync-secret"];
    for(let i=0;i<localStorage.length;i++){
      const k = localStorage.key(i);
      if(k && k.startsWith("vf-") && !EXCLUDE.includes(k)) keys.push(k);
    }
    return keys;
  }
  const LABELS = {
    "vf-images":"Biblioth├иque", "vf-modules":"Connaissances", "vf-da":"Direction artistique",
    "vf-styles":"Styles", "vf-history":"Base de prompts (historique)", "vf-audit":"Audits IA",
    "vf-campaign":"Campagne en cours", "vf-lab":"Laboratoire IA", "vf-api-providers":"Param├иtres API (cl├йs incluses)", "vf-modes":"Modes de production",
    "vf-pack-imports":"Historique des imports Pack SDZ", "vf-pack-versions":"Versions des Packs SDZ install├йs",
    "vf-scheduled":"Calendrier de programmation", "vf-make-webhook":"Webhook Make",
  };
  const keys = getAllVfKeys();
  frag.appendChild(el("p",{class:"label"},"Contenu de la sauvegarde"));
  const list = el("div",{style:"margin-bottom:10px;"});
  keys.forEach(k=>{
    let count = "";
    try{ const v = LS.get(k, null); if(Array.isArray(v)) count = ` (${v.length})`; }catch(e){}
    list.appendChild(el("div",{style:"font-size:13px;color:var(--muted);padding:4px 0;border-bottom:1px solid var(--border);"}, `${LABELS[k]||k}${count}`));
  });
  frag.appendChild(list);

  const apiKeyToggle = el("input",{type:"checkbox", checked: state.includeApiKeysInExport});
  apiKeyToggle.addEventListener("change", e=>{ state.includeApiKeysInExport = e.target.checked; });
  frag.appendChild(el("label",{style:"display:flex;align-items:center;gap:8px;margin-bottom:18px;font-size:13px;color:var(--muted);"},
    [apiKeyToggle, "Inclure mes cl├йs API dans l'export (d├йconseill├й si tu comptes partager ce fichier тАФ exclu par d├йfaut)"]));

  frag.appendChild(el("button",{class:"btn-primary", style:"margin-bottom:12px;", onclick: ()=>{
    const dump = { _meta: { app:"Viewfinder", exportedAt: new Date().toISOString(), version: 1 } };
    getAllVfKeys().forEach(k=>{
      if(k==="vf-api-providers" && !state.includeApiKeysInExport){
        const sanitized = (LS.get(k, [])||[]).map(p=> ({...p, apiKey:""}));
        dump[k] = sanitized;
      } else {
        dump[k] = LS.get(k, null);
      }
    });
    const blob = new Blob([JSON.stringify(dump, null, 2)], {type:"application/json"});
    const link = document.createElement("a");
    link.download = `viewfinder-sauvegarde-${nowStr().replace(/\//g,"-")}.json`;
    link.href = URL.createObjectURL(blob);
    link.click();
  }}, [svgIcon(ICONS.download,16), el("span",{},"Exporter toute la sauvegarde")]));

  const importInput = el("input",{type:"file", accept:"application/json", style:"display:none"});
  const importMsg = el("p",{style:"font-size:12px;color:var(--green);min-height:14px;"},"");
  importInput.addEventListener("change", (e)=>{
    const file = e.target.files[0]; if(!file) return;
    const reader = new FileReader();
    reader.onload = ()=>{
      try{
        const dump = JSON.parse(reader.result);
        const entries = Object.entries(dump).filter(([k])=> k.startsWith("vf-"));
        if(!entries.length){ importMsg.textContent = "Ce fichier ne contient aucune donn├йe Viewfinder reconnue."; return; }
        const ok = confirm(`Restaurer cette sauvegarde va REMPLACER toutes les donn├йes actuelles de Viewfinder sur cet appareil (${entries.length} ├йl├йment(s)). Continuer ?`);
        if(!ok) return;
        entries.forEach(([k,v])=>{ if(v!==null) LS.set(k, v); });
        importMsg.textContent = "Restauration r├йussie, rechargement...";
        setTimeout(()=>location.reload(), 800);
      }catch(err){ importMsg.textContent = "Fichier invalide ou corrompu."; }
    };
    reader.readAsText(file);
    importInput.value = "";
  });
  frag.appendChild(importInput);
  frag.appendChild(el("button",{class:"btn-secondary"}, [svgIcon(ICONS.upload,14), el("span",{},"Restaurer une sauvegarde")]))
    .addEventListener("click", ()=>importInput.click());
  frag.appendChild(importMsg);

  return frag;
}

/* ============================================================
   ROUTEUR
============================================================ */
function renderMain(){
  const main = document.getElementById("main");
  main.innerHTML = "";
  const builders = {
    accueil: buildAccueilTab, library: buildLibraryTab, editor: buildEditorTab, knowledge: buildKnowledgeTab,
    da: buildDaTab, styles: buildStylesTab, post: buildPostTab, calendar: buildCalendarTab, audit: buildAuditTab, lab: buildLabTab, api: buildApiTab,
    history: buildHistoryTab, settings: buildSettingsTab,
  };
  try{
    normalizeState();
    const builder = builders[state.tab] || buildAccueilTab;
    main.appendChild(builder());
  }catch(err){
    console.error("Erreur de rendu :", err);
    main.appendChild(el("div",{class:"card"},[
      el("p",{style:"color:var(--coral);font-weight:600;margin-bottom:6px;"},"Cet onglet a rencontr├й un probl├иme."),
      el("p",{style:"font-size:12px;color:var(--muted2);margin-bottom:10px;"}, String(err && err.message || err)),
      el("button",{class:"btn-secondary", onclick:()=>{ state.tab="accueil"; renderNav(); renderMain(); }}, "Retour ├а l'accueil"),
    ]));
  }
}
renderNav();
renderMain();
updateCount();
checkServerOnLoad();

if ("serviceWorker" in navigator) {
  window.addEventListener("load", () => {
    navigator.serviceWorker.register("./sw.js").catch((err) => console.error("SW non enregistr├й :", err));
  });
}
</script>
</body>
