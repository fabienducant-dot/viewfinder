    el("option",{value:"Tous sujets"}, "Tous sujets (pas de prestation en particulier)"),
    ...KNOWN_PRESTATIONS.map(name=> el("option",{value:name}, prestationBlocksAvail[name] ? name : `${name} (non documentée)`)),
  ]);
  presSelect.value = state.prestationName;
  presSelect.addEventListener("change", e=>{ state.prestationName = e.target.value; renderMain(); });
  frag.appendChild(el("div",{style:"margin-bottom:6px;"}, presSelect));
  if(state.prestationName === "Tous sujets"){
    frag.appendChild(el("p",{class:"sublabel"},"Contenu généraliste — aucune prestation en particulier ne sera mise en avant."));
  } else if(state.prestationName && !prestationBlocksAvail[state.prestationName]){
    frag.appendChild(el("p",{class:"sublabel"},"Aucun détail trouvé pour cette prestation dans la base de connaissances — seul son nom sera transmis à l'IA."));
  } else {
    frag.appendChild(el("div",{style:"margin-bottom:14px;"}));
  }

  frag.appendChild(el("p",{class:"label"},"Style visuel"));
  const styleRow = el("div",{class:"pillrow", style:"margin-bottom:16px;"});
  // Le bouton "Aucun" a été retiré : un style par défaut (Luxe Silencieux) est toujours présélectionné.
  state.styles.forEach(s=>{
    styleRow.appendChild(el("button",{class:"pill"+(state.styleId===s.id?" active":""), onclick:()=>{ state.styleId=s.id; renderMain(); }}, s.name));
  });
  frag.appendChild(styleRow);

  frag.appendChild(el("p",{class:"label"},"Modes de production enregistrés"));
  const modesRow = el("div",{class:"pillrow", style:"margin-bottom:8px;"});
  state.productionModes.forEach(mode=>{
    modesRow.appendChild(el("button",{class:"pill", onclick:()=>{
      state.network = mode.network; state.styleId = mode.styleId; state.mission = mode.missionKey||"";
      state.da.creativite = mode.creativite; state.da.sobriete = mode.sobriete;
      LS.set("vf-da", state.da);
      renderMain();
    }}, mode.name));
  });
  frag.appendChild(modesRow);
  const saveModeBtn = el("button",{class:"btn-small", style:"margin-bottom:16px;"}, "+ Enregistrer ce mode (plateforme + style + créativité/sobriété)");
  saveModeBtn.addEventListener("click", ()=>{
    const name = prompt("Nom de ce mode (ex : Instagram Premium, Article SEO...)");
    if(!name || !name.trim()) return;
    state.productionModes.push({ id: uid(), name: name.trim(), network: state.network, styleId: state.styleId,
      missionKey: state.mission, creativite: state.da.creativite, sobriete: state.da.sobriete });
    LS.set("vf-modes", state.productionModes);
    renderMain();
  });
  frag.appendChild(saveModeBtn);

  frag.appendChild(el("p",{class:"label"},"Sujet du post"));
  const topicArea = el("textarea",{rows:"3", placeholder:"Ex : lancement du Massage Zébré, offre vacances, nouveauté..."}, state.topic);
  topicArea.addEventListener("input", e=>{ state.topic = e.target.value; });
  frag.appendChild(el("div",{style:"margin-bottom:6px;"}, topicArea));
  const topicWarn = el("p",{style:"font-size:12px;color:var(--coral);margin:0 0 12px;min-height:14px;"}, "");
  frag.appendChild(topicWarn);

  if(isCampaign){
    frag.appendChild(el("button",{class:"btn-primary", style:"margin-bottom:14px;", onclick: ()=>{
      if(!state.topic.trim()){ topicWarn.textContent = "Décris d'abord le sujet du post avant de générer."; return; }
      topicWarn.textContent = "";
      const newPosts = generateCampaignPosts(state.topic, state.mission);
      state.scheduled.push(...newPosts);
      LS.set("vf-scheduled", state.scheduled);
      state.tab = "calendar";
      renderNav(); renderMain();
    }}, [svgIcon(ICONS.sparkles,16), el("span",{},"Générer la campagne complète (5 formats)")]));
    frag.appendChild(el("p",{class:"hint"}, "Chaque déclinaison (Instagram, Facebook, Google Business, Story, Article Blog Wix) est créée en brouillon, regroupée sous une même campagne dans l'onglet Calendrier — c'est là que tu génères texte et image, valides, puis programmes (ou copies/télécharges, pour la Story et l'article de blog) chaque contenu."));
    return frag;
  }

  /* ---------- MOTEUR CRÉATIF — action principale, en deux phases ----------
     Phase A (gratuite, aucun appel image) : diversité déterministe, Creative Planner, validation
     locale, sélection des références, prompt image compact — tout ça est affiché dans le Prompt
     Inspector AVANT toute confirmation. Phase B (payante) ne part qu'après un clic explicite sur
     "Confirmer et générer l'image". Volontairement indépendant de state.imagePrompt (qui n'est
     rempli que par l'ancien mode manuel, plus bas) — c'est ce découplage qui manquait : ce bloc
     n'était visible qu'après avoir cliqué l'ancien bouton "Générer image + texte", ce qui donnait
     l'impression d'un flux à une seule étape. */
  const creativeEngineAvailable = !!(state.apiProviders.find(p=>p.kind==="openai-compatible" && (p.baseUrl||"").includes("api.openai.com")) || DEFAULT_OPENAI_PROVIDER);
  if(creativeEngineAvailable){
    const imgApiStatus = el("p",{style:"font-size:12px;color:var(--muted2);min-height:16px;margin:4px 0 8px;"},"");
    const prepareBtn = el("button",{class:"btn-primary", style:"margin-bottom:10px;"}, [svgIcon(ICONS.sparkles,14), el("span",{},"Préparer la création (gratuit)")]);
    const confirmBtn = el("button",{class:"btn-secondary", style:"margin:0 0 10px 8px;display:none;"}, [svgIcon(ICONS.wand,14), el("span",{},"Confirmer et générer l'image")]);
    const imgCancelBtn = el("button",{class:"btn-secondary", style:"margin:0 0 10px 8px;display:none;"}, "Annuler le suivi");
    const regenTextBtn = el("button",{class:"btn-secondary", style:"margin:0 0 10px 8px;display:none;"}, "Régénérer uniquement le texte");
    const relaunchAnalysisBtn = el("button",{class:"btn-secondary", style:"margin:0 0 10px 8px;display:none;"}, "Relancer l'analyse de l'image");
    const inspectorHost = el("div",{});
    let activeCancelToken = null;

    // Helper clipboard réutilisé par les 4 boutons de l'inspecteur (Tout copier / Copier le Prompt /
    // Copier le JSON) — factorisation pure de l'UI, aucun impact sur le pipeline ou l'état métier.
    // navigator.clipboard.writeText avec repli textarea+execCommand pour contextes non sécurisés.
    async function copyInspectorText(text, btn, defaultLabel){
      const restoreLabel = ()=>{ setTimeout(()=>{ btn.textContent = defaultLabel; }, 1500); };
      try{
        if(navigator.clipboard && navigator.clipboard.writeText){
          await navigator.clipboard.writeText(text);
        } else {
          throw new Error("clipboard API indisponible");
        }
        btn.textContent = "✓ Copié"; restoreLabel();
      }catch(err){
        try{
          const ta = document.createElement("textarea");
          ta.value = text; ta.style.position = "fixed"; ta.style.opacity = "0";
          document.body.appendChild(ta); ta.focus(); ta.select();
          document.execCommand("copy");
          document.body.removeChild(ta);
          btn.textContent = "✓ Copié"; restoreLabel();
        }catch(err2){
          btn.textContent = "⚠ Échec — copie manuelle requise";
          setTimeout(()=>{ btn.textContent = defaultLabel; }, 2500);
        }
      }
    }
    // Formate DD/MM/YYYY HH:MM sans dépendance externe.
    function formatInspectorDate(d){
      const p2 = n => String(n).padStart(2,"0");
      return `${p2(d.getDate())}/${p2(d.getMonth()+1)}/${d.getFullYear()} ${p2(d.getHours())}:${p2(d.getMinutes())}`;
    }

    // Reconstruit l'Inspector et les boutons DEPUIS state.lastCreativeFlow (persistant) plutôt que
    // depuis une variable locale — c'est ce qui les fait survivre à renderMain().
    function renderCreativeInspector(){
      const flow = state.lastCreativeFlow;
      inspectorHost.innerHTML = "";
      confirmBtn.style.display = "none"; regenTextBtn.style.display = "none"; relaunchAnalysisBtn.style.display = "none";
      if(!flow) return;
      if(flow.phase==="prepared" && !flow.blockingError) confirmBtn.style.display = "inline-block";
      if(flow.phase==="completed"){ regenTextBtn.style.display = "inline-block"; relaunchAnalysisBtn.style.display = "inline-block"; }
      const details = el("details",{open:true, style:"margin:10px 0;"});
      details.appendChild(el("summary",{style:"cursor:pointer;font-size:13px;color:var(--muted);"}, "Prompt Inspector — moteur créatif"));

      // ---- Textes bruts nécessaires aux boutons de copie (calculés une seule fois) ----
      const promptText = flow.imagePrompt || "";
      const jsonText = JSON.stringify(flow.brief, null, 2);
      const combinedText = `========================\nPROMPT OPENAI\n========================\n\n${promptText}\n\n========================\nSTRUCTURED OUTPUT\n========================\n\n${jsonText}`;

      // ---- Bandeau récapitulatif (lecture seule de flow.inputs/flow.brief/state.modules — aucune invention) ----
      const safe = v => (v===undefined || v===null || v==="") ? "—" : v;
      const prestationLabel = safe(flow.inputs && flow.inputs.prestation);
      const missionLabel = safe(flow.inputs && flow.inputs.mission);
      const platformLabel = safe(flow.inputs && flow.inputs.platform);
      const registresArr = (flow.inputs && Array.isArray(flow.inputs.registres)) ? flow.inputs.registres : [];
      const registresLabel = registresArr.length ? registresArr.join(", ") : "—";
      const typeCreationVal = flow.brief && flow.brief.typeCreation;
      const styleLabel = typeCreationVal==="affiche_fantastique" ? "Affiche fantastique" : typeCreationVal==="luxe_silencieux" ? "Luxe silencieux" : "—";
      const universCount = buildUniversSDZBlock(flow.allowed||[]).split("\n").filter(Boolean).length;
      // Reproduction EN LECTURE SEULE de la sélection réelle de buildCompactMasterImageSocle(registres)
      // (permanents + noirOrHaute.slice(0,3) + registreHaute.slice(0,2) par registre actif) — uniquement
      // pour affichage de statistiques ; buildCompactMasterImageSocle elle-même n'est ni appelée en
      // double ni modifiée. Ces compteurs représentent donc exactement ce qui a été injecté dans le
      // socle envoyé à OpenAI pour cette génération, jamais la taille totale de la bibliothèque.
      const allImageModules = state.modules.filter(m=> m.enabled && m.category==="MASTER_IMAGE");
      const permanentsInjected = allImageModules.filter(m=> m.criteres && m.criteres.portee==="permanent");
      const constitutionInjectedCount = permanentsInjected.filter(m=> moduleRegistre(m)==="constitution_generale").length;
      const noirOrPermanentInjectedCount = permanentsInjected.filter(m=> moduleRegistre(m)==="noir_or").length;
      const noirOrHauteInjectedCount = allImageModules.filter(m=> m.criteres && m.criteres.portee==="contextuel" && m.criteres.priorite==="haute" && moduleRegistre(m)==="noir_or").slice(0,3).length;
      const noirOrInjectedCount = noirOrPermanentInjectedCount + noirOrHauteInjectedCount;
      const registreInjectedCounts = {};
      KNOWN_REGISTRES.forEach(r=>{
        if(registresArr.includes(r)){
          registreInjectedCounts[r] = allImageModules.filter(m=> m.criteres && m.criteres.priorite==="haute" && moduleRegistre(m)===r).slice(0,2).length;
        }
      });
      const totalImageModulesInjected = constitutionInjectedCount + noirOrInjectedCount + Object.values(registreInjectedCounts).reduce((a,b)=>a+b,0);
      const summaryBox = el("div",{class:"card", style:"margin-top:8px;font-size:12px;"});
      const srow = (label,val)=> el("div",{style:"padding:2px 0;"}, [el("span",{style:"color:var(--muted2);"}, label+" : "), el("span",{}, String(val))]);
      summaryBox.appendChild(srow("Prestation", prestationLabel));
      summaryBox.appendChild(srow("Mission", missionLabel));
      summaryBox.appendChild(srow("Plateforme", platformLabel));
      summaryBox.appendChild(srow("Registre(s)", registresLabel));
      summaryBox.appendChild(srow("Style", styleLabel));
      summaryBox.appendChild(srow("Modules Constitution injectés", constitutionInjectedCount));
      summaryBox.appendChild(srow("Modules Noir & Or injectés", noirOrInjectedCount));
      summaryBox.appendChild(srow("Modules Univers SDZ injectés", universCount));
      KNOWN_REGISTRES.forEach(r=>{
        if(registresArr.includes(r)) summaryBox.appendChild(srow(`Modules ${REGISTRE_LABELS[r]} injectés`, registreInjectedCounts[r]));
      });
      summaryBox.appendChild(srow("Total modules image injectés", totalImageModulesInjected));
      summaryBox.appendChild(srow("Date", formatInspectorDate(new Date())));
      details.appendChild(summaryBox);

      // ---- Toolbar : 4 boutons de confort (Tout copier conservé + 3 nouveaux) ----
      const toolbar = el("div",{style:"display:flex;gap:6px;flex-wrap:wrap;margin:8px 0;"});
      const mkBtn = (label)=> el("button",{type:"button", class:"btn-secondary", style:"padding:4px 10px;font-size:12px;cursor:pointer;"}, label);
      const copyAllBtn = mkBtn("📋 Tout copier");
      copyAllBtn.addEventListener("click", ()=> copyInspectorText(combinedText, copyAllBtn, "📋 Tout copier"));
      const copyPromptBtn = mkBtn("📄 Copier le Prompt");
      copyPromptBtn.addEventListener("click", ()=> copyInspectorText(promptText, copyPromptBtn, "📄 Copier le Prompt"));
      const copyJsonBtn = mkBtn("📦 Copier le JSON");
      copyJsonBtn.addEventListener("click", ()=> copyInspectorText(jsonText, copyJsonBtn, "📦 Copier le JSON"));
      const clearBtn = mkBtn("🧹 Effacer");
      clearBtn.addEventListener("click", ()=>{ state.lastCreativeFlow = null; renderCreativeInspector(); });
      toolbar.appendChild(copyAllBtn); toolbar.appendChild(copyPromptBtn); toolbar.appendChild(copyJsonBtn); toolbar.appendChild(clearBtn);
      details.appendChild(toolbar);

      const body = el("div",{class:"card", style:"margin-top:8px;font-size:12px;"});
      const row = (label,val)=> el("div",{style:"padding:4px 0;border-bottom:1px solid var(--border);"}, [el("span",{style:"color:var(--muted2);"}, label+" : "), el("span",{}, val||"—")]);
      row.call && body.appendChild(row("Phase", flow.phase==="prepared" ? "A — préparée, en attente de confirmation (aucun crédit consommé)" : flow.phase==="image_failed" ? "B — échec avant obtention de l'image" : "B — terminée"));
      body.appendChild(row("Type de création (figé)", flow.brief && flow.brief.typeCreation));
      body.appendChild(row("Archétype choisi", flow.brief && flow.brief.archetypeNarratif));
      body.appendChild(row("Archétypes interdits (récents)", (flow.exclusions||[]).join(", ") || "aucun"));
      body.appendChild(row("Raison de différenciation", flow.brief && flow.brief.raisonDifferenceAvecHistorique));
      body.appendChild(row("Références sélectionnées", String((flow.referenceSelections||[]).length)));
      if(flow.phase!=="prepared") body.appendChild(row("Référence réellement utilisée", flow.usedReference ? "Oui ✓" : (flow.referenceFallbackReason ? "Non — repli : "+flow.referenceFallbackReason : "Non demandée")));
      body.appendChild(row("Modèle", "gpt-image-1"));
      body.appendChild(row("Taille prévue", API_IMAGE_SIZE_BY_PLATFORM[flow.inputs.platform] || "1024x1024"));
      if(flow.blockingError) body.appendChild(row("⛔ Bloquant — aucune image possible", flow.blockingError));
      if(flow.plannerError) body.appendChild(row("⚠ Creative Planner", flow.plannerError));
      if(flow.referenceError) body.appendChild(row("⚠ Références", flow.referenceError));
      if(flow.error) body.appendChild(row("⚠ Image", flow.error));
      if(flow.analysisError) body.appendChild(row("⚠ Analyse d'image", flow.analysisError));
      if(flow.textError) body.appendChild(row("⚠ Génération texte", flow.textError));
      body.appendChild(el("p",{style:"font-weight:600;margin:8px 0 4px;"}, "Creative Brief (JSON)"));
      body.appendChild(el("pre",{style:"white-space:pre-wrap;font-size:11px;"}, jsonText));
      body.appendChild(el("p",{style:"font-weight:600;margin:8px 0 4px;"}, "Prompt image compact (exactement celui qui sera/a été envoyé)"));
      body.appendChild(el("pre",{style:"white-space:pre-wrap;font-size:11px;"}, promptText));
      if(flow.content){
        body.appendChild(el("p",{style:"font-weight:600;margin:8px 0 4px;"}, "Texte final"));
        body.appendChild(el("pre",{style:"white-space:pre-wrap;font-size:11px;"}, JSON.stringify(flow.content, null, 2)));
      }
      details.appendChild(body);
      inspectorHost.appendChild(details);
    }

    // --- Phase A : gratuite, aucun appel image ---
    prepareBtn.addEventListener("click", async ()=>{
      if(!state.topic.trim()){ topicWarn.textContent = "Décris d'abord le sujet du post avant de générer."; return; }
      topicWarn.textContent = "";
      prepareBtn.disabled = true;
      imgApiStatus.textContent = "Préparation de la création (Creative Planner)...";
      try{
        const prepared = await prepareCreativeBrief({ mission: state.mission, platform, prestation: state.prestationName, topic: state.topic, aspectKey: PLATFORM_ASPECT[platform], size: API_IMAGE_SIZE_BY_PLATFORM[platform]||"1024x1024", isCampaign:false, registres: Array.isArray(state.registres) ? [...state.registres] : [] });
        state.lastCreativeFlow = prepared;
        imgApiStatus.textContent = prepared.plannerError
          ? `Brief préparé (avec repli local — voir Inspector) ✓ Relis le prompt avant de confirmer.`
          : "Brief préparé ✓ — relis le Creative Brief et le prompt ci-dessous avant de confirmer (aucun crédit consommé pour l'instant).";
        renderCreativeInspector();
      }catch(err){ imgApiStatus.textContent = `Échec de la préparation : ${err.message||err}`; }
      prepareBtn.disabled = false;
    });

    // --- Phase B : payante, uniquement après ce clic explicite ---
    confirmBtn.addEventListener("click", async ()=>{
      if(!state.lastCreativeFlow || state.lastCreativeFlow.phase!=="prepared") return;
      if(state.lastCreativeFlow.blockingError) return; // garde-fou : jamais d'appel image si un blocage est présent
      if(!confirm("Lancer la génération d'image via OpenAI ? Ceci consomme du crédit API.")) return;
      confirmBtn.disabled = true; imgCancelBtn.style.display = "inline-block";
      const t0 = Date.now();
      const cancelToken = { cancelled:false }; activeCancelToken = cancelToken;
      try{
        const flow = await confirmAndGenerateImage(state.lastCreativeFlow, (label)=>{ imgApiStatus.textContent = label; }, cancelToken);
        state.lastCreativeFlow = flow;
        if(!flow.ok){
          logToLab({ provider:"OpenAI", model:"gpt-image-1", type:"image", prompt: flow.imagePrompt, promptHash: hashPrompt(flow.imagePrompt||""), cost:null, durationMs: Date.now()-t0, status:"refused", reason: flow.error });
          imgApiStatus.textContent = flow.error;
          renderCreativeInspector();
          confirmBtn.disabled = false; imgCancelBtn.style.display = "none"; activeCancelToken = null;
          return;
        }
        let dataUrl = flow.dataUrl;
        let logoApplied = false;
        if(logoRequiredFor(platform)){
          const composited = await compositeBrandSignature(dataUrl, platform);
          dataUrl = composited.dataUrl; logoApplied = composited.applied;
        }
        const id = uid();
        state.images.push({ id, name:`${platform}-${nowStr()}.png`, dataUrl, tags:[platform], favorite:false,
          logoApplied, usedReference: flow.usedReference, referenceFallbackReason: flow.referenceFallbackReason,
          creativeBrief: flow.brief, creativeContent: flow.content, altText: flow.content ? flow.content.altText : (flow.analysis && flow.analysis.altText) });
        LS.set("vf-images", state.images);
        updateCount();
        state.selectedId = id; state.postImageId = id;
        flow.imageId = id; // les boutons de relance retrouveront TOUJOURS l'image par cet id, jamais par state.selectedId
        // Historique visuel structuré : uniquement maintenant, l'image existe réellement — et
        // uniquement les IDs des références utilisées, jamais leurs dataUrl complètes.
        recordStructuredImageEntry(
          { mission: state.mission, platform, prestation: state.prestationName, topic: state.topic },
          flow.brief, (flow.referenceSelections||[]).map(r=>r.id), flow.imagePrompt, id
        );
        logToLab({ provider:"OpenAI", model:"gpt-image-1", type:"image", prompt: flow.imagePrompt, promptHash: hashPrompt(flow.imagePrompt), cost:null, durationMs: Date.now()-t0, status:"accepted" });

        // Raccordement réel du texte final au flux normal de publication : Instagram attend
        // caption+hashtags dans state.textPasted, l'alt text est conservé séparément — c'est cette
        // même zone que "Programmer la publication" utilise plus bas, inchangée.
        if(flow.content){
          const hashtagsText = (flow.content.hashtags||[]).map(h=> h.startsWith("#") ? h : "#"+h).slice(0,5).join(" ");
          state.textPasted = [flow.content.caption||"", hashtagsText].filter(Boolean).join("\n\n");
          state.pendingAltText = flow.content.altText || "";
        }

        let referenceLabel;
        if(flow.usedReference) referenceLabel = "Référence visuelle utilisée ✓";
        else if(flow.referenceFallbackReason) referenceLabel = "Référence non utilisée — génération standard de secours.";
        else referenceLabel = "Génération standard — aucune référence visuelle fournie.";
        const parts = [logoRequiredFor(platform) ? (logoApplied?"Image générée, logo appliqué ✓":"Image générée — aucun logo marqué comme actif de marque.") : "Image générée et ajoutée à ta bibliothèque ✓", referenceLabel];
        if(flow.content) parts.push("Texte inséré dans la zone de publication ci-dessous ✓");
        if(flow.analysisError) parts.push("⚠ "+flow.analysisError);
        if(flow.textError) parts.push("⚠ "+flow.textError+" — utilise \"Régénérer uniquement le texte\".");
        imgApiStatus.textContent = parts.join(" — ");
        renderCreativeInspector();
        renderMain();
      }catch(err){
        const cancelled = String(err.message||err)==="__CANCELLED__";
        imgApiStatus.textContent = cancelled ? "Suivi annulé (la génération continue peut-être côté serveur)." : `Erreur inattendue : ${err.message||err}`;
      }
      confirmBtn.disabled = false; imgCancelBtn.style.display = "none"; activeCancelToken = null;
    });
    imgCancelBtn.addEventListener("click", ()=>{ if(activeCancelToken) activeCancelToken.cancelled = true; });

    regenTextBtn.addEventListener("click", async ()=>{
      const flow = state.lastCreativeFlow;
      if(!flow || !flow.dataUrl) return;
      regenTextBtn.disabled = true;
      try{
        const content = await generateContentFromBrief(flow.brief, flow.analysis, flow.inputs.platform, flow.inputs.mission);
        flow.content = content; flow.textError = null;
        const img = state.images.find(i=>i.id===flow.imageId);
        if(img){ img.creativeContent = content; img.altText = content.altText; }
        LS.set("vf-images", state.images);
        const hashtagsText = (content.hashtags||[]).map(h=> h.startsWith("#") ? h : "#"+h).slice(0,5).join(" ");
        state.textPasted = [content.caption||"", hashtagsText].filter(Boolean).join("\n\n");
        state.pendingAltText = content.altText || "";
        imgApiStatus.textContent = "Texte régénéré ✓ et inséré dans la zone de publication (image non retouchée, aucun nouvel appel image facturé)";
        renderCreativeInspector();
        renderMain();
      }catch(err){ imgApiStatus.textContent = `Échec de la régénération du texte : ${err.message||err}`; }
      regenTextBtn.disabled = false;
    });
    relaunchAnalysisBtn.addEventListener("click", async ()=>{
      const flow = state.lastCreativeFlow;
      if(!flow || !flow.dataUrl) return;
      relaunchAnalysisBtn.disabled = true;
      try{
        const analysis = await analyzeGeneratedImage(flow.dataUrl, flow.brief);
        flow.analysis = analysis; flow.analysisError = null;
        imgApiStatus.textContent = "Analyse de l'image relancée ✓ (aucun nouvel appel image facturé)";
        renderCreativeInspector();
      }catch(err){ imgApiStatus.textContent = `Échec de l'analyse : ${err.message||err}`; }
      relaunchAnalysisBtn.disabled = false;
    });

    frag.appendChild(prepareBtn);
    frag.appendChild(confirmBtn);
    frag.appendChild(imgCancelBtn);
    frag.appendChild(regenTextBtn);
    frag.appendChild(relaunchAnalysisBtn);
    frag.appendChild(imgApiStatus);
    frag.appendChild(inspectorHost);
    renderCreativeInspector(); // reconstruit l'état après un éventuel renderMain() précédent
  }

  frag.appendChild(el("p",{class:"label", style:"margin-top:18px;"}, "Mode manuel avancé (copier-coller dans ChatGPT, sans le moteur créatif)"));

  const imageOnlyMode = state.creationMode === "image";
  frag.appendChild(el("button",{class:"btn-primary", style:"margin-bottom:14px;", onclick: ()=>{
    if(!state.topic.trim()){ topicWarn.textContent = "Décris d'abord le sujet du post avant de générer."; return; }
    topicWarn.textContent = "";
    state.imagePrompt = buildImagePromptFull(platform, state.topic, PLATFORM_ASPECT[platform], state.mission);
    state.textPrompt = (platform==="Story" || imageOnlyMode) ? null : buildTextPromptFull(platform, state.topic, state.mission);
    state.textPasted = ""; state.feedbackComment = "";
    state.textPromptOptimized = null; state.imagePromptOptimized = null;
    state.postImageId = null;
    renderMain();
  }}, [svgIcon(ICONS.wand,16), el("span",{}, platform==="Story" ? "Générer l'image (accroche + logo intégrés)" : imageOnlyMode ? "Générer l'image" : "Générer image + texte")]));

  if(imageOnlyMode) frag.appendChild(el("p",{class:"sublabel", style:"margin-top:-8px;"}, "Mode image seule — aucun texte ne sera généré. Passe par \"Créer un post\" si tu as aussi besoin d'une légende."));

  if(state.imagePrompt){
    const txtDetail = textModulesDetail(platform);
    const imgDetail = imageModulesDetail();
    if(state.viewMode==="expert") frag.appendChild(buildInspector({
      platform, missionKey: state.mission, prestation: getSelectedPrestationInfo(), style: getSelectedStyle(),
      textMods: txtDetail.kept, textIgnored: txtDetail.ignored, imageMods: imgDetail.kept, imageIgnored: imgDetail.ignored,
      duplicatesRemoved: txtDetail.duplicatesRemoved + imgDetail.duplicatesRemoved,
      aspect: PLATFORM_ASPECT[platform],
      overlayRule: platform==="Story" ? "4-5 phrases fortes, tailles variées + logo bas centré" : (PLATFORM_OVERLAY[platform]==="aucun" ? "aucun texte sur l'image" : PLATFORM_OVERLAY[platform]==="fiche" ? `fiche explicative élégante (${PLATFORM_MAXCHARS[platform]} car. max)` : `1-2 phrases courtes (${PLATFORM_MAXCHARS[platform]} car. max)`),
    }));

    const risks = currentRiskFlags();
    const provider = state.apiProviders.find(p=>p.id===state.selectedProviderId) || state.apiProviders[0] || DEFAULT_OPENAI_PROVIDER;
    const estCost = provider ? estimateCost(provider, state.textPrompt||"") : null;
    const SPEED_ESTIMATES = { "Très rapide":"≈2-5 s", "Rapide":"≈5-10 s", "Moyenne":"≈10-20 s" };
    const estTime = provider ? (SPEED_ESTIMATES[provider.speed] || "variable selon le fournisseur") : null;
    const qScore = computeQualityScore({ platform, textPrompt: state.textPrompt||"", textMods: txtDetail.kept, imageMods: imgDetail.kept, missionKey: state.mission });
    const routerSuggestion = suggestProviderFor({ platform });

    frag.appendChild(el("div",{class:"card", style:"margin-bottom:16px;"},[
      el("p",{class:"label", style:"margin-bottom:10px;"},"Audit du contexte injecté"),
      state.textPrompt ? el("div",{class:"learning-row"}, `Longueur du prompt texte : ${state.textPrompt.length} caractères ${state.textPrompt.length>4000?"— assez long, vérifie qu'aucune info superflue n'a été injectée":""}`) : null,
      el("div",{class:"learning-row"},
        `Connaissances : ${txtDetail.totalAvailable+imgDetail.totalAvailable} disponibles · ${txtDetail.totalKept+imgDetail.totalKept} injectées · ${(txtDetail.ignored.length+imgDetail.ignored.length)} ignorées · ${txtDetail.duplicatesRemoved+imgDetail.duplicatesRemoved} doublons fusionnés`),
      (()=>{
        const beforeSum = txtDetail.lengthBefore + imgDetail.lengthBefore;
        const afterSum = txtDetail.lengthAfter + imgDetail.lengthAfter;
        const gain = beforeSum>0 ? Math.round((1-afterSum/beforeSum)*100) : 0;
        const tokensSaved = txtDetail.tokensSaved + imgDetail.tokensSaved;
        const costSaved = provider ? estimateCost(provider, "x".repeat(tokensSaved*4)) : null;
        const avgRelevance = Math.round((txtDetail.relevanceIndex + imgDetail.relevanceIndex)/2);
        return el("div",{class:"learning-row", style:"color:var(--green);"},
          `Optimisation moteur : ${beforeSum} → ${afterSum} caractères (−${gain}%) · ≈${tokensSaved} tokens économisés${costSaved!=null?` · ≈$${costSaved.toFixed(4)} économisés`:""} · indice de pertinence : ${avgRelevance}/100`);
      })(),
      risks.length
        ? el("div",{class:"learning-row", style:"color:var(--amber);"}, `⚠ Sujets à traiter avec prudence : ${risks.join(", ")}. Un garde-fou générique est déjà inclus dans le prompt image ; pour un résultat plus précis, renseigne un champ "Scène visuelle" dans la fiche de cette prestation (onglet Connaissances).`)
        : el("div",{class:"learning-row"}, "Aucun sujet sensible détecté."),
      el("div",{class:"learning-row"}, provider
        ? `Coût estimé (${provider.label}) : ${estCost!=null ? "$"+estCost.toFixed(4) : "non estimé — renseigne les tarifs dans Paramètres API"} · Temps estimé : ${estTime}`
        : "Aucun fournisseur API configuré — mode manuel (copier/coller)."),
      routerSuggestion ? el("div",{class:"learning-row", style:"color:var(--gold-soft);"}, `Moteur recommandé pour ce type de contenu : ${routerSuggestion.suggestion} — ${routerSuggestion.reason} (suggestion libre, tu choisis toujours toi-même dans le sélecteur ci-dessous).`) : null,
      el("p",{style:"font-size:11px;color:var(--muted2);margin-top:6px;"},"La vraie validation (texte, image, logo, nom de prestation) se fait via la checklist plus bas, une fois le contenu prêt."),
    ]));

    if(state.textPrompt && qScore.global < 70){
      frag.appendChild(el("button",{class:"btn-secondary", style:"margin-bottom:16px;", onclick: ()=>{
        const optimizedText = buildTextPromptFull(platform, state.topic, state.mission);
        const optimizedImage = buildImagePromptFull(platform, state.topic, PLATFORM_ASPECT[platform], state.mission);
        state.textPromptOptimized = optimizedText;
        state.imagePromptOptimized = optimizedImage;
        renderMain();
      }}, "🛠 Optimiser le prompt (contexte perfectible)"));
    }
    if(state.textPromptOptimized){
      frag.appendChild(el("div",{class:"card", style:"margin-bottom:16px;"},[
        el("p",{class:"label"},"Comparaison — version actuelle vs optimisée"),
        el("p",{style:"font-size:12px;color:var(--muted2);margin-bottom:8px;"},"La reconstruction applique la même logique de sélection avec le contexte le plus à jour (modules activés, historique récent). Choisis la version à utiliser."),
        el("div",{style:"display:flex;gap:8px;"},[
          el("button",{class:"btn-ghost", onclick:()=>{ state.textPromptOptimized=null; state.imagePromptOptimized=null; renderMain(); }}, "Garder l'actuelle"),
          el("button",{class:"btn-ghost active", onclick:()=>{ state.textPrompt=state.textPromptOptimized; state.imagePrompt=state.imagePromptOptimized; state.textPromptOptimized=null; state.imagePromptOptimized=null; renderMain(); }}, "Utiliser l'optimisée"),
        ]),
      ]));
    }

    if(provider && state.textPrompt){
      const cached = findCachedResult(provider.label, state.textPrompt);
      if(cached){
        frag.appendChild(el("div",{class:"card", style:"margin-bottom:16px;border-color:var(--gold-soft);"},[
          el("p",{style:"font-size:13px;margin-bottom:8px;"}, `Un résultat identique existe déjà (généré le ${cached.date} via ${cached.provider}) — évite un appel payant inutile.`),
          el("div",{style:"display:flex;gap:8px;"},[
            el("button",{class:"btn-ghost", onclick:()=>{ state.textPasted = cached.result||""; renderMain(); }}, "Réutiliser"),
            el("button",{class:"btn-ghost", onclick:()=>{ /* laisse générer via le bouton API plus bas */ }}, "Régénérer quand même"),
          ]),
        ]));
      }
    }

    frag.appendChild(el("h2",{class:"section"}, state.viewMode==="production" ? "Image à copier dans ChatGPT" : "Prompt image"));
    frag.appendChild(vfWrap(el("div",{class:"card", style:"margin-bottom:6px;"},[el("pre",{}, state.imagePrompt)])));
    frag.appendChild(copyBtnFor(()=>state.imagePrompt));
    frag.appendChild(el("p",{class:"sublabel"},"Colle ce prompt dans ChatGPT Plus (génération d'image), puis importe le résultat dans ta bibliothèque — ou utilise \"Préparer la création\" plus haut pour générer directement via l'API OpenAI."));

    const imgFileInput = el("input",{type:"file", accept:"image/*", style:"display:none"});
    const confirmMsg = el("p",{style:"font-size:12px;color:var(--green);margin-top:8px;min-height:14px;"},"");
    imgFileInput.addEventListener("change", async (e)=>{
      const file = e.target.files[0]; if(!file) return;
      let dataUrl = await resizeImageFile(file);
      let logoApplied = false;
      if(logoRequiredFor(platform)){
        const composited = await compositeBrandSignature(dataUrl, platform);
        dataUrl = composited.dataUrl; logoApplied = composited.applied;
      }
      const id = uid();
      state.images.push({id, name:file.name, dataUrl, tags:[platform], favorite:false, logoApplied});
      LS.set("vf-images", state.images);
      updateCount();
      state.selectedId = id;
      state.postImageId = id;
      confirmMsg.textContent = logoRequiredFor(platform)
        ? (logoApplied ? "Image importée, logo réel appliqué ✓" : "Image importée — aucun logo marqué comme actif de marque dans la Bibliothèque, rien n'a été ajouté.")
        : "Image ajoutée à ta bibliothèque ✓";
      imgFileInput.value = "";
      renderMain();
    });
    frag.appendChild(imgFileInput);
    frag.appendChild(el("button",{class:"btn-secondary", onclick:()=>imgFileInput.click()}, [svgIcon(ICONS.upload,14), el("span",{},"Importer l'image générée")]));
    frag.appendChild(confirmMsg);

    const previewImg = state.images.find(i=>i.id===state.postImageId);
    if(previewImg){
      frag.appendChild(el("p",{class:"label", style:"margin-top:14px;"},"Aperçu de l'image retenue pour ce post"));
      frag.appendChild(vfWrap(el("div",{style:"max-width:280px;margin:0 auto 10px;border-radius:12px;overflow:hidden;"},[
        el("img",{src:previewImg.dataUrl, style:"width:100%;display:block;"}),
      ])));

      const logoAsset = state.images.find(i=>i.assetType==="logo");
      if(logoAsset){
        const logoMsg = el("p",{style:"font-size:12px;color:var(--green);min-height:16px;margin:0 0 10px;text-align:center;"},"");
        frag.appendChild(el("button",{class:"btn-secondary", style:"margin-bottom:10px;", onclick: async ()=>{
          logoMsg.style.color = "var(--muted2)"; logoMsg.textContent = "Ajout du logo en cours...";
          try{
            const baseImg = await loadImage(previewImg.dataUrl);
            const logoImg = await loadImage(logoAsset.dataUrl);
            const canvas = document.createElement("canvas");
            canvas.width = baseImg.width; canvas.height = baseImg.height;
            const ctx = canvas.getContext("2d");
            ctx.drawImage(baseImg, 0, 0);
            const logoW = canvas.width * (state.logoOverlay.size/100);
            const logoH = logoW * (logoImg.height/logoImg.width);
            const lx = (state.logoOverlay.x/100)*canvas.width - logoW/2;
            const ly = (state.logoOverlay.y/100)*canvas.height - logoH/2;
            ctx.drawImage(logoImg, lx, ly, logoW, logoH);
            const newDataUrl = canvas.toDataURL("image/png");
            const id = uid();
            state.images.push({ id, name:`${previewImg.name.replace(/\.png$/,"")}-logo.png`, dataUrl:newDataUrl, tags:[platform,"logo-ajouté"], favorite:false });
            LS.set("vf-images", state.images);
            updateCount();
            state.postImageId = id;
            logoMsg.style.color = "var(--green)"; logoMsg.textContent = "Logo ajouté ✓ — nouvelle image créée dans la bibliothèque.";
            renderMain();
          }catch(err){
            logoMsg.style.color = "var(--coral)"; logoMsg.textContent = `Échec (${err.message||err}).`;
          }
        }}, [svgIcon(ICONS.sparkles,14), el("span",{},"Ajouter mon logo sur cette image")]));
        frag.appendChild(logoMsg);
        frag.appendChild(el("p",{style:"font-size:11px;color:var(--muted2);margin:-4px 0 10px;text-align:center;"},
          "Utilise la position/taille réglées dans l'onglet Éditeur. Crée une nouvelle image, l'originale reste intacte."));
      } else {
        frag.appendChild(el("p",{style:"font-size:12px;color:var(--muted2);margin:0 0 10px;"},
          "Aucun logo enregistré comme actif de marque — marque une image \"Logo\" dans l'onglet Bibliothèque pour pouvoir l'ajouter automatiquement ici."));
      }
    }

    if(state.textPrompt){
      frag.appendChild(el("h2",{class:"section"}, state.viewMode==="production" ? "Texte à copier dans ChatGPT" : "Prompt texte"));
      frag.appendChild(vfWrap(el("div",{class:"card", style:"margin-bottom:6px;"},[el("pre",{}, state.textPrompt)])));
      frag.appendChild(copyBtnFor(()=>state.textPrompt));

      {
        const availableProviders = state.apiProviders.length ? state.apiProviders : [DEFAULT_OPENAI_PROVIDER];
        const providerSelect = el("select",{style:"margin:8px 0;"}, availableProviders.map(p=> el("option",{value:p.id}, p.label)));
        providerSelect.value = state.selectedProviderId || availableProviders[0].id;
        providerSelect.addEventListener("change", e=>{ state.selectedProviderId = e.target.value; renderMain(); });
        frag.appendChild(providerSelect);

        const apiStatus = el("p",{style:"font-size:12px;color:var(--muted2);min-height:16px;margin:4px 0 8px;"},"");
        const apiBtn = el("button",{class:"btn-secondary", style:"margin-bottom:10px;"}, [svgIcon(ICONS.sparkles,14), el("span",{},"Générer via l'API (remplace le copier/coller)")]);
        apiBtn.addEventListener("click", async ()=>{
          const provider = availableProviders.find(p=>p.id===(state.selectedProviderId||availableProviders[0].id)) || availableProviders[0];
          const cached = findCachedResult(provider.label, state.textPrompt);
          if(cached && !confirm(`Un résultat identique existe déjà (${cached.date}). Régénérer quand même et consommer du budget ?`)) {
            state.textPasted = cached.result || "";
            renderMain();
            return;
          }
          const cost = estimateCost(provider, state.textPrompt);
          const costLabel = cost!=null ? `~$${cost.toFixed(4)}` : "coût non estimé (tarifs non renseignés)";
          if(!confirm(`Lancer la génération via ${provider.label} ? Coût estimé : ${costLabel}.`)) return;
          apiStatus.textContent = "Génération en cours...";
          const t0 = Date.now();
          try{
            const result = await callProviderText(provider, "Tu es le rédacteur officiel de cette marque, respecte strictement les informations et contraintes fournies.", state.textPrompt);
            state.textPasted = result;
            logToLab({ provider: provider.label, model: provider.model, type:"texte", prompt: state.textPrompt, promptHash: hashPrompt(state.textPrompt), result, cost, durationMs: Date.now()-t0, status:"accepted" });
            apiStatus.textContent = "Résultat reçu et inséré ci-dessous ✓";
            renderMain();
          }catch(err){
            logToLab({ provider: provider.label, model: provider.model, type:"texte", prompt: state.textPrompt, promptHash: hashPrompt(state.textPrompt), cost, durationMs: Date.now()-t0, status:"refused", reason: String(err.message||err) });
            apiStatus.textContent = `Échec de l'appel (${err.message||err}) — utilise le mode manuel ci-dessous à la place.`;
          }
        });
        frag.appendChild(apiBtn);
        frag.appendChild(apiStatus);
      }

      const pastedArea = el("textarea",{rows:"5", placeholder:"Colle ici la réponse texte de ChatGPT (ou récupère-la automatiquement via l'API ci-dessus)..."}, state.textPasted);
      pastedArea.addEventListener("input", e=>{ state.textPasted = e.target.value; });
      frag.appendChild(el("div",{style:"margin:10px 0;"}, pastedArea));

      frag.appendChild(el("button",{class:"btn-secondary", style:"margin-bottom:10px;", onclick: ()=>{
        sendToAudit({
          platform, missionKey: state.mission, topic: state.topic,
          imagePrompt: state.imagePrompt, textPrompt: state.textPrompt,
          textMods: textModulesFor(platform), imageMods: imageModulesFor(),
          prestation: getSelectedPrestationInfo(), style: getSelectedStyle(),
          antiRepeatTextNote: buildAntiRepeatNote(platform,"texte"), antiRepeatImageNote: buildAntiRepeatNote(platform,"image"),
          textPasted: state.textPasted,
        });
      }}, [svgIcon(ICONS.sparkles,14), el("span",{},"Analyser avec ChatGPT")]));
    } else {
      frag.appendChild(el("p",{class:"sublabel", style:"margin-top:10px;"}, "Aucun texte séparé pour ce format : l'accroche fait partie intégrante de l'image générée ci-dessus."));
    }

    frag.appendChild(buildFeedbackBlock({
      platform, topic: state.topic, imagePrompt: state.imagePrompt, textPrompt: state.textPrompt,
      getTextResult: ()=>state.textPasted,
      hasImage: !!previewImg, logoApplied: !!(previewImg && previewImg.logoApplied),
      prestationName: (state.prestationName && state.prestationName!=="Tous sujets") ? state.prestationName : null, missionKey: state.mission,
      schedulable: platform !== "Article Blog Wix" && platform !== "Story",
    }));

    const isSchedulable = platform !== "Article Blog Wix" && platform !== "Story";
    const requiresTextForSchedule = !!state.textPrompt;
    const contentReady = previewImg && (!requiresTextForSchedule || state.textPasted.trim());
    if(contentReady){
      if(isSchedulable){
        frag.appendChild(el("h2",{class:"section"},"Programmer la publication"));
        frag.appendChild(el("p",{class:"sublabel"},"Texte et image validés ? Choisis une date et une heure — Make ne sera déclenché qu'à ce moment précis, jamais avant."));
        const dateInput = el("input",{type:"datetime-local", value: state.scheduleDate || "", style:"width:100%;background:var(--card);border:1px solid var(--border);border-radius:10px;padding:9px 12px;font-size:14px;margin-bottom:10px;"});
        dateInput.addEventListener("input", e=>{ state.scheduleDate = e.target.value; });
        frag.appendChild(dateInput);
        const schedMsg = el("p",{style:"font-size:12px;color:var(--green);min-height:16px;"},"");
        frag.appendChild(el("button",{class:"btn-primary", style:"margin-bottom:10px;", onclick: async ()=>{
         try{
          if(!state.scheduleDate){ schedMsg.style.color="var(--coral)"; schedMsg.textContent="Choisis une date et une heure d'abord."; return; }
          if(!previewImg || !previewImg.dataUrl){ schedMsg.style.color="var(--coral)"; schedMsg.textContent="Erreur : aucune image valide sélectionnée pour ce post."; return; }
          const scheduledAt = new Date(state.scheduleDate).getTime();
          if(isNaN(scheduledAt)){ schedMsg.style.color="var(--coral)"; schedMsg.textContent="Date invalide, réessaie."; return; }
          const newPost = {
            id: uid(), platform, mission: state.mission, topic: state.topic,
            textFinal: state.textPasted, altText: state.pendingAltText || null, imageDataUrl: previewImg.dataUrl, schedulable: true,
            scheduledAt, status: "programmé", createdAt: Date.now(), sentAt: null, error: null,
          };
          state.scheduled.push(newPost);
          const savedLocally = LS.set("vf-scheduled", state.scheduled);
          if(!savedLocally){
            state.scheduled.pop(); // annule l'ajout en mémoire : rien n'a réellement été enregistré
            schedMsg.style.color = "var(--coral)";
            schedMsg.textContent = "Échec : stockage du téléphone plein (trop de photos enregistrées). Supprime d'anciens posts envoyés ou des images de la bibliothèque, puis réessaie.";
            renderMain();
            return;
          }
          state.scheduleDate = "";
          schedMsg.style.color = "var(--muted2)";
          schedMsg.textContent = "Post programmé — synchronisation avec le serveur...";
          const ok = await pushToServerSilent();
          if(ok){
            schedMsg.style.color = "var(--green)";
            schedMsg.textContent = "Post programmé ✓ — envoyé au serveur, visible dans l'onglet Calendrier.";
          } else {
            schedMsg.style.color = "var(--coral)";
            schedMsg.textContent = "Post programmé localement, mais la synchro serveur a échoué — va dans Réglages → \"Sauvegarder sur serveur\" avant de fermer l'appli.";
          }
         }catch(e){
            schedMsg.style.color = "var(--coral)";
            schedMsg.textContent = "Erreur inattendue : " + String(e && e.message || e);
         }
        }}, [svgIcon(ICONS.sparkles,16), el("span",{},"Programmer ce post")]));
        frag.appendChild(el("button",{class:"btn-ghost", style:"margin-bottom:10px;", onclick:()=>{
          state.scheduled.push({
            id: uid(), platform, mission: state.mission, topic: state.topic,
            textFinal: state.textPasted, altText: state.pendingAltText || null, imageDataUrl: previewImg.dataUrl, schedulable: true,
            scheduledAt: null, status: "brouillon", createdAt: Date.now(), sentAt: null, error: null,
          });
          LS.set("vf-scheduled", state.scheduled);
          schedMsg.style.color = "var(--green)";
          schedMsg.textContent = "Enregistré comme brouillon ✓ — tu pourras lui donner une date plus tard.";
        }}, "Enregistrer comme brouillon (sans date pour l'instant)"));
        frag.appendChild(schedMsg);
      } else {
        frag.appendChild(el("h2",{class:"section"},"Publication manuelle"));
        const manualHint = platform==="Story"
          ? "Story non automatisable via Make — télécharge l'image et publie-la toi-même en story sur Instagram et/ou Facebook."
          : `${platform} n'est pas automatisable via Make — copie le texte (s'il y en a) et télécharge l'image, puis publie-les toi-même.`;
        frag.appendChild(el("p",{class:"sublabel"}, manualHint));
        const manualMsg = el("p",{style:"font-size:12px;color:var(--green);min-height:16px;"},"");
        if(requiresTextForSchedule) frag.appendChild(copyBtnFor(()=>state.textPasted));
        frag.appendChild(el("button",{class:"btn-secondary", style:"margin:6px 0;", onclick:()=>{
          const link = document.createElement("a");
          link.download = `${platform.toLowerCase().replace(/\s+/g,"-")}-${uid()}.jpg`;
          link.href = previewImg.dataUrl;
          link.click();
        }}, [svgIcon(ICONS.download,14), el("span",{},"Télécharger l'image")]));
        frag.appendChild(el("button",{class:"btn-ghost", style:"margin:6px 0;display:block;", onclick:()=>{
          state.scheduled.push({
            id: uid(), platform, mission: state.mission, topic: state.topic,
            textFinal: state.textPasted, altText: state.pendingAltText || null, imageDataUrl: previewImg.dataUrl, schedulable: false,
            scheduledAt: null, status: "validé", createdAt: Date.now(), sentAt: null, error: null,
          });
          LS.set("vf-scheduled", state.scheduled);
          manualMsg.textContent = "Archivé dans le Calendrier ✓ (statut Validé, pour garder une trace).";
          renderMain();
        }}, "Garder une trace dans le Calendrier"));
        frag.appendChild(manualMsg);
      }
    }
  }

  return frag;
}

/* ============================================================
   ONGLET CALENDRIER — programmation et archive des publications
============================================================ */
const SCHEDULE_STATUS_LABEL = { "brouillon":"📝 Brouillon", "validé":"☑️ Validé", "programmé":"⏳ Programmé", "envoyé":"✅ Envoyé", "erreur":"⚠️ Erreur" };
function buildCalendarCard(item, inCampaign){
  const card = el("div",{class:"history-card"});
  card.appendChild(el("div",{class:"history-top"},[
    el("span",{}, `${item.platform} · ${item.mission||"—"}`),
    el("span",{}, SCHEDULE_STATUS_LABEL[item.status]||item.status),
  ]));
  card.appendChild(el("div",{style:"font-size:13px;color:var(--muted);margin-bottom:6px;"}, item.topic));
  if(item.scheduledAt) card.appendChild(el("div",{style:"font-size:12px;color:var(--muted2);"}, `Programmé pour : ${new Date(item.scheduledAt).toLocaleString("fr-FR")}`));
  if(item.sentAt) card.appendChild(el("div",{style:"font-size:12px;color:var(--green);"}, `Envoyé le : ${new Date(item.sentAt).toLocaleString("fr-FR")}`));
  if(item.error) card.appendChild(el("div",{style:"font-size:12px;color:var(--coral);"}, `Erreur : ${item.error}`));

  const requiresText = !!item.textPrompt;
  const needsContent = inCampaign && ((requiresText && (!item.textFinal || !item.textFinal.trim())) || !item.imageDataUrl);
  if(needsContent){
    card.appendChild(el("p",{class:"label", style:"margin-top:10px;"}, "Prompt image"));
    card.appendChild(vfWrap(el("div",{class:"card", style:"margin-bottom:6px;"},[el("pre",{}, item.imagePrompt)])));
    card.appendChild(copyBtnFor(()=>item.imagePrompt));

    const imgApiStatus = el("p",{style:"font-size:12px;color:var(--muted2);min-height:16px;margin:4px 0;"},"");
    const openaiProvider = state.apiProviders.find(p=>p.kind==="openai-compatible" && (p.baseUrl||"").includes("api.openai.com")) || DEFAULT_OPENAI_PROVIDER;
    if(openaiProvider){
      const imgApiBtn = el("button",{class:"btn-secondary", style:"margin:6px 0;"}, [svgIcon(ICONS.wand,14), el("span",{},"Générer l'image via l'API")]);
      const imgCancelBtn = el("button",{class:"btn-secondary", style:"margin:6px 0 6px 8px;display:none;"}, "Annuler le suivi");
      let activeCancelToken = null;
      imgCancelBtn.addEventListener("click", ()=>{
        if(activeCancelToken) activeCancelToken.cancelled = true;
      });
      imgApiBtn.addEventListener("click", async ()=>{
        if(!confirm("Lancer la génération d'image via OpenAI ? Ceci consomme du crédit API.")) return;
        imgApiBtn.disabled = true; // évite une double génération pour cette même déclinaison
        imgCancelBtn.style.display = "inline-block";
        const t0 = Date.now();
        const size = API_IMAGE_SIZE_BY_PLATFORM[item.platform] || "1024x1024";
        const cancelToken = { cancelled:false };
        activeCancelToken = cancelToken;
        try{
          const siblingImage = getCampaignSiblingImage(item.campaignId, item.id);
          const generationResult = await callProviderImage(item.imagePrompt, size, siblingImage ? [siblingImage] : undefined, (label)=>{ imgApiStatus.textContent = label; }, cancelToken);
          let dataUrl = generationResult.dataUrl;
          const { usedReference, referenceFallbackReason } = generationResult;
          let logoApplied = false;
          if(logoRequiredFor(item.platform)){
            const composited = await compositeBrandSignature(dataUrl, item.platform);
            dataUrl = composited.dataUrl; logoApplied = composited.applied;
          }
          item.imageDataUrl = dataUrl; item.logoApplied = logoApplied; item.usedReference = usedReference; item.referenceFallbackReason = referenceFallbackReason;
          const saved = LS.set("vf-scheduled", state.scheduled);
          logToLab({ provider:"OpenAI", model:"gpt-image-1-mini", type:"image", prompt:item.imagePrompt, promptHash:hashPrompt(item.imagePrompt), cost:null, durationMs:Date.now()-t0, status:"accepted" });
          let referenceLabel;
          if(usedReference) referenceLabel = "Référence visuelle utilisée ✓";
          else if(referenceFallbackReason) referenceLabel = "Référence non utilisée — génération standard de secours.";
          else referenceLabel = "Génération standard — aucune référence visuelle fournie.";
          imgApiStatus.textContent = (!saved ? "Générée, mais échec d'enregistrement (stockage plein ?)."
            : logoRequiredFor(item.platform) ? (logoApplied ? "Image générée, logo réel appliqué ✓" : "Image générée — aucun logo marqué comme actif de marque, rien n'a été ajouté.")
            : "Image générée ✓") + " — " + referenceLabel;
          renderMain();
        }catch(err){
          const cancelled = String(err.message||err)==="__CANCELLED__";
          imgApiStatus.textContent = cancelled ? "Suivi annulé (la génération continue peut-être côté serveur)." : `Échec (${err.message||err}) — utilise l'import manuel ci-dessous.`;
        }
        imgApiBtn.disabled = false;
        imgCancelBtn.style.display = "none";
        activeCancelToken = null;
      });
      card.appendChild(imgApiBtn);
      card.appendChild(imgCancelBtn);
    }
    const imgFileInput = el("input",{type:"file", accept:"image/*", style:"display:none"});
    imgFileInput.addEventListener("change", async (e)=>{
      const file = e.target.files[0]; if(!file) return;
      let dataUrl = await resizeImageFile(file);
      let logoApplied = false;
      if(logoRequiredFor(item.platform)){
        const composited = await compositeBrandSignature(dataUrl, item.platform);
        dataUrl = composited.dataUrl; logoApplied = composited.applied;
      }
      item.imageDataUrl = dataUrl; item.logoApplied = logoApplied;
      const saved = LS.set("vf-scheduled", state.scheduled);
      imgApiStatus.textContent = !saved ? "Importée, mais échec d'enregistrement (stockage plein ?)."
        : logoRequiredFor(item.platform) ? (logoApplied ? "Image importée, logo réel appliqué ✓" : "Image importée — aucun logo marqué comme actif de marque, rien n'a été ajouté.")
        : "Image importée ✓";
      renderMain();
    });
    card.appendChild(imgFileInput);
    card.appendChild(el("button",{class:"btn-secondary", style:"margin:6px 0;", onclick:()=>imgFileInput.click()}, [svgIcon(ICONS.upload,14), el("span",{},"Importer une image")]));
    card.appendChild(imgApiStatus);

    if(item.textPrompt){
      card.appendChild(el("p",{class:"label", style:"margin-top:10px;"}, "Prompt texte"));
      card.appendChild(vfWrap(el("div",{class:"card", style:"margin-bottom:6px;"},[el("pre",{}, item.textPrompt)])));
      card.appendChild(copyBtnFor(()=>item.textPrompt));
      const pastedArea = el("textarea",{rows:"4", placeholder:"Colle ici la réponse texte de ChatGPT...", style:"margin:6px 0;"}, item.textFinal);
      pastedArea.addEventListener("input", e=>{ item.textFinal = e.target.value; LS.set("vf-scheduled", state.scheduled); });
      card.appendChild(pastedArea);
    }

    const checklist = buildValidationChecklist({
      platform: item.platform, textPrompt: item.textPrompt, getTextResult: ()=>item.textFinal,
      hasImage: !!item.imageDataUrl, logoApplied: !!item.logoApplied, prestationName: null,
      missionKey: item.mission, schedulable: item.schedulable,
    });
    if(checklist.total>0){
      card.appendChild(el("p",{class:"label", style:"margin-top:10px;"}, "Checklist"));
      checklist.checks.forEach(c=>{
        card.appendChild(el("div",{class:"learning-row", style:`color:${c.ok?"var(--green)":"var(--coral)"};font-size:12px;`}, `${c.ok?"✅":"⚠️"} ${c.label}`));
      });
    }

    const validateMsg = el("p",{style:"font-size:12px;color:var(--coral);min-height:14px;margin:4px 0;"},"");
    card.appendChild(el("button",{class:"btn-secondary", style:"margin-bottom:6px;", onclick: async ()=>{
      if((requiresText && (!item.textFinal || !item.textFinal.trim())) || !item.imageDataUrl){
        validateMsg.textContent = requiresText ? "Texte et image requis avant de valider." : "Image requise avant de valider.";
        return;
      }
      item.status = "validé";
      const ok = pushToServerSilentSafe();
      LS.set("vf-scheduled", state.scheduled);
      validateMsg.style.color = "var(--green)";
      validateMsg.textContent = "Validé ✓";
      renderMain();
    }}, "☑️ Valider ce contenu"));
    card.appendChild(validateMsg);
  }

  const row = el("div",{style:"display:flex;gap:10px;align-items:flex-start;margin-top:8px;"});
  if(item.imageDataUrl) row.appendChild(el("img",{src:item.imageDataUrl, style:"width:70px;height:70px;object-fit:cover;border-radius:8px;flex-shrink:0;"}));
  row.appendChild(el("div",{style:"font-size:12px;color:var(--muted);flex:1;white-space:pre-wrap;"}, (item.textFinal||"").slice(0,180)+((item.textFinal||"").length>180?"...":"")));
  card.appendChild(row);

  const actionsRow = el("div",{style:"display:flex;gap:8px;margin-top:10px;flex-wrap:wrap;"});
  const isSchedulable = item.schedulable !== false;
  if(isSchedulable){
    if(item.status==="brouillon" || item.status==="validé" || item.status==="erreur"){
      const dt = el("input",{type:"datetime-local", style:"flex:1;background:var(--card);border:1px solid var(--border);border-radius:8px;padding:6px 8px;font-size:12px;"});
      dt.addEventListener("change", e=>{
        item.scheduledAt = new Date(e.target.value).getTime();
        item.status = "programmé"; item.error = null;
        LS.set("vf-scheduled", state.scheduled);
        pushToServerSilentSafe();
        renderMain();
      });
      actionsRow.appendChild(dt);
    }
    if(item.status==="programmé"){
      actionsRow.appendChild(el("button",{class:"btn-small", onclick:()=>{
        item.status="brouillon"; item.scheduledAt=null;
        LS.set("vf-scheduled", state.scheduled); renderMain();
      }}, "Retirer la date"));
    }
  } else {
    const hint = item.platform==="Story"
      ? "Story non programmable — télécharge l'image et publie-la toi-même en story sur Instagram et/ou Facebook."
      : "Article non programmable — copie le texte et télécharge l'image, puis publie-les toi-même dans Wix.";
    card.appendChild(el("p",{class:"sublabel", style:"margin:6px 0;"}, hint));
    if(item.textFinal) actionsRow.appendChild(copyBtnFor(()=>item.textFinal||""));
    if(item.imageDataUrl){
      actionsRow.appendChild(el("button",{class:"btn-small", onclick:()=>{
        const link = document.createElement("a");
        link.download = `${(item.platform||"blog").toLowerCase().replace(/\s+/g,"-")}-${item.id}.jpg`;
        link.href = item.imageDataUrl;
        link.click();
      }}, "Télécharger l'image"));
    }
  }
  actionsRow.appendChild(el("button",{class:"btn-small", onclick:()=>{
    if(!confirm("Supprimer définitivement ce post de l'archive ?")) return;
    state.scheduled = state.scheduled.filter(s=>s.id!==item.id);
    LS.set("vf-scheduled", state.scheduled); renderMain();
  }}, svgIcon(ICONS.trash,12)));
  card.appendChild(actionsRow);

  return card;
}

/* Pousse en arrière-plan sans bloquer l'UI ni exiger un await partout ; ignore silencieusement l'échec
   (l'auto-sync debouncée prendra quand même le relais dans la foulée). */
function pushToServerSilentSafe(){
  pushToServerSilent().catch(()=>{});
  return true;
}

function buildCalendarTab(){
  const frag = el("div",{});

  frag.appendChild(el("p",{class:"label"},"Webhook Make"));
  frag.appendChild(el("p",{class:"sublabel"},"L'URL de ton scénario Make (déclenchement webhook). À la date programmée, SDZ App l'appelle automatiquement — une seule fois par post, comme ton run manuel actuel."));
  const webhookInput = el("input",{type:"text", value: state.makeWebhook, placeholder:"https://hook.eu2.make.com/..."});
  webhookInput.addEventListener("input", e=>{ state.makeWebhook = e.target.value; LS.set("vf-make-webhook", e.target.value); });
  frag.appendChild(el("div",{style:"margin-bottom:12px;"}, webhookInput));

  const actionMsg = el("p",{style:"font-size:12px;color:var(--muted2);min-height:16px;margin:0 0 10px;"},"");
  const actionsRow = el("div",{class:"pillrow", style:"margin-bottom:16px;"});

  actionsRow.appendChild(el("button",{class:"btn-small", onclick: async ()=>{
    actionMsg.style.color="var(--muted2)"; actionMsg.textContent="Actualisation depuis le serveur...";
    try{
      const res = await fetch("/.netlify/functions/load-data", { method:"GET", headers: syncHeaders() });
      const result = await res.json();
      if(result && result.data && result.data["vf-scheduled"]){
        state.scheduled = result.data["vf-scheduled"];
        localStorage.setItem("vf-scheduled", JSON.stringify(state.scheduled));
        actionMsg.style.color="var(--green)"; actionMsg.textContent="Statuts actualisés depuis le serveur ✓";
      } else {
        actionMsg.style.color="var(--amber)"; actionMsg.textContent="Aucune donnée de calendrier trouvée côté serveur.";
      }
    }catch(e){ actionMsg.style.color="var(--coral)"; actionMsg.textContent="Échec de l'actualisation : "+String(e.message||e); }
    renderMain();
  }}, "🔄 Actualiser les statuts"));

  actionsRow.appendChild(el("button",{class:"btn-small", onclick: async ()=>{
    if(!state.makeWebhook){ actionMsg.style.color="var(--coral)"; actionMsg.textContent="Renseigne d'abord l'URL du webhook Make ci-dessus."; return; }
    actionMsg.style.color="var(--muted2)"; actionMsg.textContent="Test du webhook en cours...";
    try{
      const res = await fetch(state.makeWebhook, { method:"POST", headers:{"Content-Type":"application/json"}, body: JSON.stringify({ test:true, source:"Viewfinder - test manuel" }) });
      actionMsg.style.color = res.ok ? "var(--green)" : "var(--coral)";
      actionMsg.textContent = `Make a répondu HTTP ${res.status}${res.ok ? " ✓" : " — vérifie que le scénario est actif"}.`;
    }catch(e){ actionMsg.style.color="var(--coral)"; actionMsg.textContent="Échec de connexion au webhook : "+String(e.message||e); }
  }}, "🧪 Tester le webhook"));

  actionsRow.appendChild(el("button",{class:"btn-small", onclick: async ()=>{
    actionMsg.style.color="var(--muted2)"; actionMsg.textContent="Déclenchement de l'envoi en cours...";
    try{
      const res = await fetch("/.netlify/functions/check-scheduled-posts");
      const result = await res.json();
      actionMsg.style.color="var(--green)";
      actionMsg.textContent = `Vérifié : ${result.checked||0} post(s) au total, ${result.due||0} éligible(s), ${result.sent||0} envoyé(s), ${result.errors||0} erreur(s).`;
    }catch(e){ actionMsg.style.color="var(--coral)"; actionMsg.textContent="Échec : "+String(e.message||e); }
    renderMain();
  }}, "🚀 Envoyer maintenant"));

  actionsRow.appendChild(el("button",{class:"btn-small", onclick:()=>{
    let count = 0;
    state.scheduled.forEach(p=>{
      if(p.status!=="brouillon") return;
      const requiresText = !!p.textPrompt;
      const ready = (!requiresText || (p.textFinal && p.textFinal.trim())) && p.imageDataUrl;
      if(ready){ p.status="validé"; count++; }
    });
    LS.set("vf-scheduled", state.scheduled);
    pushToServerSilentSafe();
    actionMsg.style.color = count ? "var(--green)" : "var(--amber)";
    actionMsg.textContent = count ? `${count} contenu(s) validé(s) ✓` : "Aucun contenu prêt à valider (image requise partout, texte requis sauf pour les Stories).";
    renderMain();
  }}, "☑️ Valider la campagne"));

  frag.appendChild(actionsRow);
  frag.appendChild(actionMsg);

  if(!state.scheduled.length){
    frag.appendChild(el("p",{class:"hint"},"Aucun post programmé ou en brouillon pour l'instant. Génère un post dans \"Créer un post\" (seul ou en campagne complète), valide le texte et l'image, puis programme-le."));
    return frag;
  }

  const campaignIds = [...new Set(state.scheduled.filter(p=>p.campaignId).map(p=>p.campaignId))]
    .sort((a,b)=>{
      const ca = state.scheduled.find(p=>p.campaignId===a) || {};
      const cb = state.scheduled.find(p=>p.campaignId===b) || {};
      return (cb.createdAt||0)-(ca.createdAt||0);
    });

  campaignIds.forEach(cid=>{
    const items = state.scheduled.filter(p=>p.campaignId===cid);
    const topic = items[0].campaignTopic || items[0].topic || "(sans thème)";
    frag.appendChild(el("h2",{class:"section"}, `📦 Campagne — ${topic.length>60 ? topic.slice(0,60)+"..." : topic}`));
    items.forEach(item=> frag.appendChild(buildCalendarCard(item, true)));
  });

  const standalone = state.scheduled.filter(p=>!p.campaignId);
  if(standalone.length){
    if(campaignIds.length) frag.appendChild(el("h2",{class:"section"},"Posts individuels"));
    const sorted = standalone.slice().sort((a,b)=>{
      const order = {"programmé":0, "validé":1, "brouillon":2, "erreur":3, "envoyé":4};
      if(order[a.status]!==order[b.status]) return order[a.status]-order[b.status];
      return (a.scheduledAt||Infinity) - (b.scheduledAt||Infinity);
    });
    sorted.forEach(item=> frag.appendChild(buildCalendarCard(item, false)));
  }

  return frag;
}

function scoreRow(label, val){
  const pct = val==null ? 0 : val*10;
  const color = val==null ? "var(--muted2)" : pct>=70 ? "var(--green)" : pct>=45 ? "var(--amber)" : "var(--coral)";
  return el("div",{style:"margin-bottom:8px;"},[
    el("div",{style:"display:flex;justify-content:space-between;font-size:12px;color:var(--muted);margin-bottom:3px;"},
      [el("span",{},label), el("span",{style:`color:${color};font-weight:600;`}, val!=null? `${val}/10` : "—")]),
    el("div",{style:"height:5px;background:rgba(255,255,255,0.08);border-radius:3px;overflow:hidden;"},[
      el("div",{style:`height:100%;width:${pct}%;background:${color};`}),
    ]),
  ]);
}
function renderAuditReport(report){
  const frag = el("div",{class:"card", style:"margin-bottom:16px;"});
  frag.appendChild(el("div",{style:"text-align:center;margin-bottom:14px;"},[
    el("div",{style:"font-size:11px;color:var(--muted2);text-transform:uppercase;letter-spacing:.06em;"},"Score global"),
    el("div",{style:"font-size:32px;font-weight:700;color:var(--lime);"}, report.global!=null?`${report.global}/10`:"—"),
  ]));
  [["Respect de la charte",report.charte],["Cohérence marque",report.coherence],["Respect plateforme",report.plateforme],
   ["SEO",report.seo],["Conversion",report.conversion],["Clarté",report.clarte],
   ["Qualité rédactionnelle",report.redaction],["Qualité direction artistique",report.da],
   ["Originalité",report.originalite],["Risque de répétition",report.repetition]]
   .forEach(([label,val])=> frag.appendChild(scoreRow(label,val)));

  if(report.pointsForts.length){
    frag.appendChild(el("p",{class:"label", style:"margin-top:14px;"},"Points forts"));
    report.pointsForts.forEach(p=> frag.appendChild(el("div",{class:"learning-row", style:"color:var(--green);"}, `+ ${p}`)));
  }
  if(report.pointsFaibles.length){
    frag.appendChild(el("p",{class:"label", style:"margin-top:10px;"},"Points faibles"));
    report.pointsFaibles.forEach(p=> frag.appendChild(el("div",{class:"learning-row", style:"color:var(--coral);"}, `− ${p}`)));
  }
  if(report.recommandations.length){
    frag.appendChild(el("p",{class:"label", style:"margin-top:10px;"},"Recommandations"));
    report.recommandations.forEach(p=> frag.appendChild(el("div",{class:"learning-row"}, `→ ${p}`)));
  }
  return frag;
}
function buildAuditTab(){
  const frag = el("div",{});
  const ctx = state.lastGenerated;

  if(!ctx){
    frag.appendChild(el("p",{class:"hint"},"Génère d'abord un contenu depuis l'onglet \"Créer un post\", puis clique sur \"Analyser avec ChatGPT\"."));
  } else {
    frag.appendChild(el("h2",{class:"section"},"Contenu à analyser"));
    frag.appendChild(el("p",{class:"sublabel"}, `${ctx.campaignLabel || ctx.platform} · Mission : ${ctx.missionKey || "non spécifiée"} · Sujet : ${ctx.topic}`));

    frag.appendChild(el("button",{class:"btn-primary", style:"margin-bottom:14px;", onclick: ()=>{
      state.auditPrompt = buildAuditPromptText(ctx);
      renderMain();
    }}, [svgIcon(ICONS.sparkles,16), el("span",{},"Générer le prompt d'audit")]));

    if(state.auditPrompt){
      frag.appendChild(vfWrap(el("div",{class:"card", style:"margin-bottom:6px;"},[el("pre",{}, state.auditPrompt)])));
      frag.appendChild(copyBtnFor(()=>state.auditPrompt));
      frag.appendChild(el("p",{class:"sublabel"},"Colle ce prompt dans ChatGPT (dans la conversation où l'image a été générée si possible), puis colle sa réponse ci-dessous."));

      const pastedArea = el("textarea",{rows:"6", placeholder:"Colle ici le rapport structuré de ChatGPT..."}, state.auditPasted);
      pastedArea.addEventListener("input", e=>{ state.auditPasted = e.target.value; });
      frag.appendChild(el("div",{style:"margin:10px 0;"}, pastedArea));

      frag.appendChild(el("button",{class:"btn-primary", style:"margin-bottom:20px;", onclick: ()=>{
        if(!state.auditPasted.trim()) return;
        const report = parseAuditReport(state.auditPasted);
        const entry = { id: uid(), date: nowStr(), platform: ctx.platform, missionKey: ctx.missionKey, topic: ctx.topic, ...report };
        state.auditHistory.push(entry);
        LS.set("vf-audit", state.auditHistory);
        state.auditPasted = ""; state.auditPrompt = "";
        renderMain();
      }}, "Importer le rapport dans l'historique d'audit"));
    }

    const last = state.auditHistory[state.auditHistory.length-1];
    if(last){
      frag.appendChild(el("h2",{class:"section"},"Dernier audit importé"));
      frag.appendChild(renderAuditReport(last));
      if(last.recommandations && last.recommandations.length){
        frag.appendChild(el("button",{class:"btn-secondary", style:"margin-bottom:24px;", onclick: ()=>{
          last.recommandations.forEach(r=>{
            state.modules.push({ id: uid(), category:"Leçons apprises",
              title: `Recommandation audit ${last.platform} — ${last.date}`, content:r, enabled:true });
          });
          LS.set("vf-modules", state.modules);
          alert("Recommandations ajoutées à la base de connaissances (catégorie Leçons apprises).");
        }}, "Ajouter ces recommandations à la base de connaissances"));
      }
    }
  }

  frag.appendChild(el("h2",{class:"section"},"Historique des audits"));
  const filterRow = el("div",{class:"pillrow", style:"margin-bottom:14px;"});
  ["Toutes",...PLATFORMS].forEach(p=>{
    filterRow.appendChild(el("button",{class:"pill"+(state.auditFilter===p?" active":""), onclick:()=>{ state.auditFilter=p; renderMain(); }}, p));
  });
  frag.appendChild(filterRow);

  const list = state.auditHistory.filter(a=> state.auditFilter==="Toutes" || a.platform===state.auditFilter).slice().reverse();
  if(list.length===0){
    frag.appendChild(el("p",{class:"hint"},"Aucun audit enregistré pour l'instant."));
  } else {
    list.forEach(a=>{
      const details = el("details",{class:"history-card"});
      details.appendChild(el("summary",{style:"cursor:pointer;display:flex;justify-content:space-between;font-size:13px;"},[
        el("span",{}, `${a.platform} · ${a.date}`),
        el("span",{style:"color:var(--lime);font-weight:600;"}, a.global!=null?`${a.global}/10`:"—"),
      ]));
      details.appendChild(renderAuditReport(a));
      frag.appendChild(details);
    });
  }

  return frag;
}

      el("div",{style:"font-size:13px;color:var(--muted);margin-bottom:4px;"}, `Sujet : ${h.topic}`),
      h.textResult ? el("div",{style:"font-size:13px;white-space:pre-wrap;"}, h.textResult.slice(0,200)+(h.textResult.length>200?"...":"")) : null,
      favBtn, excludeBtn, details,
    ]));
  });
  return frag;
}
