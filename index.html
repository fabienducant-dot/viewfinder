<style>
  :root{
    --bg:#1B1230; --card:rgba(255,255,255,0.05); --card2:rgba(255,255,255,0.08); --border:rgba(255,255,255,0.13);
    --text:#F4F1EA; --muted:#B8B4C9; --muted2:#8B899C;
    --coral:#FF5D73; --lime:#D4F14C; --amber:#FFB020; --blue:#4C6EF5; --green:#3ECF8E;
  }
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;background:var(--bg);color:var(--text);font-family:-apple-system,Segoe UI,Roboto,Helvetica,Arial,sans-serif;}
  button{font-family:inherit;cursor:pointer;border:none;background:none;color:inherit;}
  input,textarea,select{font-family:inherit;color:inherit;background:transparent;}
  ::-webkit-scrollbar{width:6px;height:6px}
  ::-webkit-scrollbar-thumb{background:#4C3D66;border-radius:3px}

  header{position:sticky;top:0;z-index:10;background:rgba(27,18,48,0.97);border-bottom:1px solid var(--border);
    padding:14px 18px;display:flex;align-items:center;justify-content:space-between;}
  .brand{display:flex;align-items:center;gap:8px;font-weight:700;font-size:18px;letter-spacing:-0.02em;}
  .dot-ring{width:26px;height:26px;border-radius:50%;border:2px solid var(--coral);display:flex;align-items:center;justify-content:center;}
  .dot-ring i{width:8px;height:8px;border-radius:50%;background:var(--lime);}
  .count{font-size:12px;color:var(--muted);}

  nav{display:flex;gap:6px;padding:12px 16px 0;overflow-x:auto;}
  nav button{padding:8px 14px;border-radius:999px;font-size:13px;white-space:nowrap;color:var(--muted);transition:background .15s;}
  nav button.active{background:var(--coral);color:var(--bg);font-weight:600;}
  nav button:not(.active):hover{background:rgba(255,255,255,0.06);}

  main{padding:16px;padding-bottom:80px;max-width:560px;margin:0 auto;}
  .hint{text-align:center;color:var(--muted2);font-size:14px;margin-top:32px;}
  .label{font-size:11px;text-transform:uppercase;letter-spacing:.06em;color:var(--muted2);margin-bottom:8px;}
  .sublabel{font-size:12px;color:var(--muted2);margin:-6px 0 14px;line-height:1.5;}
  h2.section{font-size:16px;font-weight:700;margin:26px 0 4px;padding-top:14px;border-top:1px solid var(--border);}
  h2.section:first-child{margin-top:0;padding-top:0;border-top:none;}

  .upload-zone{width:100%;border:2px dashed rgba(255,255,255,0.2);border-radius:18px;padding:28px 10px;
    display:flex;flex-direction:column;align-items:center;gap:8px;color:var(--muted);margin-bottom:16px;transition:.15s;}
  .upload-zone:hover{border-color:rgba(255,93,115,0.6);color:var(--coral);}

  .grid2{display:grid;grid-template-columns:1fr 1fr;gap:12px;}
  .thumb{position:relative;aspect-ratio:1/1;border-radius:12px;overflow:hidden;cursor:pointer;}
  .thumb img{width:100%;height:100%;object-fit:cover;display:block;}
  .thumb .del,.thumb .fav{position:absolute;top:6px;background:rgba(0,0,0,0.6);border-radius:999px;padding:6px;opacity:0;transition:.15s;}
  .thumb .del{right:6px;} .thumb .fav{left:6px;}
  .thumb:hover .del,.thumb:hover .fav{opacity:1;}
  .thumb .fav.active{opacity:1;color:var(--amber);}
  .thumb .tags{position:absolute;bottom:0;left:0;right:0;background:linear-gradient(transparent,rgba(0,0,0,0.75));
    padding:14px 6px 5px;font-size:10px;color:var(--muted);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}

  .vf{position:relative;}
  .vf .corner{position:absolute;width:20px;height:20px;border-color:var(--amber);}
  .vf .tl{top:0;left:0;border-top:2px solid;border-left:2px solid;border-top-left-radius:4px;}
  .vf .tr{top:0;right:0;border-top:2px solid;border-right:2px solid;border-top-right-radius:4px;}
  .vf .bl{bottom:0;left:0;border-bottom:2px solid;border-left:2px solid;border-bottom-left-radius:4px;}
  .vf .br{bottom:0;right:0;border-bottom:2px solid;border-right:2px solid;border-bottom-right-radius:4px;}

  .pillrow{display:flex;gap:8px;flex-wrap:wrap;}
  .pill{padding:7px 14px;border-radius:999px;font-size:13px;border:1px solid rgba(255,255,255,0.15);color:var(--muted);}
  .pill.active{background:var(--lime);color:var(--bg);border-color:var(--lime);font-weight:600;}
  .badge{display:inline-block;font-size:10px;padding:2px 8px;border-radius:999px;background:rgba(76,110,245,0.2);color:#8FA6FF;}

  textarea,input[type=text],select{width:100%;background:var(--card);border:1px solid var(--border);border-radius:10px;
    padding:9px 12px;font-size:14px;outline:none;resize:none;}
  textarea:focus,input[type=text]:focus,select:focus{border-color:var(--coral);}
  input[type=range]{width:100%;accent-color:var(--coral);}
  input[type=checkbox]{width:16px;height:16px;accent-color:var(--coral);}

  .btn-primary{width:100%;background:var(--coral);color:var(--bg);font-weight:600;border-radius:999px;padding:13px;
    display:flex;align-items:center;justify-content:center;gap:8px;font-size:15px;}
  .btn-primary:hover{filter:brightness(1.08);}
  .btn-secondary{width:100%;background:rgba(76,110,245,0.18);color:#8FA6FF;font-weight:600;border-radius:999px;padding:10px;
    display:flex;align-items:center;justify-content:center;gap:8px;font-size:14px;}
  .btn-small{background:var(--card);border-radius:8px;padding:6px 10px;font-size:12px;display:inline-flex;align-items:center;gap:5px;}
  .btn-ghost{flex:1;background:var(--card);border-radius:999px;padding:9px;font-size:13px;
    display:flex;align-items:center;justify-content:center;gap:6px;}
  .btn-ghost.active{background:var(--lime);color:var(--bg);font-weight:600;}

  .card{background:var(--card);border:1px solid var(--border);border-radius:14px;padding:14px;}
  .module-card{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:12px;margin-bottom:8px;}
  .module-head{display:flex;align-items:center;justify-content:space-between;gap:8px;margin-bottom:6px;}
  .module-title{font-weight:600;font-size:14px;}
  .module-cat{font-size:10px;color:var(--muted2);}
  .module-content{font-size:13px;color:var(--muted);white-space:pre-wrap;line-height:1.5;}

  .history-card{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:12px;margin-bottom:10px;}
  .history-top{display:flex;justify-content:space-between;align-items:center;font-size:12px;color:var(--muted2);margin-bottom:6px;}

  .slider-block{margin-bottom:14px;}
  .slider-block .row{display:flex;justify-content:space-between;font-size:12px;color:var(--muted);margin-bottom:4px;}
  .field{margin-bottom:12px;}
  .field label{display:block;font-size:12px;color:var(--muted);margin-bottom:5px;}

  canvas{width:100%;height:auto;display:block;background:#000;border-radius:12px;touch-action:none;cursor:crosshair;}
  pre{white-space:pre-wrap;font-size:12px;color:var(--muted);max-height:240px;overflow-y:auto;margin:0;font-family:ui-monospace,monospace;}
  svg{display:inline-block;vertical-align:middle;flex-shrink:0;}

</head>

/* ============================================================
   NETTOYAGE UNIQUE — purge ciblée par nom exact, jamais un reset global.
   S'exécute une seule fois (verrou vf-cleanup-2026-07) puis ne touche plus rien.
   Ne supprime QUE les entrées explicitement listées ci-dessous ; tout le reste
   (styles SDZ, modules importés, historique, audits, réglages) reste intact.
============================================================ */
(function runOneTimeCleanup(){
  const FLAG = "vf-cleanup-2026-07";
  if(LS.get(FLAG, false)) return;

  const DELETE_STYLE_NAMES = ["noir & or","editorial","éditorial","cinématique","refuge",
    "énergétique","energetique","nature","montagne","été","ete","mystique premium"];
  try{
    const styles = LS.get("vf-styles", null);
    if(Array.isArray(styles)){
      const seen = new Set();
      const cleaned = [];
      styles.forEach(s=>{
        const norm = (s.name||"").trim().toLowerCase();
        if(DELETE_STYLE_NAMES.includes(norm)) return;      // style à supprimer explicitement
        if(seen.has(norm)) return;                          // doublon (ex: "Luxe silencieux" en double)
        seen.add(norm);
        cleaned.push(s);
      });
      if(cleaned.length !== styles.length) LS.set("vf-styles", cleaned);
    }
  }catch(e){ console.error("Nettoyage styles échoué :", e); }

  const DELETE_MODULES = [
    { category:"Charte graphique", title:"Ton & identité visuelle" },
    { category:"Interdits", title:"Interdits généraux" },
    { category:"Règles rédactionnelles", title:"Structure générale" },
    { category:"Direction artistique", title:"Style par défaut" },
    { category:"Univers de marque", title:"Présentation de la marque" },
  ];
  try{
    const modules = LS.get("vf-modules", null);
    if(Array.isArray(modules)){
      const cleaned = modules.filter(m =>
        !DELETE_MODULES.some(d => d.category===m.category && d.title===m.title)
      );
      if(cleaned.length !== modules.length) LS.set("vf-modules", cleaned);
    }
  }catch(e){ console.error("Nettoyage modules échoué :", e); }

  LS.set(FLAG, true);
})();

function el(tag, attrs={}, children=[]){
  const e = document.createElement(tag);
  for(const [k,v] of Object.entries(attrs)){
    if(k==="class") e.className = v;
    else if(k==="html") e.innerHTML = v;
    else if(k.startsWith("on")) e.addEventListener(k.slice(2), v);
    else if(k==="checked"){ e.checked = v; }
    else e.setAttribute(k, v);
  }
  (Array.isArray(children)?children:[children]).forEach(c=>{
    if(c==null) return;
    e.appendChild(typeof c === "string" ? document.createTextNode(c) : c);
  });
  return e;
}

function resizeImageFile(file, maxDim=1600, quality=0.85){
  return new Promise((resolve, reject)=>{
    const reader = new FileReader();
    reader.onload = () => {
      const img = new Image();
      img.onload = () => {
        let {width,height} = img;
        if(width>maxDim || height>maxDim){
          if(width>height){ height = Math.round(height*maxDim/width); width = maxDim; }
          else { width = Math.round(width*maxDim/height); height = maxDim; }
        }
        const c = document.createElement("canvas"); c.width=width; c.height=height;
        c.getContext("2d").drawImage(img,0,0,width,height);
        resolve(c.toDataURL("image/jpeg", quality));
      };
      img.onerror = reject;
      img.src = reader.result;
    };
    reader.onerror = reject;
    reader.readAsDataURL(file);
  });
}
function loadImage(src){

   Modifiable ici sans toucher au reste du moteur si de nouvelles prestations apparaissent. */
const KNOWN_PRESTATIONS = [
  "Massage Zébré","Massage Ayurvédique Abhyanga","Massage Balinais","Massage Thaï traditionnel",
  "Massage Femme enceinte","Massage Enfant","Réflexologie plantaire thaïlandaise",

/* Fusionne le contenu de tous les modules "Prestations" activés, en éliminant les doublons exacts
   (si le même texte a été collé dans plusieurs modules). Ne modifie jamais les modules eux-mêmes. */
function getMergedPrestationsText(){
  const mods = state.modules.filter(m=>m.enabled && m.category==="Prestations");
  const seen = new Set();
  const parts = [];
  mods.forEach(m=>{
    const c = (m.content||"").trim();
    if(c && !seen.has(c)){ seen.add(c); parts.push(c); }
  });
  return parts.join("\n\n");
}
/* Repère, dans le texte fusionné, où commence chaque prestation connue et découpe le texte
   entre deux noms de prestations consécutifs pour isoler le bloc de détails de chacune. */
function extractPrestationBlocks(text){
  const found = [];
  KNOWN_PRESTATIONS.forEach(name=>{
    const idx = text.indexOf(name);
    if(idx !== -1) found.push({name, idx});
  });
  found.sort((a,b)=>a.idx-b.idx);
  const blocks = {};
  found.forEach((f,i)=>{
    const end = i+1<found.length ? found[i+1].idx : text.length;
    blocks[f.name] = text.slice(f.idx, end).trim();
  });
  return blocks;
}
function extractField(block, patterns){
  for(const re of patterns){ const m = block.match(re); if(m) return m[1].trim(); }
  return null;
}
const DURATION_PATTERNS = [/dur[ée]e\s*[:\-]\s*([^\n]+)/i, /(\d+\s*(?:min|minutes|h|heures)\b[^\n]*)/i];
const PRICE_PATTERNS = [/tarifs?\s*[:\-]\s*([^\n]+)/i, /prix\s*[:\-]\s*([^\n]+)/i, /(\d+[\.,]?\d*\s*€[^\n]*)/];
/* Champs de la "fiche prestation" enrichie : reconnus automatiquement s'ils sont écrits
   sous la forme "Label : contenu" dans le bloc de la prestation. Ceux non trouvés sont
   simplement omis — le bloc brut complet est de toute façon toujours transmis en renfort. */
const PRESTATION_FICHE_LABELS = ["histoire","émotion","psychologie","codes visuels","matières",
  "textures","lumière","composition","vocabulaire","cta","interdits","scène visuelle"];
function extractFicheFields(block){
  const found = {};
  PRESTATION_FICHE_LABELS.forEach(label=>{
    const re = new RegExp(label.replace(/[.*+?^${}()|[\]\\]/g,"\\$&")+"\\s*[:\\-]\\s*([^\\n]+)","i");
    const m = block.match(re);
    if(m) found[label] = m[1].trim();
  });
  return found;
}

/* ---------- MOTEUR DE CONTEXTE ----------
   Sélectionne les modules pertinents pour les catégories demandées, fusionne les doublons stricts
   (même titre + même contenu dans deux modules), trie selon la hiérarchie SDZ, puis applique un
   budget de caractères pour ne garder que ce qui a un réel impact — qualité plutôt que quantité. */
/* ---------- Paliers de priorité par catégorie ----------
   "always" : ADN de marque, ton, direction artistique, règles dures, CTA, mission, et catégories déjà
              spécifiques à la plateforme (via TEXT_MODULE_MAP) — jamais sacrifiées en premier.
   "rare"   : contenus de fond (glossaire, historique de décisions, exemples, leçons) — utiles mais
              plafonnés en nombre pour éviter le remplissage systématique.
   "context": tout le reste — inclus seulement s'il est réellement pertinent maintenant (voir plus bas). */
function moduleTier(category){
  const ALWAYS = ["MASTER SDZ","CODEX SDZ","Univers de marque","Charte graphique","Direction artistique",
    "Règles rédactionnelles","CTA","Missions","Interdits","À ne jamais faire","À faire",
    "Vocabulaire autorisé","Vocabulaire interdit","Logo","Palette","Typographies",
    "Instagram","Facebook","Google Business","Stories","Blog Wix","SEO"];
  const RARE = ["Décisions importantes","Glossaire","Erreurs fréquentes","Exemples excellents",
    "Exemples validés","Exemples refusés","Leçons apprises","Bibliothèque d'idées"];
  if(ALWAYS.includes(category)) return "always";
  if(RARE.includes(category)) return "rare";
  return "context";
}
/* Pertinence contextuelle réelle, calculée automatiquement (aucun réglage manuel ajouté à l'interface) :
   une connaissance "context" n'est injectée que si elle correspond à la situation actuelle. */
function isContextRelevantNow(m){
  if(m.category==="Saisonnalité"){
    const season = getCurrentSeasonFR().toLowerCase();
    return m.content.toLowerCase().includes(season);
  }
  if(m.category==="Offres"){
    const t = `${state.topic||""} ${state.prestationName||""} ${state.mission||""}`.toLowerCase();
    return t.includes("cadeau") || t.includes("offre") || state.mission==="Vendre des bons cadeaux";
  }
  return true; // Prestations, Psychologie client, Personae, Objections clients : pertinents dès qu'ils existent
}
/* Quasi-déduplication : au sein d'une même catégorie, deux connaissances au contenu très proche
   (ex : "Univers SDZ" et "Fondation SDZ" qui disent la même chose) ne sont injectées qu'une fois —
   on garde la plus complète des deux. Basé sur une similarité de mots, pas seulement un texte identique. */
function quasiDedup(mods){
  const kept = [];
  let removed = 0;
  mods.forEach(m=>{
    const dupIdx = kept.findIndex(k=> k.category===m.category && textSimilarity(k.content, m.content) > 0.6);
    if(dupIdx===-1){ kept.push(m); return; }
    removed++;
    if(m.content.length > kept[dupIdx].content.length) kept[dupIdx] = m;
  });
  return { kept, removed };
}

function selectModulesOrdered(categories, budgetChars){
  const allCats = [...new Set([...ALWAYS_ON_CATEGORIES, ...categories])];
  let mods = selectModules(allCats);
  const totalAvailable = mods.length;
  const lengthBefore = mods.reduce((s,m)=>s+m.content.length, 0);

  // 1. doublons stricts (contenu identique)
  const seen = new Set();
  let strictDuplicates = 0;
  mods = mods.filter(m=>{
    const key = m.category+"|"+m.title+"|"+m.content.trim();
    if(seen.has(key)){ strictDuplicates++; return false; }
    seen.add(key);
    return true;
  });
  // 2. quasi-doublons (idée très proche exprimée deux fois)
  const dedupResult = quasiDedup(mods);
  mods = dedupResult.kept;
  const duplicatesRemoved = strictDuplicates + dedupResult.removed;

  // 3. tri selon la hiérarchie SDZ
  const rank = c => { const i = HIERARCHY_ORDER.indexOf(c); return i===-1 ? HIERARCHY_ORDER.length : i; };
  mods = mods.map((m,i)=>({m,i})).sort((a,b)=> rank(a.m.category)-rank(b.m.category) || a.i-b.i).map(x=>x.m);

  // 4. paliers de priorité + pertinence contextuelle
  const always = mods.filter(m=> moduleTier(m.category)==="always");
  const contextAll = mods.filter(m=> moduleTier(m.category)==="context");
  const rareAll = mods.filter(m=> moduleTier(m.category)==="rare");
  const contextRelevant = contextAll.filter(isContextRelevantNow);
  const contextSkipped = contextAll.filter(m=>!isContextRelevantNow(m));

  // 5. construction budgétée : toujours en premier, puis contexte pertinent, puis rare (plafonné à 2)
  const kept = []; const ignored = [];
  let total = 0;
  const tryAdd = (m)=>{
    const len = m.content.length;
    if(kept.length===0 || total+len<=budgetChars){ kept.push(m); total+=len; return true; }
    ignored.push(m); return false;
  };
  always.forEach(tryAdd);
  contextRelevant.forEach(tryAdd);
  let rareAdded = 0;
  rareAll.forEach(m=>{
    if(rareAdded>=2){ ignored.push(m); return; }
    if(tryAdd(m)) rareAdded++;
  });
  ignored.push(...contextSkipped);

  const lengthAfter = kept.reduce((s,m)=>s+m.content.length, 0);
  const gainPercent = lengthBefore>0 ? Math.round((1 - lengthAfter/lengthBefore)*100) : 0;
  const tokensSaved = Math.max(0, Math.round((lengthBefore-lengthAfter)/4));
  // Indice de pertinence : part du contenu injecté qui est "toujours" ou "contexte pertinent" (par opposition au "rare")
  const highValueCount = always.filter(m=>kept.includes(m)).length + contextRelevant.filter(m=>kept.includes(m)).length;
  const relevanceIndex = kept.length>0 ? Math.round((highValueCount/kept.length)*100) : 100;

  return { kept, ignored, totalAvailable, totalKept: kept.length, duplicatesRemoved,
    lengthBefore, lengthAfter, gainPercent, tokensSaved, relevanceIndex };
}

/* ---------- score qualité : mesure automatique + auto-évaluation guidée ---------- */
function textSimilarity(a, b){
  const words = s => new Set(s.toLowerCase().split(/\W+/).filter(w=>w.length>3));
  const wa = words(a), wb = words(b);
  if(!wa.size || !wb.size) return 0;
  let inter = 0; wa.forEach(w=>{ if(wb.has(w)) inter++; });
  return inter / Math.min(wa.size, wb.size);
}
function computeRepetitionRisk(platform, text){
  if(!text || !text.trim()) return 0;
  const recents = state.history.filter(h=>h.platform===platform && h.textResult).slice(-6);
  if(!recents.length) return 0;
  let max = 0;
  recents.forEach(h=>{ const sim = textSimilarity(text, h.textResult); if(sim>max) max=sim; });
  return Math.round(max*100);
}

/* Empreinte simple (djb2) pour détecter un prompt identique déjà généré — évite un appel API inutile. */
function hashPrompt(text){
  let h = 5381;
  for(let i=0;i<text.length;i++){ h = ((h*33) ^ text.charCodeAt(i)) >>> 0; }
  return h.toString(36);
}
function findCachedResult(providerLabel, promptText){
  const hash = hashPrompt(promptText);
  return state.lab.find(l=> l.provider===providerLabel && l.promptHash===hash && l.status==="accepted") || null;
}

/* Tous les appels passent désormais par les fonctions serveur du même site Netlify

   Netlify). Le navigateur ne détient plus aucune clé et ne contacte jamais le fournisseur
   directement — ça évite le blocage CORS et sécurise les clés. */
async function callProviderText(provider, systemPrompt, userPrompt){
  const res = await fetch("/.netlify/functions/generate-text", {
    method:"POST",
    headers: { "Content-Type":"application/json" },
    body: JSON.stringify({ kind: provider.kind, model: provider.model, baseUrl: provider.baseUrl, systemPrompt, userPrompt }),
  });
  const data = await res.json();
  if(!res.ok || data.error) throw new Error(data.error || `Erreur ${res.status}`);
  return data.text || "";
}
async function callProviderImage(prompt, size){
  const res = await fetch("/.netlify/functions/generate-image", {
    method:"POST",
    headers: { "Content-Type":"application/json" },
    body: JSON.stringify({ prompt, size }),
  });
  const data = await res.json();
  if(!res.ok || data.error) throw new Error(data.error || `Erreur ${res.status}`);
  if(data.b64) return `data:image/png;base64,${data.b64}`;
  if(data.url) return data.url;
  throw new Error("Aucune image reçue du fournisseur.");
}

/* Estimation grossière (≈4 caractères/token) — précision dépendante des tarifs que l'utilisateur renseigne. */
function estimateCost(provider, promptText){
  if(!provider || (!provider.priceIn && !provider.priceOut)) return null;
  const inTokens = Math.ceil(promptText.length / 4);
  const outTokens = 400; // estimation forfaitaire de la réponse
  const cost = (inTokens/1000)*(provider.priceIn||0) + (outTokens/1000)*(provider.priceOut||0);

}

/* ---------- SCORE QUALITÉ (avant génération) ----------
   Heuristique locale basée sur des signaux structurels disponibles (présence de modules,
   longueur, budget de contexte, risques détectés, historique récent). Ce n'est PAS un jugement
   sémantique — pour une vraie évaluation qualitative, utiliser l'onglet Audit IA (ChatGPT). */
function computeQualityScore({ platform, textPrompt, textMods, imageMods, totalTextAvailable, missionKey }){
  const dims = {};
  const hasMasterCodex = state.modules.some(m=>m.enabled && (m.category==="MASTER SDZ"||m.category==="CODEX SDZ"));
  dims["Respect SDZ"] = hasMasterCodex ? 100 : 60;
  dims["Respect plateforme"] = textMods.some(m=>[platform,"Instagram","Facebook","Google Business","Blog Wix"].includes(m.category)) ? 100 : 75;
  const needsSEO = platform==="Google Business" || platform==="Article Blog Wix";
  dims["Respect SEO"] = !needsSEO ? 100 : (textMods.some(m=>m.category==="SEO") ? 100 : 45);
  dims["Respect conversion"] = (missionKey && MISSIONS[missionKey]) || textMods.some(m=>m.category==="CTA") ? 100 : 65;
  dims["Respect DA"] = daLinesText().length > 40 ? 100 : 55;
  const len = textPrompt.length;
  dims["Longueur"] = len<300 ? 50 : len>7000 ? 55 : 100;
  dims["Doublons"] = 100; // la fusion sans doublons est déjà appliquée en amont
  const risks = currentRiskFlags();
  dims["Risque API"] = Math.max(30, 100 - risks.length*20);
  dims["Lisibilité"] = len>0 && len<6000 ? 90 : 65;
  dims["Clarté"] = (missionKey ? 15 : 0) + (state.prestationName ? 15 : 0) + 70;
  const recentSame = state.history.filter(h=>h.platform===platform).slice(-5);
  dims["Originalité"] = recentSame.length>3 ? 70 : 95;

  const values = Object.values(dims).map(v=>Math.min(100,v));
  const global = Math.round(values.reduce((a,b)=>a+b,0) / values.length);
  const weakPoints = Object.entries(dims).filter(([,v])=>v<75).map(([k])=>k);
  return { global, dims, weakPoints };
}

function parseAuditReport(text){
  const num = (key)=>{ const m = text.match(new RegExp(key+"\\s*:\\s*([0-9.]+)")); return m ? parseFloat(m[1]) : null; };
  const section = (label, stops)=>{
    const re = new RegExp(label+"\\s*:\\s*([\\s\\S]*?)(?="+stops.join("|")+"|$)", "i");
    const m = text.match(re);
    if(!m) return [];
    return m[1].split("\n").map(l=>l.trim()).filter(l=>l.startsWith("-")).map(l=>l.replace(/^-+\s*/,"").trim()).filter(Boolean);
  };
  return {
    charte:num("RESPECT_CHARTE"), coherence:num("COHERENCE_MARQUE"), plateforme:num("RESPECT_PLATEFORME"),
    seo:num("SEO"), conversion:num("CONVERSION"), clarte:num("CLARTE"), redaction:num("QUALITE_REDACTIONNELLE"),
    da:num("QUALITE_DA"), originalite:num("ORIGINALITE"), repetition:num("RISQUE_REPETITION"), global:num("SCORE_GLOBAL"),
    pointsForts: section("POINTS_FORTS", ["POINTS_FAIBLES","RECOMMANDATIONS"]),
    pointsFaibles: section("POINTS_FAIBLES", ["RECOMMANDATIONS","POINTS_FORTS"]),
    recommandations: section("RECOMMANDATIONS", ["POINTS_FORTS","POINTS_FAIBLES"]),
    raw: text,
  };
}

let canvasEl = null;
function drawCanvas(){
  if(!canvasEl) return;
  const img = state.images.find(i=>i.id===state.selectedId);
  if(!img) return;
  const {w,h} = ASPECTS[state.aspect];
  canvasEl.width = w; canvasEl.height = h;
  const ctx = canvasEl.getContext("2d");
  ctx.clearRect(0,0,w,h);
  loadImage(img.dataUrl).then(async image=>{
    const srcRatio = image.width/image.height, dstRatio = w/h;
    let sx,sy,sw,sh;
    if(srcRatio>dstRatio){ sh=image.height; sw=sh*dstRatio; sx=(image.width-sw)/2; sy=0; }
    else { sw=image.width; sh=sw/dstRatio; sx=0; sy=(image.height-sh)/2; }
    ctx.filter = `brightness(${state.filters.brightness}%) contrast(${state.filters.contrast}%) saturate(${state.filters.saturate}%) grayscale(${state.filters.grayscale}%)`;
    ctx.drawImage(image, sx,sy,sw,sh, 0,0,w,h);
    ctx.filter = "none";
    if(state.overlay.text.trim()){
      const fontSize = (state.overlay.size/100)*(w/10);
      ctx.font = `700 ${fontSize}px Georgia, serif`;
      ctx.fillStyle = state.overlay.color;
      ctx.textAlign = "center"; ctx.textBaseline = "middle";
      ctx.shadowColor = "rgba(0,0,0,0.55)"; ctx.shadowBlur = fontSize*0.15;
      ctx.fillText(state.overlay.text, (state.overlay.x/100)*w, (state.overlay.y/100)*h);
      ctx.shadowBlur = 0;
    }
    if(state.logoOverlay.assetId){
      const asset = state.images.find(i=>i.id===state.logoOverlay.assetId);
      if(asset){
        try{
          const logoImg = await loadImage(asset.dataUrl);
          const logoW = w * (state.logoOverlay.size/100);
          const logoH = logoW * (logoImg.height/logoImg.width);
          const lx = (state.logoOverlay.x/100)*w - logoW/2;
          const ly = (state.logoOverlay.y/100)*h - logoH/2;
          ctx.drawImage(logoImg, lx, ly, logoW, logoH);
        }catch(e){}
      }
    }
  });
}
function buildEditorTab(){
  const img = state.images.find(i=>i.id===state.selectedId);
  if(!img) return el("p",{class:"hint"},"Choisis d'abord une photo dans ta bibliothèque.");
  const frag = el("div",{});

  canvasEl = el("canvas", {});
  let dragging = false;
  function posFromEvent(e){
    const rect = canvasEl.getBoundingClientRect();
    const cx = e.touches ? e.touches[0].clientX : e.clientX;
    const cy = e.touches ? e.touches[0].clientY : e.clientY;
    state.overlay.x = Math.max(0,Math.min(100, ((cx-rect.left)/rect.width)*100));
    state.overlay.y = Math.max(0,Math.min(100, ((cy-rect.top)/rect.height)*100));
    drawCanvas();
  }
  canvasEl.addEventListener("mousedown", e=>{dragging=true; posFromEvent(e);});
  canvasEl.addEventListener("mousemove", e=>{ if(dragging) posFromEvent(e); });
  window.addEventListener("mouseup", ()=>dragging=false);
  canvasEl.addEventListener("touchstart", e=>{dragging=true; posFromEvent(e);});
  canvasEl.addEventListener("touchmove", e=>{ if(dragging) posFromEvent(e); });
  canvasEl.addEventListener("touchend", ()=>dragging=false);

  frag.appendChild(el("div", {style:"max-width:360px;margin:0 auto 20px;"}, [vfWrap(canvasEl)]));
  setTimeout(drawCanvas, 0);

  frag.appendChild(el("p",{class:"label"},"Format"));
  const aspectRow = el("div",{class:"pillrow", style:"margin-bottom:16px;"});
  Object.keys(ASPECTS).forEach(key=>{
    aspectRow.appendChild(el("button",{

  frag.appendChild(aspectRow);

  const filterLabels = {brightness:"Luminosité", contrast:"Contraste", saturate:"Saturation", grayscale:"Noir & blanc"};
  Object.keys(state.filters).forEach(key=>{

    range.addEventListener("input", e=>{ state.filters[key] = Number(e.target.value); valSpan.textContent = `${state.filters[key]}%`; drawCanvas(); });
    frag.appendChild(el("div",{class:"slider-block"},[row, range]));
  });

  frag.appendChild(el("p",{class:"label", style:"margin-top:8px;"},"Texte (glisse sur l'image pour le positionner)"));
  const textInput = el("input",{type:"text", value:state.overlay.text, placeholder:"Ton texte..."});
  textInput.addEventListener("input", e=>{ state.overlay.text = e.target.value; drawCanvas(); });
  frag.appendChild(el("div",{style:"margin-bottom:10px;"}, textInput));

  const sizeRange = el("input",{type:"range", min:"20", max:"100", value:String(state.overlay.size), style:"flex:1;"});
  sizeRange.addEventListener("input", e=>{ state.overlay.size = Number(e.target.value); drawCanvas(); });
  const colorInput = el("input",{type:"color", value: state.overlay.color, style:"width:38px;height:38px;border-radius:10px;border:1px solid var(--border);"});
  colorInput.addEventListener("input", e=>{ state.overlay.color = e.target.value; drawCanvas(); });
  frag.appendChild(el("div",{style:"display:flex;gap:12px;align-items:center;margin-bottom:20px;"},[sizeRange, colorInput]));

  const brandAssets = state.images.filter(i=>i.assetType);
  frag.appendChild(el("p",{class:"label"},"Logo / actif de marque à surimposer"));
  if(!brandAssets.length){
    frag.appendChild(el("p",{class:"sublabel"},"Aucun actif de marque enregistré. Marque une photo comme \"Logo\" depuis l'onglet Bibliothèque pour pouvoir l'utiliser ici."));
  } else {
    const assetSelect = el("select",{}, [
      el("option",{value:""}, "Aucun"),
      ...brandAssets.map(a=> el("option",{value:a.id}, `${a.assetType} — ${a.name}`)),
    ]);
    assetSelect.value = state.logoOverlay.assetId;
    assetSelect.addEventListener("change", e=>{ state.logoOverlay.assetId = e.target.value; drawCanvas(); });
    frag.appendChild(el("div",{style:"margin-bottom:10px;"}, assetSelect));

    if(state.logoOverlay.assetId){
      ["x","y","size"].forEach(key=>{
        const labels = { x:"Position horizontale", y:"Position verticale", size:"Taille" };
        const valSpan = el("span",{}, `${state.logoOverlay[key]}%`);
        const row = el("div",{class:"row"},[el("span",{},labels[key]), valSpan]);
        const range = el("input",{type:"range", min: key==="size"?"5":"0", max: key==="size"?"50":"100", value:String(state.logoOverlay[key])});
        range.addEventListener("input", e=>{ state.logoOverlay[key]=Number(e.target.value); valSpan.textContent=`${e.target.value}%`; drawCanvas(); });
        frag.appendChild(el("div",{class:"slider-block"},[row, range]));
      });
    }
  }

  frag.appendChild(el("button",{class:"btn-primary", onclick: ()=>{
    const link = document.createElement("a");
    link.download = `post-${state.aspect.replace(":","x")}.jpg`;
    link.href = canvasEl.toDataURL("image/jpeg", 0.92);
    link.click();
  }}, [svgIcon(ICONS.download,16), el("span",{},"Télécharger le visuel")]));

  return frag;
}

function buildConfigPromptText(){
  return cleanPrompt(`Tu me connais déjà à travers nos échanges précédents. En te basant sur tout ce que tu sais de mon activité, propose des modules de connaissance pour structurer ma base de marque.

Réponds STRICTEMENT avec une ligne par module, dans ce format exact (rien d'autre) :
CATEGORIE | TITRE | CONTENU

Les catégories possibles sont : ${CATEGORIES.join(", ")}.
Propose au moins un module pour "Univers de marque", "Charte graphique", "Prestations" et "Direction artistique".`);
}
function importModulesFromText(text){
  const lines = text.split("\n").map(l=>l.trim()).filter(Boolean);
  let count = 0;
  lines.forEach(line=>{
    const parts = line.split("|").map(p=>p.trim());
    if(parts.length>=3 && CATEGORIES.includes(parts[0])){
      state.modules.push({ id: uid(), category:parts[0], title:parts[1], content:parts.slice(2).join(" | "), enabled:true });
      count++;
    }
  });
  LS.set("vf-modules", state.modules);
  return count;
}

  body.appendChild(row("Contrainte texte-sur-image", overlayRule));
  body.appendChild(row("Modules texte injectés", modList(textMods)));
  body.appendChild(row("Modules texte ignorés (budget de contexte)", textIgnored && textIgnored.length ? modList(textIgnored) : "aucun"));
  body.appendChild(row("Modules image injectés", modList(imageMods)));
  body.appendChild(row("Modules image ignorés (budget de contexte)", imageIgnored && imageIgnored.length ? modList(imageIgnored) : "aucun"));
  if(duplicatesRemoved) body.appendChild(row("Doublons fusionnés automatiquement", String(duplicatesRemoved)));
  details.appendChild(body);
  return details;
}

/* ---------- bloc de retour + score qualité, réutilisé pour post simple et campagne ---------- */
function buildFeedbackBlock(ctx){
  const frag = el("div",{});
  const risk = computeRepetitionRisk(ctx.platform, ctx.getTextResult());
  frag.appendChild(el("h2",{class:"section"},"Score qualité avant validation"));
  const riskColor = risk>50 ? "var(--coral)" : risk>25 ? "var(--amber)" : "var(--green)";
  frag.appendChild(el("p",{style:`font-size:13px;margin-bottom:10px;`},[
    "Risque de répétition détecté (calcul automatique vs historique) : ",
    el("strong",{style:`color:${riskColor};`}, `${risk}%`),
  ]));
  const dims = [["charte","Respect de la charte"],["coherence","Cohérence marque"],["adaptation","Adaptation plateforme"],
    ["originalite","Originalité"],["clarte","Clarté"],["conversion","Potentiel de conversion"]];
  dims.forEach(([key,label])=>{
    const valSpan = el("span",{}, String(state.qualityScores[key]));
    const row = el("div",{class:"row"},[el("span",{},label), valSpan]);
    const range = el("input",{type:"range", min:"0", max:"10", value:String(state.qualityScores[key])});
    range.addEventListener("input", e=>{ state.qualityScores[key]=Number(e.target.value); valSpan.textContent=e.target.value; });
    frag.appendChild(el("div",{class:"slider-block"},[row, range]));
  });

  frag.appendChild(el("h2",{class:"section"},"Retour sur ce contenu"));
  frag.appendChild(el("p",{class:"sublabel"},"Ton retour devient une nouvelle règle réinjectée dans les prochaines générations."));
  const commentArea = el("textarea",{rows:"2", placeholder:"Pourquoi ? (optionnel mais utile pour que l'IA apprenne)"}, state.feedbackComment);
  commentArea.addEventListener("input", e=>{ state.feedbackComment = e.target.value; });
  frag.appendChild(el("div",{style:"margin-bottom:10px;"}, commentArea));

  const rateRow = el("div",{style:"display:flex;gap:8px;margin-bottom:24px;"});
  const doRate = (rating)=>{
    const entry = {
      id: uid(), date: nowStr(), platform: ctx.platform, topic: ctx.topic,
      imagePrompt: ctx.imagePrompt, textPrompt: ctx.textPrompt,
      textResult: ctx.getTextResult(), rating, comment: state.feedbackComment, favorite:false,
      quality: {...state.qualityScores, repetitionRisk: risk},
      campaignLabel: ctx.campaignLabel || null,
    };
    state.history.push(entry);
    LS.set("vf-history", state.history);
    if(rating==="down" || state.feedbackComment.trim()){
      state.modules.push({ id: uid(), category:"Erreurs fréquentes",
        title: `Retour ${ctx.platform} — ${nowStr()}`,
        content: state.feedbackComment.trim() || `Contenu jugé à revoir pour ${ctx.platform} : "${(ctx.getTextResult()||"").slice(0,120)}"`,
        enabled:true });
    }
    if(rating==="up" && ctx.getTextResult().trim()){
      state.modules.push({ id: uid(), category:"Exemples excellents",
        title: `Exemple validé ${ctx.platform} — ${nowStr()}`,
        content: ctx.getTextResult().trim(), enabled:true });
    }
    LS.set("vf-modules", state.modules);
    state.feedbackComment = "";
    ctx.onSaved && ctx.onSaved();
    renderMain();
  };
  rateRow.appendChild(el("button",{class:"btn-ghost", onclick:()=>doRate("up")}, "👍 Excellent"));
  rateRow.appendChild(el("button",{class:"btn-ghost", onclick:()=>doRate("mid")}, "👌 Moyen"));
  rateRow.appendChild(el("button",{class:"btn-ghost", onclick:()=>doRate("down")}, "👎 À revoir"));
  frag.appendChild(rateRow);
  return frag;
}

      imgFileInput.addEventListener("change", async (e)=>{
        const file = e.target.files[0]; if(!file) return;
        const dataUrl = await resizeImageFile(file);
        state.images.push({id: uid(), name:file.name, dataUrl, tags:[item.platform, item.label], favorite:false});

        const pastedArea = el("textarea",{rows:"4", placeholder:"Colle ici la réponse texte de ChatGPT...", style:"margin:8px 0;"}, item.textPasted);
        pastedArea.addEventListener("input", e=>{ item.textPasted = e.target.value; LS.set("vf-campaign", state.campaign); });

        frag.appendChild(el("button",{class:"btn-secondary", style:"margin-bottom:10px;", onclick: ()=>{
          sendToAudit({
            platform:item.platform, missionKey:state.mission, topic:state.topic,

            textMods: textModulesFor(item.platform), imageMods: imageModulesFor(),

          });
        }}, [svgIcon(ICONS.sparkles,14), el("span",{},"Analyser avec ChatGPT")]));
        frag.appendChild(buildFeedbackBlock({
          platform:item.platform, topic:state.topic, imagePrompt:item.imagePrompt, textPrompt:item.textPrompt,

  frag.appendChild(el("button",{class:"btn-primary", style:"margin-bottom:14px;", onclick: ()=>{
    if(!state.topic.trim()){ topicWarn.textContent = "Décris d'abord le sujet du post avant de générer."; return; }
    topicWarn.textContent = "";
    state.imagePrompt = buildImagePromptFull(platform, state.topic, PLATFORM_ASPECT[platform], state.mission);
    state.textPrompt = buildTextPromptFull(platform, state.topic, state.mission);

  if(state.imagePrompt){
    const txtDetail = textModulesDetail(platform);
    const imgDetail = imageModulesDetail();
    if(state.viewMode==="expert") frag.appendChild(buildInspector({
      platform, missionKey: state.mission, prestation: getSelectedPrestationInfo(), style: getSelectedStyle(),
      textMods: txtDetail.kept, textIgnored: txtDetail.ignored, imageMods: imgDetail.kept, imageIgnored: imgDetail.ignored,
      duplicatesRemoved: txtDetail.duplicatesRemoved + imgDetail.duplicatesRemoved,
      aspect: PLATFORM_ASPECT[platform],
      overlayRule: PLATFORM_OVERLAY[platform]==="aucun" ? "aucun texte sur l'image" : `texte léger toléré (${PLATFORM_MAXCHARS[platform]} car. max)`,
    }));

    const risks = currentRiskFlags();
    const provider = state.apiProviders.find(p=>p.id===state.selectedProviderId) || state.apiProviders[0] || null;
    const estCost = provider ? estimateCost(provider, state.textPrompt) : null;
    const SPEED_ESTIMATES = { "Très rapide":"≈2-5 s", "Rapide":"≈5-10 s", "Moyenne":"≈10-20 s" };
    const estTime = provider ? (SPEED_ESTIMATES[provider.speed] || "variable selon le fournisseur") : null;
    const qScore = computeQualityScore({ platform, textPrompt: state.textPrompt, textMods: txtDetail.kept, imageMods: imgDetail.kept, missionKey: state.mission });

    const routerSuggestion = suggestProviderFor({ platform });

    frag.appendChild(el("div",{class:"card", style:"margin-bottom:16px;"},[
      el("div",{style:"display:flex;justify-content:space-between;align-items:center;margin-bottom:10px;"},[
        el("p",{class:"label", style:"margin:0;"},"Audit préalable & score qualité"),

      ]),
      el("div",{class:"learning-row"}, `Longueur du prompt texte : ${state.textPrompt.length} caractères ${state.textPrompt.length>4000?"— assez long, vérifie qu'aucune info superflue n'a été injectée":""}`),

      (()=>{
        const beforeSum = txtDetail.lengthBefore + imgDetail.lengthBefore;
        const afterSum = txtDetail.lengthAfter + imgDetail.lengthAfter;
        const gain = beforeSum>0 ? Math.round((1-afterSum/beforeSum)*100) : 0;
        const tokensSaved = txtDetail.tokensSaved + imgDetail.tokensSaved;
        const costSaved = provider ? estimateCost(provider, "x".repeat(tokensSaved*4)) : null;
        const avgRelevance = Math.round((txtDetail.relevanceIndex + imgDetail.relevanceIndex)/2);
        return el("div",{class:"learning-row", style:"color:var(--green);"},
          `Optimisation moteur : ${beforeSum} → ${afterSum} caractères (−${gain}%) · ≈${tokensSaved} tokens économisés${costSaved!=null?` · ≈$${costSaved.toFixed(4)} économisés`:""} · indice de pertinence : ${avgRelevance}/100`);
      })(),
      risks.length
        ? el("div",{class:"learning-row", style:"color:var(--amber);"}, `⚠ Sujets à traiter avec prudence : ${risks.join(", ")}. Un garde-fou générique est déjà inclus dans le prompt image ; pour un résultat plus précis, renseigne un champ "Scène visuelle" dans la fiche de cette prestation (onglet Connaissances).`)
        : el("div",{class:"learning-row"}, "Aucun sujet sensible détecté."),
      qScore.weakPoints.length
        ? el("div",{class:"learning-row", style:"color:var(--coral);"}, `Points faibles détectés : ${qScore.weakPoints.join(", ")}.`)
        : el("div",{class:"learning-row", style:"color:var(--green);"}, "Aucun point faible détecté sur les critères mesurables."),
      el("div",{class:"learning-row"}, provider
        ? `Coût estimé (${provider.label}) : ${estCost!=null ? "$"+estCost.toFixed(4) : "non estimé — renseigne les tarifs dans Paramètres API"} · Temps estimé : ${estTime}`
        : "Aucun fournisseur API configuré — mode manuel (copier/coller)."),
      routerSuggestion ? el("div",{class:"learning-row", style:"color:#8FA6FF;"}, `Moteur recommandé pour ce type de contenu : ${routerSuggestion.suggestion} — ${routerSuggestion.reason} (suggestion libre, tu choisis toujours toi-même dans le sélecteur ci-dessous).`) : null,

    ]));

    if(qScore.global < 70){
      frag.appendChild(el("button",{class:"btn-secondary", style:"margin-bottom:16px;", onclick: ()=>{
        const optimizedText = buildTextPromptFull(platform, state.topic, state.mission);

        state.textPromptOptimized = optimizedText;
        state.imagePromptOptimized = optimizedImage;
        renderMain();

    }
    if(state.textPromptOptimized){
      frag.appendChild(el("div",{class:"card", style:"margin-bottom:16px;"},[
        el("p",{class:"label"},"Comparaison — version actuelle vs optimisée"),
        el("p",{style:"font-size:12px;color:var(--muted2);margin-bottom:8px;"},"La reconstruction applique la même logique de sélection avec le contexte le plus à jour (modules activés, historique récent). Choisis la version à utiliser."),
        el("div",{style:"display:flex;gap:8px;"},[
          el("button",{class:"btn-ghost", onclick:()=>{ state.textPromptOptimized=null; state.imagePromptOptimized=null; renderMain(); }}, "Garder l'actuelle"),
          el("button",{class:"btn-ghost active", onclick:()=>{ state.textPrompt=state.textPromptOptimized; state.imagePrompt=state.imagePromptOptimized; state.textPromptOptimized=null; state.imagePromptOptimized=null; renderMain(); }}, "Utiliser l'optimisée"),
        ]),
      ]));

    if(provider && provider.apiKey){
      const cached = findCachedResult(provider.label, state.textPrompt);
      if(cached){
        frag.appendChild(el("div",{class:"card", style:"margin-bottom:16px;border-color:#8FA6FF;"},[
          el("p",{style:"font-size:13px;margin-bottom:8px;"}, `Un résultat identique existe déjà (généré le ${cached.date} via ${cached.provider}) — évite un appel payant inutile.`),

            el("button",{class:"btn-ghost", onclick:()=>{ state.textPasted = cached.result||""; renderMain(); }}, "Réutiliser"),

    frag.appendChild(vfWrap(el("div",{class:"card", style:"margin-bottom:6px;"},[el("pre",{}, state.imagePrompt)])));
    frag.appendChild(copyBtnFor(()=>state.imagePrompt));
    frag.appendChild(el("p",{class:"sublabel"},"Colle ce prompt dans ChatGPT Plus (génération d'image), puis importe le résultat dans ta bibliothèque — ou génère-la directement ci-dessous si OpenAI est configuré."));

    const openaiProvider = state.apiProviders.find(p=>p.kind==="openai-compatible" && (p.baseUrl||"").includes("api.openai.com"));
    if(openaiProvider){
      const imgApiStatus = el("p",{style:"font-size:12px;color:var(--muted2);min-height:16px;margin:4px 0 8px;"},"");
      const imgApiBtn = el("button",{class:"btn-secondary", style:"margin-bottom:10px;"}, [svgIcon(ICONS.wand,14), el("span",{},"Générer l'image via l'API (OpenAI)")]);

        imgApiStatus.textContent = "Génération en cours (peut prendre 10-20 s)...";
        const t0 = Date.now();
        const ratio = ASPECTS[PLATFORM_ASPECT[platform]].w / ASPECTS[PLATFORM_ASPECT[platform]].h;
        const size = ratio > 1.15 ? "1792x1024" : ratio < 0.85 ? "1024x1792" : "1024x1024";
        try{
          const dataUrl = await callProviderImage(state.imagePrompt, size);
          const id = uid();
          state.images.push({ id, name:`${platform}-${nowStr()}.png`, dataUrl, tags:[platform], favorite:false });
          LS.set("vf-images", state.images);
          updateCount();
          state.selectedId = id;
          logToLab({ provider:"OpenAI", model:"gpt-image-1", type:"image", prompt: state.imagePrompt, promptHash: hashPrompt(state.imagePrompt), cost:null, durationMs: Date.now()-t0, status:"accepted" });
          imgApiStatus.textContent = "Image générée et ajoutée à ta bibliothèque ✓";
          renderMain();
        }catch(err){
          logToLab({ provider:"OpenAI", model:"gpt-image-1", type:"image", prompt: state.imagePrompt, promptHash: hashPrompt(state.imagePrompt), cost:null, durationMs: Date.now()-t0, status:"refused", reason:String(err.message||err) });
          imgApiStatus.textContent = `Échec (${err.message||err}) — utilise l'import manuel ci-dessous à la place.`;
        }
      });
      frag.appendChild(imgApiBtn);
      frag.appendChild(imgApiStatus);
    }

    const imgFileInput = el("input",{type:"file", accept:"image/*", style:"display:none"});
    const confirmMsg = el("p",{style:"font-size:12px;color:var(--green);margin-top:8px;min-height:14px;"},"");
    imgFileInput.addEventListener("change", async (e)=>{
      const file = e.target.files[0]; if(!file) return;
      const dataUrl = await resizeImageFile(file);
      const id = uid();
      state.images.push({id, name:file.name, dataUrl, tags:[platform], favorite:false});
      LS.set("vf-images", state.images);
      updateCount();
      state.selectedId = id;
      confirmMsg.textContent = "Image ajoutée à ta bibliothèque ✓";
      imgFileInput.value = "";
    });
    frag.appendChild(imgFileInput);
    frag.appendChild(el("button",{class:"btn-secondary", onclick:()=>imgFileInput.click()}, [svgIcon(ICONS.upload,14), el("span",{},"Importer l'image générée")]));
    frag.appendChild(confirmMsg);

    frag.appendChild(el("h2",{class:"section"}, state.viewMode==="production" ? "Texte à copier dans ChatGPT" : "Prompt texte"));
    frag.appendChild(vfWrap(el("div",{class:"card", style:"margin-bottom:6px;"},[el("pre",{}, state.textPrompt)])));
    frag.appendChild(copyBtnFor(()=>state.textPrompt));

      const providerSelect = el("select",{style:"margin:8px 0;"}, state.apiProviders.map(p=> el("option",{value:p.id}, p.label)));
      providerSelect.value = state.selectedProviderId || state.apiProviders[0].id;
      providerSelect.addEventListener("change", e=>{ state.selectedProviderId = e.target.value; renderMain(); });
      frag.appendChild(providerSelect);

      const apiStatus = el("p",{style:"font-size:12px;color:var(--muted2);min-height:16px;margin:4px 0 8px;"},"");
      const apiBtn = el("button",{class:"btn-secondary", style:"margin-bottom:10px;"}, [svgIcon(ICONS.sparkles,14), el("span",{},"Générer via l'API (remplace le copier/coller)")]);
      apiBtn.addEventListener("click", async ()=>{
        const provider = state.apiProviders.find(p=>p.id===(state.selectedProviderId||state.apiProviders[0].id));
        if(!provider || !provider.apiKey){ apiStatus.textContent = "Renseigne d'abord une clé API dans Paramètres API."; return; }
        const cached = findCachedResult(provider.label, state.textPrompt);
        if(cached && !confirm(`Un résultat identique existe déjà (${cached.date}). Régénérer quand même et consommer du budget ?`)) {
          state.textPasted = cached.result || "";
          renderMain();
          return;
        }
        const cost = estimateCost(provider, state.textPrompt);
        const costLabel = cost!=null ? `~$${cost.toFixed(4)}` : "coût non estimé (tarifs non renseignés)";
        if(!confirm(`Lancer la génération via ${provider.label} ? Coût estimé : ${costLabel}.`)) return;
        apiStatus.textContent = "Génération en cours...";
        const t0 = Date.now();
        try{
          const result = await callProviderText(provider, "Tu es le rédacteur officiel de cette marque, respecte strictement les informations et contraintes fournies.", state.textPrompt);
          state.textPasted = result;
          logToLab({ provider: provider.label, model: provider.model, type:"texte", prompt: state.textPrompt, promptHash: hashPrompt(state.textPrompt), result, cost, durationMs: Date.now()-t0, status:"accepted" });
          apiStatus.textContent = "Résultat reçu et inséré ci-dessous ✓";
          renderMain();
        }catch(err){
          logToLab({ provider: provider.label, model: provider.model, type:"texte", prompt: state.textPrompt, promptHash: hashPrompt(state.textPrompt), cost, durationMs: Date.now()-t0, status:"refused", reason: String(err.message||err) });
          apiStatus.textContent = `Échec de l'appel (${err.message||err}) — utilise le mode manuel ci-dessous à la place.`;
        }
      });
      frag.appendChild(apiBtn);
      frag.appendChild(apiStatus);
    }

    const pastedArea = el("textarea",{rows:"5", placeholder:"Colle ici la réponse texte de ChatGPT (ou récupère-la automatiquement via l'API ci-dessus)..."}, state.textPasted);
    pastedArea.addEventListener("input", e=>{ state.textPasted = e.target.value; });
    frag.appendChild(el("div",{style:"margin:10px 0;"}, pastedArea));

    frag.appendChild(el("button",{class:"btn-secondary", style:"margin-bottom:10px;", onclick: ()=>{
      sendToAudit({
        platform, missionKey: state.mission, topic: state.topic,
        imagePrompt: state.imagePrompt, textPrompt: state.textPrompt,
        textMods: textModulesFor(platform), imageMods: imageModulesFor(),
        prestation: getSelectedPrestationInfo(), style: getSelectedStyle(),
        antiRepeatTextNote: buildAntiRepeatNote(platform,"texte"), antiRepeatImageNote: buildAntiRepeatNote(platform,"image"),
        textPasted: state.textPasted,
      });
    }}, [svgIcon(ICONS.sparkles,14), el("span",{},"Analyser avec ChatGPT")]));

    if(state.viewMode==="production"){
      frag.appendChild(el("div",{class:"card", style:"margin-bottom:16px;"},[
        el("p",{class:"label", style:"margin-bottom:8px;"},"Checklist avant publication"),
        el("div",{class:"learning-row"},"☐ Image collée dans ChatGPT, logo joint si disponible"),
        el("div",{class:"learning-row"},"☐ Texte généré et collé ci-dessus"),
        el("div",{class:"learning-row"},"☐ Durée / tarif vérifiés"),
        el("div",{class:"learning-row"},"☐ Logo ajouté manuellement si besoin (onglet Éditeur)"),
        el("div",{class:"learning-row"},"☐ Hashtags / alt text relus"),
        el("div",{class:"learning-row"},"☐ Prêt à publier"),
      ]));
    }

    frag.appendChild(buildFeedbackBlock({
      platform, topic: state.topic, imagePrompt: state.imagePrompt, textPrompt: state.textPrompt,
      getTextResult: ()=>state.textPasted,
    }));
  }

  return frag;
}

function scoreRow(label, val){
  const pct = val==null ? 0 : val*10;
  const color = val==null ? "var(--muted2)" : pct>=70 ? "var(--green)" : pct>=45 ? "var(--amber)" : "var(--coral)";
  return el("div",{style:"margin-bottom:8px;"},[
    el("div",{style:"display:flex;justify-content:space-between;font-size:12px;color:var(--muted);margin-bottom:3px;"},
      [el("span",{},label), el("span",{style:`color:${color};font-weight:600;`}, val!=null? `${val}/10` : "—")]),
    el("div",{style:"height:5px;background:rgba(255,255,255,0.08);border-radius:3px;overflow:hidden;"},[
      el("div",{style:`height:100%;width:${pct}%;background:${color};`}),
    ]),
  ]);
}
function renderAuditReport(report){
  const frag = el("div",{class:"card", style:"margin-bottom:16px;"});
  frag.appendChild(el("div",{style:"text-align:center;margin-bottom:14px;"},[
    el("div",{style:"font-size:11px;color:var(--muted2);text-transform:uppercase;letter-spacing:.06em;"},"Score global"),
    el("div",{style:"font-size:32px;font-weight:700;color:var(--lime);"}, report.global!=null?`${report.global}/10`:"—"),
  ]));
  [["Respect de la charte",report.charte],["Cohérence marque",report.coherence],["Respect plateforme",report.plateforme],
   ["SEO",report.seo],["Conversion",report.conversion],["Clarté",report.clarte],
   ["Qualité rédactionnelle",report.redaction],["Qualité direction artistique",report.da],
   ["Originalité",report.originalite],["Risque de répétition",report.repetition]]
   .forEach(([label,val])=> frag.appendChild(scoreRow(label,val)));

  if(report.pointsForts.length){
    frag.appendChild(el("p",{class:"label", style:"margin-top:14px;"},"Points forts"));
    report.pointsForts.forEach(p=> frag.appendChild(el("div",{class:"learning-row", style:"color:var(--green);"}, `+ ${p}`)));
  }
  if(report.pointsFaibles.length){
    frag.appendChild(el("p",{class:"label", style:"margin-top:10px;"},"Points faibles"));
    report.pointsFaibles.forEach(p=> frag.appendChild(el("div",{class:"learning-row", style:"color:var(--coral);"}, `− ${p}`)));
  }
  if(report.recommandations.length){
    frag.appendChild(el("p",{class:"label", style:"margin-top:10px;"},"Recommandations"));
    report.recommandations.forEach(p=> frag.appendChild(el("div",{class:"learning-row"}, `→ ${p}`)));
  }
  return frag;
}

      ]));

function buildLabTab(){
  const frag = el("div",{});
  frag.appendChild(el("p",{class:"sublabel"},"Historique de toutes les générations via API directe : modèle, coût, temps, résultat accepté ou refusé. Alimente l'apprentissage au fil du temps."));

    frag.appendChild(el("p",{class:"hint"},"Aucune génération via API pour l'instant. Configure un fournisseur dans \"Paramètres API\" puis génère un post en Mode Expert ou Production."));
    return frag;
  }

  // Bibliothèque de compatibilité : agrège les taux d'acceptation par fournisseur pour repérer les tendances.
  const byProvider = {};
  state.lab.forEach(l=>{
    if(!byProvider[l.provider]) byProvider[l.provider] = { accepted:0, refused:0, reasons:{} };
    if(l.status==="accepted") byProvider[l.provider].accepted++;
    if(l.status==="refused"){
      byProvider[l.provider].refused++;
      const r = l.reason || "raison inconnue";
      byProvider[l.provider].reasons[r] = (byProvider[l.provider].reasons[r]||0)+1;
    }
  });
  frag.appendChild(el("p",{class:"label"},"Bibliothèque de compatibilité"));
  Object.entries(byProvider).forEach(([provName, stats])=>{
    const total = stats.accepted+stats.refused;
    const rate = total ? Math.round((stats.accepted/total)*100) : 0;
    const topReason = Object.entries(stats.reasons).sort((a,b)=>b[1]-a[1])[0];
    frag.appendChild(el("div",{class:"module-card"},[
      el("div",{class:"module-head"},[el("div",{class:"module-title"}, provName), el("span",{style:`font-size:13px;color:${rate>=80?"var(--green)":rate>=50?"var(--amber)":"var(--coral)"};font-weight:600;`}, `${rate}% accepté`)]),
      el("div",{class:"module-content"}, `${stats.accepted} accepté(s), ${stats.refused} refusé(s)${topReason? ` — motif de refus le plus fréquent : "${topReason[0]}"` : ""}`),
    ]));
  });

  frag.appendChild(el("p",{class:"label", style:"margin-top:18px;"},"Historique détaillé"));
  const filterRow = el("div",{class:"pillrow", style:"margin-bottom:14px;"});
  const providers = ["Toutes", ...new Set(state.lab.map(l=>l.provider))];
  providers.forEach(p=>{
    filterRow.appendChild(el("button",{class:"pill"+(state.labFilter===p?" active":""), onclick:()=>{ state.labFilter=p; renderMain(); }}, p));

  frag.appendChild(filterRow);

  const list = state.lab.filter(l=> state.labFilter==="Toutes" || l.provider===state.labFilter).slice().reverse();
  list.forEach(l=>{
    frag.appendChild(el("div",{class:"history-card"},[
      el("div",{class:"history-top"},[
        el("span",{}, `${l.provider} · ${l.model} · ${l.date}`),
        el("span",{style:`color:${l.status==="accepted"?"var(--green)":l.status==="refused"?"var(--coral)":"var(--muted2)"};`}, l.status==="accepted"?"✓ accepté":l.status==="refused"?"✗ refusé":"—"),
      ]),
      el("div",{style:"font-size:13px;color:var(--muted);margin-bottom:4px;"}, `Type : ${l.type} · Coût estimé : ${l.cost!=null ? "$"+l.cost.toFixed(4) : "non estimé"} · Temps : ${l.durationMs!=null ? (l.durationMs/1000).toFixed(1)+"s" : "—"}`),
      l.reason ? el("div",{style:"font-size:12px;color:var(--coral);"}, `Raison : ${l.reason}`) : null,
      el("details",{style:"margin-top:6px;"},[
        el("summary",{style:"font-size:12px;color:var(--muted2);cursor:pointer;"},"Voir le prompt envoyé"),

    [apiKeyToggle, "Inclure mes clés API dans l'export (déconseillé si tu comptes partager ce fichier — exclu par défaut)"]));

  frag.appendChild(el("button",{class:"btn-primary", style:"margin-bottom:12px;", onclick: ()=>{
    const dump = { _meta: { app:"Viewfinder", exportedAt: new Date().toISOString(), version: 1 } };
    getAllVfKeys().forEach(k=>{
      if(k==="vf-api-providers" && !state.includeApiKeysInExport){
        const sanitized = (LS.get(k, [])||[]).map(p=> ({...p, apiKey:""}));
        dump[k] = sanitized;
      } else {
        dump[k] = LS.get(k, null);
      }
    });
    const blob = new Blob([JSON.stringify(dump, null, 2)], {type:"application/json"});
    const link = document.createElement("a");
    link.download = `viewfinder-sauvegarde-${nowStr().replace(/\//g,"-")}.json`;
    link.href = URL.createObjectURL(blob);
    link.click();
  }}, [svgIcon(ICONS.download,16), el("span",{},"Exporter toute la sauvegarde")]));

  const importInput = el("input",{type:"file", accept:"application/json", style:"display:none"});
  const importMsg = el("p",{style:"font-size:12px;color:var(--green);min-height:14px;"},"");
  importInput.addEventListener("change", (e)=>{
    const file = e.target.files[0]; if(!file) return;
    const reader = new FileReader();
    reader.onload = ()=>{
      try{
        const dump = JSON.parse(reader.result);
        const entries = Object.entries(dump).filter(([k])=> k.startsWith("vf-"));
        if(!entries.length){ importMsg.textContent = "Ce fichier ne contient aucune donnée Viewfinder reconnue."; return; }
        const ok = confirm(`Restaurer cette sauvegarde va REMPLACER toutes les données actuelles de Viewfinder sur cet appareil (${entries.length} élément(s)). Continuer ?`);
        if(!ok) return;
        entries.forEach(([k,v])=>{ if(v!==null) LS.set(k, v); });
        importMsg.textContent = "Restauration réussie, rechargement...";
        setTimeout(()=>location.reload(), 800);
      }catch(err){ importMsg.textContent = "Fichier invalide ou corrompu."; }
    };
    reader.readAsText(file);
    importInput.value = "";
  });
  frag.appendChild(importInput);
  frag.appendChild(el("button",{class:"btn-secondary"}, [svgIcon(ICONS.upload,14), el("span",{},"Restaurer une sauvegarde")]))
    .addEventListener("click", ()=>importInput.click());
  frag.appendChild(importMsg);

  return frag;
}

/* ============================================================
   ROUTEUR
============================================================ */
function renderMain(){
  const main = document.getElementById("main");
  main.innerHTML = "";
  const builders = {
    accueil: buildAccueilTab, library: buildLibraryTab, editor: buildEditorTab, knowledge: buildKnowledgeTab,
    da: buildDaTab, styles: buildStylesTab, post: buildPostTab, audit: buildAuditTab, lab: buildLabTab, api: buildApiTab,
    history: buildHistoryTab, settings: buildSettingsTab,
  };
  try{
    const builder = builders[state.tab] || buildAccueilTab;
    main.appendChild(builder());
  }catch(err){
    console.error("Erreur de rendu :", err);
    main.appendChild(el("div",{class:"card"},[
      el("p",{style:"color:var(--coral);font-weight:600;margin-bottom:6px;"},"Cet onglet a rencontré un problème."),
      el("p",{style:"font-size:12px;color:var(--muted2);margin-bottom:10px;"}, String(err && err.message || err)),
      el("button",{class:"btn-secondary", onclick:()=>{ state.tab="accueil"; renderNav(); renderMain(); }}, "Retour à l'accueil"),
    ]));
  }
}
renderNav();
renderMain();
updateCount();

if ("serviceWorker" in navigator) {
  window.addEventListener("load", () => {
    navigator.serviceWorker.register("./sw.js").catch((err) => console.error("SW non enregistré :", err));
  });
}
</script>
