[build]
  publish = "."
  functions = "netlify/functions"

[functions]
  node_bundler = "esbuild"

[functions."check-scheduled-posts"]
  schedule = "*/15 * * * *"

[[redirects]]
  from = "/img/*"
  to = "/.netlify/functions/serve-image?id=:splat"
  status = 200
  force = true

[[headers]]
  for = "/sw.js"
  [headers.values]
    Cache-Control = "no-cache"
